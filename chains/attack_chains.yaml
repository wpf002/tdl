# TDE Playbook — Attack Chain Definitions
# Maps known adversary playbooks to sequences of detection rules.
# When N rules in a chain fire within the time window on the same entity,
# the chain alert fires at the escalated severity.
#
# entity_type: host | user | src_ip | domain
# window:      time window for correlation (e.g. 2h, 24h, 72h)
# min_rules:   minimum rules that must fire to trigger the chain alert
# escalate_to: severity to escalate to when chain fires

version: "1.0"

chains:

  - chain_id: CHAIN-001
    name: "Cobalt Strike Full Compromise Chain"
    description: >
      Detects the full Cobalt Strike post-exploitation sequence from initial staging
      through credential theft and lateral movement. High-confidence indicator of
      active red team or nation-state intrusion.
    threat_actor_profile: APT / Red Team
    severity: Critical
    window: 4h
    entity_type: host
    min_rules: 3
    escalate_to: Critical
    rules:
      - rule_id: TDE-EXE-004
        step: 1
        label: "MSHTA/LOLBIN execution — initial staging"
        required: false
      - rule_id: TDE-EXE-005
        step: 1
        label: "Regsvr32 SCT — alternate staging"
        required: false
      - rule_id: TDE-DE-002
        step: 2
        label: "Process injection — shellcode loaded"
        required: true
      - rule_id: TDE-CA-001
        step: 3
        label: "LSASS access — credential theft"
        required: true
      - rule_id: TDE-LM-001
        step: 4
        label: "Pass-the-Hash — lateral movement"
        required: false
      - rule_id: TDE-C2-001
        step: 5
        label: "C2 beaconing established"
        required: false
    detection_spl: |
      index=windows
      | eval chain_rules=case(
          match(rule_name,"TDE-EXE-004|TDE-EXE-005"), "staging",
          match(rule_name,"TDE-DE-002"), "injection",
          match(rule_name,"TDE-CA-001"), "cred_theft",
          match(rule_name,"TDE-LM-001"), "lateral_move",
          match(rule_name,"TDE-C2-001"), "c2",
          true(), null())
      | where isnotnull(chain_rules)
      | bucket _time span=4h
      | stats dc(chain_rules) as chain_stages, values(chain_rules) as stages, values(rule_name) as rules_fired
          by host, _time
      | where chain_stages >= 3
      | eval alert="COBALT STRIKE CHAIN DETECTED"
      | table _time, host, chain_stages, stages, rules_fired, alert
    detection_kql: |
      SecurityAlert
      | where TimeGenerated >= ago(4h)
      | where AlertName in ("TDE-EXE-004","TDE-EXE-005","TDE-DE-002","TDE-CA-001","TDE-LM-001","TDE-C2-001")
      | summarize
          ChainStages = dcount(AlertName),
          StagesList = make_set(AlertName),
          FirstSeen = min(TimeGenerated),
          LastSeen = max(TimeGenerated)
          by CompromisedEntity, bin(TimeGenerated, 4h)
      | where ChainStages >= 3
      | extend ChainAlert = "COBALT STRIKE CHAIN DETECTED"
    references:
      - https://attack.mitre.org/groups/G0080/
      - https://www.cobaltstrike.com/

  - chain_id: CHAIN-002
    name: "Ransomware Pre-Encryption Sequence"
    description: >
      Detects the universal ransomware kill chain: initial execution, privilege escalation
      or lateral spread, followed by defense evasion (log clearing, shadow copy deletion)
      before the encryption payload activates. Catching this chain early provides an
      intervention window before data loss.
    threat_actor_profile: Ransomware (LockBit / BlackCat / Black Basta / Cl0p)
    severity: Critical
    window: 2h
    entity_type: host
    min_rules: 2
    escalate_to: Critical
    rules:
      - rule_id: TDL-IMP-000050
        step: 1
        label: "Ransomware AV detection"
        required: false
      - rule_id: TDE-DE-001
        step: 2
        label: "Event log cleared — covering tracks"
        required: false
      - rule_id: TDE-IMP-002
        step: 2
        label: "VSS shadow copies deleted — blocking recovery"
        required: true
      - rule_id: TDE-IMP-001
        step: 3
        label: "Mass file rename — active encryption"
        required: true
    detection_spl: |
      index=windows
      | eval chain_stage=case(
          match(rule_name,"000050"), "av_detect",
          match(rule_name,"TDE-DE-001"), "log_cleared",
          match(rule_name,"TDE-IMP-002"), "vss_deleted",
          match(rule_name,"TDE-IMP-001"), "encrypting",
          true(), null())
      | where isnotnull(chain_stage)
      | bucket _time span=2h
      | stats dc(chain_stage) as stages, values(chain_stage) as stage_list, count by host, _time
      | where stages >= 2 AND (mvfind(stage_list,"vss_deleted")>=0 OR mvfind(stage_list,"encrypting")>=0)
      | eval alert="RANSOMWARE KILL CHAIN ACTIVE — ISOLATE HOST IMMEDIATELY"
      | table _time, host, stages, stage_list, alert
    detection_kql: |
      SecurityAlert
      | where TimeGenerated >= ago(2h)
      | where AlertName in ("TDL-IMP-000050","TDE-DE-001","TDE-IMP-002","TDE-IMP-001")
      | summarize
          Stages = dcount(AlertName),
          StagesList = make_set(AlertName),
          FirstSeen = min(TimeGenerated),
          LastSeen = max(TimeGenerated)
          by CompromisedEntity, bin(TimeGenerated, 2h)
      | where Stages >= 2
        and (StagesList has "TDE-IMP-002" or StagesList has "TDE-IMP-001")
      | extend ChainAlert = "RANSOMWARE KILL CHAIN — ISOLATE IMMEDIATELY"

  - chain_id: CHAIN-003
    name: "Active Directory Takeover Chain"
    description: >
      Detects the sequence used for full Active Directory domain compromise:
      domain enumeration (BloodHound), followed by Kerberoasting or DCSync,
      then pass-the-hash or Golden/Silver ticket usage for domain-wide lateral movement.
    threat_actor_profile: APT / Advanced Threat Actor
    severity: Critical
    window: 8h
    entity_type: user
    min_rules: 3
    escalate_to: Critical
    rules:
      - rule_id: TDE-DIS-002
        step: 1
        label: "LDAP/BloodHound enumeration"
        required: false
      - rule_id: TDE-CA-002
        step: 2
        label: "Kerberoasting — service account targeting"
        required: false
      - rule_id: TDE-CA-004
        step: 2
        label: "DCSync — credential replication"
        required: false
      - rule_id: TDE-CA-003
        step: 2
        label: "Password spraying — credential validation"
        required: false
      - rule_id: TDE-LM-001
        step: 3
        label: "Pass-the-Hash — domain-wide lateral movement"
        required: true
      - rule_id: TDE-DE-001
        step: 4
        label: "Event log clearing — anti-forensics"
        required: false
    detection_spl: |
      index=windows
      | eval stage=case(
          rule_name="TDE-DIS-002","recon",
          rule_name IN ("TDE-CA-002","TDE-CA-004","TDE-CA-003"),"cred_access",
          rule_name="TDE-LM-001","lateral",
          rule_name="TDE-DE-001","evasion",
          true(),null())
      | where isnotnull(stage)
      | bucket _time span=8h
      | stats dc(stage) as distinct_stages, values(stage) as stage_list, values(rule_name) as rules_fired
          by user, _time
      | where distinct_stages >= 3
      | eval alert="AD TAKEOVER CHAIN — EMERGENCY RESPONSE REQUIRED"
      | table _time, user, distinct_stages, stage_list, rules_fired, alert
    detection_kql: |
      SecurityAlert
      | where TimeGenerated >= ago(8h)
      | where AlertName in ("TDE-DIS-002","TDE-CA-002","TDE-CA-004","TDE-CA-003","TDE-LM-001","TDE-DE-001")
      | summarize
          Stages = dcount(AlertName),
          StagesList = make_set(AlertName),
          FirstSeen = min(TimeGenerated)
          by tostring(Entities), bin(TimeGenerated, 8h)
      | where Stages >= 3 and StagesList has "TDE-LM-001"
      | extend ChainAlert = "AD TAKEOVER CHAIN DETECTED"

  - chain_id: CHAIN-004
    name: "Insider Threat / Data Exfiltration Chain"
    description: >
      Detects insider threat data theft: bulk file collection from sensitive directories,
      followed by archiving/compression, then exfiltration to cloud storage or new domains.
      Also covers compromised account performing the same sequence.
    threat_actor_profile: Insider Threat / Compromised Account
    severity: High
    window: 24h
    entity_type: user
    min_rules: 2
    escalate_to: Critical
    rules:
      - rule_id: TDE-COL-002
        step: 1
        label: "Bulk file access — data collection"
        required: true
      - rule_id: TDE-COL-001
        step: 2
        label: "Archive creation — staging data"
        required: false
      - rule_id: TDE-EXF-001
        step: 3
        label: "Cloud storage upload — exfiltration"
        required: false
      - rule_id: TDE-EXF-002
        step: 3
        label: "Upload to new domain — exfiltration"
        required: false
    detection_spl: |
      index=windows OR index=network
      | eval stage=case(
          rule_name="TDE-COL-002","collection",
          rule_name="TDE-COL-001","staging",
          rule_name IN ("TDE-EXF-001","TDE-EXF-002"),"exfiltration",
          true(),null())
      | where isnotnull(stage)
      | bucket _time span=24h
      | stats dc(stage) as stages, values(stage) as stage_list, values(rule_name) as rules_fired
          by user, _time
      | where stages >= 2 AND mvfind(stage_list,"collection") >= 0
      | eval alert="INSIDER THREAT / DATA EXFILTRATION CHAIN DETECTED"
      | table _time, user, stages, stage_list, rules_fired, alert

  - chain_id: CHAIN-005
    name: "Initial Access to Persistence Chain"
    description: >
      Detects the sequence from initial phishing/exploitation through establishing
      persistence. Catching this chain early — before lateral movement — limits blast radius.
    threat_actor_profile: General Threat Actor
    severity: High
    window: 4h
    entity_type: host
    min_rules: 2
    escalate_to: High
    rules:
      - rule_id: TDE-EXE-001
        step: 1
        label: "PowerShell encoded — initial execution"
        required: false
      - rule_id: TDE-EXE-002
        step: 1
        label: "WSH remote payload — initial execution"
        required: false
      - rule_id: TDE-PER-001
        step: 2
        label: "Registry run key — persistence established"
        required: false
      - rule_id: TDE-PER-002
        step: 2
        label: "Suspicious service — persistence established"
        required: false
      - rule_id: TDE-PER-004
        step: 2
        label: "WMI subscription — persistence established"
        required: false
      - rule_id: TDE-C2-001
        step: 3
        label: "C2 beacon — implant calling home"
        required: false

# TDL Playbook — Log Source Catalog
# Defines criticality, tier, coverage value, and deployment metadata for every log source.
# Used by the recommendation engine and environment profiler.
#
# criticality:  Critical | High | Medium | Low
# tier:         1 (foundational) | 2 (important) | 3 (supplementary)
# deployment:   Easy | Moderate | Complex
# cost:         Low | Medium | High

version: "1.0"
last_updated: "2026-04-27"

log_sources:

  # ── TIER 1 — FOUNDATIONAL ──────────────────────────────────────────────────

  - id: windows_security_events
    name: "Windows Security Event Log"
    aliases: ["Windows AD", "Windows Active Directory", "WinEventLog:Security", "Windows Security"]
    category: Identity
    criticality: Critical
    tier: 1
    platform: Windows
    deployment: Easy
    cost: Low
    description: >
      The single most valuable log source in Windows environments. Covers authentication,
      privilege use, account changes, object access, and process creation. Without this,
      you are blind to the majority of ATT&CK credential access and lateral movement techniques.
    tactics_covered:
      - Credential Access
      - Lateral Movement
      - Persistence
      - Privilege Escalation
      - Defense Evasion
    key_event_ids:
      - "4624: Successful logon"
      - "4625: Failed logon"
      - "4648: Explicit credential use"
      - "4662: Object access (DCSync)"
      - "4688: Process creation"
      - "4698: Scheduled task created"
      - "4720/4726: Account created/deleted"
      - "4740: Account lockout"
      - "4769: Kerberos TGS request (Kerberoasting)"
      - "4776: NTLM authentication"
      - "1102: Security log cleared"
    without_this_you_miss:
      - DCSync attacks
      - Pass-the-Hash
      - Kerberoasting
      - Password spraying
      - Log clearing detection
      - Scheduled task persistence
      - Local account creation
      - Lateral movement via NTLM
    recommended_retention_days: 365
    references:
      - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/

  - id: sysmon
    name: "Sysmon (System Monitor)"
    aliases: ["Sysmon", "Microsoft-Windows-Sysmon", "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"]
    category: Endpoint
    criticality: Critical
    tier: 1
    platform: Windows
    deployment: Easy
    cost: Low
    description: >
      Free Microsoft tool providing process creation, network connections, file creation,
      registry changes, and DLL loads. Combined with Windows Security events, this gives
      near-complete Windows endpoint visibility. Required for detecting most LOLBIN abuse,
      process injection, and fileless attacks.
    tactics_covered:
      - Execution
      - Persistence
      - Defense Evasion
      - Credential Access
      - Lateral Movement
      - Command and Control
    key_event_ids:
      - "1: Process Create"
      - "2: File creation time changed (timestomping)"
      - "3: Network connection"
      - "7: Image loaded (DLL)"
      - "8: CreateRemoteThread (injection)"
      - "10: ProcessAccess (LSASS)"
      - "11: File Create"
      - "13: Registry value set"
      - "17/18/19/20/21: Named pipes, WMI"
    without_this_you_miss:
      - LSASS credential dumping (ProcessAccess)
      - Process injection (CreateRemoteThread)
      - DLL side-loading
      - WMI persistence
      - Timestomping
      - LOLBIN execution chains
    recommended_retention_days: 90
    references:
      - https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon

  - id: firewall
    name: "Firewall / Network Perimeter Logs"
    aliases: ["Firewall", "Palo Alto", "Cisco ASA", "Fortinet", "Check Point", "pfSense"]
    category: Network
    criticality: Critical
    tier: 1
    platform: Network
    deployment: Easy
    cost: Low
    description: >
      Perimeter and internal firewall logs provide east-west and north-south traffic visibility.
      Essential for detecting C2 beaconing, lateral movement, port scanning, and data exfiltration.
    tactics_covered:
      - Command and Control
      - Exfiltration
      - Lateral Movement
      - Discovery
    without_this_you_miss:
      - C2 beaconing
      - DNS tunneling (if DNS-aware)
      - Port scanning
      - Outbound exfiltration
      - Internal lateral movement traffic
    recommended_retention_days: 180
    cost_note: "Log volume can be high — consider flow data (NetFlow/IPFIX) as a lower-cost alternative"

  - id: edr
    name: "Endpoint Detection & Response (EDR)"
    aliases: ["CrowdStrike", "SentinelOne", "Microsoft Defender for Endpoint", "Carbon Black", "Palo Alto Cortex XDR", "Cylance", "MDE"]
    category: Endpoint
    criticality: Critical
    tier: 1
    platform: ["Windows", "Linux", "macOS"]
    deployment: Moderate
    cost: High
    description: >
      EDR platforms provide the richest endpoint telemetry available: process trees, memory events,
      file I/O, registry, network from the endpoint perspective, and behavioral detections.
      Replaces or supplements Sysmon in managed environments.
    tactics_covered:
      - Execution
      - Persistence
      - Privilege Escalation
      - Defense Evasion
      - Credential Access
      - Lateral Movement
    without_this_you_miss:
      - Memory injection detection
      - Behavioral anomaly detection
      - Fileless malware execution
      - Endpoint isolation capability
    recommended_retention_days: 90

  - id: dns
    name: "DNS Logs"
    aliases: ["DNS", "Domain Name System", "DNS Server logs", "Windows DNS"]
    category: Network
    criticality: High
    tier: 1
    platform: Network
    deployment: Moderate
    cost: Medium
    description: >
      DNS is queried for nearly every network action. DNS logs expose C2 infrastructure,
      DGA domains, DNS tunneling, and lateral movement via hostname resolution.
      Extremely high signal-to-noise when analyzed correctly.
    tactics_covered:
      - Command and Control
      - Exfiltration
      - Initial Access
    without_this_you_miss:
      - DNS tunneling (C2 and exfil)
      - DGA domain detection
      - C2 domain resolution before connection
      - Internal DNS-based lateral movement
    recommended_retention_days: 90

  - id: identity_provider
    name: "Identity Provider (Azure AD / Entra ID / Okta)"
    aliases: ["Azure AD", "Entra ID", "Okta", "Azure Sign-in Logs", "OktaIM2", "Ping Identity"]
    category: Identity
    criticality: Critical
    tier: 1
    platform: ["Azure", "Okta", "SaaS"]
    deployment: Easy
    cost: Low
    description: >
      Cloud identity is the new perimeter. IdP logs cover authentication, MFA, SSO, user
      provisioning, and admin actions. Without this, cloud-targeted attacks are invisible.
    tactics_covered:
      - Initial Access
      - Credential Access
      - Persistence
      - Privilege Escalation
    without_this_you_miss:
      - Password spraying against cloud accounts
      - MFA fatigue / push bombing
      - Impossible travel
      - Token theft
      - Unauthorized admin role assignment
      - Account takeover post-MFA bypass
    recommended_retention_days: 365

  # ── TIER 2 — IMPORTANT ────────────────────────────────────────────────────

  - id: proxy_web_gateway
    name: "Web Proxy / Secure Web Gateway"
    aliases: ["Proxy", "Zscaler", "Bluecoat", "McAfee Web Gateway", "Netskope", "Forward Proxy"]
    category: Network
    criticality: High
    tier: 2
    platform: Network
    deployment: Moderate
    cost: Medium
    description: >
      Web proxy logs provide full URL-level visibility into outbound HTTP/S traffic.
      Critical for detecting C2 over HTTP/S, malware downloads, and data exfiltration
      to cloud services.
    tactics_covered:
      - Command and Control
      - Exfiltration
      - Initial Access
    without_this_you_miss:
      - C2 over HTTPS to new/rare domains
      - Malicious file downloads
      - Exfiltration to cloud storage (Mega, Dropbox)
      - Beaconing with low jitter
    recommended_retention_days: 90

  - id: email_security
    name: "Email Security Gateway"
    aliases: ["Proofpoint", "Mimecast", "Microsoft Defender for O365", "O365 ATP", "ProofPoint TAP", "Email Security"]
    category: Email
    criticality: High
    tier: 2
    platform: ["Microsoft 365", "SaaS"]
    deployment: Easy
    cost: Medium
    description: >
      Email is the #1 initial access vector. Email security logs cover phishing delivery,
      malicious attachment detection, URL rewriting, and user click events.
    tactics_covered:
      - Initial Access
    without_this_you_miss:
      - Phishing delivery detection
      - Malicious attachment detonation results
      - User click on permitted malicious URL
      - BEC / inbox manipulation detection
    recommended_retention_days: 365

  - id: cloud_infrastructure
    name: "Cloud Infrastructure Logs (AWS CloudTrail / Azure Activity / GCP Audit)"
    aliases: ["AWS CloudTrail", "AWS", "Azure Activity", "GCP Audit", "CloudTrail", "Azure Monitor"]
    category: Cloud
    criticality: High
    tier: 2
    platform: ["AWS", "Azure", "GCP"]
    deployment: Easy
    cost: Medium
    description: >
      Cloud control plane logs cover every API call, resource creation/deletion, IAM change,
      and configuration modification. Essential for detecting cloud-targeted attacks and misuse.
    tactics_covered:
      - Persistence
      - Privilege Escalation
      - Defense Evasion
      - Exfiltration
      - Impact
    without_this_you_miss:
      - IAM privilege escalation
      - Bucket/blob exfiltration
      - Security control disablement
      - Crypto mining resource abuse
      - Cloud persistence (Lambda backdoors, IAM keys)
    recommended_retention_days: 365

  - id: m365_audit
    name: "Microsoft 365 / Office 365 Unified Audit Log"
    aliases: ["Office 365", "Microsoft 365", "O365", "SharePoint", "Exchange", "Teams", "M365"]
    category: SaaS
    criticality: High
    tier: 2
    platform: "Microsoft 365"
    deployment: Easy
    cost: Low
    description: >
      Covers all M365 workload activity: Exchange email rules, SharePoint file access,
      Teams messages, and admin actions. Critical for BEC detection and insider threat.
    tactics_covered:
      - Collection
      - Exfiltration
      - Persistence
      - Initial Access
    without_this_you_miss:
      - Inbox forwarding rules (BEC)
      - Mass file download from SharePoint
      - External file sharing
      - Suspicious inbox manipulation
    recommended_retention_days: 365

  - id: linux_os
    name: "Linux OS Logs (syslog / auditd)"
    aliases: ["Linux", "Linux Operating System", "Syslog", "auditd", "Linux Audit"]
    category: Endpoint
    criticality: High
    tier: 2
    platform: Linux
    deployment: Moderate
    cost: Low
    description: >
      Linux auth, process, and kernel audit logs. Critical for server environments,
      cloud workloads, and any organization running mixed-OS infrastructure.
    tactics_covered:
      - Credential Access
      - Persistence
      - Privilege Escalation
      - Lateral Movement
    without_this_you_miss:
      - SSH brute force / key-based attacks
      - Sudo abuse
      - Cron persistence
      - SUID binary exploitation
      - Container escape on Linux hosts
    recommended_retention_days: 90

  - id: vpn
    name: "VPN / Remote Access Logs"
    aliases: ["VPN", "Remote Access", "Pulse Secure", "Cisco AnyConnect", "GlobalProtect", "Citrix"]
    category: Network
    criticality: High
    tier: 2
    platform: Network
    deployment: Easy
    cost: Low
    description: >
      VPN logs are critical for detecting unauthorized remote access, credential abuse,
      and impossible travel scenarios. High value for hybrid/remote workforce environments.
    tactics_covered:
      - Initial Access
      - Lateral Movement
    without_this_you_miss:
      - External brute force against VPN
      - Credential stuffing
      - Unauthorized country of origin access
      - Impossible travel (combined with IdP)
    recommended_retention_days: 180

  # ── TIER 3 — SUPPLEMENTARY ────────────────────────────────────────────────

  - id: dlp
    name: "Data Loss Prevention (DLP)"
    aliases: ["DLP", "Varonis", "Digital Guardian", "Forcepoint DLP"]
    category: Data
    criticality: Medium
    tier: 3
    platform: ["Windows", "SaaS"]
    deployment: Complex
    cost: High
    description: >
      DLP provides content-aware visibility into data movement. Supplements behavioral
      detections with actual data classification context.
    tactics_covered:
      - Exfiltration
      - Collection
    without_this_you_miss:
      - Content-aware exfil detection
      - PII/PCI data movement
    recommended_retention_days: 180

  - id: waf
    name: "Web Application Firewall (WAF)"
    aliases: ["WAF", "Web Application Firewall", "F5 ASM", "Imperva", "Akamai WAF", "Cloudflare WAF"]
    category: Network
    criticality: Medium
    tier: 3
    platform: Network
    deployment: Moderate
    cost: Medium
    description: >
      WAF logs expose application-layer attacks including SQLi, XSS, and scanning.
      Important for externally-facing application protection.
    tactics_covered:
      - Initial Access
    without_this_you_miss:
      - Web application exploitation
      - SQLi / XSS attempts
      - Application vulnerability scanning
    recommended_retention_days: 90

  - id: saas_productivity
    name: "SaaS / Productivity Apps (Slack, Salesforce, Google Workspace, Box)"
    aliases: ["Slack", "Salesforce", "Google Workspace", "Box", "Dropbox", "GitHub", "Snowflake"]
    category: SaaS
    criticality: Medium
    tier: 3
    platform: SaaS
    deployment: Easy
    cost: Low
    description: >
      SaaS application logs cover insider threat and data exfiltration scenarios
      through non-traditional channels.
    tactics_covered:
      - Exfiltration
      - Collection
      - Initial Access
    without_this_you_miss:
      - Data exfiltration via Slack/messaging
      - Salesforce record exports
      - Source code exfiltration via GitHub
    recommended_retention_days: 90

  - id: kubernetes
    name: "Kubernetes / Container Logs"
    aliases: ["Kubernetes", "K8s", "Docker", "EKS", "AKS", "GKE"]
    category: Cloud
    criticality: Medium
    tier: 3
    platform: Kubernetes
    deployment: Complex
    cost: Medium
    description: >
      Container orchestration logs for environments running workloads in K8s.
      Covers API server audit, pod events, and container activity.
    tactics_covered:
      - Privilege Escalation
      - Lateral Movement
      - Persistence
    without_this_you_miss:
      - Container escape
      - Privileged pod abuse
      - K8s RBAC escalation
    recommended_retention_days: 90

  - id: mfa
    name: "MFA / Authentication App Logs"
    aliases: ["MFA", "Duo", "RSA SecurID", "Google Authenticator", "Authy"]
    category: Identity
    criticality: Medium
    tier: 3
    platform: SaaS
    deployment: Easy
    cost: Low
    description: >
      Standalone MFA logs supplement IdP logs with push notification activity,
      device trust events, and bypass attempts.
    tactics_covered:
      - Credential Access
      - Initial Access
    without_this_you_miss:
      - MFA push bombing / fatigue attacks
      - MFA bypass attempts
      - New device enrollments
    recommended_retention_days: 180

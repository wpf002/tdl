[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r requirements.txt",
  "cd ui && npm ci"
]

[phases.build]
cmds = [
  "cd ui && npm run build"
]

[start]
cmd = "./run prod"

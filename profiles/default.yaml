profile:
  name: "Default Enterprise Profile"
  description: "Mid-size Windows-heavy enterprise with M365 and cloud presence"
  created: "2026-04-27"

  siem:
    - platform: splunk
      version: "9.x"
    # - platform: sentinel
    # - platform: qradar
    # - platform: chronicle
    # - platform: elastic
    # - platform: rapid7
    # - platform: crowdstrike_siem
    # - platform: xsiam

  log_sources:
    - id: windows_security_events
      deployed: true
    - id: sysmon
      deployed: true
    - id: firewall
      deployed: true
    - id: edr
      deployed: true
    - id: dns
      deployed: true
    - id: identity_provider
      deployed: true
    - id: proxy_web_gateway
      deployed: false
      planned: true
    - id: email_security
      deployed: true
    - id: cloud_infrastructure
      deployed: true
    - id: m365_audit
      deployed: true
    - id: linux_os
      deployed: false
      planned: false
    - id: vpn
      deployed: true
    - id: dlp
      deployed: false
      planned: false
    - id: waf
      deployed: true
    - id: saas_productivity
      deployed: false
      planned: true
    - id: kubernetes
      deployed: false
      planned: false
    - id: mfa
      deployed: true

  crown_jewels:
    - type: Active Directory / Domain Controllers
      sensitivity: Critical
    - type: Financial systems / ERP
      sensitivity: Critical
    - type: Customer PII database
      sensitivity: High
    - type: Source code repositories
      sensitivity: High
    - type: Executive email accounts
      sensitivity: High

  industry: Financial Services
  team:
    size: small
    maturity: intermediate

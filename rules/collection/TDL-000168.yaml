rule_id: TDL-COL-000168
v4_id: 000168
name: RDS Snapshot Sharing
description: Detects the sharing of a snapshot with another account or if the snapshot has been made public. An unauthorized
  user could potentially be given access to all of the data within the snapshot.
tactic: Collection
tactic_id: TA0009
technique_id: T1537
technique_name: Transfer Data to Cloud Account
platform:
- AWS
data_sources:
- AWS CloudTrail
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_col_000168 {\n  meta:\n    author = \"TDL\"\n    description = \"RDS Snapshot Sharing\"\n    severity =\
    \ \"MEDIUM\"\n    tactic = \"TA0009\"\n    technique = \"T1537\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1537*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- auth
- collection
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 AWS APICall Event

  Where the Event Name is in [ModifyDBSnapshotAttribute]

  Where the Request Parameter attributeName is in [restore]

  Where the Request Parameter contains [valuestoadd]'
suppression:
  window: 12 hours
  fields:
  - src_ip
  - src_user
tuning_period: 14 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- "Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on \u2014 determine the collection\
  \ scope (single file, recursive walk, mailbox export)."
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

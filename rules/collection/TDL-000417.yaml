rule_id: TDL-COL-000417
v4_id: '000417'
name: Unauthorized WaveDownload Event - Salesforce
description: Wave Download events represent downloads made from lens explorations and dashboard widgets in the Tableau CRM
  user interface. A Wave Download event type is captured when a user downloads images ( .png ), Microsoft Excel data ( .xls
  ), or comma-separated values ( .csv ) files.
tactic: Collection
tactic_id: TA0009
technique_id: T1213
technique_name: Data from Information Repositories
platform:
- Windows
data_sources:
- Salesforce
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_col_000417 {
      meta:
        author = "TDL"
        description = "Unauthorized WaveDownload Event - Salesforce"
        severity = "LOW"
        tactic = "TA0009"
        technique = "T1213"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- collection
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Salseforce Event  \nWhere the Event Type is 'WaveDownload'\nWhere the Source Username is NOT on the Salesforce\
  \ Admins List"
suppression:
  window: 24 Hours
tuning_period: 7 days

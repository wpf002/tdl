rule_id: TDL-COL-000531
v4_id: '000531'
name: Hexadecimal User-Agent
description: User-Agent strings with hexadecimal values are often indicative of malware.
tactic: Collection
tactic_id: TA0009
technique_id: T1132
technique_name: ': Data Encoding'
platform:
- AWS
data_sources:
- AWS ELB
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*.+*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex ".+"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%.+%'\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_col_000531 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Hexadecimal User-Agent\"\n    severity = \"LOW\"\n    tactic = \"TA0009\"\
    \n    technique = \"T1132\"\n  events:\n    $e.metadata.event_type = \"USER_RESOURCE_ACCESS\"\
    \n    $e.eventName = /.+/\n    $actor = $e.principal.user.userid\n  match:\n \
    \   $actor over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%.+%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*.+*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= ".+"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*.+*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- collection
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths,
  mailbox, share, repository).'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource
  being acted on — determine the collection scope (single file, recursive walk, mailbox
  export).
- 'Compare against business need: does this user have a legitimate reason to read
  this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in
  unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection
  volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for
  possible DLP / privacy notification, and escalate accordingly.'
pseudo_logic: '1 Instance over any time window of a cloud audit log event where the
  User-Agent string contains hexadecimal-encoded values.


  From index=cloud

  Where sourcetype is aws:cloudtrail, azure:auditlogs, or gcp:audit

  Where eventName matches a non-empty pattern (eventName contains one or more characters)

  With count of matching events greater than or equal to 1


  With the same userIdentity.arn, eventName, and resources{}.ARN

  Results sorted descending by count, surfacing the highest-frequency hexadecimal
  User-Agent activity first.'

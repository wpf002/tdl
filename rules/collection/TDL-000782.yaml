rule_id: TDL-COL-000782
v4_id: 000782
name: ARP Reply Storm to Default Gateway MAC
description: Single host emitting >100 unsolicited ARP replies per minute claiming gateway IP. ARP-spoof MITM precursor for
  collection. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1557 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1557
technique_name: Adversary-in-the-Middle
platform:
- Windows
- Network
data_sources:
- Network IDS
- Sysmon
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search source.mac="*arp-storm*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where source.mac matches regex "arp-storm"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "source.mac" LIKE ''%arp-storm%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000782 {\n  meta:\n    author = \"TDL\"\n    description = \"ARP Reply Storm to Default Gateway\
    \ MAC\"\n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1557\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.source.mac = /arp-storm/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND source.mac LIKE "%arp-storm%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND source.mac=/arp-storm/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND source.mac=*arp-storm*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND source.mac ~= "arp-storm"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND source.mac:*arp-storm*
  sumo: '_sourceCategory=*ids* OR _sourceCategory=*sysmon*

    | where technique="T1557" OR _raw matches "*T1557*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'

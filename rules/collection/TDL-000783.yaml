rule_id: TDL-COL-000783
v4_id: 000783
name: Non-Conferencing Process Activating Microphone
description: Audio device opened via WASAPI / CoreAudio by a process not in the conferencing/recording allowlist (Teams, Zoom,
  OBS, Audacity). Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1123 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1123
technique_name: Audio Capture
platform:
- Windows
- macOS
data_sources:
- EDR
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search device.type="*mic-on*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where device.type matches regex "mic-on"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "device.type" LIKE ''%mic-on%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000783 {\n  meta:\n    author = \"TDL\"\n    description = \"Non-Conferencing Process Activating\
    \ Microphone\"\n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1123\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.device.type = /mic-on/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n \
    \ condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND device.type LIKE "%mic-on%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND device.type=/mic-on/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND device.type=*mic-on*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND device.type ~= "mic-on"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND device.type:*mic-on*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1123*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Audio device opened via WASAPI / CoreAudio by a process not in the conferencing/recording allowlist (Teams,
  Zoom, OBS, Audacity).
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

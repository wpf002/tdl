rule_id: TDL-COL-000784
v4_id: 000784
name: Scripted File Globbing of User Documents
description: PowerShell / bash recursively globbing *.doc*, *.xls*, *.pdf, *.txt, *.kdbx under user profiles, then copying
  to a staging dir. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1119 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1119
technique_name: Automated Collection
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- EDR
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*doc-harvest*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "doc-harvest"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%doc-harvest%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_col_000784 {\n  meta:\n    author = \"TDL\"\n    description = \"Scripted File Globbing of User Documents\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0009\"\n    technique = \"T1119\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /doc-harvest/\n    $host = $e.principal.hostname\n  match:\n   \
    \ $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%doc-harvest%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/doc-harvest/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*doc-harvest*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "doc-harvest"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*doc-harvest*
pseudo_logic: PowerShell / bash recursively globbing *.doc*, *.xls*, *.pdf, *.txt, *.kdbx under user profiles, then copying

rule_id: TDL-COL-000785
v4_id: 000785
name: Process Attaching to Browser via Debug/Inspector Port
description: Connection to chrome --remote-debugging-port (9222) or msedge --remote-debugging-pipe by a non-developer process.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1185 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1185
technique_name: Browser Session Hijacking
platform:
- Windows
- macOS
data_sources:
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search destination.port="*browser-debug*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where destination.port matches regex "browser-debug"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "destination.port" LIKE ''%browser-debug%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000785 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Attaching to Browser via\
    \ Debug/Inspector Port\"\n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1185\"\n  events:\n   \
    \ $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.destination.port = /browser-debug/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND destination.port LIKE "%browser-debug%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND destination.port=/browser-debug/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination.port=*browser-debug*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND destination.port ~= "browser-debug"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND destination.port:*browser-debug*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1185*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Connection to chrome --remote-debugging-port (9222) or msedge --remote-debugging-pipe by a non-developer process.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

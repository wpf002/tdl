rule_id: TDL-COL-000786
v4_id: 000786
name: Repeated Clipboard Reads From Non-UI Process
description: "GetClipboardData / NSPasteboard reads \u226510 times in 60s by a process with no UI. Crypto-clipper / password-grab.\
  \ Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1115 under Collection)."
tactic: Collection
tactic_id: TA0009
technique_id: T1115
technique_name: Clipboard Data
platform:
- Windows
- macOS
data_sources:
- EDR
severity: Medium
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search api.function="*clipboard-poll*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where api.function matches regex "clipboard-poll"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"api.function\" LIKE '%clipboard-poll%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_col_000786 {\n  meta:\n    author = \"TDL\"\n    description = \"Repeated Clipboard Reads From Non-UI\
    \ Process\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0009\"\n    technique = \"T1115\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.api.function = /clipboard-poll/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND api.function LIKE "%clipboard-poll%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND api.function=/clipboard-poll/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND api.function=*clipboard-poll*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND api.function ~= "clipboard-poll"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND api.function:*clipboard-poll*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1115*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: "GetClipboardData / NSPasteboard reads \u226510 times in 60s by a process with no UI. Crypto-clipper / password-grab."

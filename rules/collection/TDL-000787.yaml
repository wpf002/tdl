rule_id: TDL-COL-000787
v4_id: 000787
name: Bulk GetObject from Sensitive Bucket
description: ≥1000 GetObject calls in 5m from one identity against a tagged-sensitive bucket, or from a region the identity
  has never used. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1530 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1530
technique_name: Data from Cloud Storage
platform:
- AWS
- Azure
- GCP
data_sources:
- Cloud Audit Logs
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*GetObject*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex "GetObject"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%GetObject%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_col_000787 {
      meta:
        author = "TDL"
        description = "Bulk GetObject from Sensitive Bucket"
        severity = "HIGH"
        tactic = "TA0009"
        technique = "T1530"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /GetObject/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%GetObject%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/GetObject/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*GetObject*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= "GetObject"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*GetObject*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*GetObject*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
pseudo_logic: ≥1000 GetObject calls in 5m from one identity against a tagged-sensitive bucket, or from a region the identity
  has never used.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:

rule_id: TDL-COL-000787
v4_id: 000787
name: Bulk GetObject from Sensitive Bucket
description: "\u22651000 GetObject calls in 5m from one identity against a tagged-sensitive bucket, or from a region the identity\
  \ has never used. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1530 under Collection)."
tactic: Collection
tactic_id: TA0009
technique_id: T1530
technique_name: Data from Cloud Storage
platform:
- AWS
- Azure
- GCP
data_sources:
- Cloud Audit Logs
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search userIdentity.arn="*bulk-get*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where userIdentity.arn matches regex "bulk-get"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"userIdentity.arn\" LIKE '%bulk-get%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_col_000787 {\n  meta:\n    author = \"TDL\"\n    description = \"Bulk GetObject from Sensitive Bucket\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1530\"\n  events:\n    $e.metadata.event_type =\
    \ \"USER_RESOURCE_ACCESS\"\n    $e.userIdentity.arn = /bulk-get/\n    $actor = $e.principal.user.userid\n  match:\n  \
    \  $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE userIdentity.arn LIKE "%bulk-get%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND userIdentity.arn=/bulk-get/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND userIdentity.arn=*bulk-get*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter userIdentity.arn ~= "bulk-get"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND userIdentity.arn:*bulk-get*
  sumo: '_sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1530*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: "\u22651000 GetObject calls in 5m from one identity against a tagged-sensitive bucket, or from a region the\
  \ identity has never used."
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- s3
- blob
- exfil-precursor
- t1530
- collection
references:
- https://attack.mitre.org/techniques/T1530/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- "Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on \u2014 determine the collection\
  \ scope (single file, recursive walk, mailbox export)."
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

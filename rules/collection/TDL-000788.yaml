rule_id: TDL-COL-000788
v4_id: 000788
name: TFTP Transfer of running-config or startup-config
description: Network device emits copy running-config tftp:// to a non-management IP, or SNMP bulk-walk against private OIDs
  from outside management subnet. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1602 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1602
technique_name: Data from Configuration Repository
platform:
- Network
data_sources:
- Network Device Logs
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search device.config="*config-pull*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where device.config matches regex "config-pull"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "device.config" LIKE ''%config-pull%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000788 {\n  meta:\n    author = \"TDL\"\n    description = \"TFTP Transfer of running-config or\
    \ startup-config\"\n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1602\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.device.config = /config-pull/\n    $src = $e.principal.ip\n  match:\n    $src over\
    \ 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND device.config LIKE "%config-pull%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND device.config=/config-pull/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND device.config=*config-pull*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND device.config ~= "config-pull"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND device.config:*config-pull*
  sumo: '_sourceCategory=*netdev*

    | where technique="T1602" OR _raw matches "*T1602*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: Network device emits copy running-config tftp:// to a non-management IP, or SNMP bulk-walk against private OIDs
  from outside management subnet.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- snmp
- tftp
- config
- t1602
- collection
references:
- https://attack.mitre.org/techniques/T1602/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 determine the collection scope (single\
  \ file, recursive walk, mailbox export)."
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

rule_id: TDL-COL-000788
v4_id: 000788
name: TFTP Transfer of running-config or startup-config
description: Network device emits copy running-config tftp:// to a non-management IP, or SNMP bulk-walk against private OIDs
  from outside management subnet. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1602 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1602
technique_name: Data from Configuration Repository
platform:
- Network
data_sources:
- Network Device Logs
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*snmp*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "snmp"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%snmp%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_col_000788 {
      meta:
        author = "TDL"
        description = "TFTP Transfer of running-config or startup-config"
        severity = "HIGH"
        tactic = "TA0009"
        technique = "T1602"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /snmp/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%snmp%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/snmp/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*snmp*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "snmp"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*snmp*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*snmp*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
pseudo_logic: Network device emits copy running-config tftp:// to a non-management IP, or SNMP bulk-walk against private OIDs
  from outside management subnet.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:
- snmp
- tftp
- config
- t1602
- collection
references:
- https://attack.mitre.org/techniques/T1602/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — determine the collection scope (single file,
  recursive walk, mailbox export).
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

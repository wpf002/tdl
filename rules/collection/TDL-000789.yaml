rule_id: TDL-COL-000789
v4_id: 000789
name: Burst Reads from Departmental Share by Single User
description: EID 5145 share access ≥500 unique files within 10m from one user against HR/Finance/Legal share. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1039 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1039
technique_name: Data from Network Shared Drive
platform:
- Windows
- Linux
data_sources:
- Windows Event Log
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("5145")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("5145")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('5145')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_col_000789 {
      meta:
        author = "TDL"
        description = "Burst Reads from Departmental Share by Single User"
        severity = "MEDIUM"
        tactic = "TA0009"
        technique = "T1039"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(5145)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("5145")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [5145])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (5145)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("5145")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(5145)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("5145")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
pseudo_logic: EID 5145 share access ≥500 unique files within 10m from one user against HR/Finance/Legal share.
false_positives:

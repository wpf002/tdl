rule_id: TDL-COL-000789
v4_id: 000789
name: Burst Reads from Departmental Share by Single User
description: "EID 5145 share access \u2265500 unique files within 10m from one user against HR/Finance/Legal share. Generated\
  \ from gap analysis against canonical ATT&CK Enterprise matrix (T1039 under Collection)."
tactic: Collection
tactic_id: TA0009
technique_id: T1039
technique_name: Data from Network Shared Drive
platform:
- Windows
- Linux
data_sources:
- Windows Event Log
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search user.name="*share-bulk-read*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where user.name matches regex "share-bulk-read"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "user.name" LIKE ''%share-bulk-read%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000789 {\n  meta:\n    author = \"TDL\"\n    description = \"Burst Reads from Departmental Share\
    \ by Single User\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0009\"\n    technique = \"T1039\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.user.name = /share-bulk-read/\n    $src = $e.principal.ip\n  match:\n    $src over\
    \ 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND user.name LIKE "%share-bulk-read%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND user.name=/share-bulk-read/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND user.name=*share-bulk-read*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND user.name ~= "share-bulk-read"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND user.name:*share-bulk-read*
  sumo: '_sourceCategory=*windows/events*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1039*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: "EID 5145 share access \u2265500 unique files within 10m from one user against HR/Finance/Legal share."

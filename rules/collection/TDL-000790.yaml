rule_id: TDL-COL-000790
v4_id: 000790
name: Mass File Read from Removable Volume
description: "\u2265100 file reads from a DriveType=2 (removable) volume by user-shell process in 5m. Generated from gap analysis\
  \ against canonical ATT&CK Enterprise matrix (T1025 under Collection)."
tactic: Collection
tactic_id: TA0009
technique_id: T1025
technique_name: Data from Removable Media
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- Auditd
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*usb-read*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "usb-read"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%usb-read%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_col_000790 {\n  meta:\n    author = \"TDL\"\n    description = \"Mass File Read from Removable Volume\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0009\"\n    technique = \"T1025\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /usb-read/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%usb-read%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/usb-read/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*usb-read*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "usb-read"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*usb-read*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("11","23","26") AND _raw matches "*T1025*"

    | count by host, user, target_filename, image

    | sort by _count desc'
pseudo_logic: "\u2265100 file reads from a DriveType=2 (removable) volume by user-shell process in 5m."
false_positives:

name: Repeated BitBlt / CGWindowListCreateImage Calls
description: "Process invokes BitBlt / PrintWindow / CGWindowListCreateImage \u226510 times within 60s. Periodic screen capture.\
  \ Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1113 under Collection)."
tactic: Collection
tactic_id: TA0009
technique_id: T1113
technique_name: Screen Capture
platform:
- Windows

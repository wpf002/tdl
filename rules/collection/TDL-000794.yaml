rule_id: TDL-COL-000794
v4_id: 000794
name: Camera Device Activated by Non-Conferencing Process
description: Webcam opened via Media Foundation / AVFoundation by a process not in the conferencing/streaming allowlist (Teams,
  Zoom, OBS). Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1125 under Collection).
tactic: Collection
tactic_id: TA0009
technique_id: T1125
technique_name: Video Capture
platform:
- Windows
- macOS
data_sources:
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search device.type="*cam-on*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where device.type matches regex "cam-on"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "device.type" LIKE ''%cam-on%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_col_000794 {\n  meta:\n    author = \"TDL\"\n    description = \"Camera Device Activated by Non-Conferencing\
    \ Process\"\n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1125\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.device.type = /cam-on/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n \
    \ condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND device.type LIKE "%cam-on%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND device.type=/cam-on/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND device.type=*cam-on*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND device.type ~= "cam-on"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND device.type:*cam-on*
pseudo_logic: Webcam opened via Media Foundation / AVFoundation by a process not in the conferencing/streaming allowlist (Teams,

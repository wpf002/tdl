rule_id: TDL-COL-001
name: Suspicious Archive Creation in Staging Directory
tactic: Collection
tactic_id: TA0009
technique_id: T1560.001
technique_name: Archive via Utility
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 70
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4688

    | where match(ProcessName, "(?i)(7z|winrar|rar\.exe|zip\.exe)")

    | where match(CommandLine, "(?i)(\\temp\\|\\appdata\\")

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'DeviceProcessEvents

    | where TimeGenerated >= ago(1d)

    | where FileName in~ ("7z.exe","winrar.exe","rar.exe")

    | where ProcessCommandLine matches regex @"(?i)(\\temp\\|\\appdata\\)"

    | project TimeGenerated, DeviceName, AccountName, FileName, ProcessCommandLine'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4688\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule tdl_col_001 {\n  meta:\n    author = \"TDL\"\n    description = \"Suspicious Archive Creation in Staging Directory\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0009\"\n    technique = \"T1560.001\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4688\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4688'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4688])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4688

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4688)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4688)
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1560.001*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- IT staff creating manual backups
- Software deployment tools
tags:
- archive
- staging
- collection
author: TDL
created: '2024-03-10'
test_method: synthetic
last_modified: '2026-04-27'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- "Inspect the file path, file hash, parent process, and any prior network/email delivery \u2014 determine the collection\
  \ scope (single file, recursive walk, mailbox export)."
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

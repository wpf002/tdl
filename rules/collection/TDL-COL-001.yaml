rule_id: TDL-COL-001
name: Suspicious Archive Creation in Staging Directory
tactic: Collection
tactic_id: TA0009
technique_id: T1560.001
technique_name: Archive via Utility
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 70
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4688")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4688")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4688')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_col_001 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Suspicious Archive Creation in Staging Directory\"\n    severity = \"HIGH\"\
    \n    tactic = \"TA0009\"\n    technique = \"T1560.001\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $e.event_id = /(4688)/\n    $user = $e.target.user.userid\n\
    \  match:\n    $user over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4688")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4688])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4688)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4688")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4688)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4688")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- IT staff creating manual backups
- Software deployment tools
tags:
- archive
- staging
- collection
author: TDL
created: '2024-03-10'
test_method: synthetic
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths,
  mailbox, share, repository).'
- Inspect the file path, file hash, parent process, and any prior network/email delivery
  — determine the collection scope (single file, recursive walk, mailbox export).
- 'Compare against business need: does this user have a legitimate reason to read
  this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in
  unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection
  volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for
  possible DLP / privacy notification, and escalate accordingly.'
pseudo_logic: '1 Instance within any observed window of a Windows Security Event Log
  process creation event.


  From index=windows sourcetype="WinEventLog:Security"

  Where event_id is 4688

  With count of matching events greater than or equal to 1

  With results grouped and correlated by user, IpAddress, LogonType, and EventCode

  With values of host collected across matching events as hosts

  Sorted descending by count'

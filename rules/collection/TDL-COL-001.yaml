rule_id: TDL-COL-001
name: Suspicious Archive Creation in Staging Directory
tactic: Collection
tactic_id: TA0009
technique_id: T1560.001
technique_name: Archive via Utility
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 70
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4688")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4688")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4688')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_col_001 {
      meta:
        author = "TDL"
        description = "Suspicious Archive Creation in Staging Directory"
        severity = "HIGH"
        tactic = "TA0009"
        technique = "T1560.001"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4688)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4688")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4688])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4688)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4688")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4688)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4688")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- IT staff creating manual backups
- Software deployment tools
tags:
- archive
- staging
- collection
author: TDL
created: '2024-03-10'
test_method: synthetic
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the data being read (paths, mailbox, share, repository).'
- Inspect the file path, file hash, parent process, and any prior network/email delivery — determine the collection scope
  (single file, recursive walk, mailbox export).
- 'Compare against business need: does this user have a legitimate reason to read this data set in this way?'
- 'Pull staging telemetry: archive creation, large temp folders, encrypted blobs in unusual locations within the next 30 minutes.'
- 'Decide TP / FP: FP for sanctioned migration / backup / DLP testing; TP if collection volume is anomalous and lacks a ticket.'
- 'If TP: determine sensitivity of accessed data, preserve audit logs, prepare for possible DLP / privacy notification, and
  escalate accordingly.'

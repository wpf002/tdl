rule_id: TDL-C2-000101
v4_id: '000101'
name: EC2 Suspicious Outbound Communication
description: Detects when there is traffic from a EC2 to an external host labeled
  as malicious by GuardDuty.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- Windows
data_sources:
- Windows Security Event Log
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4624", "4625", "4768", "4769", "4776")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4624", "4625", "4768", "4769", "4776")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4624', '4625', '4768', '4769', '4776')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_c2_000101 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"EC2 Suspicious Outbound Communication\"\n    severity = \"HIGH\"\n    tactic\
    \ = \"TA0011\"\n    technique = \"T1071\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $e.event_id = /(4624|4625|4768|4769|4776)/\n    $user\
    \ = $e.target.user.userid\n  match:\n    $user over 30m\n  condition:\n    $e\n\
    }\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4624", "4625", "4768",
    "4769", "4776")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4624, 4625, 4768, 4769, 4776])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4624, 4625, 4768, 4769, 4776)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4624", "4625", "4768", "4769",
    "4776")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4624 OR 4625 OR 4768 OR 4769
    OR 4776)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4624", "4625", "4768", "4769", "4776")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
suppression:
  window: 8 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and
  the cadence pattern detected.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — verify
  beaconing characteristics (interval, jitter, request size, server response code).
- Pull WHOIS / TLS / passive-DNS context on the destination — newly registered or
  low-reputation infrastructure raises confidence.
- Identify the originating process and trace it back to its install / launch event
  (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for
  unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP
  / memory while session is live, and escalate to IR.'
pseudo_logic: '1 Instance within any time window of a Windows Security Authentication
  event tied to suspicious EC2 outbound communication flagged by GuardDuty.


  From index=windows sourcetype="WinEventLog:Security"

  Where event_id is one of: 4624 (Successful Logon), 4625 (Failed Logon), 4768 (Kerberos
  TGT Request), 4769 (Kerberos Service Ticket Request), or 4776 (NTLM Credential Validation)

  With a count of matching events greater than or equal to 1 per unique combination
  of user, IpAddress, LogonType, and EventCode

  With the associated IpAddress flagged as malicious by GuardDuty as an external host
  communicating with an EC2 instance

  With results sorted descending by count to surface highest-frequency activity first

  With the same user, IpAddress, LogonType, and EventCode as the correlation key across
  all matching hosts aggregated under the hosts field'

rule_id: TDL-C2-000108
v4_id: 000108
name: Activity From Anonymous Proxy IP Detected
description: "Detects users with an IP address that have been identified as an anonymous proxy IP address by O365. These proxies\
  \ are used by people who want to hide their device\u2019s IP address, and may be used for malicious intent."
tactic: Command and Control
tactic_id: TA0011
technique_id: T1090
technique_name: Proxy
platform:
- Windows
data_sources:
- O365 ATP
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'OfficeActivity

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, UserId, ClientIP, Operation, OfficeWorkload'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_c2_000108 {\n  meta:\n    author = \"TDL\"\n    description = \"Activity From Anonymous Proxy IP Detected\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0011\"\n    technique = \"T1090\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*o365*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1090*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Microsoft Cloud App Security Event

  Where the Operation is "AlertTriggered"

  Where the alert name is "Activity from anonymous IP addresses"'
suppression:
  window: 24 hours
tuning_period: 7 days

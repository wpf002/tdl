rule_id: TDL-C2-000234
v4_id: '000234'
name: Suspicious Webserver Script Location
description: Detects a host sending a request to a script file on a web server that is not in a normal web directory. Attackers
  will often upload web shell scripts to uncommon directories to avoid detection and be able to continue their attack.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Webserver
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name="*.+*"
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name matches regex ".+"
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_c2_000234 {
      meta:
        author = "TDL"
        description = "Suspicious Webserver Script Location"
        severity = "LOW"
        tactic = "TA0011"
        technique = "T1078"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name=/.+/)
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name=*.+*
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name matches "*.+*"
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Webserver Request Event

  Where the HTTP code is 200

  Where the URL is a script file

  Where the referrer is "-"

  Where the Script file path is in the root directory

  Where the Script file path is not in the normal web directory'
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and the cadence pattern detected.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify beaconing characteristics
  (interval, jitter, request size, server response code).
- Pull WHOIS / TLS / passive-DNS context on the destination — newly registered or low-reputation infrastructure raises confidence.
- Identify the originating process and trace it back to its install / launch event (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP / memory while session is live, and escalate
  to IR.'

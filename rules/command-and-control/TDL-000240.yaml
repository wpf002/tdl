rule_id: TDL-C2-000240
v4_id: '000240'
name: C2 Callback
description: Detects outbound traffic flagged by the IDS as malware communications back to a command and control server. Infected
  hosts need to maintain contact with a C2 server in order to receive updates and commands to further their objective.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- AWS
- Network
data_sources:
- IDS/IPS
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_c2_000240 {\n  meta:\n    author = \"TDL\"\n    description = \"C2 Callback\"\n    severity = \"MEDIUM\"\
    \n    tactic = \"TA0011\"\n    technique = \"T1071\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\n\
    \    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n  condition:\n\
    \    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*ids* OR _sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1071*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 IDS/IPS Exploit Event\nFrom one internal source to one external destination (Outbound)\nWhere the IDS/IPS\
  \ Signature matches the following regex \"(?i)\\b(C2|c&c|command and control)\"\n\n--------------------------------------------------------------\n\
  \n1 Guard Duty Event \nWhere the Event Type is in [\"Backdoor:EC2/C&CActivity.B\",  \"Backdoor:EC2/C&CActivity.B!DNS\",\
  \ \"Backdoor:Lambda/C&CActivity.B\", \"Backdoor:Runtime/C&CActivity.B\", \"Backdoor:Runtime/C&CActivity.B!DNS\"]"
suppression:
  window: 12 hours
tuning_period: 7 days

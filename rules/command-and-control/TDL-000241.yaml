rule_id: TDL-C2-000241
v4_id: '000241'
name: C2 Callback - Multiple Internal Hosts
description: Detects outbound traffic flagged by the IDS as malware communications back to a command and control server from
  multiple hosts. Infected hosts need to maintain contact with a C2 server in order to receive updates and commands  to further
  their objective. Multiple internal hosts demonstrating this activity could indicate a widespread botnet infection.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- AWS
- Network
data_sources:
- IDS/IPS
- AWS GuardDuty
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | bucket _time span=10m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 600 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_c2_000241 {\n  meta:\n    author = \"TDL\"\n    description = \"C2 Callback - Multiple Internal Hosts\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0011\"\n    technique = \"T1071\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 10m\n\n  condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 10m)

    | WHERE event_count >= 5

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 5

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*ids* OR _sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1071*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "5 IDS/IPS Exploit Event\nFrom multiple internal sources to a single external destinations (Outbound)\nWhere\
  \ the IDS/IPS Signature matches the following regex \"(?i)\\b(C2|c&c|command and control)\"\nWith unique Source IPs\nWithin\
  \ 10 minutes\n\n\n--------------------------------------------------------------------------------------\n\n5 Guard Duty\
  \ Events \nFrom one internal source to many external destinations (Outbound)\nWhere the Event Type is in [\"Backdoor:EC2/C&CActivity.B\"\
  ,  \"Backdoor:EC2/C&CActivity.B!DNS\", \"Backdoor:Lambda/C&CActivity.B\", \"Backdoor:Runtime/C&CActivity.B\", \"Backdoor:Runtime/C&CActivity.B!DNS\"\
  ]\nWith unique Destination IPs\nWithin 10 minutes"
suppression:
  window: 8 hours
tuning_period: 7 days

rule_id: TDL-C2-000252
v4_id: '000252'
name: Traffic to Geolocation Tracker
description: Anomaly based detection that identifies traffic to a rare geolocation. The country is added to a tracker list
  for other content to reference.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1078
technique_name: Valid Accounts
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_c2_000252 {\n  meta:\n    author = \"TDL\"\n    description = \"Traffic to Geolocation Tracker\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall*

    | where technique="T1078" OR _raw matches "*T1078*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Firewall Event

  Where the Destination Country is NOT on the Authorized Countries List'
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and the cadence pattern detected.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 verify beaconing characteristics (interval,\
  \ jitter, request size, server response code)."
- "Pull WHOIS / TLS / passive-DNS context on the destination \u2014 newly registered or low-reputation infrastructure raises\
  \ confidence."
- Identify the originating process and trace it back to its install / launch event (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP / memory while session is live, and escalate
  to IR.'

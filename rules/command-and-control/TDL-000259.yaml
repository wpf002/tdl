rule_id: TDL-C2-000259
v4_id: 000259
name: Excessive Outbound Connections to Foreign Country
description: This alert will serve as more of a beaconing alert to identify repeated connections to a potential malicious
  entity.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- Network
data_sources:
- Firewall
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |-
    index=network
    | bucket _time span=30m
    | stats count by src_ip, Account_Name, _time
    | where count >= 50
    | table _time, src_ip, dest_ip, dest_port, action
  kql: |-
    CommonSecurityLog
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 30m)
    | where Count >= 50
    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 1800 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_c2_000259 {
      meta:
        author = "TDE"
        description = "Excessive Outbound Connections to Foreign Country"
        severity = "LOW"
        tactic = "TA0011"
        technique = "T1071"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 30m

      condition:
        #event >= 50

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 30m)
    | WHERE event_count >= 50
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 50)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 50
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 50\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  50 Firewall Events
  Where the Destination Country is on the High Risk Countries List
  With the same Source IP and Destination Country
  Within 30 minutes
suppression:
  window: 24 hours
tuning_period: 7 days

rule_id: TDL-C2-000339
v4_id: 000339
name: AWS DNS Request to DGA Domain - GuardDuty
description: Detects when an EC2 instance is attempting to query a domain generated algorithm (DGA) domain.
tactic: Command and Control
tactic_id: TA0011
technique_id: T1568
technique_name: Dynamic Resolution
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_c2_000339 {\n  meta:\n    author = \"TDL\"\n    description = \"AWS DNS Request to DGA Domain - GuardDuty\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0011\"\n    technique = \"T1568\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1568*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Guard Duty Event \nWhere the Event Type is in [\"Trojan:EC2/DGADomainRequest.B\", \"Trojan:EC2/DGADomainRequest.C!DNS\"\
  , Trojan:Runtime/DGADomainRequest.C!DNS]"
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and the cadence pattern detected.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 verify beaconing characteristics (interval,\
  \ jitter, request size, server response code)."
- "Pull WHOIS / TLS / passive-DNS context on the destination \u2014 newly registered or low-reputation infrastructure raises\
  \ confidence."
- Identify the originating process and trace it back to its install / launch event (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP / memory while session is live, and escalate
  to IR.'

rule_id: TDL-C2-000430
v4_id: '000430'
name: APT User Agent
description: Detects suspicious user agent strings used in APT malware in proxy logs
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (50727, 4322, 50727, 04506)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows\nFROM flows\nWHERE eventid = 4322\n\
    \  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY sourceip, destinationip, destinationport\n\nORDER BY starttime\
    \ DESC"
  yara_l: "rule zs_c2_000430 {\n  meta:\n    author = \"TDL\"\n    description = \"APT User Agent\"\n    severity = \"MEDIUM\"\
    \n    tactic = \"TA0011\"\n    technique = \"T1071\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\n\
    \    $event.metadata.product_event_type = \"4322\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(event_id IN [4322])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4322

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "NETWORK" and action_evtlog_event_id in (4322)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4322)
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1071*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:

rule_id: TDL-C2-000462
v4_id: '000462'
name: Web Request to Possible Dynamic DNS
description: Detects a web request to a possible dynamic dns domain
tactic: Command and Control
tactic_id: TA0011
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*dns*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "dns"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%dns%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_c2_000462 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Web Request to Possible Dynamic DNS\"\n    severity = \"MEDIUM\"\n    tactic\
    \ = \"TA0011\"\n    technique = \"T1071\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /dns/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%dns%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/dns/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*dns*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "dns"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*dns*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*dns*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and
  the cadence pattern detected.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — verify
  beaconing characteristics (interval, jitter, request size, server response code).
- Pull WHOIS / TLS / passive-DNS context on the destination — newly registered or
  low-reputation infrastructure raises confidence.
- Identify the originating process and trace it back to its install / launch event
  (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for
  unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP
  / memory while session is live, and escalate to IR.'
pseudo_logic: '1 Instance within any observed window of a web request event where
  the destination involves a possible dynamic DNS domain.


  From index=network with sourcetype of firewall or ids

  Where network.protocol contains "dns"

  With stats aggregated by src_ip, dest_ip, and dest_port capturing total request
  count, count of unique destination IPs, and sum of bytes_out

  Where count is greater than or equal to 1

  With results sorted descending by bytes_out to surface highest-volume connections
  first

  With the same src_ip, dest_ip, and dest_port as the correlation key'

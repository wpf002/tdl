rule_id: TDL-C2-000499
v4_id: 000499
name: Email with Threat IOC Detected
description: Detects an email with an IOC on a threat feed
tactic: Command and Control
tactic_id: TA0011
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Email Security
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*.+*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex ".+"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%.+%'\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_c2_000499 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Email with Threat IOC Detected\"\n    severity = \"MEDIUM\"\n    tactic\
    \ = \"TA0011\"\n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.eventName = /.+/\n    $actor = $e.principal.user.userid\n\
    \  match:\n    $actor over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%.+%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*.+*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= ".+"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*.+*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- command-and-control
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and
  the cadence pattern detected.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — verify beaconing characteristics (interval, jitter, request size, server
  response code).
- Pull WHOIS / TLS / passive-DNS context on the destination — newly registered or
  low-reputation infrastructure raises confidence.
- Identify the originating process and trace it back to its install / launch event
  (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for
  unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP
  / memory while session is live, and escalate to IR.'
pseudo_logic: '1 Instance within any observation window of a cloud audit log event
  matching a wildcard-pattern event name linked to a known threat IOC.


  From index=cloud

  Where sourcetype is one of aws:cloudtrail, azure:auditlogs, or gcp:audit

  Where eventName matches the pattern "*.+*" indicating a suspicious or IOC-associated
  email-linked cloud action

  With count of matching events greater than or equal to 1

  With values of sourceIPAddress collected as src_ips

  With correlation key of userIdentity.arn, eventName, and resources{}.ARN

  Excluding events originating from known Authorized Scanners or Monitoring Agent
  source IPs

  Results sorted descending by event count with no minimum spacing required given
  the single-instance threshold'

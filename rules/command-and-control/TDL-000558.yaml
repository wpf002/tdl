author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and
  the cadence pattern detected.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — verify beaconing characteristics (interval, jitter, request size, server
  response code).
- Pull WHOIS / TLS / passive-DNS context on the destination — newly registered or
  low-reputation infrastructure raises confidence.
- Identify the originating process and trace it back to its install / launch event
  (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for
  unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP
  / memory while session is live, and escalate to IR.'
pseudo_logic: '1 or more instances within any observed window of Windows Security
  authentication events.


  From index=windows with sourcetype="WinEventLog:Security"

  Where event_id is one of: 4624 (Successful Logon), 4625 (Failed Logon), 4768 (Kerberos
  TGT Request), 4769 (Kerberos Service Ticket Request), or 4776 (NTLM Credential Validation)

  With a known malicious JA3 fingerprint present on the associated allowed network
  traffic

  Where the traffic action indicates the connection was permitted rather than blocked

  Excluding events originating from authorized scanners or monitoring agents appearing
  on the admin allow-list


  With the same user, IpAddress, LogonType, and EventCode as the correlation key,
  aggregating associated hosts per unique combination, with a minimum count threshold
  of 1 distinct occurrence.'

rule_id: TDL-C2-000795
v4_id: 000795
name: Hidden File Polled on Removable Volume
description: Repeated reads of a hidden file on a DriveType=2 volume by a long-running process. Air-gap C2 via shared USB.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1092 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1092
technique_name: Communication Through Removable Media
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Auditd
severity: Medium
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*usb-poll*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "usb-poll"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%usb-poll%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_c2_000795 {\n  meta:\n    author = \"TDL\"\n    description = \"Hidden File Polled on Removable Volume\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1092\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /usb-poll/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%usb-poll%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/usb-poll/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*usb-poll*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "usb-poll"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*usb-poll*
pseudo_logic: Repeated reads of a hidden file on a DriveType=2 volume by a long-running process. Air-gap C2 via shared USB.
false_positives:

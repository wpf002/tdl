rule_id: TDL-C2-000796
v4_id: 000796
name: HTTP Response Body Modified Mid-Path
description: TLS-stripped or plaintext HTTP response with size mismatch vs. server-declared Content-Length, or known-good
  page hash mismatch from gateway. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1659 under Command
  and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1659
technique_name: Content Injection
platform:
- Network
data_sources:
- Network IDS
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search http.response.body.bytes="*content-mismatch*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where http.response.body.bytes matches regex "content-mismatch"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "http.response.body.bytes" LIKE ''%content-mismatch%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000796 {\n  meta:\n    author = \"TDL\"\n    description = \"HTTP Response Body Modified Mid-Path\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0011\"\n    technique = \"T1659\"\n  events:\n    $e.metadata.event_type =\
    \ \"NETWORK_CONNECTION\"\n    $e.http.response.body.bytes = /content-mismatch/\n    $src = $e.principal.ip\n  match:\n\
    \    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND http.response.body.bytes LIKE "%content-mismatch%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND http.response.body.bytes=/content-mismatch/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND http.response.body.bytes=*content-mismatch*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND http.response.body.bytes ~= "content-mismatch"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND http.response.body.bytes:*content-mismatch*
pseudo_logic: TLS-stripped or plaintext HTTP response with size mismatch vs. server-declared Content-Length, or known-good
  page hash mismatch from gateway.
false_positives:

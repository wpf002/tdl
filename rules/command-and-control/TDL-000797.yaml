rule_id: TDL-C2-000797
v4_id: 000797
name: High-Entropy Base64 Body in Outbound HTTP
description: HTTP body with Shannon entropy > 5.0 and length > 256 sent to non-cdn destinations. Encoded C2 traffic. Generated
  from gap analysis against canonical ATT&CK Enterprise matrix (T1132 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1132
technique_name: Data Encoding
platform:
- Network
data_sources:
- Network IDS
severity: Medium
fidelity: Low
lifecycle: Proposed
risk_score: 50
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*http*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "http"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%http%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_c2_000797 {
      meta:
        author = "TDL"
        description = "High-Entropy Base64 Body in Outbound HTTP"
        severity = "MEDIUM"
        tactic = "TA0011"
        technique = "T1132"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /http/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%http%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/http/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*http*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "http"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*http*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*http*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
pseudo_logic: HTTP body with Shannon entropy > 5.0 and length > 256 sent to non-cdn destinations. Encoded C2 traffic.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days

rule_id: TDL-C2-000799
v4_id: 000799
name: Self-Signed TLS Certificate on Outbound Beacon
description: "Outbound TLS to non-cdn IP with self-signed cert and unusual subject, repeated session every 30\u2013120s. Generated\
  \ from gap analysis against canonical ATT&CK Enterprise matrix (T1573 under Command and Control)."
tactic: Command and Control
tactic_id: TA0011
technique_id: T1573
technique_name: Encrypted Channel
platform:
- Network
data_sources:
- Network IDS
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search tls.server.certificate.subject="*self-signed*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where tls.server.certificate.subject matches regex "self-signed"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "tls.server.certificate.subject" LIKE ''%self-signed%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000799 {\n  meta:\n    author = \"TDL\"\n    description = \"Self-Signed TLS Certificate on Outbound\
    \ Beacon\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1573\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.tls.server.certificate.subject = /self-signed/\n    $src = $e.principal.ip\n  match:\n\
    \    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND tls.server.certificate.subject LIKE "%self-signed%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND tls.server.certificate.subject=/self-signed/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND tls.server.certificate.subject=*self-signed*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND tls.server.certificate.subject ~= "self-signed"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND tls.server.certificate.subject:*self-signed*

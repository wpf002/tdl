rule_id: TDL-C2-000800
v4_id: 000800
name: Process Switching Between Multiple Outbound Endpoints
description: "Single process initiates outbound to \u22653 distinct unrelated domains within 5m using identical request cadence.\
  \ Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1008 under Command and Control)."
tactic: Command and Control
tactic_id: TA0011
technique_id: T1008
technique_name: Fallback Channels
platform:
- Network
data_sources:
- Network IDS
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search destination.domain="*fallback*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where destination.domain matches regex "fallback"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "destination.domain" LIKE ''%fallback%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000800 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Switching Between Multiple\
    \ Outbound Endpoints\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1008\"\n  events:\n   \
    \ $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.destination.domain = /fallback/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND destination.domain LIKE "%fallback%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND destination.domain=/fallback/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination.domain=*fallback*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND destination.domain ~= "fallback"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND destination.domain:*fallback*
  sumo: '_sourceCategory=*ids*

    | where technique="T1008" OR _raw matches "*T1008*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'

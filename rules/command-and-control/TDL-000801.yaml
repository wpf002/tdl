rule_id: TDL-C2-000801
v4_id: 000801
name: TLS SNI Disagrees With HTTP Host Header
description: TLS SNI = popular CDN (cloudfront, akamai), HTTP Host header = unrelated domain. Domain-fronting indicator. Generated
  from gap analysis against canonical ATT&CK Enterprise matrix (T1665 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1665
technique_name: Hide Infrastructure
platform:
- Network
data_sources:
- DNS Logs
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search tls.client.server_name="*domain-front*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where tls.client.server_name matches regex "domain-front"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "tls.client.server_name" LIKE ''%domain-front%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000801 {\n  meta:\n    author = \"TDL\"\n    description = \"TLS SNI Disagrees With HTTP Host Header\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1665\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.tls.client.server_name = /domain-front/\n    $src = $e.principal.ip\n  match:\n   \
    \ $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND tls.client.server_name LIKE "%domain-front%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND tls.client.server_name=/domain-front/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND tls.client.server_name=*domain-front*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND tls.client.server_name ~= "domain-front"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND tls.client.server_name:*domain-front*
  sumo: '_sourceCategory=*dns*

    | where technique="T1665" OR _raw matches "*T1665*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: TLS SNI = popular CDN (cloudfront, akamai), HTTP Host header = unrelated domain. Domain-fronting indicator.

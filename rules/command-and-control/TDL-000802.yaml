rule_id: TDL-C2-000802
v4_id: 000802
name: Living-Off-the-Land Binary Downloading From Internet
description: certutil.exe -urlcache -f, bitsadmin /transfer, curl, wget, Invoke-WebRequest fetching from internet to %TEMP%/%APPDATA%.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1105 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1105
technique_name: Ingress Tool Transfer
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*lolbin-download*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "lolbin-download"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%lolbin-download%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_c2_000802 {\n  meta:\n    author = \"TDL\"\n    description = \"Living-Off-the-Land Binary Downloading\
    \ From Internet\"\n    severity = \"HIGH\"\n    tactic = \"TA0011\"\n    technique = \"T1105\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /lolbin-download/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%lolbin-download%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/lolbin-download/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*lolbin-download*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "lolbin-download"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*lolbin-download*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1105*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: certutil.exe -urlcache -f, bitsadmin /transfer, curl, wget, Invoke-WebRequest fetching from internet to %TEMP%/%APPDATA%.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- download

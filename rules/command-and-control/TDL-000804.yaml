rule_id: TDL-C2-000804
v4_id: 000804
name: Sustained ICMP With Large Payload
description: ICMP echo with payload > 64 bytes sustained for >10m to single external IP. ICMP tunnel. Generated from gap analysis
  against canonical ATT&CK Enterprise matrix (T1095 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1095
technique_name: Non-Application Layer Protocol
platform:
- Network
data_sources:
- Firewall
- Network IDS
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search icmp.payload.size="*icmp-tunnel*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where icmp.payload.size matches regex "icmp-tunnel"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "icmp.payload.size" LIKE ''%icmp-tunnel%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000804 {\n  meta:\n    author = \"TDL\"\n    description = \"Sustained ICMP With Large Payload\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1095\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.icmp.payload.size = /icmp-tunnel/\n    $src = $e.principal.ip\n  match:\n    $src over\
    \ 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND icmp.payload.size LIKE "%icmp-tunnel%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND icmp.payload.size=/icmp-tunnel/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND icmp.payload.size=*icmp-tunnel*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND icmp.payload.size ~= "icmp-tunnel"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND icmp.payload.size:*icmp-tunnel*
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids*

    | where technique="T1095" OR _raw matches "*T1095*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: ICMP echo with payload > 64 bytes sustained for >10m to single external IP. ICMP tunnel.

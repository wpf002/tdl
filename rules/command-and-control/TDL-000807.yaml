rule_id: TDL-C2-000807
v4_id: 000807
name: Unsanctioned Remote-Access Tool Execution
description: Process names matching anydesk, teamviewer, splashtop, screenconnect, atera, ngrok, gotomypc on a host where
  those products are not deployed by IT. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1219 under
  Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1219
technique_name: Remote Access Software
platform:
- Windows
- macOS
data_sources:
- Sysmon
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.name="*rmm-rogue*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.name matches regex "rmm-rogue"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.name\" LIKE '%rmm-rogue%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_c2_000807 {\n  meta:\n    author = \"TDL\"\n    description = \"Unsanctioned Remote-Access Tool Execution\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0011\"\n    technique = \"T1219\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.process.name = /rmm-rogue/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.name LIKE "%rmm-rogue%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.name=/rmm-rogue/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.name=*rmm-rogue*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.name ~= "rmm-rogue"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.name:*rmm-rogue*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1219*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Process names matching anydesk, teamviewer, splashtop, screenconnect, atera, ngrok, gotomypc on a host where
  those products are not deployed by IT.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- rmm
- remote-access
- t1219
- command-and-control
references:
- https://attack.mitre.org/techniques/T1219/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination domain/IP, and the cadence pattern detected.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 verify beaconing characteristics\
  \ (interval, jitter, request size, server response code)."
- "Pull WHOIS / TLS / passive-DNS context on the destination \u2014 newly registered or low-reputation infrastructure raises\
  \ confidence."
- Identify the originating process and trace it back to its install / launch event (initial access / persistence stage).
- 'Decide TP / FP: FP for sanctioned OOB management agents (allowlist them); TP for unattended periodic egress to new infrastructure.'
- 'If TP: block the destination at egress, isolate the host, capture network PCAP / memory while session is live, and escalate
  to IR.'

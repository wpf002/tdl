rule_id: TDL-C2-000808
v4_id: 000808
name: Beacon Activated by ICMP Trigger Pattern
description: ICMP echo with anomalous payload size or pattern preceding a sudden outbound TCP/443 burst from the receiving
  host. Trigger-then-beacon C2. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1205 under Command
  and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1205
technique_name: Traffic Signaling
platform:
- Windows
- Linux
- Network
data_sources:
- Firewall
- Network IDS
- Sysmon
severity: Medium
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*icmp-trigger*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "icmp-trigger"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%icmp-trigger%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000808 {\n  meta:\n    author = \"TDL\"\n    description = \"Beacon Activated by ICMP Trigger Pattern\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1205\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /icmp-trigger/\n    $src = $e.principal.ip\n  match:\n    $src over\
    \ 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%icmp-trigger%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND network.protocol=/icmp-trigger/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*icmp-trigger*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "icmp-trigger"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND network.protocol:*icmp-trigger*
pseudo_logic: ICMP echo with anomalous payload size or pattern preceding a sudden outbound TCP/443 burst from the receiving

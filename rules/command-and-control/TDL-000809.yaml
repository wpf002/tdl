rule_id: TDL-C2-000809
v4_id: 000809
name: Programmatic Access to Public Paste/Drive Service
description: Non-browser process connecting to pastebin.com, raw.githubusercontent.com, hastebin, paste.ee, or telegram-bot
  API. Web-service C2. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1102 under Command and Control).
tactic: Command and Control
tactic_id: TA0011
technique_id: T1102
technique_name: Web Service
platform:
- Network
data_sources:
- DNS Logs
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search url.domain="*paste-c2*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where url.domain matches regex "paste-c2"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "url.domain" LIKE ''%paste-c2%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_c2_000809 {\n  meta:\n    author = \"TDL\"\n    description = \"Programmatic Access to Public Paste/Drive\
    \ Service\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0011\"\n    technique = \"T1102\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.url.domain = /paste-c2/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND url.domain LIKE "%paste-c2%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND url.domain=/paste-c2/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND url.domain=*paste-c2*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND url.domain ~= "paste-c2"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND url.domain:*paste-c2*
pseudo_logic: Non-browser process connecting to pastebin.com, raw.githubusercontent.com, hastebin, paste.ee, or telegram-bot

rule_id: TDL-CA-000059
v4_id: 000059
name: Wireless AP Broadcast Deauthentication
description: Detects a wireless deauthentication request that is sent to the broadcast MAC address of the wireless access
  point. The majority of wireless attacks on access points begin with the attacker capturing a client’s authentication. By
  sending a broadcast deauthentication packet, the access point will deauthenticate all clients on the network and an attacker
  can then capture their re-authentications.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1557
technique_name: Adversary-in-the-Middle
platform:
- Windows
data_sources:
- Windows Security Event Log
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_ca_000059 {
      meta:
        author = "TDL"
        description = "Wireless AP Broadcast Deauthentication"
        severity = "LOW"
        tactic = "TA0006"
        technique = "T1557"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: |-
  1 Wireless Access Point Event
  Where the Event Name contains "deauthentication"
  Where the Source Mac is "ff:ff:ff:ff:ff:ff"

  ----------------------------------------------------------------------------------

  1 Wireless IDS/IPS Event
  Where the Signature contains "Broadcast Deauthentication"
suppression:
  window: 24 hours
tuning_period: 7 days

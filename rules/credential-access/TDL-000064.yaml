rule_id: TDL-CA-000064
v4_id: '000064'
name: Traffic to Suspicious Top Level Domain
description: Detects multiple connection attempts to a suspicious Top Level Domain that is on the TDL High Risk Top Level
  Domains List.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1056
technique_name: Input Capture
platform:
- Windows
data_sources:
- Forward Proxy
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=network

    | bucket _time span=2m

    | stats count by src_ip, Account_Name, _time

    | where count >= 3

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 2m)

    | where Count >= 3

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 120 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000064 {\n  meta:\n    author = \"TDL\"\n    description = \"Traffic to Suspicious Top Level Domain\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0006\"\n    technique = \"T1056\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 2m\n\n  condition:\n    #event >= 3\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 2m)

    | WHERE event_count >= 3

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 3)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 3

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 3\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1056*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '3 Forward Proxy Events

  Where the Top Level Domain is on the High Risk Top Level Domains List

  With the same Source IP

  Within 2 minutes'
suppression:
  window: 24 hours
tuning_period: 7 days

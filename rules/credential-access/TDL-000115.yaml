rule_id: TDL-CA-000115
v4_id: '000115'
name: Windows Shadow Copy Creation
description: Detects when an attacker utilizes Windows shadow copy to copy the password hashes or system registry from a Domain
  Controller.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1003
technique_name: OS Credential Dumping
platform:
- Windows
data_sources:
- Windows Operating System
- Powershell Script Block
- 'Event IDs: 4688'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("vssadmin.exe", "ntdsutil.exe", "wmic.exe", "powershell.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("vssadmin.exe", "ntdsutil.exe", "wmic.exe", "powershell.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('vssadmin.exe', 'ntdsutil.exe', 'wmic.exe', 'powershell.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000115 {
      meta:
        author = "TDL"
        description = "Windows Shadow Copy Creation"
        severity = "HIGH"
        tactic = "TA0006"
        technique = "T1003"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(vssadmin.exe|ntdsutil.exe|wmic.exe|powershell.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("vssadmin.exe", "ntdsutil.exe", "wmic.exe", "powershell.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [vssadmin.exe, ntdsutil.exe, wmic.exe, powershell.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (vssadmin.exe, ntdsutil.exe, wmic.exe, powershell.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("vssadmin.exe", "ntdsutil.exe", "wmic.exe", "powershell.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(vssadmin.exe OR ntdsutil.exe OR wmic.exe OR powershell.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("vssadmin.exe", "ntdsutil.exe", "wmic.exe", "powershell.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Destination Host is a Domain Controller

  Where Process Name contains ["vssadmin.exe" or "ntdsutil.exe" or "wmic.exe" or "powershell.exe"]

  Where Command Line contains ["create" and "shadow"] or ["ntds" and "create"]'
suppression:
  window: 8 hours
  fields:
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the file path, file hash, parent process, and any prior network/email delivery — verify the read / dump / brute-force
  pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

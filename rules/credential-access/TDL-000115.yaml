rule_id: TDL-CA-000115
v4_id: '000115'
name: Windows Shadow Copy Creation
description: Detects when an attacker utilizes Windows shadow copy to copy the password hashes or system registry from a Domain
  Controller.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1003
technique_name: OS Credential Dumping
platform:
- Windows
data_sources:
- Windows Operating System
- Powershell Script Block
- 'Event IDs: 4688'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=windows

    | where (EventCode=4688 OR EventCode=4688)

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4688, 4688)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT username, hostname, \"Process Name\" AS process, \"Command Line\" AS cmdline\nFROM events\nWHERE (\"Process\
    \ Name\" ILIKE '%vssadmin.exe%' AND \"Command Line\" ILIKE '%delete%')\n   OR (\"Process Name\" ILIKE '%wmic.exe%' AND\
    \ \"Command Line\" ILIKE '%shadowcopy%delete%')\n  AND INOFFSET(starttime, LAST 86400 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule zs_ca_000115 {\n  meta:\n    author = \"TDE\"\n    description = \"Windows Shadow Copy Creation\"\n    severity\
    \ = \"CRITICAL\"\n    tactic = \"TA0040\"\n    technique = \"T1490\"\n\n  events:\n    $proc.metadata.event_type = \"\
    PROCESS_LAUNCH\"\n    ($proc.target.process.file.full_path = /vssadmin\\.exe$/\n     and $proc.target.process.command_line\
    \ = /delete/i)\n    or\n    ($proc.target.process.file.full_path = /wmic\\.exe$/\n     and $proc.target.process.command_line\
    \ = /shadowcopy.*delete/i)\n    $proc.principal.hostname = $host\n\n  match:\n    $host over 1h\n\n  condition:\n    #proc\
    \ >= 1\n\n  outcome:\n    $risk_score = max(100)\n}"
  esql: "FROM logs-windows.sysmon_operational*,logs-system.security*\n| WHERE @timestamp > NOW() - 1 day\n| WHERE event.code\
    \ == \"4688\"\n| WHERE (process.name LIKE \"*vssadmin.exe\" AND process.command_line LIKE \"*delete*\")\n     OR (process.name\
    \ LIKE \"*wmic.exe\" AND process.command_line RLIKE \"(?i)shadowcopy.*delete\")\n| KEEP host.name, user.name, process.name,\
    \ process.command_line, @timestamp\n| SORT @timestamp DESC"
  leql: "where((process CONTAINS \"vssadmin.exe\" AND command CONTAINS \"delete\")\n  OR (process CONTAINS \"wmic.exe\" AND\
    \ command CONTAINS \"shadowcopy\"))\ngroupby(hostname, username)\ncalculate(count AS vss_deletions)"
  crowdstrike: "event_simpleName=ProcessRollup2\n| where (FileName MATCHES \"(?i)vssadmin.exe\" AND CommandLine MATCHES \"\
    (?i)delete\")\n    OR (FileName MATCHES \"(?i)wmic.exe\" AND CommandLine MATCHES \"(?i)shadowcopy.*delete\")\n| table\
    \ ComputerName, UserName, FileName, CommandLine, ContextTimeStamp"
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\"\n| filter (action_process_image_name ~= \"vssadmin.exe\" and\
    \ action_process_command_line contains \"delete\")\n       or (action_process_image_name ~= \"wmic.exe\" and action_process_command_line\
    \ ~= \"(?i)shadowcopy.*delete\")\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line,\
    \ _time"
  lucene: '(process:vssadmin.exe AND command_line:*delete*)

    OR (process:wmic.exe AND command_line:*shadowcopy*delete*)'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- credential-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Destination Host is a Domain Controller

  Where Process Name contains ["vssadmin.exe" or "ntdsutil.exe" or "wmic.exe" or "powershell.exe"]

  Where Command Line contains ["create" and "shadow"] or ["ntds" and "create"]'
suppression:
  window: 8 hours
  fields:
  - Source Username
tuning_period: 7 days

rule_id: TDL-CA-000158
v4_id: 000158
name: POST to Threat Domain
description: This rule is designed to detect a POST request to a domain found on a Threat Intelligence Feed. POST requests
  are used to upload data and can indicate an attempt to exfiltrate data to a threat host.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1567
technique_name: Exfiltration Over Web Service
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, host, user, _raw'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000158 {\n  meta:\n    author = \"TDL\"\n    description = \"POST to Threat Domain\"\n    severity =\
    \ \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1567\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1567*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Forward Proxy Event

  From one internal source to on external destination (Outbound)

  Where the Destination Domain is on a Threat Intelligence List

  Where the Request Method is "POST"'
suppression:
  window: 12 hours
tuning_period: 7 days

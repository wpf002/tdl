rule_id: TDL-CA-000197
v4_id: 000197
name: Multiple Application Connections Deleted
description: Detects multiple Okta applications deleted by a single user.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1078
technique_name: Valid Accounts
platform:
- Okta
data_sources:
- Okta
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=okta sourcetype=OktaIM2:log

    | bucket _time span=10m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'OktaLogs_CL

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 600 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000197 {\n  meta:\n    author = \"TDL\"\n    description = \"Multiple Application Connections Deleted\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0006\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 10m\n\n  condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 10m)

    | WHERE event_count >= 5

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 5

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*okta*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '5 Okta Event

  Where the Event Type is "application.lifecycle.delete"

  From the same source IP and same source User

  With at least 5 unique applications

  Within 10 minutes'
suppression:
  window: 24 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- "Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on \u2014 verify the read\
  \ / dump / brute-force pattern is consistent with this technique."
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

pseudo_logic: "1 Windows Process Creation Event\nWhere the Event ID is in [592, 4688]\nWhere Destination Host is a Domain\
  \ Controller\nOR\n    Where Process Name equals \"reg.exe\"\n\tOR\n\t\tWhere Command Line contains \"save hklm\\system\"\
  \n\t\tWhere Command Line contains \"save hklm\\sam\"\n\t\tWhere Command Line contains \"save hklm\\security\"\n\t\tWhere\
  \ Command Line contains \"save hkey_local_machine\\system\"\n\t\tWhere Command Line contains \"save hkey_local_machine\\\
  sam\"\n\t\tWhere Command Line contains \"save hkey_local_machine\\security\"\n\t\tWhere Command Line contains \"save registry\\\
  machine\\system\"\n\t\tWhere Command Line contains \"save registry\\machine\\sam\"\n\t\tWhere Command Line contains \"save\
  \ registry\\machine\\security\"\n\t\tWhere Command Line contains \"export hklm\\system\"\n\t\tWhere Command Line contains\
  \ \"export hklm\\sam\"\n\t\tWhere Command Line contains \"export hklm\\security\"\n\t\tWhere Command Line contains \"export\
  \ hkey_local_machine\\system\"\n\t\tWhere Command Line contains \"export hkey_local_machine\\sam\"\n\t\tWhere Command Line\
  \ contains \"export hkey_local_machine\\security\"\n\t\tWhere Command Line contains \"export registry\\machine\\system\"\
  \n\t\tWhere Command Line contains \"export registry\\machine\\sam\"\n\t\tWhere Command Line contains \"export registry\\\
  machine\\security\"\n   \n    Where Process Name equals \"powershell.exe\"\n    Where Command Line contains \"Invoke-Mimikatz\"\
  \n\t\n\tWhere Process Name equals \"procdump.exe\"\n\tWhere Command contains \"lsass.exe\"\n\t\n\tWhere Process Name equals\
  \ \"taskmgr.exe\"\n\tWhere Command contains \"lsass\"\n\n\n-----------------------------------------------------------------------------------\n\
  \n1 Windows Process Creation Event\nWhere the Event ID is in [4657]\nWhere Destination Host is a Domain Controller\nRegistry\
  \ Key contains [hklm\\system, hklm\\sam, hkey_local_machine\\system, hklm\\security, hkey_local_machine\\sam, hkey_local_machine\\\
  security, registry\\machine\\system, registry\\machine\\sam, registry\\machine\\security]"

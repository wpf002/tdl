rule_id: TDL-CA-000202
v4_id: '000202'
name: Credential Dumping
description: Detects the dumping of memory or registry hives to gain credentials. The tool Procdump or Task Manager can be
  used to dump the memory of the lsass.exe. The lsass process is responsible for the authentication of users on a Windows
  host. Procdump is a tool that can dump a process’ memory to a file. The Task Manager can also be used to dump any process’
  memory in the GUI. By dumping the memory of lsass.exe, an attacker can search the memory for plaintext passwords that were
  inputted during authentication and compromise the accounts. Alternatively, an attacker can use reg.exe to download the Security
  Account Manager (SAM) registry hive, which contains user password hashes. These hashes can then be cracked or used in pass-the-hash
  attacks at a later time.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1003
technique_name: OS Credential Dumping
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)
    | search registry_key="*save hklm\system*"
    | stats count, values(host) as hosts by user, target_object, details, image
    | sort - count
  kql: |
    DeviceRegistryEvents
    | where TimeGenerated > ago(1d)
    | where registry_key matches regex "save hklm\system"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Registry Key", "Registry Value Name", "Registry Value Data", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('12','13','14')
      AND "registry_key" LIKE '%save hklm\system%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000202 {
      meta:
        author = "TDL"
        description = "Credential Dumping"
        severity = "HIGH"
        tactic = "TA0006"
        technique = "T1003"
      events:
        $e.metadata.event_type = "REGISTRY_MODIFICATION"
        $e.registry_key = /save hklm\system/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "registry" AND registry_key LIKE "%save hklm\system%"
    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "registry" AND registry_key=/save hklm\system/)
    groupby(asset, registry_key, registry_value)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry_key=*save hklm\system*
    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue
    | sort -changes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.REGISTRY AND registry_key ~= "save hklm\system"
    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name
    | sort desc changes
  lucene: |
    event.category:"registry" AND registry_key:*save hklm\system*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("12","13","14") AND registry_key matches "*save hklm\system*"
    | count by host, user, registry_key, registry_value, image
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'

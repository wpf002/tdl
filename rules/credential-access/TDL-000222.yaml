rule_id: TDL-CA-000222
v4_id: '000222'
name: Group Policy Password Enumeration
description: When attempting to pivot within an internal AD network, attackers will query the Domain Controllers for passwords
  stored within group policy files. This is typically done by querying the SYSVOL share and searching for multiple .xml files.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1552
technique_name: Unsecured Credentials
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5140'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=5140 OR EventCode=5145)

    | bucket _time span=2m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (5140, 5145)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 2m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 120 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000222 {\n  meta:\n    author = \"TDE\"\n    description = \"Group Policy Password Enumeration\"\n \
    \   severity = \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1552\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 2m\n\n  condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 2m)

    | WHERE event_count >= 5

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 5

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- credential-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '5 Windows Network Share Object Accessed Events

  Where the Event ID is in [5145]

  Where the Share Name is "\\*\SYSVOL"

  Where the Share File Relative Target Name matches "*.xml"

  With the same Source and Destination

  With unique Share File Names

  Within 2 minutes'
suppression:
  window: 12 hours
tuning_period: 7 days

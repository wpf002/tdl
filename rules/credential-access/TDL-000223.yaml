rule_id: TDL-CA-000223
v4_id: '000223'
name: SYSVOL Share Sweep
description: When attempting to pivot within an internal AD network, attackers will query the Domain Controllers for passwords
  stored within group policy files. This is typically done by querying the SYSVOL share. An internal host attempting to query
  the SYSVOL share is suspicious activity and does not happen often which could be indicative of this type of attack.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1552
technique_name: Unsecured Credentials
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5140'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("5140", "5145")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("5140", "5145")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('5140', '5145')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000223 {
      meta:
        author = "TDL"
        description = "SYSVOL Share Sweep"
        severity = "MEDIUM"
        tactic = "TA0006"
        technique = "T1552"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(5140|5145)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("5140", "5145")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [5140, 5145])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (5140, 5145)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("5140", "5145")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(5140 OR 5145)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("5140", "5145")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "10 Windows Network Share Object Accessed Events\nWhere the Event ID is in [5140]\nWhere the Share Name is \"\
  \\\\*\\SYSVOL\"\nWith the same Source IP\nWith unique Destinations\nWithin 2 minutes\n\n--------------------------------------------------------------------\n\
  \n3 Windows Network Share Object Accessed Events\nWhere the Event ID is in [5145]\nWhere the Share Name is \"\\\\*\\SYSVOL\"\
  \nWhere the Share File Relative Target Name matches the regex \".^*\\\\policies\\\\.*\\\\Machine\\\\.*$\" \nWith the same\
  \ Source IP\nWith unique Destinations\nWithin 2 minutes"
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the read / dump / brute-force
  pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

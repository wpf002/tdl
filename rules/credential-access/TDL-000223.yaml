rule_id: TDL-CA-000223
v4_id: '000223'
name: SYSVOL Share Sweep
description: When attempting to pivot within an internal AD network, attackers will query the Domain Controllers for passwords
  stored within group policy files. This is typically done by querying the SYSVOL share. An internal host attempting to query
  the SYSVOL share is suspicious activity and does not happen often which could be indicative of this type of attack.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1552
technique_name: Unsecured Credentials
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5140'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=5140 OR EventCode=5140 OR EventCode=5145)

    | bucket _time span=2m

    | stats count by src_ip, Account_Name, _time

    | where count >= 10

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (5140, 5140, 5145)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 2m)

    | where Count >= 10

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 120 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000223 {\n  meta:\n    author = \"TDE\"\n    description = \"SYSVOL Share Sweep\"\n    severity = \"\
    MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1552\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 2m\n\n \
    \ condition:\n    #event >= 10\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 2m)

    | WHERE event_count >= 10

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 10)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 10

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 10\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- credential-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "10 Windows Network Share Object Accessed Events\nWhere the Event ID is in [5140]\nWhere the Share Name is \"\
  \\\\*\\SYSVOL\"\nWith the same Source IP\nWith unique Destinations\nWithin 2 minutes\n\n--------------------------------------------------------------------\n\
  \n3 Windows Network Share Object Accessed Events\nWhere the Event ID is in [5145]\nWhere the Share Name is \"\\\\*\\SYSVOL\"\
  \nWhere the Share File Relative Target Name matches the regex \".^*\\\\policies\\\\.*\\\\Machine\\\\.*$\" \nWith the same\
  \ Source IP\nWith unique Destinations\nWithin 2 minutes"
suppression:
  window: 12 hours
tuning_period: 7 days

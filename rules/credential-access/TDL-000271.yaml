rule_id: TDL-CA-000271
v4_id: '000271'
name: Logon Attempts to Non Existent Account
description: Detects a potential account guessing attack against Windows accounts taregting a single host. Attackers may attempt
  to determine if a username exists by authenticating with a username and observing error messages recieved. The guessed username
  may be a default account for an applications or a permutation of the organization's naming convention. Once the attacker
  has determined if a username exists, they can target the existing accounts with password spraying attacks.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1110
technique_name: Brute Force
platform:
- Windows
data_sources:
- Windows Active Directory
- 'Event IDs: 4625'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4625", "4776")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4625", "4776")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4625', '4776')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000271 {
      meta:
        author = "TDL"
        description = "Logon Attempts to Non Existent Account"
        severity = "LOW"
        tactic = "TA0006"
        technique = "T1110"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4625|4776)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4625", "4776")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4625, 4776])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4625, 4776)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4625", "4776")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4625 OR 4776)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4625", "4776")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "75 Windows Authentication Failure events \nFrom the same internal Source IP/Source Hostname and same internal\
  \ Destination Hostname\nWhere the Event ID is in [529, 4625, 680, 681, 4776]\nWhere the Failure Code is \"0xC0000064\" \n\
  Where the username does not end with \"$\"\nWhere the Source IP/Hostname is NOT on the Mail Server List\nWhere the Source\
  \ IP/Hostname is NOT on the Central Authentication Server List\nWhere the Source IP/Hostname is NOT on the Vulnerability\
  \ Scanner List\nWhere the Source IP/Hostname is NOT on the Domain Controller List\nWhere the Destination Username is NOT\
  \ on the High Value Target Accounts List\nWhere the Destination Username is NOT on the Password Reset Exclusion List - 8\
  \ hours\nWith the same Destination Username and Event ID\nWithin 3 minutes"
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user — verify the read / dump
  / brute-force pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

rule_id: TDL-CA-000283
v4_id: 000283
name: Stealth Account Guessing - Domain Controller - 4776
description: Detects a potential account guessing attack against Windows accounts. Attackers may attempt to determine if a
  username exists by authenticating with a username and observing error messages received. The guessed usernames may be default
  accounts for applications or permutations the organization's naming convention. Once the attacker has determined if a username
  exists, they can target the existing accounts with password spraying attacks. The attacker, in this instance, is preforming
  the account guessing at a slow rate to avoid detection.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1110
technique_name: Brute Force
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4776'
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | where (EventCode=4776 OR EventCode=4776)

    | bucket _time span=1m

    | stats count by src_ip, Account_Name, _time

    | where count >= 4

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4776, 4776)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)

    | where Count >= 4

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4776\n  AND INOFFSET(starttime, LAST 3600 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    HAVING event_count >= 4\nORDER BY starttime DESC"
  yara_l: "rule zs_ca_000283 {\n  meta:\n    author = \"TDL\"\n    description = \"Stealth Account Guessing - Domain Controller\
    \ - 4776\"\n    severity = \"LOW\"\n    tactic = \"TA0006\"\n    technique = \"T1110\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4776\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 1h\n\n  condition:\n    #event >= 4\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4776'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 1h)

    | WHERE event_count >= 4

    | SORT event_count DESC'
  leql: 'where(event_id IN [4776])

    groupby(source_ip, username, hostname)

    calculate(count AS event_count)

    having(event_count >= 4)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4776

    | stats count as events by ComputerName, UserName

    | where events >= 4'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4776)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as event_count by hostname, actor_effective_username

    | filter event_count >= 4

    | fields hostname, actor_effective_username, event_count'
  lucene: event_id:(4776)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1110*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "4 Instances over 1 hour of at least 2 Windows Authentication Failure Events \nFrom the same internal Source\
  \ Hostname to the same Destination\nWhere the Event ID in [680, 681, 4776]\nWhere the Failure Code is \"0xC0000064\"\nWhere\
  \ the Destination Hostname is on the Domain Controller List \nWhere the Destination Username does NOT end with \"$\" \n\
  Where the Source Hostname is NOT on a Mail Server List \nWhere the Source Hostname is NOT on a Central Authentication Server\
  \ List \nWith unique Destination Usernames \nWith the same Event ID \nWithin 3 minutes"
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 verify the read /\
  \ dump / brute-force pattern is consistent with this technique."
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

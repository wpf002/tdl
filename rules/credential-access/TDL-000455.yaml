rule_id: TDL-CA-000455
v4_id: '000455'
name: Suspicious Network Communication With IPFS
description: Detects connections to interplanetary file system (IPFS) containing a
  user's email address which mirrors behaviors observed in recent phishing campaigns
  leveraging IPFS to host credential harvesting webpages.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1506
technique_name: Input Capture
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*tcp*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "tcp"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%tcp%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_ca_000455 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Suspicious Network Communication With IPFS\"\n    severity = \"MEDIUM\"\n\
    \    tactic = \"TA0006\"\n    technique = \"T1506\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /tcp/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/tcp/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*tcp*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*tcp*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*tcp*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity
  provider, and the source process / actor.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — verify the read / dump / brute-force pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions
  follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached
  credentials, recent session tokens, kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended
  dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions,
  isolate the host, and consider golden-ticket / krbtgt rotation if scope warrants.'
pseudo_logic: '1 Instance within any observed window of a network connection event
  matching IPFS-related credential harvesting behaviour.


  From index=network where sourcetype is firewall or sourcetype is ids

  Where network.protocol contains "tcp"

  With dest_ip, dest_port, and bytes_out recorded per src_ip and dest_ip pair

  With count of connections greater than or equal to 1 and unique destination IPs
  (dc(dest_ip)) computed alongside total bytes_out (sum(bytes_out))

  Excluding traffic originating from authorized scanners and monitoring agents


  With the same src_ip and dest_ip, sorted descending by bytes_out to surface highest-volume
  suspicious transfers first, with no minimum deduplication spacing applied given
  the single-instance threshold.'

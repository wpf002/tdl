rule_id: TDL-CA-000562
v4_id: '000562'
name: Kubernetes Secrets Deleted
description: Detects a secret being deleted within a kubernetes instance. Sometimes secret deletion is part of a normal buisness
  procedure so by itself it may not be a threat. However, it can be great context in conjunction to other alerts
tactic: Credential Access
tactic_id: TA0006
technique_id: T1552
technique_name: Unsecured Credentials
platform:
- Windows
data_sources:
- Kubernetes
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*.+*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex ".+"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000562 {
      meta:
        author = "TDL"
        description = "Kubernetes Secrets Deleted"
        severity = "MEDIUM"
        tactic = "TA0006"
        technique = "T1552"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /.+/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%.+%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*.+*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= ".+"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*.+*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 Kubernetes Event \nWhere Verb is \"delete\"\nWhere Resource is \"secrets\"\nWhere the Response Code is 200"
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the read / dump / brute-force
  pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

rule_id: TDL-CA-000590
v4_id: 000590
name: Golden Ticket Activity
description: Detects when a source generates a ticket granting service (TGS) event without a ticket granting ticket (TGT)
  event, which means a Golden Ticket may be used within the environment. Adversaries who have the KRBTGT account password
  hash may forge Kerberos ticket-granting tickets (TGT), also known as a golden ticket. Using a golden ticket, adversaries
  are then able to request ticket granting service (TGS) tickets, which enable access to specific resources. Golden tickets
  require adversaries to interact with the Key Distribution Center (KDC) in order to obtain TGS.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1558
technique_name: Steal or Forge Kerberos Tickets
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4768, 4769'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4768", "4769")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4768", "4769")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4768', '4769')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000590 {
      meta:
        author = "TDL"
        description = "Golden Ticket Activity"
        severity = "MEDIUM"
        tactic = "TA0006"
        technique = "T1558"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4768|4769)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4768", "4769")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4768, 4769])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4768, 4769)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4768", "4769")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4768 OR 4769)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4768", "4769")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Windows Event

  Where the Event ID is  "4769"

  Where the Source user is NOT a machine account

  Where the Service Name does NOT end with "$"

  Where the Service Name is NOT "krbtgt"

  With 5 Unique Service Names

  From the Same Src IP and Src User

  Within 10 Hours


  AND where there are no 4768 Events within the timeframe from the same source IP and user'
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the read / dump / brute-force
  pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

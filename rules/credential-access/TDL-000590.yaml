rule_id: TDL-CA-000590
v4_id: 000590
name: Golden Ticket Activity
description: Detects when a source generates a ticket granting service (TGS) event without a ticket granting ticket (TGT)
  event, which means a Golden Ticket may be used within the environment. Adversaries who have the KRBTGT account password
  hash may forge Kerberos ticket-granting tickets (TGT), also known as a golden ticket. Using a golden ticket, adversaries
  are then able to request ticket granting service (TGS) tickets, which enable access to specific resources. Golden tickets
  require adversaries to interact with the Key Distribution Center (KDC) in order to obtain TGS.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1558
technique_name: Steal or Forge Kerberos Tickets
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4768, 4769'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4768 OR EventCode=4769 OR EventCode=4769 OR EventCode=4768)

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4768, 4769, 4769, 4768)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid IN (4768, 4769)\n  AND INOFFSET(starttime, LAST 36000 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule zs_ca_000590 {\n  meta:\n    author = \"TDL\"\n    description = \"Golden Ticket Activity\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1558\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.metadata.product_event_type = \"4768\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 10h\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4768'', ''4769'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 10h)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4768, 4769])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4768 OR EventCode=4769

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4768, 4769)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4768 OR 4769)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1558*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Windows Event

  Where the Event ID is  "4769"

  Where the Source user is NOT a machine account

  Where the Service Name does NOT end with "$"

  Where the Service Name is NOT "krbtgt"

  With 5 Unique Service Names

  From the Same Src IP and Src User

  Within 10 Hours


  AND where there are no 4768 Events within the timeframe from the same source IP and user'

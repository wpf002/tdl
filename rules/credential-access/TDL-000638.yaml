rule_id: TDL-CA-000638
v4_id: 000638
name: LDAP Kerberos Recon - Defender
description: Identifies LDAP search activity that focuses on Kerberos-related attributes and security principals often queried
  by attackers during pre-authentication reconnaissance.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1558
technique_name: Steal or Forge Kerberos Tickets
platform:
- Windows
data_sources:
- Microsoft Defender
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4624", "4625", "4768", "4769", "4776")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4624", "4625", "4768", "4769", "4776")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4624', '4625', '4768', '4769', '4776')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000638 {
      meta:
        author = "TDL"
        description = "LDAP Kerberos Recon - Defender"
        severity = "LOW"
        tactic = "TA0006"
        technique = "T1558"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4624|4625|4768|4769|4776)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4624", "4625", "4768", "4769", "4776")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4624, 4625, 4768, 4769, 4776])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4624, 4625, 4768, 4769, 4776)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4624", "4625", "4768", "4769", "4776")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4624 OR 4625 OR 4768 OR 4769 OR 4776)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4624", "4625", "4768", "4769", "4776")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 AdvancedHunting Device Event\nWhere event_category = \"AdvancedHunting-DeviceEvents\"\nWhere event_type =\
  \ \"LdapSearch\"\nWhere tags != \"[ ]\"\nWhere scope!=\"Base\"\n\nWhere (\n    additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=4194304)\"\
  \n    OR additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=2097152)\"\n    OR additional_fields contains\
  \ \"!(userAccountControl:1.2.840.113556.1.4.803:=1048574)\"\n    OR additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=524288)\"\
  \n    OR additional_fields contains \"msDS-AllowedToActOnBehalfOfOtherIdentity\"\n    OR additional_fields contains \"msDS-AllowedToDelegateTo\"\
  \n)"
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user — verify the read / dump
  / brute-force pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

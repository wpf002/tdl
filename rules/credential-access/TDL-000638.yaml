rule_id: TDL-CA-000638
v4_id: 000638
name: LDAP Kerberos Recon - Defender
description: Identifies LDAP search activity that focuses on Kerberos-related attributes and security principals often queried
  by attackers during pre-authentication reconnaissance.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1558
technique_name: Steal or Forge Kerberos Tickets
platform:
- Windows
data_sources:
- Microsoft Defender
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_ca_000638 {\n  meta:\n    author = \"TDL\"\n    description = \"LDAP Kerberos Recon - Defender\"\n    severity\
    \ = \"LOW\"\n    tactic = \"TA0006\"\n    technique = \"T1558\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1558*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 AdvancedHunting Device Event\nWhere event_category = \"AdvancedHunting-DeviceEvents\"\nWhere event_type =\
  \ \"LdapSearch\"\nWhere tags != \"[ ]\"\nWhere scope!=\"Base\"\n\nWhere (\n    additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=4194304)\"\
  \n    OR additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=2097152)\"\n    OR additional_fields contains\
  \ \"!(userAccountControl:1.2.840.113556.1.4.803:=1048574)\"\n    OR additional_fields contains \"(userAccountControl:1.2.840.113556.1.4.803:=524288)\"\
  \n    OR additional_fields contains \"msDS-AllowedToActOnBehalfOfOtherIdentity\"\n    OR additional_fields contains \"msDS-AllowedToDelegateTo\"\
  \n)"
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- "Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user \u2014 verify the read\
  \ / dump / brute-force pattern is consistent with this technique."
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

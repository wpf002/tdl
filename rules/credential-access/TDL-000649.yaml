rule_id: TDL-CA-000649
v4_id: 000649
name: Sys Admin Tools Created or Modified - Varonis
description: Detects the change or creation of administrative tools. While the tools
  may have legitimate uses, the use of the tools can be used for malicious activity.
  The activity should be validated by the user creating and or modifying the tools.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Varonis
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process_name="*.+*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process_name matches regex ".+"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process_name\" LIKE '%.+%'\n\
    LAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_ca_000649 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Sys Admin Tools Created or Modified - Varonis\"\n    severity = \"LOW\"\n\
    \    tactic = \"TA0006\"\n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process_name = /.+/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process_name LIKE "%.+%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND process_name=/.+/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process_name=*.+*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND process_name:*.+*

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND process_name matches "*.+*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- credential-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity
  provider, and the source process / actor.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — verify the read / dump / brute-force pattern is consistent with this technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions
  follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached
  credentials, recent session tokens, kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended
  dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions,
  isolate the host, and consider golden-ticket / krbtgt rotation if scope warrants.'
pseudo_logic: '1 Instance within any time window of a Sysmon Process Creation event.


  From index=endpoint with sourcetype=Sysmon

  Where EventCode=1 (Process Create)

  Where process_name matches a wildcard pattern indicating administrative or system
  tools

  With fields collected including process_name, parent_process_name, command_line,
  host, and user

  With a minimum count of 1 occurrence across the aggregation


  With the same process_name, parent_process_name, and command_line as the correlation
  key, deduplicated by unique host and user combinations per process invocation.'

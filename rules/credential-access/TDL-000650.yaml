rule_id: TDL-CA-000650
v4_id: '000650'
name: Azure Network Packet Capture Detected
description: Detects potential full network packet capture in Azure. Packet Capture is an Azure Network Watcher feature that
  can be used to inspect network traffic. This feature can potentially be abused to read sensitive data from unencrypted internal
  traffic.
tactic: Credential Access
tactic_id: TA0006
technique_id: T1040
technique_name: Network Sniffing
platform:
- Azure
data_sources:
- Azure Activity
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=azure

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_ca_000650 {
      meta:
        author = "TDE"
        description = "Azure Network Packet Capture Detected"
        severity = "HIGH"
        tactic = "TA0006"
        technique = "T1040"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-azure*,logs-o365*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- credential-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 Azure Administrative Activity Event
  Where the operation is in ["MICROSOFT.NETWORK/*/STARTPACKETCAPTURE/ACTION", "MICROSOFT.NETWORK/*/VPNCONNECTIONS/STARTPACKETCAPTURE/ACTION", "MICROSOFT.NETWORK/*/PACKETCAPTURES/WRITE"]
  Where the action is success

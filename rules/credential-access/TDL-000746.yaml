rule_id: TDL-CA-000746
v4_id: '000746'
name: Anonymous NetrServerPasswordSet2 to Domain Controller
description: Successful NetrServerPasswordSet2 / NetrServerAuthenticate3 from anonymous session against a DC. Zerologon (CVE-2020-1472)
  signature. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1212 under Credential Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1212
technique_name: Exploitation for Credential Access
platform:
- Windows
data_sources:
- EDR
- Windows Event Log
severity: Critical
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search rpc.opnum="*zerologon*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where rpc.opnum matches regex "zerologon"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "rpc.opnum" LIKE ''%zerologon%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_ca_000746 {\n  meta:\n    author = \"TDL\"\n    description = \"Anonymous NetrServerPasswordSet2 to\
    \ Domain Controller\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0006\"\n    technique = \"T1212\"\n  events:\n  \
    \  $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.rpc.opnum = /zerologon/\n    $src = $e.principal.ip\n  match:\n\
    \    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND rpc.opnum LIKE "%zerologon%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND rpc.opnum=/zerologon/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND rpc.opnum=*zerologon*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND rpc.opnum ~= "zerologon"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND rpc.opnum:*zerologon*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*windows/events*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1212*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'

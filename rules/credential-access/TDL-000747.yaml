rule_id: TDL-CA-000747
v4_id: '000747'
name: SMB Connection Following SCF/HTML UNC Trigger
description: Client SMB connection to external IP within 2s of opening a file or browsing a path. Forced-auth via SCF / .url
  / HTML img src=\\evil. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1187 under Credential Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1187
technique_name: Forced Authentication
platform:
- Windows
data_sources:
- Network IDS
- Windows Event Log
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search destination.ip="*smb-external*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where destination.ip matches regex "smb-external"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "destination.ip" LIKE ''%smb-external%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_ca_000747 {\n  meta:\n    author = \"TDL\"\n    description = \"SMB Connection Following SCF/HTML\
    \ UNC Trigger\"\n    severity = \"HIGH\"\n    tactic = \"TA0006\"\n    technique = \"T1187\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.destination.ip = /smb-external/\n    $src = $e.principal.ip\n  match:\n    $src over\
    \ 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND destination.ip LIKE "%smb-external%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND destination.ip=/smb-external/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination.ip=*smb-external*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND destination.ip ~= "smb-external"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND destination.ip:*smb-external*
  sumo: '_sourceCategory=*ids* OR _sourceCategory=*windows/events*

    | where technique="T1187" OR _raw matches "*T1187*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: Client SMB connection to external IP within 2s of opening a file or browsing a path. Forced-auth via SCF / .url

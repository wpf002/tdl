rule_id: TDL-CA-000748
v4_id: 000748
name: SAML Token Issued With Impossible Lifetime
description: ADFS / Azure AD token with NotOnOrAfter > 24h, or SignatureCertificate fingerprint not in the published cert
  set. Golden-SAML forging signal. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1606 under Credential
  Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1606
technique_name: Forge Web Credentials
platform:
- Azure
- AWS
- Windows
data_sources:
- Cloud Audit Logs
- ADFS Logs
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search token.lifetime="*saml-forge*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where token.lifetime matches regex "saml-forge"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"token.lifetime\" LIKE '%saml-forge%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_ca_000748 {\n  meta:\n    author = \"TDL\"\n    description = \"SAML Token Issued With Impossible\
    \ Lifetime\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0006\"\n    technique = \"T1606\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.token.lifetime = /saml-forge/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE token.lifetime LIKE "%saml-forge%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND token.lifetime=/saml-forge/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND token.lifetime=*saml-forge*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter token.lifetime ~= "saml-forge"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND token.lifetime:*saml-forge*
  sumo: '_sourceCategory=*cloud/audit* OR _sourceCategory=*windows/adfs*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1606*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: ADFS / Azure AD token with NotOnOrAfter > 24h, or SignatureCertificate fingerprint not in the published cert
  set. Golden-SAML forging signal.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- golden-saml
- jwt
- forge
- t1606
- credential-access
references:
- https://attack.mitre.org/techniques/T1606/

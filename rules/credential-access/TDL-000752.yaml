rule_id: TDL-CA-000752
v4_id: '000752'
name: ADCS Certificate Issued With SAN Override
description: EID 4886/4887 with explicit SubjectAltName UPN that does not match the requesting account. ADCS ESC1/ESC6 abuse.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1649 under Credential Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1649
technique_name: Steal or Forge Authentication Certificates
platform:
- Windows
data_sources:
- Windows Event Log
- ADCS Logs
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search certificate.san="*esc1*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where certificate.san matches regex "esc1"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "certificate.san" LIKE ''%esc1%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_ca_000752 {\n  meta:\n    author = \"TDL\"\n    description = \"ADCS Certificate Issued With SAN Override\"\
    \n    severity = \"CRITICAL\"\n    tactic = \"TA0006\"\n    technique = \"T1649\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.certificate.san = /esc1/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND certificate.san LIKE "%esc1%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND certificate.san=/esc1/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND certificate.san=*esc1*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND certificate.san ~= "esc1"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND certificate.san:*esc1*
  sumo: '_sourceCategory=*windows/events* OR _sourceCategory=*windows/adcs*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1649*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: EID 4886/4887 with explicit SubjectAltName UPN that does not match the requesting account. ADCS ESC1/ESC6 abuse.
false_positives:

rule_id: TDL-CA-000752
v4_id: '000752'
name: ADCS Certificate Issued With SAN Override
description: EID 4886/4887 with explicit SubjectAltName UPN that does not match the requesting account. ADCS ESC1/ESC6 abuse.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1649 under Credential Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1649
technique_name: Steal or Forge Authentication Certificates
platform:
- Windows
data_sources:
- Windows Event Log
- ADCS Logs
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search event_id IN ("4886", "4887")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where event_id in ("4886", "4887")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "event_id" IN ('4886', '4887')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_ca_000752 {
      meta:
        author = "TDL"
        description = "ADCS Certificate Issued With SAN Override"
        severity = "CRITICAL"
        tactic = "TA0006"
        technique = "T1649"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.event_id = /(4886|4887)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND event_id IN ("4886", "4887")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND event_id IN [4886, 4887])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND event_id IN (4886, 4887)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND event_id in ("4886", "4887")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND event_id:(4886 OR 4887)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND event_id IN ("4886", "4887")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: EID 4886/4887 with explicit SubjectAltName UPN that does not match the requesting account. ADCS ESC1/ESC6 abuse.
false_positives:

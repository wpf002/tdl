rule_id: TDL-CA-000753
v4_id: '000753'
name: Non-Browser Process Reading Browser Cookie Database
description: Read of Chrome/Edge "Network\Cookies" SQLite, Firefox cookies.sqlite, or Safari Cookies.binarycookies by a process
  other than the browser itself. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1539 under Credential
  Access).
tactic: Credential Access
tactic_id: TA0006
technique_id: T1539
technique_name: Steal Web Session Cookie
platform:
- Windows
- macOS
- Linux
data_sources:
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*cookie-steal*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "cookie-steal"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%cookie-steal%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_ca_000753 {\n  meta:\n    author = \"TDL\"\n    description = \"Non-Browser Process Reading Browser\
    \ Cookie Database\"\n    severity = \"HIGH\"\n    tactic = \"TA0006\"\n    technique = \"T1539\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /cookie-steal/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%cookie-steal%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/cookie-steal/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*cookie-steal*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "cookie-steal"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*cookie-steal*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1539*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Read of Chrome/Edge "Network\Cookies" SQLite, Firefox cookies.sqlite, or Safari Cookies.binarycookies by a process
  other than the browser itself.

rule_id: TDL-CA-002
name: Kerberoasting - Large Volume TGS Requests
tactic: Credential Access
tactic_id: TA0006
technique_id: T1558.003
technique_name: Kerberoasting
platform:
- Windows
data_sources:
- Windows Security Event Log (4769)
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 85
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4769")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4769")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4769')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_ca_002 {\n  meta:\n    author = \"TDL\"\n    description =\
    \ \"Kerberoasting - Large Volume TGS Requests\"\n    severity = \"HIGH\"\n   \
    \ tactic = \"TA0006\"\n    technique = \"T1558.003\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $e.event_id = /(4769)/\n    $user = $e.target.user.userid\n\
    \  match:\n    $user over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4769")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4769])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4769)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4769")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4769)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4769")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- Monitoring tools enumerating SPNs
tags:
- kerberoasting
- active-directory
- credential-access
author: TDL
created: '2024-02-02'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity
  provider, and the source process / actor.'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern
  for the user — verify the read / dump / brute-force pattern is consistent with this
  technique.
- 'Pull preceding execution / discovery telemetry: many credential-access actions
  follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached
  credentials, recent session tokens, kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended
  dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions,
  isolate the host, and consider golden-ticket / krbtgt rotation if scope warrants.'
pseudo_logic: '1 or more instances over any period of Windows Security Event Log event_id
  4769 (Kerberos Service Ticket Request).


  From index=windows sourcetype="WinEventLog:Security"

  Where event_id is 4769

  With stats aggregated by user, IpAddress, LogonType, and EventCode

  Where count of matching events is greater than or equal to 1

  With the same user and IpAddress as the correlation key, sorted descending by count'

rule_id: TDL-CA-004
name: DCSync Attack - Replication Rights Abuse
tactic: Credential Access
tactic_id: TA0006
technique_id: T1003.006
technique_name: DCSync
platform:
- Windows
data_sources:
- Windows Security Event Log (4662)
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 95
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4662

    | where Properties="1131f6aa-9c07-11d1-f79f-00c04fc2dcd2" OR Properties="1131f6ab-9c07-11d1-f79f-00c04fc2dcd2"

    | where NOT match(SubjectUserName,"\\$$")

    | table _time, host, SubjectUserName, Properties'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4662

    | where Properties has_any ("1131f6aa-9c07-11d1-f79f-00c04fc2dcd2","1131f6ab-9c07-11d1-f79f-00c04fc2dcd2")

    | where SubjectUserName !endswith "$"

    | project TimeGenerated, Computer, SubjectUserName, Properties'
  aql: "SELECT username AS subject_user, hostname AS dc_name, QIDNAME(qid) AS event_name,\n       \"Object Properties\" AS\
    \ properties\nFROM events\nWHERE eventid = 4662\n  AND \"Object Properties\" ILIKE '%1131f6aa-9c07-11d1-f79f-00c04fc2dcd2%'\n\
    \     OR \"Object Properties\" ILIKE '%1131f6ab-9c07-11d1-f79f-00c04fc2dcd2%'\n  AND username NOT LIKE '%$'\n  AND INOFFSET(starttime,\
    \ LAST 86400 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule tdl_ca_004 {\n  meta:\n    author = \"TDL\"\n    description = \"DCSync Attack - Replication Rights Abuse\"\
    \n    severity = \"CRITICAL\"\n    tactic = \"TA0006\"\n    technique = \"T1003.006\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4662\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4662'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4662])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4662

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4662)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4662)
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1003.006*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Azure AD Connect
- Backup solutions with AD replication permissions
tags:
- dcsync
- mimikatz
- critical
- active-directory
author: TDL
created: '2024-02-04'
test_method: purple_team
last_modified: '2026-04-27'
triage_steps:
- 'Confirm the alert metadata: timestamp, target host (LSASS / DC / KDC) or identity provider, and the source process / actor.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 verify the read /\
  \ dump / brute-force pattern is consistent with this technique."
- 'Pull preceding execution / discovery telemetry: many credential-access actions follow process-injection or LSASS tooling.'
- 'Compute the blast radius: which accounts could have been exposed (enumerate cached credentials, recent session tokens,
  kerberos tickets).'
- 'Decide TP / FP: FP for sanctioned IR / pen-test / DSC tooling; TP for unattended dumping or anomalous Kerberos behavior.'
- 'If TP: rotate all potentially exposed credentials and tickets, invalidate sessions, isolate the host, and consider golden-ticket
  / krbtgt rotation if scope warrants.'

rule_id: TDL-CA-004
name: DCSync Attack - Replication Rights Abuse
tactic: Credential Access
tactic_id: TA0006
technique_id: T1003.006
technique_name: DCSync
platform:
- Windows
data_sources:
- Windows Security Event Log (4662)
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 95
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4662

    | where Properties="1131f6aa-9c07-11d1-f79f-00c04fc2dcd2" OR Properties="1131f6ab-9c07-11d1-f79f-00c04fc2dcd2"

    | where NOT match(SubjectUserName,"\\$$")

    | table _time, host, SubjectUserName, Properties'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4662

    | where Properties has_any ("1131f6aa-9c07-11d1-f79f-00c04fc2dcd2","1131f6ab-9c07-11d1-f79f-00c04fc2dcd2")

    | where SubjectUserName !endswith "$"

    | project TimeGenerated, Computer, SubjectUserName, Properties'
  aql: |-
    SELECT username AS subject_user, hostname AS dc_name, QIDNAME(qid) AS event_name,
           "Object Properties" AS properties
    FROM events
    WHERE eventid = 4662
      AND "Object Properties" ILIKE '%1131f6aa-9c07-11d1-f79f-00c04fc2dcd2%'
         OR "Object Properties" ILIKE '%1131f6ab-9c07-11d1-f79f-00c04fc2dcd2%'
      AND username NOT LIKE '%$'
      AND INOFFSET(starttime, LAST 86400 SECONDS)
    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_ca_004 {
      meta:
        author = "TDL"
        description = "DCSync Attack - Replication Rights Abuse"
        severity = "CRITICAL"
        tactic = "TA0006"
        technique = "T1003.006"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4662"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4662')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4662])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4662
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (4662)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: |-
    event_id:(4662)
false_positives:
- Azure AD Connect
- Backup solutions with AD replication permissions
tags:
- dcsync
- mimikatz
- critical
- active-directory

rule_id: TDL-DE-000027
v4_id: '000027'
name: Suspicious Inbox Manipulation
description: Detects a suspicious inbox rule modification set to forward to an unauthorized email address.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1020
technique_name: Automated Exfiltration
platform:
- Microsoft 365
data_sources:
- Exchange
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'OfficeActivity

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, UserId, ClientIP, Operation, OfficeWorkload'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_de_000027 {\n  meta:\n    author = \"TDE\"\n    description = \"Suspicious Inbox Manipulation\"\n    severity\
    \ = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1020\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- defense-evasion
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 O365 Exchange event \nWhere the operation is \"Set-InboxRule\"\nWhere the Forward/Redirect Target Domain\
  \ is not owned by the organization\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 O365 ATP Alert Event\nWhere the Operation is \"AlertTriggered\"\nWhere the Alert Name is \"Suspicious inbox manipulation\
  \ rule\"\n\n---------------------------------------------------------------------------------------------------------------"
suppression:
  window: 8 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days

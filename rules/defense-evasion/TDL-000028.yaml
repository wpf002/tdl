rule_id: TDL-DE-000028
v4_id: 000028
name: Suspicious Inbox Forwarding
description: Detects a new email forwarding or redirect rule to an unauthorized email address.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1020
technique_name: Automated Exfiltration
platform:
- Microsoft 365
data_sources:
- Exchange
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*New-InboxRule*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex "New-InboxRule"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%New-InboxRule%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000028 {
      meta:
        author = "TDL"
        description = "Suspicious Inbox Forwarding"
        severity = "HIGH"
        tactic = "TA0005"
        technique = "T1020"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /New-InboxRule/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%New-InboxRule%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/New-InboxRule/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*New-InboxRule*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= "New-InboxRule"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*New-InboxRule*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*New-InboxRule*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 O365 Exchange event \nWhere the operation is \"New-InboxRule\"\nWhere the Forward/Redirect Target Domain\
  \ is not owned by the organization\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 O365 ATP Alert Event\nWhere the Operation is \"AlertTriggered\"\nWhere the Alert Name is \"Suspicious inbox forwarding\"\
  \n\n---------------------------------------------------------------------------------------------------------------\n\n\
  1 MCAS Event"
suppression:
  window: 8 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on — distinguish administrative
  tooling from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

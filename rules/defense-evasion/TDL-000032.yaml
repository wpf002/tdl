rule_id: TDL-DE-000032
v4_id: '000032'
name: Audit Log Cleared
description: 'Detects when the Windows OS security log is cleared on a host. Attackers could attempt to erase their tracks
  by clearing logs that contains record of their malicious activity.


  Detects when the Linux security log is cleared on a host. Attackers could attempt to erase their tracks by clearing logs
  that contains record of their malicious activity.'
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1070
technique_name: Indicator Removal on Host
platform:
- Linux
- Windows
data_sources:
- Windows Operating System
- Linux Operating System
- 'Event IDs: 1102'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=linux

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'Syslog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: "SELECT username, hostname, QIDNAME(qid) AS event_name, eventid\nFROM events\nWHERE eventid IN (1102, 104)\n  AND INOFFSET(starttime,\
    \ LAST 86400 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule zs_de_000032 {\n  meta:\n    author = \"TDL\"\n    description = \"Audit Log Cleared\"\n    severity = \"\
    MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1070.001\"\n\n  events:\n    $log_clear.metadata.event_type = \"\
    SYSTEM_AUDIT_LOG_WIPE\"\n    ($log_clear.metadata.product_event_type = \"1102\" or\n     $log_clear.metadata.product_event_type\
    \ = \"104\")\n    $log_clear.principal.hostname = $host\n\n  match:\n    $host over 24h\n\n  condition:\n    #log_clear\
    \ >= 1\n\n  outcome:\n    $risk_score = max(90)\n}"
  esql: 'FROM logs-system.security*,logs-system.system*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("1102", "104")

    | KEEP host.name, winlog.event_data.SubjectUserName, event.code, @timestamp

    | SORT @timestamp DESC'
  leql: 'where(event_id IN [1102, 104])

    groupby(hostname)

    calculate(count AS clear_count)'
  crowdstrike: 'event_simpleName=SecurityLogCleared OR event_simpleName=EventLogCleared

    | table ComputerName, UserName, EventCode, ContextTimeStamp

    | sort -ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter action_evtlog_event_id in (1102, 104)

    | fields hostname, actor_effective_username, action_evtlog_event_id, _time

    | sort desc _time'
  lucene: event_id:(1102 OR 104)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1070*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Windows Audit Log Cleared Event\nWhere the Source is \"Microsoft-Windows-Eventlog\"\nOR\n\tWhere the Event\
  \ Type is \"Security\"\n\tWhere the Event ID is in [517, 1102]\n\t\n\tWhere the Event Type is \"System\"\n\tWhere the Event\
  \ ID is \"104\"\n\t\nWhere the Destination Hostname is NOT in High Value Target Host List"
suppression:
  window: 12 hours
  fields:
  - Destination Hostname
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 distinguish administrative\
  \ tooling from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths)."
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

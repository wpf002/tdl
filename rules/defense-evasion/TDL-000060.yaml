rule_id: TDL-DE-000060
v4_id: '000060'
name: Rogue DHCP Server
description: Detects a host that is not a DHCP server communicating over DHCP ports to clients. An attacker can execute a
  man-in-the-middle attack by responding to a DHCP request before the legitimate server. The malicious DHCP lease can set
  the client’s default gateway to a compromised host, where the attacker can intercept and read all of the client’s traffic.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1557
technique_name: Adversary-in-the-Middle
platform:
- Windows
data_sources:
- Dynamic Host Configuration Protocol (DHCP)
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_de_000060 {\n  meta:\n    author = \"TDE\"\n    description = \"Rogue DHCP Server\"\n    severity = \"\
    MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1557\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- defense-evasion
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Firewall Events

  Where the Destination Port is in [67,68]

  Where Destination IP is NOT in the DHCP Server List


  --------------------------------------------------------------------------------------------------------------------------


  1 DHCP Event

  Where the Event Type is DHCPACK

  Where the Source IP is NOT on the DHCP Server List'
suppression:
  window: 12 hours
tuning_period: 7 days

rule_id: TDL-DE-000153
v4_id: '000153'
name: Sensitive Registry Key Modification
description: Windows log all registry keys that are modified on a system. If a registry key is modified that includes the
  file name detected by antivirus, there is evidence that execution may have taken place and the rule will create an event
  for correlation with other indicators of compromise.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1112
technique_name: Modify Registry
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4657'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)
    | search registry_key="*.+*"
    | stats count, values(host) as hosts by user, target_object, details, image
    | sort - count
  kql: |
    DeviceRegistryEvents
    | where TimeGenerated > ago(1d)
    | where registry_key matches regex ".+"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Registry Key", "Registry Value Name", "Registry Value Data", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('12','13','14')
      AND "registry_key" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000153 {
      meta:
        author = "TDL"
        description = "Sensitive Registry Key Modification"
        severity = "MEDIUM"
        tactic = "TA0005"
        technique = "T1112"
      events:
        $e.metadata.event_type = "REGISTRY_MODIFICATION"
        $e.registry_key = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "registry" AND registry_key LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "registry" AND registry_key=/.+/)
    groupby(asset, registry_key, registry_value)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry_key=*.+*
    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue
    | sort -changes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.REGISTRY AND registry_key ~= ".+"
    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name
    | sort desc changes
  lucene: |
    event.category:"registry" AND registry_key:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("12","13","14") AND registry_key matches "*.+*"
    | count by host, user, registry_key, registry_value, image
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Windows Registry Modification Event

  Where the Event ID is in [567, 4657]

  Where the Object Name is on the Sensitive Registry Key List'
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- Inspect the registry hive, key path, value name, and writing process — distinguish administrative tooling from adversary
  tradecraft (LOLBins, signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

rule_id: TDL-DE-000161
v4_id: '000161'
name: EC2 Snapshot Sharing
description: Detects the sharing of a snapshot with another account or if the snapshot has been made public. An unauthorized
  user could potentially be given access to all of the data within the snapshot.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1578
technique_name: Modify Cloud Compute Infrastructure
platform:
- AWS
data_sources:
- AWS CloudTrail
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |-
    index=aws sourcetype=aws:cloudtrail
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    AWSCloudTrail
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_de_000161 {
      meta:
        author = "TDE"
        description = "EC2 Snapshot Sharing"
        severity = "MEDIUM"
        tactic = "TA0005"
        technique = "T1578"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-aws.cloudtrail*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- 'Reviewing logic - High false positive rate.

  Exclude expected user/ip pairs

  https://stratus-red-team.cloud/attack-techniques/AWS/aws.exfiltration.ec2-s'
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- auth
- defense-evasion
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 AWS APICall Event
  Where the Event Name is in [ModifySnapshotAttribute]
  Where the Request Parameter contains [add]
  OR
  Where the Event Name is in [SharedSnapshotCopyInitiated]
suppression:
  window: 12 hours
  fields:
  - src_ip
  - src_user
tuning_period: 14 days

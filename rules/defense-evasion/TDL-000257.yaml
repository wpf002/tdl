rule_id: TDL-DE-000257
v4_id: '000257'
name: Potential Pass the Hash Attack Activity
description: Pass the Hash (PTH) is commonly found when an attacker is dumping a connected user's password hash via NTLM from
  memory. The hash is passed to the remote host as a NTLM authentication instead of requesting a service ticket from the domain
  controller using Kerberos.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1550
technique_name: Use Alternate Authentication Material
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4624'
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | where (EventCode=4624 OR EventCode=4624)

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4624, 4624)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4624\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule zs_de_000257 {\n  meta:\n    author = \"TDE\"\n    description = \"Potential Pass the Hash Attack Activity\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0005\"\n    technique = \"T1550\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4624\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4624'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4624])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4624

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4624)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4624)
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- defense-evasion
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Windows Authentication Success Event

  Where the Event ID is in [528, 540, 4624]

  Where the Logon Type is 9

  Where the Authentication Package is "Negotiate"

  Where the Logon Process is "seclogo"'
suppression:
  window: 24 hours
tuning_period: 7 days

rule_id: TDL-DE-000362
v4_id: '000362'
name: Suspicious Conhost Child Process
description: Detects Windows Console Host (conhost) spawning a child process. This is very unusual - investigate the parent/child
  relationships of the conhost process and determine why this is occurring.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1202
technique_name: Indirect Command Execution
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("conhost.exe", "splwow64.exe", "werfault.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("conhost.exe", "splwow64.exe", "werfault.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('conhost.exe', 'splwow64.exe', 'werfault.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000362 {
      meta:
        author = "TDL"
        description = "Suspicious Conhost Child Process"
        severity = "LOW"
        tactic = "TA0005"
        technique = "T1202"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(conhost.exe|splwow64.exe|werfault.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("conhost.exe", "splwow64.exe", "werfault.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [conhost.exe, splwow64.exe, werfault.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (conhost.exe, splwow64.exe, werfault.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("conhost.exe", "splwow64.exe", "werfault.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(conhost.exe OR splwow64.exe OR werfault.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("conhost.exe", "splwow64.exe", "werfault.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 30 days.'
tags:
- edp
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Parent Process Name equals "conhost.exe"

  AND Process Name not in ["splwow64.exe", "werfault.exe", "conhost.exe"]'
tuning_period: 30 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- Inspect the parent → child process tree, command line arguments, and code-signing status — distinguish administrative tooling
  from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

rule_id: TDL-DE-000435
v4_id: '000435'
name: CobaltStrike Malleable OneDrive Browsing Traffic Profile
description: Detects Malleable OneDrive Profile
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1071
technique_name: Application Layer Protocol
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*CobaltStrike*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex "CobaltStrike"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%CobaltStrike%'\nLAST 24\
    \ HOURS\n"
  yara_l: "rule tdl_tdl_de_000435 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"CobaltStrike Malleable OneDrive Browsing Traffic Profile\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1071\"\n  events:\n\
    \    $e.metadata.event_type = \"USER_RESOURCE_ACCESS\"\n    $e.eventName = /CobaltStrike/\n\
    \    $actor = $e.principal.user.userid\n  match:\n    $actor over 30m\n  condition:\n\
    \    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%CobaltStrike%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/CobaltStrike/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*CobaltStrike*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= "CobaltStrike"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*CobaltStrike*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*CobaltStrike*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '

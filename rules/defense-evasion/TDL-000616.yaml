rule_id: TDL-DE-000616
v4_id: '000616'
name: AWS GuardDuty High Alert
description: A catch all detection used to alert on any high severity GuardDuty alert
  that is not mapped to an exisiting TDL Detection
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1078
technique_name: Valid Accounts
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*GuardDuty*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex "GuardDuty"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%GuardDuty%'\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_de_000616 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"AWS GuardDuty High Alert\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\
    \n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type = \"USER_RESOURCE_ACCESS\"\
    \n    $e.eventName = /GuardDuty/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%GuardDuty%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/GuardDuty/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*GuardDuty*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= "GuardDuty"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*GuardDuty*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*GuardDuty*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process
  / DLL / log clear / service stop).'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource
  being acted on — distinguish administrative tooling from adversary tradecraft (LOLBins,
  signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log
  channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence
  / cred-access action in the same minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts
  for it; TP if it''s unattended and pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out
  of retention, isolate the host, and escalate to IR.'
pseudo_logic: '1 Instance within any time window of an AWS GuardDuty High severity
  alert event not mapped to an existing TDL Detection.


  From index=cloud

  Where sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit

  With eventName matching wildcard "*GuardDuty*"

  With count of matching events greater than or equal to 1

  Excluding alerts attributable to known security software or authorized admin tools


  With the same userIdentity.arn, eventName, and resources{}.ARN as the correlation
  key, aggregating associated sourceIPAddress values, sorted descending by event count.'

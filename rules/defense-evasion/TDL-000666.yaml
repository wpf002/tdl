rule_id: TDL-DE-000666
v4_id: '000666'
name: Ptrace Anti Debugging Activity - GuardDuty
description: This detection looks for a process running on the listed Amazon EC2 instance or a container within your AWS environment
  that has used the ptrace system call with the PTRACE_TRACEME option. This activity would cause an attached debugger to detach
  from the running process. If no debugger is attached, it has no effect. However, the activity in itself raises suspicion
  because this might indicate that malware is running on the system. Malware frequently uses anti-debugging techniques to
  evade analysis, and these techniques can be detected at runtime. GuardDuty examines related runtime activity and context
  so that it generates this finding only when the associated activity and context are potentially suspicious.
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1622
technique_name: Debugger Evasion
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |-
    index=aws sourcetype=aws:cloudtrail
    | table _time, host, user, ProcessName, CommandLine
  kql: |-
    AWSCloudTrail
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_de_000666 {
      meta:
        author = "TDE"
        description = "Ptrace Anti Debugging Activity - GuardDuty"
        severity = "MEDIUM"
        tactic = "TA0005"
        technique = "T1622"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-aws.cloudtrail*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:

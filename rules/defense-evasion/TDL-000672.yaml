rule_id: TDL-DE-000672
v4_id: '000672'
name: Mass User Typosquatting Domain Access
description: Detects a mass amount of  web traffic from unqiue users to a web domain that appears to be similar to a company's
  domain. Typosquatting can be used in targeted phishing attempts for credentials or to deploy malware. The list of domains
  is pulled by using DNS Twister
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1583
technique_name: Acquire Infrastructure
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |-
    index=network
    | bucket _time span=5m
    | stats count by src_ip, Account_Name, _time
    | where count >= 50
    | table _time, src_ip, dest_ip, dest_port, action
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 5m)
    | where Count >= 50
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_de_000672 {
      meta:
        author = "TDL"
        description = "Mass User Typosquatting Domain Access"
        severity = "MEDIUM"
        tactic = "TA0005"
        technique = "T1583"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 50

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 50
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 50)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 50
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 50\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- defense-evasion
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: |-
  50 URL Events
  With the same URL Domain
  With uniue Usernames/IPs
  Within 5 minutes

  ***Focus on using Usernames only if the log has the source user within it***
suppression:
  window: 24 hours
tuning_period: 7 days

rule_id: TDL-DE-000724
v4_id: '000724'
name: UAC Auto-Elevate Bypass via fodhelper / computerdefaults
description: fodhelper.exe or computerdefaults.exe spawned with HKCU\Software\Classes\ms-settings\Shell\Open\command precondition
  set. Classic auto-elevate UAC bypass. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1548 under
  Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1548
technique_name: Abuse Elevation Control Mechanism
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- EDR
- Auditd
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.executable="*uac-bypass*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.executable matches regex "uac-bypass"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.executable\" LIKE\
    \ '%uac-bypass%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000724 {\n  meta:\n    author = \"TDL\"\n    description = \"UAC Auto-Elevate Bypass via fodhelper\
    \ / computerdefaults\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1548\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.executable = /uac-bypass/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.executable LIKE "%uac-bypass%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.executable=/uac-bypass/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.executable=*uac-bypass*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.executable ~= "uac-bypass"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.executable:*uac-bypass*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1548*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: fodhelper.exe or computerdefaults.exe spawned with HKCU\Software\Classes\ms-settings\Shell\Open\command precondition
  set. Classic auto-elevate UAC bypass.

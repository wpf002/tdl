- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 distinguish administrative\
  \ tooling from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths)."
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

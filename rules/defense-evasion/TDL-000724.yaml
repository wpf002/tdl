rule_id: TDL-DE-000724
v4_id: '000724'
name: UAC Auto-Elevate Bypass via fodhelper / computerdefaults
description: fodhelper.exe or computerdefaults.exe spawned with HKCU\Software\Classes\ms-settings\Shell\Open\command precondition
  set. Classic auto-elevate UAC bypass. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1548 under
  Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1548
technique_name: Abuse Elevation Control Mechanism
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- EDR
- Auditd
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("fodhelper.exe", "computerdefaults.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("fodhelper.exe", "computerdefaults.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('fodhelper.exe', 'computerdefaults.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000724 {
      meta:
        author = "TDL"
        description = "UAC Auto-Elevate Bypass via fodhelper / computerdefaults"
        severity = "HIGH"
        tactic = "TA0005"
        technique = "T1548"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(fodhelper.exe|computerdefaults.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("fodhelper.exe", "computerdefaults.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [fodhelper.exe, computerdefaults.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (fodhelper.exe, computerdefaults.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("fodhelper.exe", "computerdefaults.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(fodhelper.exe OR computerdefaults.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("fodhelper.exe", "computerdefaults.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: fodhelper.exe or computerdefaults.exe spawned with HKCU\Software\Classes\ms-settings\Shell\Open\command precondition
  set. Classic auto-elevate UAC bypass.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days

rule_id: TDL-DE-000725
v4_id: '000725'
name: Process Acquired SeImpersonate-Style Privileged Token
description: Sysmon EID 1 or EDR token-grant event showing a non-service process acquiring SeAssignPrimaryTokenPrivilege or
  SeImpersonatePrivilege. Token-theft / Potato-style abuse. Generated from gap analysis against canonical ATT&CK Enterprise
  matrix (T1134 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1134
technique_name: Access Token Manipulation
platform:
- Windows
data_sources:
- Sysmon
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.token.privileges="*token-impersonate*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.token.privileges matches regex "token-impersonate"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.token.privileges\"\
    \ LIKE '%token-impersonate%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000725 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Acquired SeImpersonate-Style\
    \ Privileged Token\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1134\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.token.privileges = /token-impersonate/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.token.privileges LIKE "%token-impersonate%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.token.privileges=/token-impersonate/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.token.privileges=*token-impersonate*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.token.privileges ~= "token-impersonate"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.token.privileges:*token-impersonate*
pseudo_logic: Sysmon EID 1 or EDR token-grant event showing a non-service process acquiring SeAssignPrimaryTokenPrivilege
  or SeImpersonatePrivilege. Token-theft / Potato-style abuse.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\

rule_id: TDL-DE-000727
v4_id: '000727'
name: Privileged Pod Created With Host Mounts
description: 'create pod with privileged: true OR hostPID/hostNetwork: true OR hostPath volume mounting / and /etc. Container
  escape / host evasion primitive. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1610 under Defense
  Evasion).'
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1610
technique_name: Deploy Container
platform:
- Kubernetes
- AWS
- Azure
- GCP
data_sources:
- Cloud Audit Logs
- Kubernetes Audit Logs
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search pod.spec.containers="*privileged-pod*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where pod.spec.containers matches regex "privileged-pod"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"pod.spec.containers\" LIKE '%privileged-pod%'\nLAST 24\
    \ HOURS"
  yara_l: "rule tdl_tdl_de_000727 {\n  meta:\n    author = \"TDL\"\n    description = \"Privileged Pod Created With Host Mounts\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1610\"\n  events:\n    $e.metadata.event_type =\
    \ \"USER_RESOURCE_ACCESS\"\n    $e.pod.spec.containers = /privileged-pod/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE pod.spec.containers LIKE "%privileged-pod%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND pod.spec.containers=/privileged-pod/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND pod.spec.containers=*privileged-pod*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter pod.spec.containers ~= "privileged-pod"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND pod.spec.containers:*privileged-pod*
  sumo: '_sourceCategory=*cloud/audit* OR _sourceCategory=*k8s/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1610*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: 'create pod with privileged: true OR hostPID/hostNetwork: true OR hostPath volume mounting / and /etc. Container
  escape / host evasion primitive.'

rule_id: TDL-DE-000728
v4_id: 000728
name: 'Raw Volume Open via \\\\.\\C: Handle'
description: "Process opens \\\\.\\C: or \\\\.\\PhysicalDrive0 with FILE_READ_DATA \u2014 bypasses NTFS ACLs to read NTDS.dit,\
  \ registry hives, locked files. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1006 under Defense\
  \ Evasion)."
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1006
technique_name: Direct Volume Access
platform:
- Windows
data_sources:
- Sysmon
- EDR
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.name="*raw-volume*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.name matches regex "raw-volume"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.name\" LIKE '%raw-volume%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000728 {\n  meta:\n    author = \"TDL\"\n    description = \"Raw Volume Open via \\\\\\\\.\\\\\
    C: Handle\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1006\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.name = /raw-volume/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.name LIKE "%raw-volume%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.name=/raw-volume/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.name=*raw-volume*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.name ~= "raw-volume"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.name:*raw-volume*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("12","13","14") AND _raw matches "*T1006*"

    | count by host, user, registry_key, registry_value, image

    | sort by _count desc'
pseudo_logic: "Process opens \\\\.\\C: or \\\\.\\PhysicalDrive0 with FILE_READ_DATA \u2014 bypasses NTFS ACLs to read NTDS.dit,\

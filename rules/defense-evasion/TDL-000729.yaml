rule_id: TDL-DE-000729
v4_id: 000729
name: Process Reads Domain Membership / Geo Before Execution
description: Short-lived process queries GetComputerNameEx, NetWkstaGetInfo, GetUserGeoID and exits with no further activity.
  Likely environment-keyed payload bailing on a non-target host. Generated from gap analysis against canonical ATT&CK Enterprise
  matrix (T1480 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1480
technique_name: Execution Guardrails
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- Sysmon
severity: Medium
fidelity: Low
lifecycle: Proposed
risk_score: 50
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*guardrail*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "guardrail"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%guardrail%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000729 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Reads Domain Membership /\
    \ Geo Before Execution\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1480\"\n  events:\n \
    \   $e.metadata.event_type = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /guardrail/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%guardrail%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/guardrail/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*guardrail*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "guardrail"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*guardrail*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1480*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Short-lived process queries GetComputerNameEx, NetWkstaGetInfo, GetUserGeoID and exits with no further activity.
  Likely environment-keyed payload bailing on a non-target host.

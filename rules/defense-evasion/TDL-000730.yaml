rule_id: TDL-DE-000730
v4_id: '000730'
name: Suspicious Crash in Security Product Process
description: AV/EDR process crash (MsMpEng.exe, sentinel*.exe, Csagent.exe) followed within 5m by new process creation that
  the dead product would normally block. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1211 under
  Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1211
technique_name: Exploitation for Defense Evasion
platform:
- Windows
- Linux
data_sources:
- EDR
- Sysmon
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.name="*av-crash*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.name matches regex "av-crash"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.name\" LIKE '%av-crash%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000730 {\n  meta:\n    author = \"TDL\"\n    description = \"Suspicious Crash in Security Product\
    \ Process\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1211\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.name = /av-crash/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.name LIKE "%av-crash%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.name=/av-crash/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.name=*av-crash*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.name ~= "av-crash"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.name:*av-crash*
pseudo_logic: AV/EDR process crash (MsMpEng.exe, sentinel*.exe, Csagent.exe) followed within 5m by new process creation that
  the dead product would normally block.
false_positives:

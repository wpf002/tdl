rule_id: TDL-DE-000731
v4_id: '000731'
name: DLL Search Order Hijack via Phantom DLL in PATH Directory
description: Process loads a DLL from a writable PATH directory before the system32 copy. Phantom-DLL hijack. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1574 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1574
technique_name: Hijack Execution Flow
platform:
- Windows
- macOS
- Linux
data_sources:
- Sysmon
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search file.path="*phantom-dll*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "phantom-dll"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"file.path\" LIKE '%phantom-dll%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000731 {\n  meta:\n    author = \"TDL\"\n    description = \"DLL Search Order Hijack via Phantom\
    \ DLL in PATH Directory\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1574\"\n  events:\n  \
    \  $e.metadata.event_type = \"PROCESS_LAUNCH\"\n    $e.file.path = /phantom-dll/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND file.path LIKE "%phantom-dll%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND file.path=/phantom-dll/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND file.path=*phantom-dll*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND file.path ~= "phantom-dll"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND file.path:*phantom-dll*
pseudo_logic: Process loads a DLL from a writable PATH directory before the system32 copy. Phantom-DLL hijack.

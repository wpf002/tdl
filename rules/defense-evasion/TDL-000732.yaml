rule_id: TDL-DE-000732
v4_id: '000732'
name: PAM Module File Modified Outside Patch Window
description: Write to /lib/security/pam_*.so or /etc/pam.d/* outside an approved package install. Backdoors authentication
  on Linux. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1556 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1556
technique_name: Modify Authentication Process
platform:
- Windows
- Linux
- macOS
- Azure
- AWS
data_sources:
- Windows Event Log
- Sysmon
- Auditd
- Cloud Audit Logs
severity: Critical
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*pam*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "pam"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%pam%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000732 {\n  meta:\n    author = \"TDL\"\n    description = \"PAM Module File Modified Outside Patch\
    \ Window\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0005\"\n    technique = \"T1556\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /pam/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n  condition:\n\
    \    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%pam%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/pam/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*pam*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "pam"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*pam*
pseudo_logic: Write to /lib/security/pam_*.so or /etc/pam.d/* outside an approved package install. Backdoors authentication
  on Linux.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\

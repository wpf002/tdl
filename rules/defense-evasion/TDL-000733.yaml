name: Network Device Firmware/Image Replaced from Untrusted Source
description: "Cisco/Juniper/Arista config event: copy tftp://\u2026 running-config or boot system flash:<unknown>. Image swap\
  \ on network gear. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1601 under Defense Evasion)."
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1601
technique_name: Modify System Image
platform:
- Network
data_sources:
- Network Device Logs
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search device.config="*fw-replace*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where device.config matches regex "fw-replace"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "device.config" LIKE ''%fw-replace%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_de_000733 {\n  meta:\n    author = \"TDL\"\n    description = \"Network Device Firmware/Image Replaced\
    \ from Untrusted Source\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0005\"\n    technique = \"T1601\"\n  events:\n\
    \    $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.device.config = /fw-replace/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND device.config LIKE "%fw-replace%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND device.config=/fw-replace/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND device.config=*fw-replace*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND device.config ~= "fw-replace"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND device.config:*fw-replace*

rule_id: TDL-DE-000734
v4_id: '000734'
name: Asymmetric Traffic Across Trust Boundary
description: TCP sessions where reply path differs from request path crossing a security boundary, or NAT'd flows bypassing
  the egress firewall. Indicates rogue route/bridge. Generated from gap analysis against canonical ATT&CK Enterprise matrix
  (T1599 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1599
technique_name: Network Boundary Bridging
platform:
- Network
data_sources:
- Firewall
- Network IDS
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search network.path="*asymmetric*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where network.path matches regex "asymmetric"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"network.path\" LIKE '%asymmetric%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000734 {\n  meta:\n    author = \"TDL\"\n    description = \"Asymmetric Traffic Across Trust Boundary\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1599\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.network.path = /asymmetric/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND network.path LIKE "%asymmetric%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND network.path=/asymmetric/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND network.path=*asymmetric*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND network.path ~= "asymmetric"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND network.path:*asymmetric*
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids*

    | where technique="T1599" OR _raw matches "*T1599*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: TCP sessions where reply path differs from request path crossing a security boundary, or NAT'd flows bypassing
  the egress firewall. Indicates rogue route/bridge.
false_positives:

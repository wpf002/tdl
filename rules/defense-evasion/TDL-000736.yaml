rule_id: TDL-DE-000736
v4_id: '000736'
name: Code Execution from Unbacked RWX Memory
description: EDR event showing thread start address inside RWX private memory (no backing image). Reflective DLL / shellcode
  loader signal. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1620 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1620
technique_name: Reflective Code Loading
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- Sysmon
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.thread.start_address="*rwx-thread*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.thread.start_address matches regex "rwx-thread"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.thread.start_address\"\
    \ LIKE '%rwx-thread%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000736 {\n  meta:\n    author = \"TDL\"\n    description = \"Code Execution from Unbacked RWX Memory\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1620\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.process.thread.start_address = /rwx-thread/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.thread.start_address LIKE "%rwx-thread%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.thread.start_address=/rwx-thread/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.thread.start_address=*rwx-thread*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.thread.start_address ~= "rwx-thread"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.thread.start_address:*rwx-thread*
pseudo_logic: EDR event showing thread start address inside RWX private memory (no backing image). Reflective DLL / shellcode

rule_id: TDL-DE-000737
v4_id: '000737'
name: DCShadow Replication from Non-DC Source
description: EID 4928/4929 replication source from a host not in the DC OU, or DRSReplicaAdd from an unfamiliar SPN. DCShadow
  pattern. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1207 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1207
technique_name: Rogue Domain Controller
platform:
- Windows
data_sources:
- Windows Event Log
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search source.host="*dcshadow*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where source.host matches regex "dcshadow"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "source.host" LIKE ''%dcshadow%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_de_000737 {\n  meta:\n    author = \"TDL\"\n    description = \"DCShadow Replication from Non-DC Source\"\
    \n    severity = \"CRITICAL\"\n    tactic = \"TA0005\"\n    technique = \"T1207\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.source.host = /dcshadow/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND source.host LIKE "%dcshadow%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND source.host=/dcshadow/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND source.host=*dcshadow*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND source.host ~= "dcshadow"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND source.host:*dcshadow*
  sumo: '_sourceCategory=*windows/events*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("11","23","26") AND _raw matches "*T1207*"

    | count by host, user, target_filename, image

    | sort by _count desc'
pseudo_logic: EID 4928/4929 replication source from a host not in the DC OU, or DRSReplicaAdd from an unfamiliar SPN. DCShadow

rule_id: TDL-DE-000737
v4_id: '000737'
name: DCShadow Replication from Non-DC Source
description: EID 4928/4929 replication source from a host not in the DC OU, or DRSReplicaAdd from an unfamiliar SPN. DCShadow
  pattern. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1207 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1207
technique_name: Rogue Domain Controller
platform:
- Windows
data_sources:
- Windows Event Log
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search event_id IN ("4928", "4929")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where event_id in ("4928", "4929")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "event_id" IN ('4928', '4929')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000737 {
      meta:
        author = "TDL"
        description = "DCShadow Replication from Non-DC Source"
        severity = "CRITICAL"
        tactic = "TA0005"
        technique = "T1207"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.event_id = /(4928|4929)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND event_id IN ("4928", "4929")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND event_id IN [4928, 4929])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND event_id IN (4928, 4929)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND event_id in ("4928", "4929")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND event_id:(4928 OR 4929)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND event_id IN ("4928", "4929")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: EID 4928/4929 replication source from a host not in the DC OU, or DRSReplicaAdd from an unfamiliar SPN. DCShadow
  pattern.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days

rule_id: TDL-DE-000738
v4_id: 000738
name: Unsigned Kernel Driver Load
description: DriverLoad event for a driver not in the Microsoft / vendor-trusted publisher allowlist; or insmod / modprobe
  of an LKM outside package management. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1014 under
  Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1014
technique_name: Rootkit
platform:
- Windows
- Linux
data_sources:
- EDR
- Auditd
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search file.signature="*unsigned-driver*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where file.signature matches regex "unsigned-driver"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"file.signature\" LIKE '%unsigned-driver%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000738 {\n  meta:\n    author = \"TDL\"\n    description = \"Unsigned Kernel Driver Load\"\n  \
    \  severity = \"CRITICAL\"\n    tactic = \"TA0005\"\n    technique = \"T1014\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.file.signature = /unsigned-driver/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND file.signature LIKE "%unsigned-driver%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND file.signature=/unsigned-driver/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND file.signature=*unsigned-driver*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND file.signature ~= "unsigned-driver"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND file.signature:*unsigned-driver*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1014*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: DriverLoad event for a driver not in the Microsoft / vendor-trusted publisher allowlist; or insmod / modprobe
  of an LKM outside package management.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

rule_id: TDL-DE-000740
v4_id: '000740'
name: Office Document Fetching Remote Template URL
description: winword.exe / excel.exe child connection to http(s):// retrieving .dotm or .xltm. Remote-template injection delivery.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1221 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1221
technique_name: Template Injection
platform:
- Windows
data_sources:
- EDR
- Sysmon
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search url.full="*remote-template*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where url.full matches regex "remote-template"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "url.full" LIKE ''%remote-template%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_de_000740 {\n  meta:\n    author = \"TDL\"\n    description = \"Office Document Fetching Remote Template\
    \ URL\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1221\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.url.full = /remote-template/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND url.full LIKE "%remote-template%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND url.full=/remote-template/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND url.full=*remote-template*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND url.full ~= "remote-template"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND url.full:*remote-template*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1221*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: winword.exe / excel.exe child connection to http(s):// retrieving .dotm or .xltm. Remote-template injection
  delivery.

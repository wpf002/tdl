rule_id: TDL-DE-000741
v4_id: '000741'
name: Wake-on-LAN / Magic-Packet from External Source
description: WoL magic packet (UDP/9 or UDP/7 with FFFFFFFFFFFF + 16x MAC) received from a non-internal subnet. Stealth wake-up
  signaling. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1205 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1205
technique_name: Traffic Signaling
platform:
- Windows
- Linux
- Network
data_sources:
- Firewall
- Network IDS
- Sysmon
severity: Medium
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search destination.port="*wol*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where destination.port matches regex "wol"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "destination.port" LIKE ''%wol%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_de_000741 {\n  meta:\n    author = \"TDL\"\n    description = \"Wake-on-LAN / Magic-Packet from External\
    \ Source\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1205\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.destination.port = /wol/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND destination.port LIKE "%wol%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND destination.port=/wol/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination.port=*wol*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND destination.port ~= "wol"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND destination.port:*wol*
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*sysmon*

    | where technique="T1205" OR _raw matches "*T1205*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: WoL magic packet (UDP/9 or UDP/7 with FFFFFFFFFFFF + 16x MAC) received from a non-internal subnet. Stealth wake-up
  signaling.

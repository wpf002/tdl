rule_id: TDL-DE-000742
v4_id: '000742'
name: MSBuild / InstallUtil Executing User-Authored XML Project
description: msbuild.exe or installutil.exe with argument pointing to an .xml/.csproj/.dll in %TEMP%/%APPDATA%. Inline-task
  code execution. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1127 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1127
technique_name: Trusted Developer Utilities Proxy Execution
platform:
- Windows
data_sources:
- Sysmon
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("msbuild.exe", "installutil.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("msbuild.exe", "installutil.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('msbuild.exe', 'installutil.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_000742 {
      meta:
        author = "TDL"
        description = "MSBuild / InstallUtil Executing User-Authored XML Project"
        severity = "HIGH"
        tactic = "TA0005"
        technique = "T1127"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(msbuild.exe|installutil.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("msbuild.exe", "installutil.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [msbuild.exe, installutil.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (msbuild.exe, installutil.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("msbuild.exe", "installutil.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(msbuild.exe OR installutil.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("msbuild.exe", "installutil.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: msbuild.exe or installutil.exe with argument pointing to an .xml/.csproj/.dll in %TEMP%/%APPDATA%. Inline-task
  code execution.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days

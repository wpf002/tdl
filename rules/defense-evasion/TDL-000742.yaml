rule_id: TDL-DE-000742
v4_id: '000742'
name: MSBuild / InstallUtil Executing User-Authored XML Project
description: msbuild.exe or installutil.exe with argument pointing to an .xml/.csproj/.dll in %TEMP%/%APPDATA%. Inline-task
  code execution. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1127 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1127
technique_name: Trusted Developer Utilities Proxy Execution
platform:
- Windows
data_sources:
- Sysmon
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*msbuild-inline*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "msbuild-inline"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%msbuild-inline%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000742 {\n  meta:\n    author = \"TDL\"\n    description = \"MSBuild / InstallUtil Executing User-Authored\
    \ XML Project\"\n    severity = \"HIGH\"\n    tactic = \"TA0005\"\n    technique = \"T1127\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /msbuild-inline/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%msbuild-inline%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/msbuild-inline/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*msbuild-inline*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "msbuild-inline"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*msbuild-inline*
  sumo: '_sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1127*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: msbuild.exe or installutil.exe with argument pointing to an .xml/.csproj/.dll in %TEMP%/%APPDATA%. Inline-task
  code execution.

rule_id: TDL-DE-000743
v4_id: '000743'
name: Resource Created in Non-Approved Cloud Region
description: RunInstances / VM create / ComputeEngine.insert in a region outside the approved-region allowlist. Adversaries
  use exotic regions to evade region-scoped detections. Generated from gap analysis against canonical ATT&CK Enterprise matrix
  (T1535 under Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1535
technique_name: Unused/Unsupported Cloud Regions
platform:
- AWS
- Azure
- GCP
data_sources:
- Cloud Audit Logs
severity: Medium
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search awsRegion="*off-region*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where awsRegion matches regex "off-region"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"awsRegion\" LIKE '%off-region%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_de_000743 {\n  meta:\n    author = \"TDL\"\n    description = \"Resource Created in Non-Approved Cloud\
    \ Region\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0005\"\n    technique = \"T1535\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.awsRegion = /off-region/\n    $actor = $e.principal.user.userid\n  match:\n    $actor\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE awsRegion LIKE "%off-region%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND awsRegion=/off-region/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND awsRegion=*off-region*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter awsRegion ~= "off-region"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND awsRegion:*off-region*
  sumo: '_sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1535*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: RunInstances / VM create / ComputeEngine.insert in a region outside the approved-region allowlist. Adversaries
  use exotic regions to evade region-scoped detections.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- cloud
- region
- shadow-it
- t1535
- defense-evasion
references:
- https://attack.mitre.org/techniques/T1535/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- "Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on \u2014 distinguish administrative\
  \ tooling from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths)."
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

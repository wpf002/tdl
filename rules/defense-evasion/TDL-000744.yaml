name: Process Reads VM/Sandbox Indicators Then Exits Quickly
description: Process reads HKLM\SYSTEM\HardwareConfig\* (BIOS strings), checks WMI Win32_BIOS / Manufacturer, or scans for
  VBOX/VMware drivers and exits within 5s. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1497 under
  Defense Evasion).
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1497
technique_name: Virtualization/Sandbox Evasion
platform:

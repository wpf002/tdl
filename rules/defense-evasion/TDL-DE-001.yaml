rule_id: TDL-DE-001
name: Windows Event Log Cleared
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1070.001
technique_name: Clear Windows Event Logs
platform:
- Windows
data_sources:
- Windows Security Event Log (1102)
- Windows System Event Log (104)
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 90
queries:
  spl: 'index=windows (EventCode=1102 OR EventCode=104)

    | stats count by host, SubjectUserName, EventCode, _time

    | table _time, host, SubjectUserName, EventCode'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (1102, 104)

    | project TimeGenerated, Computer, SubjectUserName, EventID, Activity'
  aql: "SELECT username, hostname, QIDNAME(qid) AS event_name, eventid\nFROM events\nWHERE eventid IN (1102, 104)\n  AND INOFFSET(starttime,\
    \ LAST 86400 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule tdl_de_001 {\n  meta:\n    author = \"TDL\"\n    description = \"Windows Event Log Cleared\"\n    severity\
    \ = \"CRITICAL\"\n    tactic = \"TA0005\"\n    technique = \"T1070.001\"\n\n  events:\n    $log_clear.metadata.event_type\
    \ = \"SYSTEM_AUDIT_LOG_WIPE\"\n    ($log_clear.metadata.product_event_type = \"1102\" or\n     $log_clear.metadata.product_event_type\
    \ = \"104\")\n    $log_clear.principal.hostname = $host\n\n  match:\n    $host over 24h\n\n  condition:\n    #log_clear\
    \ >= 1\n\n  outcome:\n    $risk_score = max(90)\n}"
  esql: 'FROM logs-system.security*,logs-system.system*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("1102", "104")

    | KEEP host.name, winlog.event_data.SubjectUserName, event.code, @timestamp

    | SORT @timestamp DESC'
  leql: 'where(event_id IN [1102, 104])

    groupby(hostname)

    calculate(count AS clear_count)'
  crowdstrike: 'event_simpleName=SecurityLogCleared OR event_simpleName=EventLogCleared

    | table ComputerName, UserName, EventCode, ContextTimeStamp

    | sort -ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter action_evtlog_event_id in (1102, 104)

    | fields hostname, actor_effective_username, action_evtlog_event_id, _time

    | sort desc _time'
  lucene: event_id:(1102 OR 104)
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1070.001*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized IT staff during maintenance
tags:
- log-clearing
- anti-forensics
- critical
author: TDL
created: '2024-01-25'
test_method: purple_team
last_modified: '2026-04-27'

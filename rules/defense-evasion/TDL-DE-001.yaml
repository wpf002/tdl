rule_id: TDL-DE-001
name: Windows Event Log Cleared
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1070.001
technique_name: Clear Windows Event Logs
platform:
- Windows
data_sources:
- Windows Security Event Log (1102)
- Windows System Event Log (104)
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 90
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("1102", "104")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("1102", "104")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('1102', '104')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_de_001 {
      meta:
        author = "TDL"
        description = "Windows Event Log Cleared"
        severity = "CRITICAL"
        tactic = "TA0005"
        technique = "T1070.001"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(1102|104)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("1102", "104")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [1102, 104])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (1102, 104)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("1102", "104")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(1102 OR 104)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("1102", "104")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Authorized IT staff during maintenance
tags:
- log-clearing
- anti-forensics
- critical
author: TDL
created: '2024-01-25'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process / DLL / log clear / service stop).'
- Inspect the parent → child process tree, command line arguments, and code-signing status — distinguish administrative tooling
  from adversary tradecraft (LOLBins, signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence / cred-access action in the same
  minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts for it; TP if it''s unattended and
  pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out of retention, isolate the host, and escalate
  to IR.'

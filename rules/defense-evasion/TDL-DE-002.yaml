rule_id: TDL-DE-002
name: Process Injection via CreateRemoteThread
tactic: Defense Evasion
tactic_id: TA0005
technique_id: T1055.001
technique_name: DLL Injection
platform:
- Windows
data_sources:
- Sysmon Event ID 8
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 85
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process_name="*.+*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process_name matches regex ".+"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process_name\" LIKE '%.+%'\n\
    LAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_de_002 {\n  meta:\n    author = \"TDL\"\n    description =\
    \ \"Process Injection via CreateRemoteThread\"\n    severity = \"HIGH\"\n    tactic\
    \ = \"TA0005\"\n    technique = \"T1055.001\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process_name = /.+/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process_name LIKE "%.+%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND process_name=/.+/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process_name=*.+*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND process_name:*.+*

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND process_name matches "*.+*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- Debugging tools
- AV/EDR products
tags:
- process-injection
- defense-evasion
author: TDL
created: '2024-01-26'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the evasion artifact (process
  / DLL / log clear / service stop).'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — distinguish administrative tooling from adversary tradecraft (LOLBins,
  signed binary proxies, masquerading paths).
- 'Pull surrounding security-tool telemetry: EDR sensor health, AV scan history, log
  channel state to see what was suppressed.'
- 'Look for adjacent stages: a successful evasion typically wraps an execution / persistence
  / cred-access action in the same minute.'
- 'Decide TP / FP: FP if patch / debugging / IT-troubleshooting context fully accounts
  for it; TP if it''s unattended and pairs with other malicious telemetry.'
- 'If TP: restore the disabled defenses, capture artifacts before evidence rolls out
  of retention, isolate the host, and escalate to IR.'
pseudo_logic: '1 Instance within any time window of a Sysmon CreateRemoteThread event.


  From index=endpoint sourcetype=Sysmon

  Where EventCode=8

  With process_name matching a non-empty or wildcard pattern (process_name="*.+*")


  Correlate by process_name, parent_process_name, and command_line, aggregating distinct
  hosts and users observed across those groupings.


  Exclude events originating from known debugging tools (e.g., Visual Studio, WinDbg)
  and approved AV/EDR product processes present on the environment allow-list.


  With a minimum threshold of 1 matching event — any single occurrence is sufficient
  to trigger — correlated on the same process_name, parent_process_name, and command_line
  combination.'

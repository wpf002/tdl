rule_id: TDL-DIS-000033
v4_id: '000033'
name: Port Scan Detected - Internal
description: Detects a port scan from one internal host to another. Attackers will use port scans to perform reconnaissance
  to determine open services on the target.
tactic: Discovery
tactic_id: TA0007
technique_id: T1046
technique_name: Network Service Scanning
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search destination_port IN ("53", "80", "88", "129", "137", "138", "139", "161")
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where destination_port in ("53", "80", "88", "129", "137", "138", "139", "161")
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "destination_port" IN ('53', '80', '88', '129', '137', '138', '139', '161')
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_dis_000033 {
      meta:
        author = "TDL"
        description = "Port Scan Detected - Internal"
        severity = "MEDIUM"
        tactic = "TA0007"
        technique = "T1046"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.destination_port = /(53|80|88|129|137|138|139|161)/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND destination_port IN ("53", "80", "88", "129", "137", "138", "139", "161")
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND destination_port IN [53, 80, 88, 129, 137, 138, 139, 161])
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination_port IN (53, 80, 88, 129, 137, 138, 139, 161)
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND destination_port in ("53", "80", "88", "129", "137", "138", "139", "161")
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND destination_port:(53 OR 80 OR 88 OR 129 OR 137 OR 138 OR 139 OR 161)
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where destination_port IN ("53", "80", "88", "129", "137", "138", "139", "161")
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "30 Firewall Events\nFrom one internal source to one internal destination (Internal)\nWhere the Destination\
  \ Port is 1-1024\nWhere the Destination Port is NOT in [53, 80 , 88, 129, 137, 138, 139, 161, 389, 443, 445]\nOR\n\tWhere\
  \ the Log Source is Fortinet FortiGate\n\tWhere the action is NOT in [server-rst, client-rst, timeout]\n\n\tWhere the action/result\
  \ is NOT in [reset, timeout]\n\t\nWith unique Destination Ports\nWithin 10 minutes"
suppression:
  window: 12 hours
  fields:
  - Source IP
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — determine whether the enumeration is targeted
  (specific user / share / OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

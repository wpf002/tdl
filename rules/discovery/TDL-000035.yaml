rule_id: TDL-DIS-000035
v4_id: '000035'
name: SMB Scan - Outbound
description: Detects an internal host scanning for open SMB ports outbound to external hosts. This could indicate an attacker
  or malware on a compromised internal host attempting to scan other hosts to propagate.
tactic: Discovery
tactic_id: TA0007
technique_id: T1046
technique_name: Network Service Scanning
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | bucket _time span=5m

    | stats dc(dest_port) as ports, dc(dest_ip) as hosts by _time, src_ip

    | where ports >= 20 OR hosts >= 30

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 5m)

    | where Count >= 10

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: "SELECT sourceip, COUNT(DISTINCT destinationport) AS unique_ports,\n       COUNT(DISTINCT destinationip) AS unique_hosts,\
    \ COUNT(*) AS total_conns\nFROM flows\nWHERE INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY sourceip\nHAVING unique_ports\
    \ >= 20 OR unique_hosts >= 30\nORDER BY unique_ports DESC"
  yara_l: "rule zs_dis_000035 {\n  meta:\n    author = \"TDL\"\n    description = \"SMB Scan - Outbound\"\n    severity =\
    \ \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1046\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 10\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 hour

    | STATS unique_ports = COUNT_DISTINCT(destination.port), unique_hosts = COUNT_DISTINCT(destination.ip), total = COUNT(*)
    BY source.ip, @timestamp = BUCKET(@timestamp, 5 minutes)

    | WHERE unique_ports >= 20 OR unique_hosts >= 30

    | SORT unique_ports DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 10)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 10

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 10\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "10 Firewall Event \nFrom one internal source to many external destinations (Outbound)\nOR\n\tWhere the Destination\
  \ Port is in [139, 445]\n\t\n\tWhere the Application is in [SMB, Samba] case insensitive \n\t\nWith the same Destination\
  \ Port\nWith unique Destination IPs\nFrom single Source IP\nWithin 5 minutes"
suppression:
  window: 12 hours
  fields:
  - Source IP
tuning_period: 7 days

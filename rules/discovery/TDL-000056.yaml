rule_id: TDL-DIS-000056
v4_id: '000056'
name: Service Discovery - Inbound
description: Detects an external host sending packets to several destinations over a single port to map the network or discover
  live hosts to exploit.
tactic: Discovery
tactic_id: TA0007
technique_id: T1046
technique_name: Network Service Scanning
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | bucket _time span=15m

    | stats count by src_ip, Account_Name, _time

    | where count >= 30

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 15m)

    | where Count >= 30

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 900 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_dis_000056 {\n  meta:\n    author = \"TDL\"\n    description = \"Service Discovery - Inbound\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1046\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 15m\n\n\
    \  condition:\n    #event >= 30\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 15m)

    | WHERE event_count >= 30

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 30)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 30

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 30\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall*

    | where technique="T1046" OR _raw matches "*T1046*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "30 Firewall Events\nFrom one external source to many internal destinations (Inbound)\nWhere the Destination\
  \ Port is 1-1024\nOR\n\tWhere the Log Source is Fortinet FortiGate\n\tWhere the action is NOT in [server-rst, client-rst,\
  \ timeout]\n\n\tWhere the action/result is NOT in [reset, timeout]\n\t\nWith the same Destination Port\nWith unique Destination\
  \ IPs\nWithin 15 minutes"
suppression:
  fields:
  - Source IP
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 determine whether the enumeration is targeted\
  \ (specific user / share / OU) or scattered (broad, scripted)."
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- "Pull adjacent execution / lateral-movement / cred-access telemetry \u2014 discovery often precedes the next stage by minutes."
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

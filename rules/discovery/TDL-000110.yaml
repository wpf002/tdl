rule_id: TDL-DIS-000110
v4_id: '000110'
name: Unauthorized Access to Admin Share
description: A report that provides visibility into unauthorized users accessing the ADMIN$ share.
tactic: Discovery
tactic_id: TA0007
technique_id: T1135
technique_name: Network Share Discovery
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5140'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("5140", "5145")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("5140", "5145")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('5140', '5145')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_dis_000110 {
      meta:
        author = "TDL"
        description = "Unauthorized Access to Admin Share"
        severity = "MEDIUM"
        tactic = "TA0007"
        technique = "T1135"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(5140|5145)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("5140", "5145")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [5140, 5145])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (5140, 5145)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("5140", "5145")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(5140 OR 5145)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("5140", "5145")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '1 Windows Network Share Accessed Event

  Where the Event ID is in [5140, 5145]

  Where the Share Name is "\\*\ADMIN$"

  Where the Source Username is NOT in the Users Authorized to Access the Admin Share List

  Where the Source Username does NOT end with "$"'
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user — determine whether the
  enumeration is targeted (specific user / share / OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

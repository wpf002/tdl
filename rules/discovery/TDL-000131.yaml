rule_id: TDL-DIS-000131
v4_id: '000131'
name: AWS User Enumeration
description: Detects when a host executes AWS API calls that match enumeration tool behavior. Once an attacker obtains an
  API key for a user, they will attempt to enumerate the permissions of the user to determine which API calls they can use.
tactic: Discovery
tactic_id: TA0007
technique_id: T1069
technique_name: Permission Groups Discovery
platform:
- AWS
data_sources:
- Amazon AWS
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | bucket _time span=1m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 60 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_dis_000131 {\n  meta:\n    author = \"TDL\"\n    description = \"AWS User Enumeration\"\n    severity =\
    \ \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1069\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 1m\n\n \
    \ condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 1m)

    | WHERE event_count >= 5

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 5

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname,\
    \ actor_effective_username, event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1069*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '5 AWS CloudTrail Events

  From the same Source IP and Source Username

  Where the Event Name is in [ListAccessKeys, ListUserPolicies, ListGroupsForUser, GetGroupPolicy, GetUser, ListQueues, DescribeDBSnapshots,
  DescribePermissions,GetAccountAuthorizationDetails,GetUserPolicy,ListAccessKeys,ListPolicies,ListEntitiesForPolicy,GetAccountPasswordPolicy,ListUsers]

  Where the User Agent is NOT "signin.amazonaws.com"

  Where the Source Username is NOT on the Amazon AWS Admin User List

  With at least 2 unique Event Names

  Within 1 minutes'
suppression:
  window: 12 hours
tuning_period: 7 days

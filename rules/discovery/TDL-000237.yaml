rule_id: TDL-DIS-000237
v4_id: '000237'
name: Webserver Directory Brute Force
description: Detects a host requesting multiple files that are not found on the web server and scanning tools used by attackers
  will attempt to enumerate common files hosted on the web server. However, the majroity of the time these files will not
  exist and return 404 errors.
tactic: Discovery
tactic_id: TA0007
technique_id: T1083
technique_name: File and Directory Discovery
platform:
- Windows
data_sources:
- Webserver
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name="*.+*"
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name matches regex ".+"
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_dis_000237 {
      meta:
        author = "TDL"
        description = "Webserver Directory Brute Force"
        severity = "LOW"
        tactic = "TA0007"
        technique = "T1083"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name=/.+/)
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name=*.+*
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name matches "*.+*"
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "20 Webserver Request Events \nWhere HTTP code matches \"404\"\nWith the Same Source IP\nWith unique URLs\n\
  within 2 minutes"
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user — determine whether the
  enumeration is targeted (specific user / share / OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

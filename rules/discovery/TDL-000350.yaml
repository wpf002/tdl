rule_id: TDL-DIS-000350
v4_id: '000350'
name: Kubernetes Dashboard Exposed to the Internet - GuardDuty
description: Detects when the default service account for a namespace in your Kubernetes cluster was granted admin privileges.
  Kubernetes creates a default service account for all the namespaces in the cluster. It automatically assigns the default
  service account as an identity to pods that have not been explicitly associated to another service account. If the default
  service account has admin privileges, it may result in pods being unintentionally launched with admin privileges. If this
  behavior is not expected, it may indicate a configuration mistake or that your credentials are compromised.
tactic: Discovery
tactic_id: TA0007
technique_id: T1538
technique_name: Cloud Service Dashboard
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*GuardDuty*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex "GuardDuty"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%GuardDuty%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_dis_000350 {
      meta:
        author = "TDL"
        description = "Kubernetes Dashboard Exposed to the Internet - GuardDuty"
        severity = "MEDIUM"
        tactic = "TA0007"
        technique = "T1538"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /GuardDuty/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%GuardDuty%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/GuardDuty/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*GuardDuty*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= "GuardDuty"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*GuardDuty*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*GuardDuty*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Guard Duty Event \nWhere the Event Type is in [\"Policy:Kubernetes/ExposedDashboard\", \"Policy:Kubernetes/KubeflowDashboardExposed\"\
  ]"
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on — determine whether the
  enumeration is targeted (specific user / share / OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

rule_id: TDL-DIS-000474
v4_id: '000474'
name: ICMP Host Discovery - Internal
description: Detects when an internal host pings hundreds of other hosts. This could
  be an attacker trying to discover what hosts are in the network.
tactic: Discovery
tactic_id: TA0007
technique_id: T1046
technique_name: Network Service Discovery
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*icmp*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "icmp"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%icmp%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_dis_000474 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"ICMP Host Discovery - Internal\"\n    severity = \"MEDIUM\"\n    tactic\
    \ = \"TA0007\"\n    technique = \"T1046\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /icmp/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%icmp%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/icmp/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*icmp*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "icmp"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*icmp*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*icmp*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s)
  observed.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — determine
  whether the enumeration is targeted (specific user / share / OU) or scattered (broad,
  scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin,
  engineer, or pen-tester? Discovery from a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often
  precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting;
  TP if the user is unexpected and adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges,
  and watch for the next-stage activity that the recon was likely setting up.'
pseudo_logic: '1 or more ICMP traffic events observed, with the count of unique destination
  IPs and total outbound bytes calculated per source, across any time window.


  From index=network

  Where sourcetype is firewall or sourcetype is ids

  With network.protocol matching "*icmp*"

  Summarized by count of events, distinct count of dest_ip as unique_dests, and sum
  of bytes_out grouped by src_ip, dest_ip, and dest_port

  Where count is greater than or equal to 1

  Sorted descending by bytes_out


  With the same src_ip as the correlation key, flagging internal hosts generating
  ICMP traffic toward a high number of unique dest_ip values indicative of host sweep
  activity

  Excluding traffic originating from authorized scanner IPs and known monitoring agent
  addresses'

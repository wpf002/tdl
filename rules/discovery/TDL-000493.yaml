rule_id: TDL-DIS-000493
v4_id: 000493
name: Spike in Internal SMB Traffic from a Single IP
description: Detects when a internal host has a spike in internal SMB connections within the organization's network.
tactic: Discovery
tactic_id: TA0007
technique_id: T1135
technique_name: Network Share Discovery
platform:
- Network
data_sources:
- Firewall
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 180 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_dis_000493 {\n  meta:\n    author = \"TDL\"\n    description = \"Spike in Internal SMB Traffic from a Single\
    \ IP\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1135\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 3m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 3m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall*

    | where technique="T1135" OR _raw matches "*T1135*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "Firewall Events\nFrom an internal source to an internal destination (Internal)\nWhere the Action is Allowed\n\
  OR\n    Where the Destination Port IN (\"139\", \"445\")\n\n    Where the Application contains \"smb\"\n\n    Where the\
  \ Application contains \"samba\"\n\nBaseline Type: Daily\nEntity: Source IP\n\nBaseline Learning: 30 Days\nRetention: 90\
  \ Days\n\nOutlier: count\nSensitivity: 3\nMinimum: 3"
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 determine whether the enumeration is targeted\
  \ (specific user / share / OU) or scattered (broad, scripted)."
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- "Pull adjacent execution / lateral-movement / cred-access telemetry \u2014 discovery often precedes the next stage by minutes."
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

rule_id: TDL-DIS-000583
v4_id: 000583
name: Kubernetes RBAC Permission Enumeration Attempt
description: 'Detects identities attempting to enumerate their Kubernetes RBAC permissions. In the early stages of a breach,
  attackers will aim to list the permissions they have within the compromised environment. In a Kubernetes cluster, this can
  be achieved by interacting with the API server, and querying the SelfSubjectAccessReview API via e.g. a "kubectl auth can-i
  --list" command. This will enumerate the Role-Based Access Controls (RBAC) rules defining the compromised user''s authorization.
  Sigma rule created by Leo Tsaousis (@laripping)


  ref: https://www.elastic.co/guide/en/security/current/kubernetes-suspicious-self-subject-review.html'
tactic: Discovery
tactic_id: TA0007
technique_id: T1069
technique_name: Permission Groups Discovery
platform:
- Windows
data_sources:
- Kubernetes
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*.+*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex ".+"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_dis_000583 {
      meta:
        author = "TDL"
        description = "Kubernetes RBAC Permission Enumeration Attempt"
        severity = "LOW"
        tactic = "TA0007"
        technique = "T1069"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /.+/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%.+%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*.+*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= ".+"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*.+*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 Kubernetes Event \nWhere the Resource is \"selfsubjectrulesreviews\"\nWhere Verb is \"create\"\nWhere apiGroup\
  \ is \"authorization.k8s.io\""
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — determine whether the enumeration
  is targeted (specific user / share / OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

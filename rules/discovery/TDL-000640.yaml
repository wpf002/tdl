rule_id: TDL-DIS-000640
v4_id: '000640'
name: LDAP Trust Recon - Defender
description: Detects LDAP search activity targeting Active Directory trust relationships, including domain trusts, forest
  trusts, transitive relationships, and trust configuration attributes.
tactic: Discovery
tactic_id: TA0007
technique_id: T1482
technique_name: Domain Trust Discovery
platform:
- Windows
data_sources:
- Microsoft Defender
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, host, user, ProcessName, CommandLine'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_dis_000640 {
      meta:
        author = "TDL"
        description = "LDAP Trust Recon - Defender"
        severity = "LOW"
        tactic = "TA0007"
        technique = "T1482"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- discovery
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: |-
  1 AdvancedHunting Device Event
  Where event_category = "AdvancedHunting-DeviceEvents"
  Where event_type = "LdapSearch"
  Where tags != "[ ]"
  Where scope!="Base"

  Where (
      additional_fields contains "(objectCategory=nTDSDSA)"
      OR additional_fields contains "(objectCategory=domain)"
      OR additional_fields contains "(objectClass=trustedDomain)"
  )
  AND
  Where (
      additional_fields does NOT contain "(domainSid=)"
      AND additional_fields does NOT contain "(objectSid=)"
  )

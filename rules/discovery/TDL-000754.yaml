rule_id: TDL-DIS-000754
v4_id: '000754'
name: Process Enumerating Foreground Windows via EnumWindows
description: Short-lived process calling EnumWindows / GetForegroundWindow / GetWindowText >50 times within 10s. Common screen-aware
  malware staging. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1010 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1010
technique_name: Application Window Discovery
platform:
- Windows
- macOS
data_sources:
- EDR
severity: Low
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search api.function="*enum-windows*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where api.function matches regex "enum-windows"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"api.function\" LIKE '%enum-windows%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000754 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Enumerating Foreground Windows\
    \ via EnumWindows\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1010\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.api.function = /enum-windows/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND api.function LIKE "%enum-windows%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND api.function=/enum-windows/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND api.function=*enum-windows*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND api.function ~= "enum-windows"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND api.function:*enum-windows*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1010*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Short-lived process calling EnumWindows / GetForegroundWindow / GetWindowText >50 times within 10s. Common screen-aware
  malware staging.

rule_id: TDL-DIS-000755
v4_id: '000755'
name: Non-Browser Process Reading Browser History DB
description: Read of Chrome "History", Firefox places.sqlite or Safari History.db by a process that is not the browser itself.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1217 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1217
technique_name: Browser Information Discovery
platform:
- Windows
- macOS
- Linux
data_sources:
- EDR
- Sysmon
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*browser-history*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "browser-history"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%browser-history%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000755 {\n  meta:\n    author = \"TDL\"\n    description = \"Non-Browser Process Reading Browser\
    \ History DB\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1217\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /browser-history/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%browser-history%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/browser-history/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*browser-history*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "browser-history"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*browser-history*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1217*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Read of Chrome "History", Firefox places.sqlite or Safari History.db by a process that is not the browser itself.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

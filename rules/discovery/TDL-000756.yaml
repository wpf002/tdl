rule_id: TDL-DIS-000756
v4_id: '000756'
name: Wide-Scope ListServices / GetServices Without Prior Use
description: Identity invokes service-enumeration APIs (resourcegroups.ListResources, billing.GetCostAndUsage) for the first
  time. New tenants of a compromised role. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1526 under
  Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1526
technique_name: Cloud Service Discovery
platform:
- AWS
- Azure
- GCP
- SaaS
data_sources:
- Cloud Audit Logs
severity: Low
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search userIdentity.arn="*svc-enum*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where userIdentity.arn matches regex "svc-enum"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"userIdentity.arn\" LIKE '%svc-enum%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000756 {\n  meta:\n    author = \"TDL\"\n    description = \"Wide-Scope ListServices / GetServices\
    \ Without Prior Use\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1526\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.userIdentity.arn = /svc-enum/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE userIdentity.arn LIKE "%svc-enum%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND userIdentity.arn=/svc-enum/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND userIdentity.arn=*svc-enum*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter userIdentity.arn ~= "svc-enum"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND userIdentity.arn:*svc-enum*
  sumo: '_sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1526*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: Identity invokes service-enumeration APIs (resourcegroups.ListResources, billing.GetCostAndUsage) for the first
  time. New tenants of a compromised role.
false_positives:

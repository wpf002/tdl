rule_id: TDL-DIS-000756
v4_id: '000756'
name: Wide-Scope ListServices / GetServices Without Prior Use
description: Identity invokes service-enumeration APIs (resourcegroups.ListResources, billing.GetCostAndUsage) for the first
  time. New tenants of a compromised role. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1526 under
  Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1526
technique_name: Cloud Service Discovery
platform:
- AWS
- Azure
- GCP
- SaaS
data_sources:
- Cloud Audit Logs
severity: Low
fidelity: Medium
lifecycle: Proposed
risk_score: 35
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*ListServices*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex "ListServices"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%ListServices%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_dis_000756 {
      meta:
        author = "TDL"
        description = "Wide-Scope ListServices / GetServices Without Prior Use"
        severity = "LOW"
        tactic = "TA0007"
        technique = "T1526"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /ListServices/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%ListServices%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/ListServices/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*ListServices*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= "ListServices"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*ListServices*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*ListServices*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
pseudo_logic: Identity invokes service-enumeration APIs (resourcegroups.ListResources, billing.GetCostAndUsage) for the first
  time. New tenants of a compromised role.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days

name: Mass ListObjects Across Many Buckets
description: "ListObjects/ListBlobs against \u226510 distinct buckets/containers from the same identity in 10m. Bucket-walking\
  \ pre-exfil. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1619 under Discovery)."
tactic: Discovery
tactic_id: TA0007
technique_id: T1619
technique_name: Cloud Storage Object Discovery
platform:
- AWS

rule_id: TDL-DIS-000758
v4_id: 000758
name: Kubectl get all from Inside a Pod
description: kubectl get all / kubectl get pods --all-namespaces issued from an in-cluster service account that does not normally
  enumerate. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1613 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1613
technique_name: Container and Resource Discovery
platform:
- Kubernetes
data_sources:
- Kubernetes Audit Logs
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search objectRef.resource="*k8s-enum*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where objectRef.resource matches regex "k8s-enum"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"objectRef.resource\" LIKE '%k8s-enum%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000758 {\n  meta:\n    author = \"TDL\"\n    description = \"Kubectl get all from Inside a Pod\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1613\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.objectRef.resource = /k8s-enum/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE objectRef.resource LIKE "%k8s-enum%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND objectRef.resource=/k8s-enum/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND objectRef.resource=*k8s-enum*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter objectRef.resource ~= "k8s-enum"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND objectRef.resource:*k8s-enum*
  sumo: '_sourceCategory=*k8s/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1613*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: kubectl get all / kubectl get pods --all-namespaces issued from an in-cluster service account that does not
  normally enumerate.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- k8s
- kubectl
- enum
- t1613
- discovery
references:
- https://attack.mitre.org/techniques/T1613/
author: TDL gap-analysis generator

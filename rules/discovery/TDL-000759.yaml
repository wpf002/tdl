rule_id: TDL-DIS-000759
v4_id: 000759
name: Process Calls IsDebuggerPresent / CheckRemoteDebuggerPresent
description: Non-debugger process invokes IsDebuggerPresent, CheckRemoteDebuggerPresent or NtQueryInformationProcess (ProcessDebugPort).
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1622 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1622
technique_name: Debugger Evasion
platform:
- Windows
- Linux
data_sources:
- EDR
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search api.function="*anti-debug*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where api.function matches regex "anti-debug"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"api.function\" LIKE '%anti-debug%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000759 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Calls IsDebuggerPresent /\
    \ CheckRemoteDebuggerPresent\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1622\"\n  events:\n\
    \    $e.metadata.event_type = \"PROCESS_LAUNCH\"\n    $e.api.function = /anti-debug/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND api.function LIKE "%anti-debug%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND api.function=/anti-debug/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND api.function=*anti-debug*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND api.function ~= "anti-debug"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND api.function:*anti-debug*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1622*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Non-debugger process invokes IsDebuggerPresent, CheckRemoteDebuggerPresent or NtQueryInformationProcess (ProcessDebugPort).
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- anti-debug
- t1622
- discovery
references:
- https://attack.mitre.org/techniques/T1622/

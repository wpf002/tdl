rule_id: TDL-DIS-000760
v4_id: '000760'
name: driverquery.exe Executed by Non-Admin Context
description: driverquery.exe / sc.exe query type=driver / fltmc.exe filters from a user-context process. Pre-rootkit reconnaissance.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1652 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1652
technique_name: Device Driver Discovery
platform:
- Windows
data_sources:
- Sysmon
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.executable="*driverquery*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.executable matches regex "driverquery"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.executable\" LIKE\
    \ '%driverquery%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000760 {\n  meta:\n    author = \"TDL\"\n    description = \"driverquery.exe Executed by Non-Admin\
    \ Context\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1652\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.executable = /driverquery/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.executable LIKE "%driverquery%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.executable=/driverquery/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.executable=*driverquery*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.executable ~= "driverquery"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.executable:*driverquery*
  sumo: '_sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1652*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: driverquery.exe / sc.exe query type=driver / fltmc.exe filters from a user-context process. Pre-rootkit reconnaissance.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

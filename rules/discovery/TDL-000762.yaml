rule_id: TDL-DIS-000762
v4_id: '000762'
name: wevtutil el or Get-WinEvent Enumerating All Logs
description: wevtutil el / Get-WinEvent -ListLog * / journalctl --list-boots invoked from non-admin / non-engineer context.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1654 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1654
technique_name: Log Enumeration
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Auditd
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*log-enum*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "log-enum"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%log-enum%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000762 {\n  meta:\n    author = \"TDL\"\n    description = \"wevtutil el or Get-WinEvent Enumerating\
    \ All Logs\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0007\"\n    technique = \"T1654\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /log-enum/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%log-enum%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/log-enum/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*log-enum*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "log-enum"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*log-enum*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1654*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: wevtutil el / Get-WinEvent -ListLog * / journalctl --list-boots invoked from non-admin / non-engineer context.

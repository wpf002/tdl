rule_id: TDL-DIS-000763
v4_id: '000763'
name: Packet Capture Tool Execution
description: tcpdump / tshark / windump / pktmon / dumpcap launched outside known network-engineering context. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1040 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1040
technique_name: Network Sniffing
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- Sysmon
- Auditd
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.executable="*pcap*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.executable matches regex "pcap"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.executable\" LIKE\
    \ '%pcap%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000763 {\n  meta:\n    author = \"TDL\"\n    description = \"Packet Capture Tool Execution\"\n\
    \    severity = \"HIGH\"\n    tactic = \"TA0007\"\n    technique = \"T1040\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.process.executable = /pcap/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.executable LIKE "%pcap%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.executable=/pcap/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.executable=*pcap*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.executable ~= "pcap"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.executable:*pcap*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1040*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: tcpdump / tshark / windump / pktmon / dumpcap launched outside known network-engineering context.

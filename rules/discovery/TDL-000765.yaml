rule_id: TDL-DIS-000765
v4_id: '000765'
name: WMI Enumeration of Win32_USBHub / Win32_PnPEntity
description: Get-WmiObject / Get-CimInstance over Win32_USBHub, Win32_PnPEntity, Win32_LogicalDisk from non-IT context. Generated
  from gap analysis against canonical ATT&CK Enterprise matrix (T1120 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1120
technique_name: Peripheral Device Discovery
platform:
- Windows
- macOS
data_sources:
- Sysmon
severity: Low
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search wmi.query="*device-enum*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where wmi.query matches regex "device-enum"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "wmi.query" LIKE ''%device-enum%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_dis_000765 {\n  meta:\n    author = \"TDL\"\n    description = \"WMI Enumeration of Win32_USBHub /\
    \ Win32_PnPEntity\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1120\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.wmi.query = /device-enum/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND wmi.query LIKE "%device-enum%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND wmi.query=/device-enum/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND wmi.query=*device-enum*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND wmi.query ~= "device-enum"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND wmi.query:*device-enum*
  sumo: '_sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("12","13","14") AND _raw matches "*T1120*"

    | count by host, user, registry_key, registry_value, image

    | sort by _count desc'
pseudo_logic: Get-WmiObject / Get-CimInstance over Win32_USBHub, Win32_PnPEntity, Win32_LogicalDisk from non-IT context.

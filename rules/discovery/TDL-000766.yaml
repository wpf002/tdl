rule_id: TDL-DIS-000766
v4_id: '000766'
name: tasklist / ps Enumerating EDR & AV Processes
description: "tasklist /v or ps -ef | grep with patterns for sentinel*, csagent, MsMpEng, falcon, defender, carbonblack \u2014\
  \ survey for security tools. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1057 under Discovery)."
tactic: Discovery
tactic_id: TA0007
technique_id: T1057
technique_name: Process Discovery
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- Auditd
severity: Low
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*process-enum*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "process-enum"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%process-enum%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000766 {\n  meta:\n    author = \"TDL\"\n    description = \"tasklist / ps Enumerating EDR & AV\
    \ Processes\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1057\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /process-enum/\n    $host = $e.principal.hostname\n  match:\n  \
    \  $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%process-enum%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/process-enum/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*process-enum*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "process-enum"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*process-enum*
pseudo_logic: "tasklist /v or ps -ef | grep with patterns for sentinel*, csagent, MsMpEng, falcon, defender, carbonblack \u2014\

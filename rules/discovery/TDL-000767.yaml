rule_id: TDL-DIS-000767
v4_id: '000767'
name: reg query of Sensitive Registry Hives
description: reg.exe query against HKLM\SAM, HKLM\SECURITY, HKLM\System\CurrentControlSet\Control\Lsa, or HKLM\Software\Microsoft\Windows
  Defender. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1012 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1012
technique_name: Query Registry
platform:
- Windows
data_sources:
- Sysmon
severity: Low
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*reg-query*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "reg-query"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%reg-query%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000767 {\n  meta:\n    author = \"TDL\"\n    description = \"reg query of Sensitive Registry Hives\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1012\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.process.command_line = /reg-query/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%reg-query%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/reg-query/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*reg-query*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "reg-query"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*reg-query*
pseudo_logic: reg.exe query against HKLM\SAM, HKLM\SECURITY, HKLM\System\CurrentControlSet\Control\Lsa, or HKLM\Software\Microsoft\Windows

rule_id: TDL-DIS-000768
v4_id: 000768
name: wmic product where / dpkg -l for Security Software
description: wmic.exe product where, Get-ItemProperty Uninstall, dpkg -l, or rpm -qa filtered for AV/EDR vendor names. Generated
  from gap analysis against canonical ATT&CK Enterprise matrix (T1518 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1518
technique_name: Software Discovery
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
severity: Low
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*sw-enum*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "sw-enum"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%sw-enum%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000768 {\n  meta:\n    author = \"TDL\"\n    description = \"wmic product where / dpkg -l for\
    \ Security Software\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1518\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /sw-enum/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%sw-enum%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/sw-enum/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*sw-enum*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "sw-enum"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*sw-enum*
  sumo: '_sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1518*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: wmic.exe product where, Get-ItemProperty Uninstall, dpkg -l, or rpm -qa filtered for AV/EDR vendor names.

rule_id: TDL-DIS-000774
v4_id: '000774'
name: net time / w32tm Probed by Unusual Process
description: net time \\<host>, w32tm /query /status, or date / hwclock from a non-admin user-context process. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1124 under Discovery).
tactic: Discovery
tactic_id: TA0007
technique_id: T1124
technique_name: System Time Discovery
platform:
- Windows
- Linux
data_sources:
- Sysmon
severity: Low
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*time-probe*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "time-probe"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%time-probe%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_dis_000774 {\n  meta:\n    author = \"TDL\"\n    description = \"net time / w32tm Probed by Unusual\
    \ Process\"\n    severity = \"LOW\"\n    tactic = \"TA0007\"\n    technique = \"T1124\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /time-probe/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%time-probe%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/time-probe/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*time-probe*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "time-probe"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*time-probe*
pseudo_logic: net time \\<host>, w32tm /query /status, or date / hwclock from a non-admin user-context process.

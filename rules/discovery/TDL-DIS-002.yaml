rule_id: TDL-DIS-002
name: LDAP Enumeration - Bulk Active Directory Object Queries
tactic: Discovery
tactic_id: TA0007
technique_id: T1087.002
technique_name: Domain Account Discovery
platform:
- Windows
data_sources:
- Windows Security Event Log (4661)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4661

    | bucket _time span=10m

    | stats count as queries, dc(ObjectName) as objects by SubjectUserName, IpAddress, _time

    | where queries >= 100 AND objects >= 50

    | table _time, SubjectUserName, IpAddress, queries, objects'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4661

    | summarize Queries = count(), Objects = dcount(ObjectName) by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Queries >= 100 and Objects >= 50'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4661\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule tdl_dis_002 {\n  meta:\n    author = \"TDL\"\n    description = \"LDAP Enumeration - Bulk Active Directory\
    \ Object Queries\"\n    severity = \"HIGH\"\n    tactic = \"TA0007\"\n    technique = \"T1087.002\"\n\n  events:\n   \
    \ $event.metadata.event_type = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4661\"\n    $event.principal.hostname\
    \ = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n\
    \  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4661'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4661])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4661

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4661)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4661)
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1087.002*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Identity management platforms
- HR system AD integrations
tags:
- ldap
- bloodhound
- discovery
- domain-enumeration
author: TDL
created: '2024-02-21'
test_method: purple_team
last_modified: '2026-04-27'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s) observed.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 determine whether\
  \ the enumeration is targeted (specific user / share / OU) or scattered (broad, scripted)."
- 'Compare against the user''s role: is this discovery activity normal for an admin, engineer, or pen-tester? Discovery from
  a finance or HR identity is high-signal.'
- "Pull adjacent execution / lateral-movement / cred-access telemetry \u2014 discovery often precedes the next stage by minutes."
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting; TP if the user is unexpected and
  adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges, and watch for the next-stage activity
  that the recon was likely setting up.'

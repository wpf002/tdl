rule_id: TDL-DIS-002
name: LDAP Enumeration - Bulk Active Directory Object Queries
tactic: Discovery
tactic_id: TA0007
technique_id: T1087.002
technique_name: Domain Account Discovery
platform:
- Windows
data_sources:
- Windows Security Event Log (4661)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4661

    | bucket _time span=10m

    | stats count as queries, dc(ObjectName) as objects by SubjectUserName, IpAddress, _time

    | where queries >= 100 AND objects >= 50

    | table _time, SubjectUserName, IpAddress, queries, objects'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4661

    | summarize Queries = count(), Objects = dcount(ObjectName) by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Queries >= 100 and Objects >= 50'
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid = 4661
      AND INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_dis_002 {
      meta:
        author = "TDL"
        description = "LDAP Enumeration - Bulk Active Directory Object Queries"
        severity = "HIGH"
        tactic = "TA0007"
        technique = "T1087.002"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4661"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4661')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4661])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4661
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (4661)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: |-
    event_id:(4661)
false_positives:
- Identity management platforms
- HR system AD integrations
tags:
- ldap
- bloodhound
- discovery
- domain-enumeration
author: TDL
created: '2024-02-21'
test_method: purple_team

rule_id: TDL-DIS-002
name: LDAP Enumeration - Bulk Active Directory Object Queries
tactic: Discovery
tactic_id: TA0007
technique_id: T1087.002
technique_name: Domain Account Discovery
platform:
- Windows
data_sources:
- Windows Security Event Log (4661)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4661")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4661")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4661')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_dis_002 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"LDAP Enumeration - Bulk Active Directory Object Queries\"\n    severity\
    \ = \"HIGH\"\n    tactic = \"TA0007\"\n    technique = \"T1087.002\"\n  events:\n\
    \    $e.metadata.event_type = \"USER_LOGIN\"\n    $e.event_id = /(4661)/\n   \
    \ $user = $e.target.user.userid\n  match:\n    $user over 30m\n  condition:\n\
    \    $e\n}\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4661")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4661])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4661)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4661")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4661)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4661")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- Identity management platforms
- HR system AD integrations
tags:
- ldap
- bloodhound
- discovery
- domain-enumeration
author: TDL
created: '2024-02-21'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the enumeration command(s)
  observed.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — determine whether the enumeration is targeted (specific user / share /
  OU) or scattered (broad, scripted).
- 'Compare against the user''s role: is this discovery activity normal for an admin,
  engineer, or pen-tester? Discovery from a finance or HR identity is high-signal.'
- Pull adjacent execution / lateral-movement / cred-access telemetry — discovery often
  precedes the next stage by minutes.
- 'Decide TP / FP: FP for sanctioned pen-test, asset inventory, or admin troubleshooting;
  TP if the user is unexpected and adjacent telemetry is suspicious.'
- 'If TP: review what was learned (groups, hosts, paths), constrain the user''s privileges,
  and watch for the next-stage activity that the recon was likely setting up.'
pseudo_logic: '1 or more instances over any time window of Windows Security Event
  4661 (A handle to an object was requested).


  From index=windows sourcetype="WinEventLog:Security"

  Where event_id is 4661

  With results aggregated by user, IpAddress, LogonType, and EventCode

  Where count of matching events is greater than or equal to 1

  With the same user, IpAddress, LogonType, and EventCode

  Sorted descending by count to surface highest-volume enumeration activity first'

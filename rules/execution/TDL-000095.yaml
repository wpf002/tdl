rule_id: TDL-EXE-000095
v4_id: 000095
name: Malware Detection Followed by Connection to Threat IP
description: Detects a malware event followed by a connection attempt to a known malicious IP.
tactic: Execution
tactic_id: TA0002
technique_id: T1204
technique_name: User Execution
platform:
- Network
data_sources:
- Antivirus
- Firewall
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*tcp*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "tcp"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%tcp%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_exe_000095 {
      meta:
        author = "TDL"
        description = "Malware Detection Followed by Connection to Threat IP"
        severity = "HIGH"
        tactic = "TA0002"
        technique = "T1204"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /tcp/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/tcp/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*tcp*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*tcp*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*tcp*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Malware Detection Event\n\nFollowed By\n\n1 Firewall Event\nOR\n          From an external source to an internal\
  \ destination (Inbound)\n          Where the Source IP is on a Threat Intelligence List\n          Where the Destination\
  \ IP is the Source IP in the previous event\n\n          From an internal source to an external destination (Outbound)\n\
  \          Where the Destination IP is on a Threat Intelligence List\n          With the same Source IP from the previous\
  \ event\n\nWithin 15 minutes"
suppression:
  window: 8 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — pay attention to short-lived processes, encoded
  arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

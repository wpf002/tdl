rule_id: TDL-EXE-000095
v4_id: 000095
name: Malware Detection Followed by Connection to Threat IP
description: Detects a malware event followed by a connection attempt to a known malicious IP.
tactic: Execution
tactic_id: TA0002
technique_id: T1204
technique_name: User Execution
platform:
- Network
data_sources:
- Antivirus
- Firewall
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=network

    | table _time, host, user, _raw'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 900 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_exe_000095 {\n  meta:\n    author = \"TDL\"\n    description = \"Malware Detection Followed by Connection\
    \ to Threat IP\"\n    severity = \"HIGH\"\n    tactic = \"TA0002\"\n    technique = \"T1204\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 15m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 15m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Malware Detection Event\n\nFollowed By\n\n1 Firewall Event\nOR\n          From an external source to an internal\
  \ destination (Inbound)\n          Where the Source IP is on a Threat Intelligence List\n          Where the Destination\
  \ IP is the Source IP in the previous event\n\n          From an internal source to an external destination (Outbound)\n\
  \          Where the Destination IP is on a Threat Intelligence List\n          With the same Source IP from the previous\
  \ event\n\nWithin 15 minutes"
suppression:
  window: 8 hours
tuning_period: 7 days

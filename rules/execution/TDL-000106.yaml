rule_id: TDL-EXE-000106
v4_id: '000106'
name: Multiple Allowed Inbound Connections from Threat IP
description: Detects when there is multiple allowed inbound connections from an external IP on a threat intelligence feed.
tactic: Execution
tactic_id: TA0002
technique_id: T1078
technique_name: Valid Accounts
platform:
- Network
data_sources:
- Firewall
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=network

    | bucket _time span=5m

    | stats count by src_ip, Account_Name, _time

    | where count >= 10

    | table _time, host, user, _raw'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 5m)

    | where Count >= 10

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_exe_000106 {\n  meta:\n    author = \"TDL\"\n    description = \"Multiple Allowed Inbound Connections from\
    \ Threat IP\"\n    severity = \"LOW\"\n    tactic = \"TA0002\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 10\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 10

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 10)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 10

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 10\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall*

    | where technique="T1078" OR _raw matches "*T1078*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '10 Firewall Event

  From a single external source to a a single internal destination (Inbound)

  Where the Action is in [Allow, Alert] case insensitive

  Where the Source IP is on a Threat Intelligence List

  Where Destination IP is NOT a known DMZ IP Address

  With the same Source IP, Destination IP, and Event Type (Session Start, Session End, etc)

  Within 5 mins'
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 pay attention to short-lived processes,\
  \ encoded arguments, and unusual parents (Office, browser, services)."
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

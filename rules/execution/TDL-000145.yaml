rule_id: TDL-EXE-000145
v4_id: '000145'
name: External Reconnaissance Followed by Malicious Callback
description: This rule is designed to track external reconnaissance attribution to malware infections due to zero day exploits.
  If a zero-day exploit were to occur, the IDS signatures will not detect the exploit leaving the target vulnerable to repeated
  attacks.
tactic: Execution
tactic_id: TA0002
technique_id: T1595
technique_name: Active Scanning
platform:
- Network
data_sources:
- Firewall
- IDS/IPS
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_exe_000145 {\n  meta:\n    author = \"TDE\"\n    description = \"External Reconnaissance Followed by Malicious\
    \ Callback\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0002\"\n    technique = \"T1595\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- execution
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Port Scan Detected - Inbound, Service Discovery - Inbound, Vulnerability Scan - Inbound, OR Vulnerability
  Sweep - Inbound Event


  Followed By


  1 Firewall Event

  From an internal host to an external host (Outbound)

  Where the Action is Allowed

  Where the Source IP is the Destination IP from the previous event

  Where the Destination IP is the Source IP from the previous event

  Within 7 Days'
suppression:
  window: 12 hours
tuning_period: 7 days

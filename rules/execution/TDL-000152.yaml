rule_id: TDL-EXE-000152
v4_id: '000152'
name: PSEXEC Detection
description: Detects an attacker pivoting internally using PSEXEC. PSEXEC is a common administrator tool used to remotely
  execute commands and manage systems. PSEXEC connects to the ADMIN$ share of an internal host and then immediately installs
  a windows service image. This rule is designed to detect this type of activity.
tactic: Execution
tactic_id: TA0002
technique_id: T1021
technique_name: Remote Services
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688, 5140, 4697'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4688", "5140", "4697", "5145")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4688", "5140", "4697", "5145")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4688', '5140', '4697', '5145')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_000152 {
      meta:
        author = "TDL"
        description = "PSEXEC Detection"
        severity = "MEDIUM"
        tactic = "TA0002"
        technique = "T1021"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4688|5140|4697|5145)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4688", "5140", "4697", "5145")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4688, 5140, 4697, 5145])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4688, 5140, 4697, 5145)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4688", "5140", "4697", "5145")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4688 OR 5140 OR 4697 OR 5145)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4688", "5140", "4697", "5145")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Windows Process Execution Event \nWhere the Event ID is in [592, 4688]\nWhere the Process Name is psexec.exe\n\
  \n---------------------------------------------------------------------------------------------------------------\n\n1 Windows\
  \ Network Share Object Accessed Event\nWhere the Event ID is in [5140, 5145]\nWhere the Share Name is in [\\\\*\\C$, \\\\\
  *\\ADMIN$]\n\t\nFollowed By\n\t\n1 Windows Service Installed Event\nWhere the Event ID is in [601, 4697]\nWithin the same\
  \ Source and Destination in the previous event\nWithin 2 minutes"
suppression:
  window: 12 hours
  fields:
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

rule_id: TDL-EXE-000172
v4_id: '000172'
name: Browser Spawning Command Line Tools
description: Detects a browser attempting to spawn command line tools such as cmd.exe or powershell.exe. In recent years,
  attackers have compromised websites to exploit browsers in which command line tools are used to download files to assist
  in compromising the host.
tactic: Execution
tactic_id: TA0002
technique_id: T1202
technique_name: Indirect Command Execution
platform:
- Windows
data_sources:
- Windows Operating System (Windows 10/2016)
- 'Event IDs: 4688'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("firefox.exe", "chrome.exe", "microsoftedge.exe", "safari.exe", "opera.exe", "iexplore.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("firefox.exe", "chrome.exe", "microsoftedge.exe", "safari.exe", "opera.exe", "iexplore.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('firefox.exe', 'chrome.exe', 'microsoftedge.exe', 'safari.exe', 'opera.exe', 'iexplore.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_000172 {
      meta:
        author = "TDL"
        description = "Browser Spawning Command Line Tools"
        severity = "MEDIUM"
        tactic = "TA0002"
        technique = "T1202"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(firefox.exe|chrome.exe|microsoftedge.exe|safari.exe|opera.exe|iexplore.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("firefox.exe", "chrome.exe", "microsoftedge.exe", "safari.exe", "opera.exe", "iexplore.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [firefox.exe, chrome.exe, microsoftedge.exe, safari.exe, opera.exe, iexplore.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (firefox.exe, chrome.exe, microsoftedge.exe, safari.exe, opera.exe, iexplore.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("firefox.exe", "chrome.exe", "microsoftedge.exe", "safari.exe", "opera.exe", "iexplore.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(firefox.exe OR chrome.exe OR microsoftedge.exe OR safari.exe OR opera.exe OR iexplore.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("firefox.exe", "chrome.exe", "microsoftedge.exe", "safari.exe", "opera.exe", "iexplore.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Windows Process Execution Event \nWhere the Event ID is in [592, 4688]\nWhere the Parent Process Name is\
  \ in [firefox.exe, chrome.exe, microsoftedge.exe, safari.exe, opera.exe, iexplore.exe, vivaldi.exe, brave.exe]\nWhere the\
  \ Process Name is cmd.exe"
suppression:
  window: 12 hours
  fields:
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

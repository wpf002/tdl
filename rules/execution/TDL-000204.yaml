rule_id: TDL-EXE-000204
v4_id: '000204'
name: Non-standard Process Launching Windows Process
description: Detects when a default Windows process is launched by a non-standard
  process. Windows processes have defined execution paths and are supposed to be executed
  by certain other processes and a standard process being executed by a different
  process may indicate an attacker has executed a malicious copy or is tampering with
  the process or its modules.
tactic: Execution
tactic_id: TA0002
technique_id: T1569
technique_name: System Services
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search event_id IN ("4688")

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where event_id in ("4688")

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"event_id\" IN ('4688')\nLAST\
    \ 24 HOURS\n"
  yara_l: "rule tdl_tdl_exe_000204 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Non-standard Process Launching Windows Process\"\n    severity = \"HIGH\"\
    \n    tactic = \"TA0002\"\n    technique = \"T1569\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.event_id = /(4688)/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND event_id IN ("4688")

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND event_id IN [4688])

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND event_id IN (4688)

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND event_id in ("4688")

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND event_id:(4688)

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND event_id IN ("4688")

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
suppression:
  window: 8 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — pay attention to short-lived processes, encoded arguments, and unusual
  parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any
  child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked
  here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if
  it traces to a packaging script, software install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible,
  and escalate to IR with the process tree attached.'
pseudo_logic: '1 Instance over any time window of a Windows process creation event
  (Event ID 4688).

  From index=endpoint sourcetype=Sysmon

  Where EventCode=1 and event_id is 4688

  With process_name matching a known default Windows process executable

  Where parent_process_name does not match the expected standard parent process for
  that Windows process

  With results aggregated by process_name, parent_process_name, and command_line

  Excluding launches attributed to known security software or authorized admin tools

  With the same process_name, parent_process_name, and command_line combination appearing
  at least 1 time, deduplicated per unique host and user pairing'

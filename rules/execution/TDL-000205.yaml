rule_id: TDL-EXE-000205
v4_id: '000205'
name: Non-standard Process Launching LSASS
description: Detects when a non-standard process launches lsass.exe. This could indicate an attacker is executing malicious
  code that is calling the process in a non-standard method to bypass controls.
tactic: Execution
tactic_id: TA0002
technique_id: T1003
technique_name: OS Credential Dumping
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4688 OR EventCode=4688)

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4688, 4688)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT sourceaddress AS source_host, username, QIDNAME(qid) AS event_name,\n       \"Process Name\" AS accessing_process,\
    \ \"Granted Access\" AS access_mask\nFROM events\nWHERE eventid = 10\n  AND \"Target Image\" ILIKE '%lsass.exe%'\n  AND\
    \ \"Granted Access\" IN ('0x1010','0x1410','0x1fffff','0x147a')\n  AND \"Source Image\" NOT ILIKE '%\\Windows\\System32\\\
    %'\n  AND INOFFSET(starttime, LAST 3600 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule zs_exe_000205 {\n  meta:\n    author = \"TDE\"\n    description = \"Non-standard Process Launching LSASS\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1003.001\"\n\n  events:\n    $proc_access.metadata.event_type\
    \ = \"PROCESS_OPEN\"\n    $proc_access.target.process.file.full_path = /lsass\\.exe$/\n    $proc_access.additional.fields[\"\
    GrantedAccess\"] = /0x1010|0x1410|0x1fffff/\n    $proc_access.principal.process.file.full_path != /Windows\\\\System32/\n\
    \    $proc_access.principal.hostname = $host\n\n  match:\n    $host over 5m\n\n  condition:\n    #proc_access >= 1\n\n\
    \  outcome:\n    $risk_score = max(95)\n}"
  esql: 'FROM logs-windows.sysmon_operational*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code == "10"

    | WHERE winlog.event_data.TargetImage LIKE "*\\lsass.exe"

    | WHERE winlog.event_data.GrantedAccess IN ("0x1010","0x1410","0x1fffff","0x147a")

    | WHERE NOT winlog.event_data.SourceImage LIKE "*\\Windows\\System32\\*"

    | KEEP host.name, winlog.event_data.SourceImage, winlog.event_data.GrantedAccess, winlog.event_data.CallTrace, @timestamp

    | SORT @timestamp DESC'
  leql: "where(source_name = \"Microsoft-Windows-Sysmon\"\n  AND event_id = 10\n  AND target_image CONTAINS \"lsass.exe\"\n\
    \  AND granted_access IN [\"0x1010\",\"0x1410\",\"0x1fffff\"]\n  AND NOT source_image CONTAINS \"Windows\\System32\")\n\
    calculate(count AS total)\nhaving(total >= 1)"
  crowdstrike: 'event_simpleName=ProcessRollup2

    | where TargetProcessName MATCHES "(?i)lsass.exe"

    | where DesiredAccess IN ("0x1010","0x1410","0x1fffff")

    | where FileName NOT MATCHES "(?i)C:\\Windows\\System32"

    | table ComputerName, FileName, TargetProcessName, DesiredAccess, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "INJECTION"

    | filter action_remote_process_image_path contains "lsass.exe"

    | filter actor_process_image_path not contains "C:\Windows\System32"

    | fields hostname, actor_process_image_name, action_remote_process_image_path, actor_effective_username, _time

    | sort desc _time'
  lucene: 'event_id:10 AND target_image:*lsass.exe

    AND granted_access:(0x1010 OR 0x1410 OR 0x1fffff)

    AND NOT source_image:*Windows\System32*'
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- execution
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Process Name equals "lsass.exe"

  Where Parent Process Name NOT null

  Where Parent Process Name NOT in ["wininit.exe"]'
tuning_period: 7 days

rule_id: TDL-EXE-000208
v4_id: 000208
name: Non-standard Process Launching Regedit
description: Detects when a non-standard process launches regedit.exe This could indicate an attacker is executing malicious
  code that is calling the process in a non-standard method to bypass controls.
tactic: Execution
tactic_id: TA0002
technique_id: T1112
technique_name: Modify Registry
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)
    | search registry_key="*.+*"
    | stats count, values(host) as hosts by user, target_object, details, image
    | sort - count
  kql: |
    DeviceRegistryEvents
    | where TimeGenerated > ago(1d)
    | where registry_key matches regex ".+"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Registry Key", "Registry Value Name", "Registry Value Data", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('12','13','14')
      AND "registry_key" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_000208 {
      meta:
        author = "TDL"
        description = "Non-standard Process Launching Regedit"
        severity = "MEDIUM"
        tactic = "TA0002"
        technique = "T1112"
      events:
        $e.metadata.event_type = "REGISTRY_MODIFICATION"
        $e.registry_key = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "registry" AND registry_key LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "registry" AND registry_key=/.+/)
    groupby(asset, registry_key, registry_value)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry_key=*.+*
    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue
    | sort -changes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.REGISTRY AND registry_key ~= ".+"
    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name
    | sort desc changes
  lucene: |
    event.category:"registry" AND registry_key:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("12","13","14") AND registry_key matches "*.+*"
    | count by host, user, registry_key, registry_value, image
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Process Name equals "regedit.exe"

  Where Parent Process Name NOT null'
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

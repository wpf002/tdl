rule_id: TDL-EXE-000359
v4_id: 000359
name: Cobalt Strike Process Patterns
description: Detects process patterns found in Cobalt Strike beacon activity. This includes the use of named pipes to communicate
  the result of post-exploitation tools to the Cobalt Strike beacon.
tactic: Execution
tactic_id: TA0002
technique_id: T1059
technique_name: Command and Scripting Interpreter
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("cmd.exe", "dllhost.exe", "whoami.exe", "runonce.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("cmd.exe", "dllhost.exe", "whoami.exe", "runonce.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('cmd.exe', 'dllhost.exe', 'whoami.exe', 'runonce.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_000359 {
      meta:
        author = "TDL"
        description = "Cobalt Strike Process Patterns"
        severity = "MEDIUM"
        tactic = "TA0002"
        technique = "T1059"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(cmd.exe|dllhost.exe|whoami.exe|runonce.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("cmd.exe", "dllhost.exe", "whoami.exe", "runonce.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [cmd.exe, dllhost.exe, whoami.exe, runonce.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (cmd.exe, dllhost.exe, whoami.exe, runonce.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("cmd.exe", "dllhost.exe", "whoami.exe", "runonce.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(cmd.exe OR dllhost.exe OR whoami.exe OR runonce.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("cmd.exe", "dllhost.exe", "whoami.exe", "runonce.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Windows Process Creation Event\nWhere the Event ID is in [592, 4688]\nWhere\n\tParent Process Name starts\
  \ with \"C:\\Temp\"\n\tAND Command Line contains \"cmd.exe /c whoami\"\nOR\n\tProcess Name is dllhost.exe\n\tAND Command\
  \ Line contains any of [\"cmd.exe /c echo\", \"> \\\\.\\pipe\", \"whoami.exe\"]\nOR\n\tParent Process Name is in [\"dllhost.exe\"\
  , \"runonce.exe\"]\n\tAND Command Line contains all of [\"cmd.exe /c echo\", \"> \\\\.\\pipe\"]"
tuning_period: 14 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

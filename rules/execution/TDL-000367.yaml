rule_id: TDL-EXE-000367
v4_id: '000367'
name: Ransomware Activity
description: Detects and O365 alert with the type Ransomware Activity
tactic: Execution
tactic_id: TA0002
technique_id: T1486
technique_name: Data Encrypted for Impact
platform:
- Windows
data_sources:
- O365 ATP
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'OfficeActivity

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, UserId, ClientIP, Operation, OfficeWorkload'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_exe_000367 {\n  meta:\n    author = \"TDL\"\n    description = \"Ransomware Activity\"\n    severity =\
    \ \"HIGH\"\n    tactic = \"TA0002\"\n    technique = \"T1486\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=BootstrapProcess OR event_simpleName=SuspiciousFilesWithOperation

    | where FileOperation IN ("WRITE","RENAME","DELETE")

    | stats count(FileName) as file_count, dc(FileExtension) as ext_count by ComputerName, FileName_parent

    | where file_count >= 50 AND ext_count >= 3

    | sort -file_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: 'source_name:Microsoft-Windows-Sysmon AND event_id:11

    AND NOT file_extension:(tmp OR log OR ini)'
  sumo: '_sourceCategory=*o365*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1486*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: 1 O365 event where event name is "Ransomware activity"
suppression:
  window: 4 hours
  fields:
  - src_user
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 pay attention to short-lived\
  \ processes, encoded arguments, and unusual parents (Office, browser, services)."
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

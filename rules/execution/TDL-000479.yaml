rule_id: TDL-EXE-000479
v4_id: 000479
name: Web Request to Hard Coded IP
description: Detects a web request to a hard coded IP domain
tactic: Execution
tactic_id: TA0002
technique_id: T1204
technique_name: User Execution
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*tcp*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "tcp"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%tcp%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_exe_000479 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Web Request to Hard Coded IP\"\n    severity = \"MEDIUM\"\n    tactic =\
    \ \"TA0002\"\n    technique = \"T1204\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /tcp/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/tcp/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*tcp*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*tcp*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*tcp*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — pay attention to short-lived processes, encoded arguments, and unusual
  parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any
  child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked
  here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if
  it traces to a packaging script, software install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible,
  and escalate to IR with the process tree attached.'
pseudo_logic: '1 Instance within any observation window of a web request directed
  to a hard-coded IP address destination.


  From index=network where sourcetype is firewall or sourcetype is ids

  Where network.protocol contains "tcp"

  With count of connection events greater than or equal to 1 per src_ip and dest_ip
  and dest_port combination

  With the distinct count of dest_ip and sum of bytes_out calculated per grouping
  for triage context

  Excluding traffic originating from authorized scanner systems or known monitoring
  agent source IPs

  With the same src_ip, dest_ip, and dest_port as the correlation key

  Sorted by highest bytes_out to surface highest-volume direct-IP web requests first'

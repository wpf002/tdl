rule_id: TDL-EXE-000519
v4_id: 000519
name: Potentially Malicious PowerShell Keyword Activity
description: Detects when various malicious command keywords are contained within a PowerShell script or command.
tactic: Execution
tactic_id: TA0002
technique_id: T1204
technique_name: User Execution
platform:
- Windows
data_sources:
- Windows Operating System
- Powershell Script Block
- 'Event IDs: 4688, 4104'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |-
    index=windows
    | where (EventCode=4688 OR EventCode=4104 OR EventCode=4688 OR EventCode=4104)
    | table _time, host, user, ProcessName, CommandLine
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | where EventID in (4688, 4104, 4688, 4104)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid IN (4688, 4104)
      AND INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC
  yara_l: |-
    rule zs_exe_000519 {
      meta:
        author = "TDE"
        description = "Potentially Malicious PowerShell Keyword Activity"
        severity = "MEDIUM"
        tactic = "TA0002"
        technique = "T1204"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4688"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4688', '4104')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4688, 4104])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4688 OR EventCode=4104
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (4688, 4104)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: event_id:(4688 OR 4104)
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- execution
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Windows Process Execution Event \nWhere the Event ID is in [592, 4688]\nWhere the Process Name is powershell.exe\n\
  Where Command matches the regex \".*\\b(?:adjusttokenprivileges|image_nt_optional_hdr64_magic|microsoft.win32.unsafenativemethods|readprocessmemory.invoke|se_privilege_enabled|lsa_unicode_string|minidumpwritedump|page_execute_read|security_delegation|token_adjust_privileges|token_all_access|token_assign_primary|token_duplicate|token_elevation|token_impersonate|token_information_class|token_privileges|token_query|metasploit)\\\
  b.*\"\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 Windows Powershell Script Execution Event\nWhere the Event ID is 4104\nWhere the Script matches the regex \".*\\b(?:adjusttokenprivileges|image_nt_optional_hdr64_magic|microsoft.win32.unsafenativemethods|readprocessmemory.invoke|se_privilege_enabled|lsa_unicode_string|minidumpwritedump|page_execute_read|security_delegation|token_adjust_privileges|token_all_access|token_assign_primary|token_duplicate|token_elevation|token_impersonate|token_information_class|token_privileges|token_query|metasploit)\\\
  b.*\""

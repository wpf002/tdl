rule_id: TDL-EXE-000533
v4_id: '000533'
name: Script/CLI UserAgent string
description: This pattern discovers HTTP communications from an internal source where
  a development library or command line client user-agent string was observed (e.g.
  Wget, cURL, etc.). Use of these techniques by attackers is described in https://attack.mitre.org/techniques/T1105/
  and https://attack.mitre.org/techniques/T1064/.
tactic: Execution
tactic_id: TA0002
technique_id: T1105
technique_name: Ingress Tool Transfer
platform:
- AWS
data_sources:
- AWS ELB
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*UserAgent*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex "UserAgent"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%UserAgent%'\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_exe_000533 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Script/CLI UserAgent string\"\n    severity = \"LOW\"\n    tactic = \"TA0002\"\
    \n    technique = \"T1105\"\n  events:\n    $e.metadata.event_type = \"USER_RESOURCE_ACCESS\"\
    \n    $e.eventName = /UserAgent/\n    $actor = $e.principal.user.userid\n  match:\n\
    \    $actor over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%UserAgent%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/UserAgent/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*UserAgent*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= "UserAgent"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*UserAgent*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*UserAgent*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource
  being acted on — pay attention to short-lived processes, encoded arguments, and
  unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any
  child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked
  here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if
  it traces to a packaging script, software install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible,
  and escalate to IR with the process tree attached.'
pseudo_logic: '1 Instance within any time window of an HTTP request observed via AWS
  ELB or cloud audit log sources where a script or command-line user-agent string
  is present.


  From index=cloud sourcetype matching aws:cloudtrail, azure:auditlogs, or gcp:audit

  Where eventName contains "UserAgent"

  With userIdentity.arn, eventName, and resources{}.ARN used as grouping fields

  With count of matching events >= 1

  With sourceIPAddress values collected as src_ips per grouping key

  Excluding traffic attributed to authorized scanners or known monitoring agents

  With the same userIdentity.arn, eventName, and resources{}.ARN as the correlation
  key'

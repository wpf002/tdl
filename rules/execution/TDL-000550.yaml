rule_id: TDL-EXE-000550
v4_id: '000550'
name: Anti-virus Malware Found
description: Antivirus detects and attempts to take action on files that are found
  to be potentially malicious. Any antivirus event that identifies a file as malicious,
  regardless of the action taken, will be used in further correlation.
tactic: Execution
tactic_id: TA0002
technique_id: T1204
technique_name: User Execution
platform:
- Windows
data_sources:
- Antivirus
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process_name="*.+*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process_name matches regex ".+"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process_name\" LIKE '%.+%'\n\
    LAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_exe_000550 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Anti-virus Malware Found\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0002\"\
    \n    technique = \"T1204\"\n  events:\n    $e.metadata.event_type = \"PROCESS_LAUNCH\"\
    \n    $e.process_name = /.+/\n    $host = $e.principal.hostname\n  match:\n  \
    \  $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process_name LIKE "%.+%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND process_name=/.+/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process_name=*.+*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND process_name:*.+*

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND process_name matches "*.+*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — pay attention to short-lived processes, encoded arguments, and unusual
  parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any
  child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked
  here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if
  it traces to a packaging script, software install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible,
  and escalate to IR with the process tree attached.'
pseudo_logic: '1 Instance within any time window of an Antivirus Malware Found event.


  From index=endpoint sourcetype=Sysmon

  Where EventCode=1 (Process Creation)

  With process_name matching wildcard pattern "*.+*" indicating a potentially malicious
  or anomalously named executable

  With fields captured including process_name, parent_process_name, command_line,
  host, and user

  Where count of matching process creation events is greater than or equal to 1

  Excluding events associated with known security software or authorized admin tools
  per false-positive allow-list

  With the same process_name and parent_process_name and command_line as the correlation
  key, deduplicated across unique host and user combinations'

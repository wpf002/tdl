rule_id: TDL-EXE-000658
v4_id: 000658
name: Cobalt Strike Installation via Powershell
description: Detects Cobalt Strike Installation via Powershell.
tactic: Execution
tactic_id: TA0002
technique_id: T1569
technique_name: System Services
platform:
- Windows
data_sources:
- Microsoft Windows
- 'Event IDs: 7045, 4697'
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: |-
    index=windows
    | where (EventCode=7045 OR EventCode=4697 OR EventCode=7045 OR EventCode=4697)
    | table _time, host, user, ProcessName, CommandLine
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | where EventID in (7045, 4697, 7045, 4697)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid IN (7045, 4697)
      AND INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC
  yara_l: |-
    rule zs_exe_000658 {
      meta:
        author = "TDL"
        description = "Cobalt Strike Installation via Powershell"
        severity = "CRITICAL"
        tactic = "TA0002"
        technique = "T1569"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "7045"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('7045', '4697')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [7045, 4697])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=7045 OR EventCode=4697
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (7045, 4697)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: event_id:(7045 OR 4697)
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Windows System Event \nWhere EventSourceName is \"Service Control Manager\"\nWhere the Event ID is 7045 \n\
  Where ImagePath contains \"COMSPEC\" AND \"start\" AND \"powershell\"\n\n--------------------------------------------------------------------\n\
  \n1 Windows Security event\nWhere the Event ID is 4697\nWhere ServiceFileName contains  \"COMSPEC\"\nWhere ServiceFileName\
  \ contains  \"start\"\nWhere ServiceFileName contains  \"powershell\""

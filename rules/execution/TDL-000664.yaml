rule_id: TDL-EXE-000664
v4_id: '000664'
name: High Risk Scheduled Task Deleted
description: This detection rule identifies Event ID 4699 (a scheduled task was deleted) in conjunction with critical process
  names such as WindowsUpdate, BitLocker, Defender and . The focus is to monitor the deletion of scheduled tasks associated
  with key system operations, which could indicate malicious activity attempting to disrupt essential security and update
  processes. Alerts generated by this rule should be investigated promptly to ensure system integrity and security remain
  intact.”
tactic: Execution
tactic_id: TA0002
technique_id: T1053
technique_name: Scheduled Task or Job
platform:
- Windows
data_sources:
- Microsoft Windows
- 'Event IDs: 4699'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search event_id IN ("4699")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where event_id in ("4699")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "event_id" IN ('4699')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_000664 {
      meta:
        author = "TDL"
        description = "High Risk Scheduled Task Deleted"
        severity = "HIGH"
        tactic = "TA0002"
        technique = "T1053"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.event_id = /(4699)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND event_id IN ("4699")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND event_id IN [4699])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND event_id IN (4699)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND event_id in ("4699")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND event_id:(4699)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND event_id IN ("4699")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 Windows Security Event\nWhere Event ID 4699\nWhere Taskname contains either\n\"*\\\\Windows\\\\SystemRestore\\\
  \\SR*\" \n\"*\\\\Windows\\\\Windows\\\\Defender*\" \n\"*\\\\Windows\\\\BitLocker*\" \n\"*\\\\Windows\\\\WindowsBackup*\"\
  \ \n\"*\\\\Windows\\\\WindowsUpdate*\" \n\"*\\\\Windows\\\\UpdateOrchestrator\\\\Schedule*\" \n\"*\\\\Windows\\\\ExploitGuard*\"\
  \nAND src_user(subject username) is not a machine account \"*$\""
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

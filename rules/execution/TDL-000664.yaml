rule_id: TDL-EXE-000664
v4_id: '000664'
name: High Risk Scheduled Task Deleted
description: "This detection rule identifies Event ID 4699 (a scheduled task was deleted) in conjunction with critical process\
  \ names such as WindowsUpdate, BitLocker, Defender and . The focus is to monitor the deletion of scheduled tasks associated\
  \ with key system operations, which could indicate malicious activity attempting to disrupt essential security and update\
  \ processes. Alerts generated by this rule should be investigated promptly to ensure system integrity and security remain\
  \ intact.\u201D"
tactic: Execution
tactic_id: TA0002
technique_id: T1053
technique_name: Scheduled Task or Job
platform:
- Windows
data_sources:
- Microsoft Windows
- 'Event IDs: 4699'
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=windows

    | where (EventCode=4699 OR EventCode=4699)

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4699, 4699)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4699\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule zs_exe_000664 {\n  meta:\n    author = \"TDL\"\n    description = \"High Risk Scheduled Task Deleted\"\n \
    \   severity = \"HIGH\"\n    tactic = \"TA0002\"\n    technique = \"T1053\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4699\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4699'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4699])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4699

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4699)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4699)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1053*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- execution
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Windows Security Event\nWhere Event ID 4699\nWhere Taskname contains either\n\"*\\\\Windows\\\\SystemRestore\\\
  \\SR*\" \n\"*\\\\Windows\\\\Windows\\\\Defender*\" \n\"*\\\\Windows\\\\BitLocker*\" \n\"*\\\\Windows\\\\WindowsBackup*\"\
  \ \n\"*\\\\Windows\\\\WindowsUpdate*\" \n\"*\\\\Windows\\\\UpdateOrchestrator\\\\Schedule*\" \n\"*\\\\Windows\\\\ExploitGuard*\"\
  \nAND src_user(subject username) is not a machine account \"*$\""
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 pay attention to short-lived\
  \ processes, encoded arguments, and unusual parents (Office, browser, services)."
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

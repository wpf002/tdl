rule_id: TDL-EXE-000703
v4_id: '000703'
name: Direct Syscall via Unbacked Memory Region
description: Process makes NT* syscalls from an unbacked / RX private memory region. Indicates syscall stub injection or direct
  system call evasion. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1106 under Execution).
tactic: Execution
tactic_id: TA0002
technique_id: T1106
technique_name: Native API
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- Sysmon
severity: Medium
fidelity: Low
lifecycle: Proposed
risk_score: 50
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.thread.start_address="*ntdll*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.thread.start_address matches regex "ntdll"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.thread.start_address\"\
    \ LIKE '%ntdll%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_exe_000703 {\n  meta:\n    author = \"TDL\"\n    description = \"Direct Syscall via Unbacked Memory\
    \ Region\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0002\"\n    technique = \"T1106\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.thread.start_address = /ntdll/\n    $host = $e.principal.hostname\n  match:\n \
    \   $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.thread.start_address LIKE "%ntdll%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.thread.start_address=/ntdll/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.thread.start_address=*ntdll*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.thread.start_address ~= "ntdll"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.thread.start_address:*ntdll*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1106*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Process makes NT* syscalls from an unbacked / RX private memory region. Indicates syscall stub injection or
  direct system call evasion.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

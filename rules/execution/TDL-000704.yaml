rule_id: TDL-EXE-000704
v4_id: '000704'
name: Suspicious Lambda/Function Created with Admin Role
description: New serverless function created with privileged role (IAM admin / contributor) by a non-CI/CD identity. Adversaries
  weaponize serverless to persist with cloud creds. Generated from gap analysis against canonical ATT&CK Enterprise matrix
  (T1648 under Execution).
tactic: Execution
tactic_id: TA0002
technique_id: T1648
technique_name: Serverless Execution
platform:
- AWS
- Azure
- GCP
data_sources:
- Cloud Audit Logs
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search userIdentity.arn="*lambda*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where userIdentity.arn matches regex "lambda"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"userIdentity.arn\" LIKE '%lambda%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_exe_000704 {\n  meta:\n    author = \"TDL\"\n    description = \"Suspicious Lambda/Function Created\
    \ with Admin Role\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0002\"\n    technique = \"T1648\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.userIdentity.arn = /lambda/\n    $actor = $e.principal.user.userid\n  match:\n  \
    \  $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE userIdentity.arn LIKE "%lambda%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND userIdentity.arn=/lambda/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND userIdentity.arn=*lambda*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter userIdentity.arn ~= "lambda"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND userIdentity.arn:*lambda*
  sumo: '_sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1648*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: New serverless function created with privileged role (IAM admin / contributor) by a non-CI/CD identity. Adversaries

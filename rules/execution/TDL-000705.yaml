rule_id: TDL-EXE-000705
v4_id: '000705'
name: DLL Loaded from User-Writable Path
description: Process loads a DLL from %TEMP%, %APPDATA% or other user-writable directory. Adversaries side-load malicious
  DLLs from those paths. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1129 under Execution).
tactic: Execution
tactic_id: TA0002
technique_id: T1129
technique_name: Shared Modules
platform:
- Windows
data_sources:
- Sysmon
- EDR
severity: Medium
fidelity: Low
lifecycle: Proposed
risk_score: 50
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search file.path="*user-writable*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "user-writable"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"file.path\" LIKE '%user-writable%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_exe_000705 {\n  meta:\n    author = \"TDL\"\n    description = \"DLL Loaded from User-Writable Path\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0002\"\n    technique = \"T1129\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.file.path = /user-writable/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND file.path LIKE "%user-writable%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND file.path=/user-writable/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND file.path=*user-writable*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND file.path ~= "user-writable"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND file.path:*user-writable*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1129*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Process loads a DLL from %TEMP%, %APPDATA% or other user-writable directory. Adversaries side-load malicious
  DLLs from those paths.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- dll
- loadlibrary
- module
- t1129
- execution
references:
- https://attack.mitre.org/techniques/T1129/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 pay attention to short-lived\
  \ processes, encoded arguments, and unusual parents (Office, browser, services)."
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

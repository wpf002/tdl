rule_id: TDL-EXE-000706
v4_id: '000706'
name: RMM Agent Spawning Interactive Shell
description: ConnectWise / Kaseya / NinjaOne / TeamViewer agent process spawns cmd, powershell or pwsh. Outside known patch
  workflows this signals abused deployment tooling. Generated from gap analysis against canonical ATT&CK Enterprise matrix
  (T1072 under Execution).
tactic: Execution
tactic_id: TA0002
technique_id: T1072
technique_name: Software Deployment Tools
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- MDM Logs
- RMM Logs
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.parent.name="*rmm-shell*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.parent.name matches regex "rmm-shell"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.parent.name\" LIKE\
    \ '%rmm-shell%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_exe_000706 {\n  meta:\n    author = \"TDL\"\n    description = \"RMM Agent Spawning Interactive Shell\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0002\"\n    technique = \"T1072\"\n  events:\n    $e.metadata.event_type =\
    \ \"PROCESS_LAUNCH\"\n    $e.process.parent.name = /rmm-shell/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.parent.name LIKE "%rmm-shell%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.parent.name=/rmm-shell/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.parent.name=*rmm-shell*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.parent.name ~= "rmm-shell"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.parent.name:*rmm-shell*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*mdm* OR _sourceCategory=*rmm*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1072*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: ConnectWise / Kaseya / NinjaOne / TeamViewer agent process spawns cmd, powershell or pwsh. Outside known patch
  workflows this signals abused deployment tooling.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows

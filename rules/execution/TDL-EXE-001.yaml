rule_id: TDL-EXE-001
name: PowerShell Encoded Command Execution
tactic: Execution
tactic_id: TA0002
technique_id: T1059.001
technique_name: PowerShell
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
- Sysmon Event ID 1
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4688")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4688")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4688')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exe_001 {
      meta:
        author = "TDL"
        description = "PowerShell Encoded Command Execution"
        severity = "HIGH"
        tactic = "TA0002"
        technique = "T1059.001"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4688)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4688")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4688])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4688)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4688")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4688)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4688")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin scripts using encoded commands
- SCCM/Intune deployment scripts
tags:
- powershell
- encoding
- execution
author: TDL
created: '2024-01-15'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the executing process.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — pay attention to short-lived
  processes, encoded arguments, and unusual parents (Office, browser, services).
- Pull EDR process tree for the alert PID; check the parent / grandparent and any child processes spawned within 5 minutes.
- 'Compare against the host''s baseline: is the binary / interpreter normally invoked here, by this user, at this time?'
- 'Decide TP / FP: TP if the execution chain has no business justification; FP if it traces to a packaging script, software
  install, or scheduled job.'
- 'If TP: contain the host, kill the offending process, snapshot memory if possible, and escalate to IR with the process tree
  attached.'

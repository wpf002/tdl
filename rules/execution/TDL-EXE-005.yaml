rule_id: TDL-EXE-005
name: Regsvr32 Executing Remote SCT Scriptlet (Squiblydoo)
tactic: Execution
tactic_id: TA0002
technique_id: T1218.010
technique_name: Regsvr32
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
- Sysmon Event ID 1
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 90
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4688

    | where ProcessName="regsvr32.exe"

    | where match(CommandLine, "(?i)(/s|/u|/i).*(http[s]?://|scrobj\.dll)")

    | table _time, host, user, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4688 and Process =~ "regsvr32.exe"

    | where CommandLine matches regex @"(?i)(/s|/u|/i).*(http[s]?://|scrobj\.dll)"

    | project TimeGenerated, Computer, Account, CommandLine'
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid = 4688
      AND INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_exe_005 {
      meta:
        author = "TDL"
        description = "Regsvr32 Executing Remote SCT Scriptlet (Squiblydoo)"
        severity = "CRITICAL"
        tactic = "TA0002"
        technique = "T1218.010"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4688"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4688')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4688])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4688
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (4688)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: |-
    event_id:(4688)
false_positives:
- Extremely rare in production
tags:
- regsvr32
- squiblydoo
- lolbin

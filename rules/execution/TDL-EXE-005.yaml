rule_id: TDL-EXE-005
name: Regsvr32 Executing Remote SCT Scriptlet (Squiblydoo)
tactic: Execution
tactic_id: TA0002
technique_id: T1218.010
technique_name: Regsvr32
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
- Sysmon Event ID 1
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 90
queries:
  spl: 'index=windows sourcetype=WinEventLog:Security EventCode=4688

    | where ProcessName="regsvr32.exe"

    | where match(CommandLine, "(?i)(/s|/u|/i).*(http[s]?://|scrobj\.dll)")

    | table _time, host, user, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID == 4688 and Process =~ "regsvr32.exe"

    | where CommandLine matches regex @"(?i)(/s|/u|/i).*(http[s]?://|scrobj\.dll)"

    | project TimeGenerated, Computer, Account, CommandLine'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4688\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule tdl_exe_005 {\n  meta:\n    author = \"TDL\"\n    description = \"Regsvr32 Executing Remote SCT Scriptlet\
    \ (Squiblydoo)\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0002\"\n    technique = \"T1218.010\"\n\n  events:\n \
    \   $event.metadata.event_type = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4688\"\n    $event.principal.hostname\
    \ = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n\
    \  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4688'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4688])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4688

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4688)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4688)
  sumo: '_sourceCategory=*sysmon*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1218.010*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Extremely rare in production
tags:

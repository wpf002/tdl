rule_id: TDL-EXF-000053
v4_id: '000053'
name: Potential Data Exfiltration
description: Detects a host communicating to an external host over common data transfer port with at least 5 MB out.
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1030
technique_name: Data Transfer Size Limits
platform:
- Network
data_sources:
- Firewall
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_exf_000053 {\n  meta:\n    author = \"TDL\"\n    description = \"Potential Data Exfiltration\"\n    severity\
    \ = \"LOW\"\n    tactic = \"TA0010\"\n    technique = \"T1030\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- It is best practice to use specific hosts for these file transfers which can be whitelisted from triggering the alarm.
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- exfiltration
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Firewall Event\nFrom one internal source to one external destination (Outbound)\nOR\n\tWhere the Destination\
  \ Port is in [20, 21, 22, 23, 69, 115, 989, 990]\n\tWhere the Application is in [ftp, ssh, telnet, tftp, sftp, ftps]\n\t\
  \nWhere the Bytes Out is greater than 5 MB\nWhere the Source IP is NOT on the High Value Target Host List\n\n----------------------------------------------------------------------------------------------------\n\
  \n1 DLP Event\nWhere Event Name matches [\"exfiltration\"]"
suppression:
  window: 24 hours
  fields:
  - Source IP
tuning_period: 7 days

rule_id: TDL-EXF-000071
v4_id: '000071'
name: DNS Tunneling - Outbound
description: Detects an outbound firewall session over port 53 with at least 10 MB out. This could be indicative of an exfiltration
  attempt over DNS.
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1030
technique_name: Data Transfer Size Limits
platform:
- Windows
data_sources:
- Windows Security Event Log
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows

    | table _time, host, user, _raw'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_exf_000071 {\n  meta:\n    author = \"TDL\"\n    description = \"DNS Tunneling - Outbound\"\n    severity\
    \ = \"HIGH\"\n    tactic = \"TA0010\"\n    technique = \"T1030\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 5m\n\n \
    \ condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | where technique="T1030" OR _raw matches "*T1030*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- exfiltration
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 DNS Request Event\nWhere the Bytes Out is greater than 10 MB\n\n----------------------------------------------------------------------------------\n\
  \n1 Firewall Event \nWhere the Destination Port is 53\nWhere the Bytes Out is greater than 10 MB"
suppression:
  window: 8 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination, total bytes transferred, and the protocol used.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 quantify the data volume vs the host's\
  \ baseline outbound profile."
- 'Pivot to preceding collection / staging activity: archives, mailbox dumps, database extracts in the prior 24h on the same
  host.'
- Identify what was likely exfiltrated (path patterns, file types, classification labels) and the user/process that produced
  it.
- 'Decide TP / FP: FP for sanctioned cloud backup / vendor data sharing on a known channel; TP for unattended bulk transfers
  to new endpoints.'
- 'If TP: block the destination, isolate the host, preserve network and DLP evidence, and trigger your data-incident process
  (legal / privacy / customer notification as applicable).'

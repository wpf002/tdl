rule_id: TDL-EXF-000298
v4_id: 000298
name: Google Drive Ownership Transferred via Google Workspace
description: Detects when Google Drive/Google Docs files are transferred to another user by the administrator. This service
  can also be abused by adversaries to transfer files to an adversary account for potential exfiltration.
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1537
technique_name: Transfer Data to Cloud Account
platform:
- Google Workspace
data_sources:
- Google Workspace
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_exf_000298 {\n  meta:\n    author = \"TDL\"\n    description = \"Google Drive Ownership Transferred via\
    \ Google Workspace\"\n    severity = \"LOW\"\n    tactic = \"TA0010\"\n    technique = \"T1537\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*gcp*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1537*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- exfiltration
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Google Workspace Event

  Where the events.name is CREATE_DATA_TRANSFER_REQUEST"

  AND the APPLICATION_NAME contains "drive"'
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination, total bytes transferred, and the protocol used.'
- "Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on \u2014 quantify the data\
  \ volume vs the host's baseline outbound profile."
- 'Pivot to preceding collection / staging activity: archives, mailbox dumps, database extracts in the prior 24h on the same
  host.'
- Identify what was likely exfiltrated (path patterns, file types, classification labels) and the user/process that produced
  it.
- 'Decide TP / FP: FP for sanctioned cloud backup / vendor data sharing on a known channel; TP for unattended bulk transfers
  to new endpoints.'
- 'If TP: block the destination, isolate the host, preserve network and DLP evidence, and trigger your data-incident process
  (legal / privacy / customer notification as applicable).'

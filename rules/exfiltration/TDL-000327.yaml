rule_id: TDL-EXF-000327
v4_id: '000327'
name: EC2 Anomalous Network Activity Detected - GuardDuty
description: Detects when GuardDuty alerts on anomalous network traffic communication with a EC2 instance
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1571
technique_name: Non-Standard Port
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*GuardDuty*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex "GuardDuty"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%GuardDuty%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exf_000327 {
      meta:
        author = "TDL"
        description = "EC2 Anomalous Network Activity Detected - GuardDuty"
        severity = "MEDIUM"
        tactic = "TA0010"
        technique = "T1571"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /GuardDuty/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%GuardDuty%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/GuardDuty/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*GuardDuty*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= "GuardDuty"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*GuardDuty*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*GuardDuty*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- exfiltration
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Guard Duty Event \nWhere the Event Type is in [\"Backdoor:EC2/Spambot\", \"Behavior:EC2/NetworkPortUnusual\"\
  , \"Behavior:EC2/TrafficVolumeUnusual\"]"
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination, total bytes transferred, and the protocol used.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — quantify the data volume vs the host's baseline
  outbound profile.
- 'Pivot to preceding collection / staging activity: archives, mailbox dumps, database extracts in the prior 24h on the same
  host.'
- Identify what was likely exfiltrated (path patterns, file types, classification labels) and the user/process that produced
  it.
- 'Decide TP / FP: FP for sanctioned cloud backup / vendor data sharing on a known channel; TP for unattended bulk transfers
  to new endpoints.'
- 'If TP: block the destination, isolate the host, preserve network and DLP evidence, and trigger your data-incident process
  (legal / privacy / customer notification as applicable).'

rule_id: TDL-EXF-000812
v4_id: 000812
name: Large File Transfer Over Bluetooth OBEX
description: Bluetooth OBEX FTP/OPP transfer >10MB to a non-paired device, or rogue Wi-Fi tether process active during file
  write. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1011 under Exfiltration).
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1011
technique_name: Exfiltration Over Other Network Medium
platform:
- Windows
- Linux
data_sources:
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search device.protocol="*bt-exfil*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where device.protocol matches regex "bt-exfil"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "device.protocol" LIKE ''%bt-exfil%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_exf_000812 {\n  meta:\n    author = \"TDL\"\n    description = \"Large File Transfer Over Bluetooth\
    \ OBEX\"\n    severity = \"HIGH\"\n    tactic = \"TA0010\"\n    technique = \"T1011\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.device.protocol = /bt-exfil/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND device.protocol LIKE "%bt-exfil%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND device.protocol=/bt-exfil/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND device.protocol=*bt-exfil*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND device.protocol ~= "bt-exfil"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND device.protocol:*bt-exfil*
  sumo: '_sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("11","23","26") AND _raw matches "*T1011*"

    | count by host, user, target_filename, image

    | sort by _count desc'
pseudo_logic: Bluetooth OBEX FTP/OPP transfer >10MB to a non-paired device, or rogue Wi-Fi tether process active during file
  write.

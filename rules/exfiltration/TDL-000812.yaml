rule_id: TDL-EXF-000812
v4_id: 000812
name: Large File Transfer Over Bluetooth OBEX
description: Bluetooth OBEX FTP/OPP transfer >10MB to a non-paired device, or rogue Wi-Fi tether process active during file
  write. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1011 under Exfiltration).
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1011
technique_name: Exfiltration Over Other Network Medium
platform:
- Windows
- Linux
data_sources:
- EDR
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)
    | search file_name="*.+*"
    | stats count, values(host) as hosts by user, image, target_filename
    | where count >= 1
    | sort - count
  kql: |
    DeviceFileEvents
    | where TimeGenerated > ago(1d)
    | where file_name matches regex ".+"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "File Path", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('11','23','26')
      AND "file_name" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_exf_000812 {
      meta:
        author = "TDL"
        description = "Large File Transfer Over Bluetooth OBEX"
        severity = "HIGH"
        tactic = "TA0010"
        technique = "T1011"
      events:
        $e.metadata.event_type = "FILE_CREATION"
        $e.file_name = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "file" AND file_name LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "file" AND file_name=/.+/)
    groupby(asset, file_path, process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (FileWritten, NewExecutableWritten) AND file_name=*.+*
    | stats count as writes by ComputerName, UserName, FileName, ImageFileName
    | sort -writes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.FILE AND file_name ~= ".+"
    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path
    | sort desc writes
  lucene: |
    event.category:"file" AND file_name:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("11","23","26") AND file_name matches "*.+*"
    | count by host, user, target_filename, image
    | sort by _count desc
pseudo_logic: Bluetooth OBEX FTP/OPP transfer >10MB to a non-paired device, or rogue Wi-Fi tether process active during file
  write.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:

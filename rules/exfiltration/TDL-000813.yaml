rule_id: TDL-EXF-000813
v4_id: 000813
name: Large Write to Removable Volume in Short Window
description: '>100MB total bytes written by single process to a DriveType=2 volume within 5m. Generated from gap analysis
  against canonical ATT&CK Enterprise matrix (T1052 under Exfiltration).'
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1052
technique_name: Exfiltration Over Physical Medium
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*usb-exfil*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "usb-exfil"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%usb-exfil%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_exf_000813 {\n  meta:\n    author = \"TDL\"\n    description = \"Large Write to Removable Volume in\
    \ Short Window\"\n    severity = \"HIGH\"\n    tactic = \"TA0010\"\n    technique = \"T1052\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /usb-exfil/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%usb-exfil%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/usb-exfil/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*usb-exfil*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "usb-exfil"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*usb-exfil*
pseudo_logic: '>100MB total bytes written by single process to a DriveType=2 volume within 5m.'

rule_id: TDL-EXF-002
name: Exfiltration to Newly Registered Domain
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1048.002
technique_name: Exfiltration Over Alternative Protocol
platform:
- Windows
- Linux
data_sources:
- Proxy/web gateway logs
- DNS logs
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=network sourcetype=proxy

    | where bytes_out >= 10485760

    | lookup domain_age_intel.csv domain as dest_host OUTPUT domain_age_days

    | where domain_age_days <= 30

    | stats sum(bytes_out) as total_out by src_ip, dest_host, domain_age_days

    | eval mb=round(total_out/1048576,2)

    | table src_ip, dest_host, domain_age_days, mb'
  kql: "CommonSecurityLog\n| where TimeGenerated >= ago(1d)\n| where SentBytes >= 10485760\n| join kind=inner (externaldata(domain:string,\
    \ age_days:int) [@\"https://your-domain-age-intel\"] with (format=\"csv\"))\n    on $left.DestinationHostName == $right.domain\n\
    | where age_days <= 30"
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_exf_002 {
      meta:
        author = "TDL"
        description = "Exfiltration to Newly Registered Domain"
        severity = "HIGH"
        tactic = "TA0010"
        technique = "T1048.002"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: |-
    event_id:* AND log_type:"security"
false_positives:
- Legitimate vendors on new domains
- CDN edge nodes
tags:
- exfiltration
- new-domain
- threat-intel
author: TDL
created: '2024-03-16'
test_method: synthetic
last_modified: '2026-04-27'

rule_id: TDL-EXF-002
name: Exfiltration to Newly Registered Domain
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1048.002
technique_name: Exfiltration Over Alternative Protocol
platform:
- Windows
- Linux
data_sources:
- Proxy/web gateway logs
- DNS logs
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=network sourcetype=proxy

    | where bytes_out >= 10485760

    | lookup domain_age_intel.csv domain as dest_host OUTPUT domain_age_days

    | where domain_age_days <= 30

    | stats sum(bytes_out) as total_out by src_ip, dest_host, domain_age_days

    | eval mb=round(total_out/1048576,2)

    | table src_ip, dest_host, domain_age_days, mb'
  kql: "CommonSecurityLog\n| where TimeGenerated >= ago(1d)\n| where SentBytes >= 10485760\n| join kind=inner (externaldata(domain:string,\
    \ age_days:int) [@\"https://your-domain-age-intel\"] with (format=\"csv\"))\n    on $left.DestinationHostName == $right.domain\n\
    | where age_days <= 30"
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule tdl_exf_002 {\n  meta:\n    author = \"TDL\"\n    description = \"Exfiltration to Newly Registered Domain\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0010\"\n    technique = \"T1048.002\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*dns*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1048.002*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate vendors on new domains
- CDN edge nodes
tags:
- exfiltration
- new-domain
- threat-intel
author: TDL
created: '2024-03-16'
test_method: synthetic
last_modified: '2026-04-27'
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination, total bytes transferred, and the protocol used.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 quantify the data volume vs the host's\
  \ baseline outbound profile."
- 'Pivot to preceding collection / staging activity: archives, mailbox dumps, database extracts in the prior 24h on the same
  host.'
- Identify what was likely exfiltrated (path patterns, file types, classification labels) and the user/process that produced
  it.
- 'Decide TP / FP: FP for sanctioned cloud backup / vendor data sharing on a known channel; TP for unattended bulk transfers
  to new endpoints.'
- 'If TP: block the destination, isolate the host, preserve network and DLP evidence, and trigger your data-incident process
  (legal / privacy / customer notification as applicable).'

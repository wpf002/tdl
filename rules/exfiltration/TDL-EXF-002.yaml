rule_id: TDL-EXF-002
name: Exfiltration to Newly Registered Domain
tactic: Exfiltration
tactic_id: TA0010
technique_id: T1048.002
technique_name: Exfiltration Over Alternative Protocol
platform:
- Windows
- Linux
data_sources:
- Proxy/web gateway logs
- DNS logs
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*tcp*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "tcp"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%tcp%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_exf_002 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Exfiltration to Newly Registered Domain\"\n    severity = \"HIGH\"\n   \
    \ tactic = \"TA0010\"\n    technique = \"T1048.002\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.network.protocol = /tcp/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/tcp/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*tcp*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*tcp*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*tcp*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Legitimate vendors on new domains
- CDN edge nodes
tags:
- exfiltration
- new-domain
- threat-intel
author: TDL
created: '2024-03-16'
test_method: synthetic
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, destination, total bytes transferred,
  and the protocol used.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — quantify
  the data volume vs the host's baseline outbound profile.
- 'Pivot to preceding collection / staging activity: archives, mailbox dumps, database
  extracts in the prior 24h on the same host.'
- Identify what was likely exfiltrated (path patterns, file types, classification
  labels) and the user/process that produced it.
- 'Decide TP / FP: FP for sanctioned cloud backup / vendor data sharing on a known
  channel; TP for unattended bulk transfers to new endpoints.'
- 'If TP: block the destination, isolate the host, preserve network and DLP evidence,
  and trigger your data-incident process (legal / privacy / customer notification
  as applicable).'
pseudo_logic: '1 or more instances within the observed time window of network traffic
  events where outbound bytes are ranked by volume descending.


  From index=network with sourcetype firewall or sourcetype ids

  Where network.protocol contains tcp

  With src_ip, dest_ip, and dest_port as the grouping keys

  With count of connections per group at least 1

  With sum of bytes_out calculated per group and sorted highest to lowest

  With dc(dest_ip) tracked as unique destination count per source

  Where dest_ip or associated domain resolves to a newly registered domain (domain
  age below threshold per threat intelligence or domain registration feed)

  Excluding dest_ip or dest domain values present in the legitimate vendor and CDN
  edge node allow-list

  With the same src_ip and dest_ip as the correlation key, deduplicated per unique
  dest_port pairing'

rule_id: TDL-IMP-000029
v4_id: 000029
name: Mass File Deletion
description: Detects when a user deletes multiple files from a file transfer/storage appliance. This could indicate an insider
  threat or a compromised or disgruntled user attempting to cause destruction to the organization.
tactic: Impact
tactic_id: TA0040
technique_id: T1485
technique_name: Data Destruction
platform:
- Microsoft 365
data_sources:
- Sharepoint
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | bucket _time span=5m

    | stats count as total, dc(TargetUserName) as unique_targets by _time, SubjectUserName

    | where total >= 50

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'OfficeActivity

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Count >= 50

    | project TimeGenerated, UserId, ClientIP, Operation, OfficeWorkload'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 600 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_imp_000029 {\n  meta:\n    author = \"TDL\"\n    description = \"Mass File Deletion\"\n    severity = \"\
    MEDIUM\"\n    tactic = \"TA0040\"\n    technique = \"T1485\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 10m\n\n\
    \  condition:\n    #event >= 50\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 10m)

    | WHERE event_count >= 50

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 50)'
  crowdstrike: 'event_simpleName=BootstrapProcess OR event_simpleName=SuspiciousFilesWithOperation

    | where FileOperation IN ("WRITE","RENAME","DELETE")

    | stats count(FileName) as file_count, dc(FileExtension) as ext_count by ComputerName, FileName_parent

    | where file_count >= 50 AND ext_count >= 3

    | sort -file_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 50\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: 'source_name:Microsoft-Windows-Sysmon AND event_id:11

    AND NOT file_extension:(tmp OR log OR ini)'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- impact
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "50 Sharepoint Events\nWhere the Operation is \"FileDeleted\"\nWhere the workload is \"Sharepoint\"\nWith distinct\
  \ File Names\nWith the same Source Username \nWithin 10 minutes\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 Microsoft Cloud App Security Event\nWhere the Operation is \"AlertTriggered\"\nWhere the Alert Name is \"Unusual volume\
  \ of file deletion\""
suppression:
  window: 12 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days

rule_id: TDL-IMP-000034
v4_id: '000034'
name: Outbound Crypto Mining Traffic Detected
description: Detects continuous outbound connections on common crypto mining ports. The miner needs to communicate frequently
  to keep the pool server updated so the miner can receive the currency payouts.
tactic: Impact
tactic_id: TA0040
technique_id: T1496
technique_name: Resource Hijacking
platform:
- Network
data_sources:
- Firewall
- Domain Name System (DNS)
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*dns*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "dns"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%dns%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_imp_000034 {
      meta:
        author = "TDL"
        description = "Outbound Crypto Mining Traffic Detected"
        severity = "LOW"
        tactic = "TA0040"
        technique = "T1496"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /dns/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%dns%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/dns/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*dns*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "dns"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*dns*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*dns*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- impact
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 Firewall Event \nFrom one internal source to one external destination (Outbound)\nOR\n\tWhere the Destination\
  \ IP is on the Cryptomining Pool IP List\n\t\n\tWhere the Destination Domain is on the Cryptomining Pool Domain List\n\n\
  \n---------------------------------------------------------------------\n\n1 DNS Request event\nWhere the Destination Domain\
  \ is on the Cryptomining Pool Domain List"
suppression:
  window: 24 hours
  fields:
  - Source IP
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host(s) affected, scope of impact (count of files / accounts / services).'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — characterize the destructive action (encrypt,
  delete, lockout, disable, reboot).
- 'Determine spread: is this a single host or a coordinated multi-host event? Pull file / service telemetry across the fleet.'
- Trigger your major-incident bridge if scope is multi-host or business-critical — early activation buys time.
- 'Decide TP / FP: FP only if a sanctioned destructive action (DR test, decommission) is documented; default to TP at this
  severity.'
- 'If TP: execute your IR runbook — isolate, preserve evidence, restore from backup if appropriate, hunt for adversary persistence
  to prevent recurrence.'

rule_id: TDL-IMP-000162
v4_id: '000162'
name: DHCP Starvation
description: An attacker can broadcast DHCPDISCOVER messages with spoofed MAC addresses to force the DHCP server to lease
  all of the IPs in the address pool this can cause a denial-of-service.
tactic: Impact
tactic_id: TA0040
technique_id: T1489
technique_name: Service Stop
platform:
- Windows
data_sources:
- Dynamic Host Configuration Protocol (DHCP)
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=windows

    | bucket _time span=1m

    | stats count by src_ip, Account_Name, _time

    | where count >= 200

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)

    | where Count >= 200

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 60 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_imp_000162 {\n  meta:\n    author = \"TDL\"\n    description = \"DHCP Starvation\"\n    severity = \"MEDIUM\"\
    \n    tactic = \"TA0040\"\n    technique = \"T1489\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\n\
    \    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 1m\n\n  condition:\n\
    \    #event >= 200\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 1m)

    | WHERE event_count >= 200

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 200)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 200

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 200\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1489*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- impact
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '200 DHCP Events

  Where the Event Type is DHCPACK

  Where the Destination IP (Allocated IP) is in the DHCP IP Range

  With unique Source MAC Addresses

  Within 1 minute'
suppression:
  window: 12 hours
tuning_period: 7 days

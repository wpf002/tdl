rule_id: TDL-IMP-000188
v4_id: 000188
name: Wireless AP Deauthentication Flood
description: Detects a high volume of deauthentication events on an access point. The majority of wireless attacks begin with
  the attacker capturing a client’s authentication to the access point. An attacker will send a  high volume of deauthentication
  packets to kick a client off the network and force them to re-authenticate. This can also create a denial-of-service condition
  for the targeted clients if the attacker continues to send a high-volume of deauthentication packets.
tactic: Impact
tactic_id: TA0040
technique_id: T1498
technique_name: Network Denial of Service
platform:
- Windows
data_sources:
- Windows Security Event Log
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |-
    index=windows
    | bucket _time span=1m
    | stats count by src_ip, Account_Name, _time
    | where count >= 100
    | table _time, src_ip, dest_ip, dest_port, action
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)
    | where Count >= 100
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 60 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_imp_000188 {
      meta:
        author = "TDL"
        description = "Wireless AP Deauthentication Flood"
        severity = "LOW"
        tactic = "TA0040"
        technique = "T1498"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 1m

      condition:
        #event >= 100

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 1m)
    | WHERE event_count >= 100
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 100)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 100
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 100\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- impact
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  100 Wireless Access Point Event
  Where the Event Name contains "deauthentication"
  With the same Access Point
  Within 1 minute

  ----------------------------------------------------------------------------------

  1 Wireless IDS/IPS Event
  Where the Signature contains "Deauthentication Flood"
suppression:
  window: 24 hours
tuning_period: 7 days

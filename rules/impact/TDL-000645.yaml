rule_id: TDL-IMP-000645
v4_id: '000645'
name: Possible Ransomware Detected - Varonis
description: Detects when multiple files have been encrypted within a short period. This could be related to the modification
  of file extensions or the creation of files with known ransomware related extensions.
tactic: Impact
tactic_id: TA0040
technique_id: T1486
technique_name: Data Encrypted for Impact
platform:
- Windows
data_sources:
- Varonis
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows

    | table _time, host, user, ProcessName, CommandLine'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_imp_000645 {
      meta:
        author = "TDE"
        description = "Possible Ransomware Detected - Varonis"
        severity = "HIGH"
        tactic = "TA0040"
        technique = "T1486"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=BootstrapProcess OR event_simpleName=SuspiciousFilesWithOperation
    | where FileOperation IN ("WRITE","RENAME","DELETE")
    | stats count(FileName) as file_count, dc(FileExtension) as ext_count by ComputerName, FileName_parent
    | where file_count >= 50 AND ext_count >= 3
    | sort -file_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: |-
    source_name:Microsoft-Windows-Sysmon AND event_id:11
    AND NOT file_extension:(tmp OR log OR ini)
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- impact
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 VaronisDatAdvantage Alert
  Where the Alert Name is in ["File encrypted by ransomware","Immediate pattern detected: user actions resemble ransomware","Suspected ransomware intrusion activity","Potential encryption of multiple files"]

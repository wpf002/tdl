rule_id: TDL-IMP-000815
v4_id: 000815
name: Modification of Financial / Audit Records by Non-App Identity
description: UPDATE/DELETE on financial or audit tables by a database account outside the application service account allowlist.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1565 under Impact).
tactic: Impact
tactic_id: TA0040
technique_id: T1565
technique_name: Data Manipulation
platform:
- Windows
- Linux
- AWS
data_sources:
- Auditd
- Sysmon
- Cloud Audit Logs
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search db.user="*data-tamper*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where db.user matches regex "data-tamper"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "db.user" LIKE ''%data-tamper%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_imp_000815 {\n  meta:\n    author = \"TDL\"\n    description = \"Modification of Financial / Audit\
    \ Records by Non-App Identity\"\n    severity = \"HIGH\"\n    tactic = \"TA0040\"\n    technique = \"T1565\"\n  events:\n\
    \    $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.db.user = /data-tamper/\n    $src = $e.principal.ip\n  match:\n\
    \    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND db.user LIKE "%data-tamper%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND db.user=/data-tamper/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND db.user=*data-tamper*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND db.user ~= "data-tamper"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND db.user:*data-tamper*
  sumo: '_sourceCategory=*linux/auditd* OR _sourceCategory=*sysmon* OR _sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1565*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: UPDATE/DELETE on financial or audit tables by a database account outside the application service account allowlist.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows

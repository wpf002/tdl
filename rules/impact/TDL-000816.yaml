rule_id: TDL-IMP-000816
v4_id: 000816
name: Modification of Public Web Root by Non-Deployment Identity
description: Write to index.html, default.aspx, or other web-root entry file by a process not in the deployment-pipeline allowlist.
  Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1491 under Impact).
tactic: Impact
tactic_id: TA0040
technique_id: T1491
technique_name: Defacement
platform:
- Network
data_sources:
- Web Server Logs
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*deface*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "deface"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%deface%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_imp_000816 {\n  meta:\n    author = \"TDL\"\n    description = \"Modification of Public Web Root by\
    \ Non-Deployment Identity\"\n    severity = \"HIGH\"\n    tactic = \"TA0040\"\n    technique = \"T1491\"\n  events:\n\
    \    $e.metadata.event_type = \"FILE_CREATION\"\n    $e.file.path = /deface/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%deface%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/deface/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*deface*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "deface"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*deface*
pseudo_logic: Write to index.html, default.aspx, or other web-root entry file by a process not in the deployment-pipeline
  allowlist.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days

queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.name="*disk-wipe*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.name matches regex "disk-wipe"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.name\" LIKE '%disk-wipe%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_imp_000817 {\n  meta:\n    author = \"TDL\"\n    description = \"Direct Write to Physical Drive or\
    \ Partition Boot Sector\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0040\"\n    technique = \"T1561\"\n  events:\n\
    \    $e.metadata.event_type = \"FILE_CREATION\"\n    $e.file.name = /disk-wipe/\n    $host = $e.principal.hostname\n \
    \ match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.name LIKE "%disk-wipe%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.name=/disk-wipe/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.name=*disk-wipe*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.name ~= "disk-wipe"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.name:*disk-wipe*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1561*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'

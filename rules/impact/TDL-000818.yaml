rule_id: TDL-IMP-000818
v4_id: 000818
name: Process Forking Storm Saturating CPU
description: Single parent spawning >500 children in 60s, or fork-bomb pattern from a non-build process. Endpoint DoS. Generated
  from gap analysis against canonical ATT&CK Enterprise matrix (T1499 under Impact).
tactic: Impact
tactic_id: TA0040
technique_id: T1499
technique_name: Endpoint Denial of Service
platform:
- Windows
- Linux
data_sources:
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.parent.pid="*fork-storm*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.parent.pid matches regex "fork-storm"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.parent.pid\" LIKE\
    \ '%fork-storm%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_imp_000818 {\n  meta:\n    author = \"TDL\"\n    description = \"Process Forking Storm Saturating\
    \ CPU\"\n    severity = \"HIGH\"\n    tactic = \"TA0040\"\n    technique = \"T1499\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.parent.pid = /fork-storm/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.parent.pid LIKE "%fork-storm%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.parent.pid=/fork-storm/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.parent.pid=*fork-storm*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.parent.pid ~= "fork-storm"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.parent.pid:*fork-storm*

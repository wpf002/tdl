rule_id: TDL-IMP-000819
v4_id: 000819
name: BIOS/UEFI Flash Operation From User Context
description: Direct invocation of fwupdmgr, afuwin.exe, AFU /B, or write to \Device\NTPNP_PCI* with FW update IOCTL outside
  vendor management agent. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1495 under Impact).
tactic: Impact
tactic_id: TA0040
technique_id: T1495
technique_name: Firmware Corruption
platform:
- Windows
- Linux
data_sources:
- EDR
- Firmware Telemetry
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*firmware-flash*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "firmware-flash"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%firmware-flash%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_imp_000819 {\n  meta:\n    author = \"TDL\"\n    description = \"BIOS/UEFI Flash Operation From User\
    \ Context\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0040\"\n    technique = \"T1495\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /firmware-flash/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%firmware-flash%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/firmware-flash/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*firmware-flash*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "firmware-flash"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*firmware-flash*
pseudo_logic: Direct invocation of fwupdmgr, afuwin.exe, AFU /B, or write to \Device\NTPNP_PCI* with FW update IOCTL outside
  vendor management agent.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows

rule_id: TDL-IMP-000819
v4_id: 000819
name: BIOS/UEFI Flash Operation From User Context
description: Direct invocation of fwupdmgr, afuwin.exe, AFU /B, or write to \Device\NTPNP_PCI* with FW update IOCTL outside
  vendor management agent. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1495 under Impact).
tactic: Impact
tactic_id: TA0040
technique_id: T1495
technique_name: Firmware Corruption
platform:
- Windows
- Linux
data_sources:
- EDR
- Firmware Telemetry
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("afuwin.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("afuwin.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('afuwin.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_imp_000819 {
      meta:
        author = "TDL"
        description = "BIOS/UEFI Flash Operation From User Context"
        severity = "CRITICAL"
        tactic = "TA0040"
        technique = "T1495"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(afuwin.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("afuwin.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [afuwin.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (afuwin.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("afuwin.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(afuwin.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("afuwin.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: Direct invocation of fwupdmgr, afuwin.exe, AFU /B, or write to \Device\NTPNP_PCI* with FW update IOCTL outside
  vendor management agent.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:

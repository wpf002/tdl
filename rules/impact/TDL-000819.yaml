triage_steps:
- 'Confirm the alert metadata: timestamp, host(s) affected, scope of impact (count of files / accounts / services).'
- Inspect the parent → child process tree, command line arguments, and code-signing status — characterize the destructive
  action (encrypt, delete, lockout, disable, reboot).
- 'Determine spread: is this a single host or a coordinated multi-host event? Pull file / service telemetry across the fleet.'
- Trigger your major-incident bridge if scope is multi-host or business-critical — early activation buys time.
- 'Decide TP / FP: FP only if a sanctioned destructive action (DR test, decommission) is documented; default to TP at this
  severity.'
- 'If TP: execute your IR runbook — isolate, preserve evidence, restore from backup if appropriate, hunt for adversary persistence
  to prevent recurrence.'

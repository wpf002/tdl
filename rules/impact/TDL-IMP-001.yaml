rule_id: TDL-IMP-001
name: Ransomware Staging - Mass File Rename
tactic: Impact
tactic_id: TA0040
technique_id: T1486
technique_name: Data Encrypted for Impact
platform:
- Windows
data_sources:
- Sysmon Event ID 11
- EDR file telemetry
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 100
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process_name="*.+*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process_name matches regex ".+"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process_name\" LIKE '%.+%'\n\
    LAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_imp_001 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Ransomware Staging - Mass File Rename\"\n    severity = \"CRITICAL\"\n \
    \   tactic = \"TA0040\"\n    technique = \"T1486\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process_name = /.+/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process_name LIKE "%.+%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND process_name=/.+/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process_name=*.+*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND process_name:*.+*

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND process_name matches "*.+*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- File sync clients during bulk sync
tags:
- ransomware
- encryption
- critical
author: TDL
created: '2024-03-01'
test_method: synthetic
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host(s) affected, scope of impact (count
  of files / accounts / services).'
- Inspect the file path, file hash, parent process, and any prior network/email delivery
  — characterize the destructive action (encrypt, delete, lockout, disable, reboot).
- 'Determine spread: is this a single host or a coordinated multi-host event? Pull
  file / service telemetry across the fleet.'
- Trigger your major-incident bridge if scope is multi-host or business-critical —
  early activation buys time.
- 'Decide TP / FP: FP only if a sanctioned destructive action (DR test, decommission)
  is documented; default to TP at this severity.'
- 'If TP: execute your IR runbook — isolate, preserve evidence, restore from backup
  if appropriate, hunt for adversary persistence to prevent recurrence.'
pseudo_logic: '1 or more instances over any time window of a Sysmon Process Creation
  event where the process name matches a wildcard pattern containing a dot and one
  or more additional characters.


  From index=endpoint with sourcetype=Sysmon

  Where EventCode=1 (Process Creation)

  Where process_name matches the pattern "*.+*" (any process name containing a dot
  followed by one or more characters)

  With statistics aggregated by process_name, parent_process_name, and command_line

  With values of host and user collected per grouping

  Where the event count per group is greater than or equal to 1


  With the same process_name, parent_process_name, and command_line as the correlation
  key across all matching hosts and users.'

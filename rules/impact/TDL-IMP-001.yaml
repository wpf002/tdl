rule_id: TDL-IMP-001
name: Ransomware Staging - Mass File Rename
tactic: Impact
tactic_id: TA0040
technique_id: T1486
technique_name: Data Encrypted for Impact
platform:
- Windows
data_sources:
- Sysmon Event ID 11
- EDR file telemetry
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 100
queries:
  spl: 'index=windows sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" EventCode=11

    | bucket _time span=1m

    | stats dc(TargetFilename) as files by host, Image, _time

    | where files >= 50

    | table _time, host, Image, files'
  kql: 'DeviceFileEvents

    | where TimeGenerated >= ago(1d)

    | where ActionType in ("FileCreated","FileModified","FileRenamed")

    | summarize FileCount = count(), Extensions = make_set(tostring(split(FileName,".")[-1])) by DeviceName, InitiatingProcessFileName,
    bin(TimeGenerated, 1m)

    | where FileCount >= 50 and array_length(Extensions) >= 3'
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_imp_001 {
      meta:
        author = "TDL"
        description = "Ransomware Staging - Mass File Rename"
        severity = "CRITICAL"
        tactic = "TA0040"
        technique = "T1486"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=BootstrapProcess OR event_simpleName=SuspiciousFilesWithOperation
    | where FileOperation IN ("WRITE","RENAME","DELETE")
    | stats count(FileName) as file_count, dc(FileExtension) as ext_count by ComputerName, FileName_parent
    | where file_count >= 50 AND ext_count >= 3
    | sort -file_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: |-
    source_name:Microsoft-Windows-Sysmon AND event_id:11
    AND NOT file_extension:(tmp OR log OR ini)
false_positives:
- File sync clients during bulk sync
tags:
- ransomware
- encryption
- critical
author: TDL
created: '2024-03-01'
test_method: synthetic
last_modified: '2026-04-27'

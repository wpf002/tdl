rule_id: TDL-IMP-002
name: Shadow Copy Deletion via vssadmin or wmic
tactic: Impact
tactic_id: TA0040
technique_id: T1490
technique_name: Inhibit System Recovery
platform:
- Windows
data_sources:
- Windows Security Event Log (4688)
- Sysmon Event ID 1
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 100
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4688")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4688")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4688')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_imp_002 {
      meta:
        author = "TDL"
        description = "Shadow Copy Deletion via vssadmin or wmic"
        severity = "CRITICAL"
        tactic = "TA0040"
        technique = "T1490"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4688)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4688")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4688])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4688)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4688")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4688)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4688")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Authorized backup solutions managing shadow storage
tags:
- vss
- shadow-copy
- ransomware
- critical
author: TDL
created: '2024-03-01'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host(s) affected, scope of impact (count of files / accounts / services).'
- Inspect the file path, file hash, parent process, and any prior network/email delivery — characterize the destructive action
  (encrypt, delete, lockout, disable, reboot).
- 'Determine spread: is this a single host or a coordinated multi-host event? Pull file / service telemetry across the fleet.'
- Trigger your major-incident bridge if scope is multi-host or business-critical — early activation buys time.
- 'Decide TP / FP: FP only if a sanctioned destructive action (DR test, decommission) is documented; default to TP at this
  severity.'
- 'If TP: execute your IR runbook — isolate, preserve evidence, restore from backup if appropriate, hunt for adversary persistence
  to prevent recurrence.'

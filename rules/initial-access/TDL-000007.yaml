rule_id: TDL-AUTH-000007
v4_id: '000007'
name: Multiple MFA Push Rejections Detected
description: Detects a fatigue attack or MFA push spam by sending multiple push notifications to a target user. This could
  indicate that the end users credentials are compromised and the attacker is attempting to authenticate by sending multiple
  notifications to users
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Azure
- Okta
data_sources:
- Okta
- Duo
- Azure
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    (index=okta sourcetype="OktaIM2:log" eventType="user.mfa.okta_verify.deny_push")
    OR (index=azure sourcetype="azure:aad:signin" "properties.status.errorCode"=500121)
    | eval user=coalesce('actor.alternateId','properties.userPrincipalName')
    | eval src_ip=coalesce('client.ipAddress','properties.ipAddress')
    | bin _time span=5m
    | stats count, values(src_ip) as src_ips by user, _time
    | where count >= 5
    | sort - count
  kql: |
    union
      (SigninLogs
        | where ResultType == "500121"
        | extend User = UserPrincipalName, SrcIp = IPAddress),
      (OktaSSO_CL
        | where eventType_s == "user.mfa.okta_verify.deny_push"
        | extend User = actor_alternateId_s, SrcIp = client_ipAddress_s)
    | where TimeGenerated > ago(1h)
    | summarize Count = count(), SrcIps = make_set(SrcIp) by User, bin(TimeGenerated, 5m)
    | where Count >= 5
    | order by Count desc
  aql: |
    SELECT username, sourceip, COUNT(*) as deny_count
    FROM events
    WHERE (
      (LOGSOURCETYPENAME(devicetype) ILIKE '%Okta%' AND "eventType" = 'user.mfa.okta_verify.deny_push')
      OR (LOGSOURCETYPENAME(devicetype) ILIKE '%Azure Active Directory%' AND "errorCode" = '500121')
    )
    GROUP BY username
    HAVING COUNT(*) >= 5
    LAST 5 MINUTES
  yara_l: |
    rule tdl_auth_000007_mfa_push_rejection_burst {
      meta:
        author = "TDL"
        description = "Multiple MFA Push Rejections Detected"
        severity = "LOW"
        tactic = "TA0001"
        technique = "T1078"
      events:
        (
          $e.metadata.product_name = "Okta"
          and $e.metadata.product_event_type = "user.mfa.okta_verify.deny_push"
        ) or (
          $e.metadata.product_name = "Azure AD"
          and $e.security_result.action_details = /500121/
        )
        $user = $e.principal.user.userid
      match:
        $user over 5m
      outcome:
        $count = count_distinct($e.metadata.id)
      condition:
        $count >= 5
    }
  esql: |
    FROM logs-okta*,logs-azure.signinlogs*
    | WHERE @timestamp > NOW() - 5 minutes
    | WHERE event.action == "user.mfa.okta_verify.deny_push"
         OR azure.signinlogs.properties.status.error_code == "500121"
    | EVAL user = COALESCE(okta.actor.alternate_id, azure.signinlogs.properties.user_principal_name)
    | STATS deny_count = COUNT(*) BY user
    | WHERE deny_count >= 5
    | SORT deny_count DESC
  leql: |
    where(
      (logset="Okta" AND eventType=user.mfa.okta_verify.deny_push)
      OR (logset="Azure AD Sign-In" AND errorCode=500121)
    )
    groupby(user)
    calculate(count)
    having(count >= 5)
    timeslice(5m)
  crowdstrike: |
    (#vendor=okta eventType="user.mfa.okta_verify.deny_push")
    OR (#vendor=microsoft properties.status.errorCode=500121)
    | user := if(#vendor="okta", actor.alternateId, properties.userPrincipalName)
    | groupBy([user, bucket(span=5m)], function=count())
    | _count >= 5
    | sort(_count, order=desc)
  xql: |
    dataset in (okta_raw, msft_azure_ad_signinlogs_raw)
    | filter (event_type = "user.mfa.okta_verify.deny_push")
          or (action_evtlog_message contains "500121")
    | comp count() as fail_count by actor_effective_username, bin(_time, 5m)
    | filter fail_count >= 5
    | sort desc fail_count
  lucene: |
    (event.dataset:"okta.system" AND okta.event_type:"user.mfa.okta_verify.deny_push")
    OR (event.dataset:"azure.signinlogs" AND azure.signinlogs.properties.status.error_code:"500121")
  sumo: |
    (_sourceCategory=*okta* AND _raw="*user.mfa.okta_verify.deny_push*")
    OR (_sourceCategory=*azure*signin* AND _raw="*\"errorCode\":500121*")
    | parse "\"alternateId\":\"*\"" as okta_user nodrop
    | parse "\"userPrincipalName\":\"*\"" as az_user nodrop
    | if(!isEmpty(okta_user), okta_user, az_user) as user
    | timeslice 5m
    | count by user, _timeslice
    | where _count >= 5
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '5 Okta Event

  Where the Event Type is "user.mfa.okta_verify.deny_push"

  With the same Source Username

  Within 5 minutes


  5 Azure Event

  Where the Event is [Sign-in activity]

  Where the Failure Code is [500121]

  Where the Failure Reason is [mfa denied; user declined the authentication]'
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on to assess whether the entry
  vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-AUTH-000008
v4_id: 000008
name: HVT Password Guessing
description: Detects a potential password guessing attack against an admin account from a single source.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Linux
- Windows
data_sources:
- Windows Active Directory
- Linux Operating System
- 'Event IDs: 4625, 4776'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=linux

    | bucket _time span=4m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'Syslog

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 4m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid IN (4625, 4776)\n  AND INOFFSET(starttime, LAST 14400 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    HAVING event_count >= 5\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000008 {\n  meta:\n    author = \"TDL\"\n    description = \"HVT Password Guessing\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.metadata.product_event_type = \"4625\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 4h\n\n  condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-system.syslog*,logs-auditd*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4625'', ''4776'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 4h)

    | WHERE event_count >= 5

    | SORT event_count DESC'
  leql: 'where(event_id IN [4625, 4776])

    groupby(source_ip, username, hostname)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4625 OR EventCode=4776

    | stats count as events by ComputerName, UserName

    | where events >= 5'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4625, 4776)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as event_count by hostname, actor_effective_username

    | filter event_count >= 5

    | fields hostname, actor_effective_username, event_count'
  lucene: event_id:(4625 OR 4776)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "5 Windows Authentication Failure events \nFrom the same internal Source and the same internal Destination host\n\
  Where the Event ID is in [529, 4625, 680, 681, 4776]\nWhere the Failure Code is \"0xC000006A\"\nWhere the Destination Username\
  \ is on the High Value Target Accounts List\nWhere the source IP/host is NOT on the Mail Server List\nWhere the source IP/host\
  \ is NOT on the Central Authentication Server List\nWhere the Source IP/Hostname is NOT on the Vulnerability Scanner List\n\
  Where the  Destination Username is NOT on the Password Reset Exclusion List - 4 hours\nWith the same Destination Username\
  \ and Event ID\nWithin 3 minutes"
suppression:
  window: 12 hours
  fields:
  - Source IP
  - Source Host
tuning_period: 7 days

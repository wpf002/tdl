rule_id: TDL-AUTH-000011
v4_id: '000011'
name: Service Account Login with Cleartext Password
description: Detects a logon to a Windows service account where the password was sent in clear text. This identifies when
  the service account is authenticating using an insecure method.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Windows Active Directory
- 'Event IDs: 4624'
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=windows

    | where (EventCode=4624 OR EventCode=4624)

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4624, 4624)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT username, hostname, QIDNAME(qid) AS event_name, eventid\nFROM events\nWHERE eventid IN (1102, 104)\n  AND INOFFSET(starttime,\
    \ LAST 86400 SECONDS)\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000011 {\n  meta:\n    author = \"TDE\"\n    description = \"Service Account Login with Cleartext\
    \ Password\"\n    severity = \"LOW\"\n    tactic = \"TA0005\"\n    technique = \"T1070.001\"\n\n  events:\n    $log_clear.metadata.event_type\
    \ = \"SYSTEM_AUDIT_LOG_WIPE\"\n    ($log_clear.metadata.product_event_type = \"1102\" or\n     $log_clear.metadata.product_event_type\
    \ = \"104\")\n    $log_clear.principal.hostname = $host\n\n  match:\n    $host over 24h\n\n  condition:\n    #log_clear\
    \ >= 1\n\n  outcome:\n    $risk_score = max(90)\n}"
  esql: 'FROM logs-system.security*,logs-system.system*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("1102", "104")

    | KEEP host.name, winlog.event_data.SubjectUserName, event.code, @timestamp

    | SORT @timestamp DESC'
  leql: 'where(event_id IN [1102, 104])

    groupby(hostname)

    calculate(count AS clear_count)'
  crowdstrike: 'event_simpleName=SecurityLogCleared OR event_simpleName=EventLogCleared

    | table ComputerName, UserName, EventCode, ContextTimeStamp

    | sort -ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter action_evtlog_event_id in (1102, 104)

    | fields hostname, actor_effective_username, action_evtlog_event_id, _time

    | sort desc _time'
  lucene: event_id:(1102 OR 104)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Windows Authentication Success Event\nWhere the Event ID is in [528, 540, 4624]\nWhere the Logon Type is\
  \ 8\nOR\n\tWhere the Destination Username is on the Service Account List\n\tWhere the Destination Username matches the Service\
  \ Account Naming Convention\nWhere Logon Process is NOT [Advapi]"
suppression:
  window: 24 hours
  fields:
  - Source IP
  - Source Host
tuning_period: 7 days

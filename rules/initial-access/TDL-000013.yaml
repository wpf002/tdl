rule_id: TDL-AUTH-000013
v4_id: '000013'
name: Local Admin Created
description: Detects when a user is added to a local admin group to locally escalate privileges.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1136
technique_name: Create Account
platform:
- Linux
- Windows
data_sources:
- Windows Active Directory
- Linux Operating System
- 'Event IDs: 4720, 4722, 4728, 4732, 4756'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=linux

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'Syslog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid IN (4720, 4722, 4728, 4732, 4756)\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username,\
    \ hostname, QIDNAME(qid)\n\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000013 {\n  meta:\n    author = \"TDL\"\n    description = \"Local Admin Created\"\n    severity =\
    \ \"LOW\"\n    tactic = \"TA0001\"\n    technique = \"T1136\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.metadata.product_event_type = \"4720\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-system.syslog*,logs-auditd*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4720'', ''4722'', ''4728'', ''4732'', ''4756'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4720, 4722, 4728, 4732, 4756])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4720 OR EventCode=4722 OR EventCode=4728 OR EventCode=4732

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4720, 4722, 4728, 4732)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4720 OR 4722 OR 4728 OR 4732 OR 4756)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1136*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Windows User Created Event\nWhere the Event ID is in [624, 4720, 626, 4722]\nWhere the Destination User Domain\
  \ is NOT in the Company AD Domains List\n\nFollowed By\n\n1 Windows User Added to Security Group Event\nWhere the Event\
  \ ID is in [632, 4728, 636, 4732, 660, 4756]\nOR\n          Where the Group Name is \"Administrator\"\n\n          Where\
  \ the Group Name is in the Local Admin Group List\n\nWhere the Group Domain is NOT in the Company AD Domains List\nWith\
  \ the same Destination Username from the previous event\t\nWithin 5 minutes"
suppression:
  window: 24 hours
  fields:
  - Destination Host
  - Destination Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- "Examine the parent \u2192 child process tree, command line arguments, and code-signing status to assess whether the entry\
  \ vector is consistent with this technique."
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

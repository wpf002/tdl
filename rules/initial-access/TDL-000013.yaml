rule_id: TDL-AUTH-000013
v4_id: '000013'
name: Local Admin Created
description: Detects when a user is added to a local admin group to locally escalate privileges.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1136
technique_name: Create Account
platform:
- Linux
- Windows
data_sources:
- Windows Active Directory
- Linux Operating System
- 'Event IDs: 4720, 4722, 4728, 4732, 4756'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4720", "4722", "4728", "4732", "4756")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4720", "4722", "4728", "4732", "4756")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4720', '4722', '4728', '4732', '4756')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_auth_000013 {
      meta:
        author = "TDL"
        description = "Local Admin Created"
        severity = "LOW"
        tactic = "TA0001"
        technique = "T1136"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4720|4722|4728|4732|4756)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4720", "4722", "4728", "4732", "4756")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4720, 4722, 4728, 4732, 4756])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4720, 4722, 4728, 4732, 4756)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4720", "4722", "4728", "4732", "4756")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4720 OR 4722 OR 4728 OR 4732 OR 4756)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4720", "4722", "4728", "4732", "4756")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Windows User Created Event\nWhere the Event ID is in [624, 4720, 626, 4722]\nWhere the Destination User Domain\
  \ is NOT in the Company AD Domains List\n\nFollowed By\n\n1 Windows User Added to Security Group Event\nWhere the Event\
  \ ID is in [632, 4728, 636, 4732, 660, 4756]\nOR\n          Where the Group Name is \"Administrator\"\n\n          Where\
  \ the Group Name is in the Local Admin Group List\n\nWhere the Group Domain is NOT in the Company AD Domains List\nWith\
  \ the same Destination Username from the previous event\t\nWithin 5 minutes"
suppression:
  window: 24 hours
  fields:
  - Destination Host
  - Destination Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the parent → child process tree, command line arguments, and code-signing status to assess whether the entry vector
  is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-AUTH-000016
v4_id: '000016'
name: Privileged Account Created with Abnormal Name
description: Detects when an account username that is outside of the privilged user naming convention is added to a security
  enabled group
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4728, 4732, 4756'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4728 OR EventCode=4732 OR EventCode=4756 OR EventCode=4728)

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4728, 4732, 4756, 4728)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid IN (4728, 4732, 4756)\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname,\
    \ QIDNAME(qid)\n\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000016 {\n  meta:\n    author = \"TDE\"\n    description = \"Privileged Account Created with Abnormal\
    \ Name\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4728\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4728'', ''4732'', ''4756'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4728, 4732, 4756])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4728 OR EventCode=4732 OR EventCode=4756

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4728, 4732, 4756)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4728 OR 4732 OR 4756)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Windows User Added to Security Group Event\nWhere the Event ID is in [632, 4728, 636, 4732, 660, 4756] \n\
  Where the Group Name is in the High Value Target Groups List\nWhere the Destination Username does NOT match the Admin/Privileged\
  \ User Naming Convention"
suppression:
  window: 12 hours
  fields:
  - Source Username
tuning_period: 7 days

rule_id: TDL-AUTH-000023
v4_id: '000023'
name: Impossible Travel Login Detected
description: Detects when a user successfully logs in from 2 locations where the user would have to be Superman to travel
  that fast.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- AWS
- Microsoft 365
data_sources:
- VPN
- Office 365
- AWS GuardDuty
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | bucket _time span=5m

    | stats count by src_ip, Account_Name, _time

    | where count >= 2

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SigninLogs

    | where TimeGenerated >= ago(1d)

    | where ResultType == 0

    | summarize Locs = make_set(Location) by UserPrincipalName, bin(TimeGenerated, 1h)

    | where array_length(Locs) >= 2

    | project TimeGenerated, UserId, ClientIP, Operation, OfficeWorkload'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000023 {\n  meta:\n    author = \"TDL\"\n    description = \"Impossible Travel Login Detected\"\n\
    \    severity = \"HIGH\"\n    tactic = \"TA0001\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 2\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-azure*,logs-o365*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 2

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 2)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 2

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 2\n| fields hostname,\
    \ actor_effective_username, event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*vpn* OR _sourceCategory=*o365* OR _sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "2 Successful Login Events\nFrom multiple sources\nWith the same Destination Username\nWhere the Distance Traveled\
  \ speed required is greater than 925 kph\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 O365 ATP Alert\nWhere the alert name is \"Impossible travel activity\"\n\n\n---------------------------------------------------------------------------------------------------------------\n\
  \n1 Guard Duty Event \nWhere the Event Type is in [\"UnauthorizedAccess:IAMUser/ConsoleLoginSuccess.B\"]"
suppression:
  window: 8 hours
  fields:
  - Destination Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on to assess whether the entry
  vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

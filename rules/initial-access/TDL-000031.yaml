rule_id: TDL-AUTH-000031
v4_id: '000031'
name: Successful Remote Brute Force
description: This rule is designed to detect a login success from a source that has been previously flagged for Remote Password
  Guessing, this may indicate an attacker successfully guessed a users password.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- AWS
- Azure
- Microsoft 365
data_sources:
- VPN
- Azure AD
- Office 365
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | bucket _time span=3m

    | stats count as failures, dc(Account_Name) as unique_users by _time, IpAddress

    | where failures >= 10

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SigninLogs

    | where TimeGenerated >= ago(1d)

    | summarize Failures = count(), UniqueAccounts = dcount(TargetUserName) by IpAddress, bin(TimeGenerated, 3m)

    | where Failures >= 10

    | project TimeGenerated, UserPrincipalName, IPAddress, Location, ResultType'
  aql: "SELECT username, sourceip, COUNT(*) AS failure_count, UNIQUECOUNT(username) AS unique_accounts\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n  AND eventid IN (4625, 529, 4776)\n  AND INOFFSET(starttime, LAST\
    \ 180 SECONDS)\nGROUP BY sourceip\nHAVING unique_accounts >= 10 AND (failure_count / unique_accounts) <= 3\nORDER BY failure_count\
    \ DESC\nSTART '2026-04-27 00:00:00'"
  yara_l: "rule zs_auth_000031 {\n  meta:\n    author = \"TDL\"\n    description = \"Successful Remote Brute Force\"\n   \
    \ severity = \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1078\"\n\n  events:\n    $login.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $login.metadata.product_name = \"Windows\"\n    $login.security_result.action = \"BLOCK\"\n  \
    \  $login.principal.ip = $src_ip\n    $login.target.user.userid = $user\n\n  match:\n    $src_ip over 3m\n\n  condition:\n\
    \    #login > 10 and\n    #user > 8\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-azure*,logs-o365*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("4625", "529")

    | STATS failure_count = COUNT(*), unique_accounts = COUNT_DISTINCT(winlog.event_data.TargetUserName) BY source.ip, @timestamp
    = BUCKET(@timestamp, 3m)

    | WHERE unique_accounts >= 10

    | EVAL ratio = failure_count / unique_accounts

    | WHERE ratio <= 3

    | SORT failure_count DESC'
  leql: 'where(event_id IN [4625, 529] AND logset = "Active Directory")

    groupby(source_ip)

    calculate(unique_count:destination_account AS unique_accounts)

    calculate(count AS total_failures)

    having(unique_accounts >= 10)

    having(total_failures / unique_accounts <= 3)'
  crowdstrike: 'event_simpleName=UserLogonFailed2

    | stats count(TargetUserName) as failures, dc(TargetUserName) as unique_accounts by RemoteIP

    | where unique_accounts >= 10 AND failures/unique_accounts <= 3

    | sort -unique_accounts'
  xql: 'dataset = cloud_audit_log

    | filter event_type = "CLOUD" and action_evtlog_event_id = 4625

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as failure_count, dc(actor_effective_username) as unique_accounts by src_ip

    | filter unique_accounts >= 10

    | fields src_ip, failure_count, unique_accounts'
  lucene: 'event_id:(4625 OR 529) AND log_source_type:"Windows Security"

    AND NOT user_name:("ANONYMOUS LOGON" OR "*$")'
  sumo: '_sourceCategory=*vpn* OR _sourceCategory=*azure* OR _sourceCategory=*o365* OR _sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "10 Remote Authentication Failure events\nFrom 1 external source to the same destination\nWith the same Source\
  \ IP and Destination Username\nWithin 3 minutes\n\nFollowed By\n\n1 Successful Remote Login Event\nWith the same Source\
  \ IP and Destination Username from the previous event\nWithin 15 minutes\n\n\n---------------------------------------------------------------------------------\n\
  \n1 Guard Duty Event \nWhere the Event Type is in [\"Impact:EC2/WinRMBruteForce\", \"UnauthorizedAccess:EC2/RDPBruteForce\"\
  , \"UnauthorizedAccess:EC2/SSHBruteForce\"]\n\nFollowed By \n\n1 AWS CloudTrail Events\nFrom the same Source IP\nWhere the\
  \ Event ID is \"ConsoleLogin\"\nWhere the User Type (userIdentity.type) is \"IAMUser\"\nWhere the Result (responseElements.ConsoleLogin)\
  \ is \"Success\"\nWith the same Source IP and Source Username\nWithin 15 minutes"
suppression:
  window: 12 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on to assess whether the entry
  vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-AUTH-000036
v4_id: '000036'
name: Password Spraying
description: Detects a potential password spraying attack against Windows accounts. Attackers may have gathered a list of
  user accounts and could be attempting to use common passwords against each one in order to compromise the accounts.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Linux
- Windows
data_sources:
- Windows Operating System
- Linux Operating System
- 'Event IDs: 4625'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=linux

    | bucket _time span=3m

    | stats count as failures, dc(Account_Name) as unique_users by _time, IpAddress

    | where failures >= 10

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'Syslog

    | where TimeGenerated >= ago(1d)

    | summarize Failures = count(), UniqueAccounts = dcount(TargetUserName) by IpAddress, bin(TimeGenerated, 3m)

    | where Failures >= 10

    | project TimeGenerated, Computer, Account, Activity'
  aql: "SELECT username, sourceip, COUNT(*) AS failure_count, UNIQUECOUNT(username) AS unique_accounts\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n  AND eventid IN (4625, 529, 4776)\n  AND INOFFSET(starttime, LAST\
    \ 180 SECONDS)\nGROUP BY sourceip\nHAVING unique_accounts >= 10 AND (failure_count / unique_accounts) <= 3\nORDER BY failure_count\
    \ DESC\nSTART '2026-04-27 00:00:00'"
  yara_l: "rule zs_auth_000036 {\n  meta:\n    author = \"TDE\"\n    description = \"Password Spraying\"\n    severity = \"\
    LOW\"\n    tactic = \"TA0006\"\n    technique = \"T1078\"\n\n  events:\n    $login.metadata.event_type = \"USER_LOGIN\"\
    \n    $login.metadata.product_name = \"Windows\"\n    $login.security_result.action = \"BLOCK\"\n    $login.principal.ip\
    \ = $src_ip\n    $login.target.user.userid = $user\n\n  match:\n    $src_ip over 3m\n\n  condition:\n    #login > 10 and\n\
    \    #user > 8\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-system.syslog*,logs-auditd*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("4625", "529")

    | STATS failure_count = COUNT(*), unique_accounts = COUNT_DISTINCT(winlog.event_data.TargetUserName) BY source.ip, @timestamp
    = BUCKET(@timestamp, 3m)

    | WHERE unique_accounts >= 10

    | EVAL ratio = failure_count / unique_accounts

    | WHERE ratio <= 3

    | SORT failure_count DESC'
  leql: 'where(event_id IN [4625, 529] AND logset = "Active Directory")

    groupby(source_ip)

    calculate(unique_count:destination_account AS unique_accounts)

    calculate(count AS total_failures)

    having(unique_accounts >= 10)

    having(total_failures / unique_accounts <= 3)'
  crowdstrike: 'event_simpleName=UserLogonFailed2

    | stats count(TargetUserName) as failures, dc(TargetUserName) as unique_accounts by RemoteIP

    | where unique_accounts >= 10 AND failures/unique_accounts <= 3

    | sort -unique_accounts'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id = 4625

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as failure_count, dc(actor_effective_username) as unique_accounts by src_ip

    | filter unique_accounts >= 10

    | fields src_ip, failure_count, unique_accounts'
  lucene: 'event_id:(4625 OR 529) AND log_source_type:"Windows Security"

    AND NOT user_name:("ANONYMOUS LOGON" OR "*$")'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "5 Windows Authentication Failure Events \nFrom the same internal Source IP to the same Destination\nWhere the\
  \ Event ID in [529, 4625]\nWhere the Failure Code is \"0xC000006A\"\nWhere the Destination Username does NOT end with \"\
  $\" \nWhere the Destination IP/Hostname is NOT on the Domain Controller List \nWhere the Source IP/Hostname is NOT on a\
  \ Mail Server List \nWhere the Source IP/Hostname is NOT on a Central Authentication Server List \nWith unique Destination\
  \ Usernames \nWith the same Event ID \nWithin 3 minutes \n\n---------------------------------------------------------------------------------------------------------------\n\
  \n5 Failed Authentication Events \nFrom the same internal Source IP to the same Destination\nWhere the Destination Username\
  \ does NOT end with \"$\" \nWhere the Source IP/Hostname is NOT on a Mail Server List \nWhere the Source IP/Hostname is\
  \ NOT on a Central Authentication Server List \nWith unique Destination Usernames\nWithin 3 minutes"
suppression:
  window: 24 hours
  fields:
  - Source IP
  - Source Hostname
tuning_period: 7 days

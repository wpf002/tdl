rule_id: TDL-AUTH-000040
v4_id: '000040'
name: Password Spraying - Domain Controller
description: Detects a potential password spraying attack against Windows accounts. Attackers may have gathered a list of
  user accounts and could be attempting to use common passwords against each one in order to compromise the accounts. Authentications
  relayed to a domain controller do not log the true source host, so the password attack cannot be traced back to a particular
  host. However, a high volume of authentication failures to a single host to the domain controller can be used as an indicator.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4625, 4768, 4771'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("4625", "4768", "4771")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("4625", "4768", "4771")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('4625', '4768', '4771')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_auth_000040 {
      meta:
        author = "TDL"
        description = "Password Spraying - Domain Controller"
        severity = "LOW"
        tactic = "TA0001"
        technique = "T1078"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(4625|4768|4771)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("4625", "4768", "4771")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [4625, 4768, 4771])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (4625, 4768, 4771)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("4625", "4768", "4771")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(4625 OR 4768 OR 4771)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("4625", "4768", "4771")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "10 Windows Authentication Failure Events \nFrom the same internal Source IP to the same Destination\nWhere\
  \ the Event ID in [529, 4625, 676, 4768, 675, 4771]\nWhere the Failure Code is in [0xC000006A, 0x18]\nWhere the Destination\
  \ IP/Hostname is on the Domain Controller List \nWhere the Destination Username does NOT end with \"$\" \nWhere the Source\
  \ IP/Hostname is NOT on a Mail Server List \nWhere the Source IP/Hostname is NOT on the Domain Controller List\nWhere the\
  \ Source IP/Hostname is NOT on a Central Authentication Server List \nWith unique Destination Usernames \nWith the same\
  \ Event ID \nWithin 3 minutes"
suppression:
  window: 24 hours
  fields:
  - Source IP
  - Source Hostname
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user to assess whether the entry
  vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-AUTH-000085
v4_id: 000085
name: HTTP Traffic Pattern to Threat Domains
description: Detects when a single IP connects to multiple known malicious domains. This could be an indicator of an infected
  host.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1189
technique_name: Drive-by Compromise
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |-
    index=network
    | bucket _time span=20m
    | stats count by src_ip, Account_Name, _time
    | where count >= 5
    | table _time, host, user, _raw
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 20m)
    | where Count >= 5
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 1200 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000085 {
      meta:
        author = "TDE"
        description = "HTTP Traffic Pattern to Threat Domains"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1189"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 20m

      condition:
        #event >= 5

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 20m)
    | WHERE event_count >= 5
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 5)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 5
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  5 Forward Proxy Events
  Where the Destination Domain is on a Threat Intelligence List
  With the same Source IP
  With unique Destination Domains
  Within 20 minutes
suppression:
  window: 12 hours
tuning_period: 7 days

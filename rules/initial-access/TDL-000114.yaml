rule_id: TDL-AUTH-000114
v4_id: '000114'
name: Modifications to Domain Groups
description: A report that provides visibility into modifications made to domain groups by unauthorized users.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1098
technique_name: Account Manipulation
platform:
- Linux
- Windows
data_sources:
- Windows Operating System
- Linux Operating System
- 'Event IDs: 4735, 4737, 4757'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=linux

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'Syslog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid IN (4735, 4737, 4757)\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname,\
    \ QIDNAME(qid)\n\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000114 {\n  meta:\n    author = \"TDE\"\n    description = \"Modifications to Domain Groups\"\n  \
    \  severity = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1098\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4735\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-system.syslog*,logs-auditd*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4735'', ''4737'', ''4757'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4735, 4737, 4757])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4735 OR EventCode=4737 OR EventCode=4757

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4735, 4737, 4757)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4735 OR 4737 OR 4757)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Windows Group Modified Event

  Where the Event ID is in [639, 4735, 641, 4737, 661, 4757]'
tuning_period: 7 days

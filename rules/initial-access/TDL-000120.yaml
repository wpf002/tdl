rule_id: TDL-AUTH-000120
v4_id: '000120'
name: Mass Account Lockouts
description: Detects when a large amount of user accounts are locked out which could be indicative of an enterprise wide password
  spraying attack. Attackers could try multiple user accounts and lock them out, which could be malicious activity or an attempt
  to learn the lockout policy of the organization.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1531
technique_name: Account Access Removal
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4740'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4740 OR EventCode=4740)

    | bucket _time span=10m

    | stats count by src_ip, Account_Name, _time

    | where count >= 25

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4740, 4740)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 10m)

    | where Count >= 25

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4740\n  AND INOFFSET(starttime, LAST 600 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    HAVING event_count >= 25\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000120 {\n  meta:\n    author = \"TDE\"\n    description = \"Mass Account Lockouts\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1531\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.metadata.product_event_type = \"4740\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 10m\n\n  condition:\n    #event >= 25\n\n  outcome:\n    $risk_score = max(50)\n\
    }"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4740'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 10m)

    | WHERE event_count >= 25

    | SORT event_count DESC'
  leql: 'where(event_id IN [4740])

    groupby(source_ip, username, hostname)

    calculate(count AS event_count)

    having(event_count >= 25)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4740

    | stats count as events by ComputerName, UserName

    | where events >= 25'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4740)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as event_count by hostname, actor_effective_username

    | filter event_count >= 25

    | fields hostname, actor_effective_username, event_count'
  lucene: event_id:(4740)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '25 Windows Account Locked Out Events

  Where the Event ID is in [644, 4740]

  With unique Destination Usernames

  With the same Event ID

  Within 10 mins


  ---------------------------------------------------------------------------------------------------------------


  25 User Account Locked Out Events

  With unique Destination Usernames

  With the same Event ID

  Within 10 mins'
suppression:
  window: 12 hours
tuning_period: 7 days

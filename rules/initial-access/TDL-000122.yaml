rule_id: TDL-AUTH-000122
v4_id: '000122'
name: NTLM Authentication Attempt from Suspicious Host
description: Detects a NTLM Authentication where the source host does not match the
  source of the authentication
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Windows Security Event Log
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4624", "4625", "4768", "4769", "4776")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4624", "4625", "4768", "4769", "4776")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4624', '4625', '4768', '4769', '4776')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_auth_000122 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"NTLM Authentication Attempt from Suspicious Host\"\n    severity = \"MEDIUM\"\
    \n    tactic = \"TA0001\"\n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $e.event_id = /(4624|4625|4768|4769|4776)/\n    $user\
    \ = $e.target.user.userid\n  match:\n    $user over 30m\n  condition:\n    $e\n\
    }\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4624", "4625", "4768",
    "4769", "4776")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4624, 4625, 4768, 4769, 4776])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4624, 4625, 4768, 4769, 4776)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4624", "4625", "4768", "4769",
    "4776")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4624 OR 4625 OR 4768 OR 4769
    OR 4776)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4624", "4625", "4768", "4769", "4776")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender,
  URL), and the matched IOC.'
- Examine the source IP, geo / ASN, authentication method, and prior sign-in pattern
  for the user to assess whether the entry vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes
  around the alert for related delivery activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access
  events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned
  vendor onboarding, marketing campaign, pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic
  artifacts, and open an incident ticket referencing this rule_id.'
pseudo_logic: '1 or more instances within any observed window of Windows Security
  authentication events.


  From index=windows sourcetype="WinEventLog:Security"

  Where event_id is one of: 4624 (successful logon), 4625 (failed logon), 4768 (Kerberos
  TGT request), 4769 (Kerberos service ticket request), or 4776 (NTLM credential validation)

  With the host field collected as a multi-value list (hosts) to identify mismatches
  between the originating host and the authenticating source

  Where count is greater than or equal to 1

  With the same user, IpAddress, LogonType, and EventCode as the correlation key

  Deduplication and ranking applied by sorting on count descending to surface the
  highest-frequency mismatches first'

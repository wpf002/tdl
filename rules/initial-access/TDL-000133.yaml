rule_id: TDL-AUTH-000133
v4_id: '000133'
name: AWS Unauthorized Action Attempts
description: Detects an AWS account that has been blocked from performing multiple actions due to security permissions. An
  attacker with a compromised account may not know the account’s permissions and will attempt abusive activities, which may
  be blocked due to insufficient privileges.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1098
technique_name: Account Manipulation
platform:
- AWS
data_sources:
- AWS CloudTrail
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |-
    index=aws sourcetype=aws:cloudtrail
    | bucket _time span=1m
    | stats count by src_ip, Account_Name, _time
    | where count >= 3
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    AWSCloudTrail
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)
    | where Count >= 3
    | project TimeGenerated, Computer, Account, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 60 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000133 {
      meta:
        author = "TDE"
        description = "AWS Unauthorized Action Attempts"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1098"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 1m

      condition:
        #event >= 3

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-aws.cloudtrail*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 1m)
    | WHERE event_count >= 3
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 3)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 3
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 3\n| fields hostname,\
    \ actor_effective_username, event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  3 AWS CloudTrail events
  Where the Event Type is AwsApiCall
  Where the User Type (userIdentity.type) is "IAMUser"
  Where the Error_code is in [AccessDenied, UnauthorizedOperation]
  Within 1 minute
suppression:
  window: 12 hours
tuning_period: 7 days

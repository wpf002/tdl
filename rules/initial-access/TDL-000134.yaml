rule_id: TDL-AUTH-000134
v4_id: '000134'
name: AWS Root Account Used
description: Detects when the default AWS root account is used. The root account is first created with the AWS subscription
  account and has the highest privileges. It is recommended to immediately create a separate administrative account instead
  of using root, as normal usage of root can make the account more vulnerable to compromise. Utilizing a separate administrative
  account will also aid in forensics of any incident that were to occur.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1098
technique_name: Account Manipulation
platform:
- AWS
data_sources:
- AWS CloudTrail
- AWS GuardDuty
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |-
    index=aws sourcetype=aws:cloudtrail
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    AWSCloudTrail
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000134 {
      meta:
        author = "TDL"
        description = "AWS Root Account Used"
        severity = "HIGH"
        tactic = "TA0001"
        technique = "T1098"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-aws.cloudtrail*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 AWS CloudTrail Event\nWhere the User Type {userIdentity.type} is Root\nWhere the Parent Process {userIdentity.invokedBy}\
  \ name is NULL\nWhere the Event Type is NOT \"AwsServiceEvent\"\n\n\n-----------------------------------------------------------------------------------------\n\
  \n1 Guard Duty Event \nWhere the Event Type is in [\"Policy:IAMUser/RootCredentialUsage\", \"Policy:IAMUser/ShortTermRootCredentialUsage\"\
  ]"
suppression:
  window: 8 hours
tuning_period: 7 days

rule_id: TDL-AUTH-000167
v4_id: '000167'
name: External Reconnaissance Followed by VPN Authentication
description: This rule is designed to track external reconnaissance and when any previously flagged IP is spotted attempting
  to make remote login.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1595
technique_name: Active Scanning
platform:
- Network
data_sources:
- Firewall
- VPN
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: |-
    CommonSecurityLog
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000167 {
      meta:
        author = "TDE"
        description = "External Reconnaissance Followed by VPN Authentication"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1595"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 Port Scan Detected - Inbound, Service Discovery - Inbound, Vulnerability Scan - Inbound, OR Vulnerability Sweep - Inbound Event

  Followed By

  1 Successful VPN Authentication Event
  With the same Source IP from the previous event
  Within 7 Days
suppression:
  window: 12 hours
tuning_period: 7 days

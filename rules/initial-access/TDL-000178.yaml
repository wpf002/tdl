rule_id: TDL-AUTH-000178
v4_id: 000178
name: AWS Privilege Escalation via Group Policy
description: Detects an attacker escalating the privileges of an attacker attaching a policy to a group. If the attacker belongs
  to the group, the added permissions will grant escalated privileges.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- AWS
data_sources:
- AWS CloudTrail
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'AWSCloudTrail

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000178 {\n  meta:\n    author = \"TDL\"\n    description = \"AWS Privilege Escalation via Group Policy\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-aws.cloudtrail*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*aws*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 AWS APICall Event\nWhere the Event Name is in [AttachGroupPolicy, PutGroupPolicy]\nWhere Policy ARN is Client\
  \ HVT Policy\nOR \nWhere the Policy ARN is in [arn:aws:iam::aws:policy/AdministratorAccess\" or \"arn:aws:iam::aws:policy/AmazonSNSFullAccess\"\
  \ or \"arn:aws:iam::aws:policy/AmazonEC2FullAccess\" or \"arn:aws:iam::aws:policy/AmazonS3FullAccess\" or \"arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess\"\
  \ or \"arn:aws:iam::aws:policy/AWSCodeCommitPowerUser\" or \"arn:aws:iam::aws:policy/AWSKeyManagementServicePowerUser\"\
  \ or \"arn:aws:iam::aws:policy/PowerUserAccess\" or \"arn:aws:iam::aws:policy/DatabaseAdministrator\" or \"arn:aws:iam::aws:policy/NetworkAdministrator\"\
  \ or \"arn:aws:iam::aws:policy/SystemAdministrator\" or \"arn:aws:iam::aws:policy/Billing\"]"

rule_id: TDL-AUTH-000236
v4_id: '000236'
name: Webserver Command Injection Attempt
description: Detects a host attempting to call the command line on a web server to execute remote commands and if the web
  server is vulnerable to injection, an attacker can pipe commands into CMD that will be processed by the server.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1202
technique_name: Indirect Command Execution
platform:
- Windows
data_sources:
- Webserver
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000236 {\n  meta:\n    author = \"TDL\"\n    description = \"Webserver Command Injection Attempt\"\
    \n    severity = \"LOW\"\n    tactic = \"TA0001\"\n    technique = \"T1202\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1202*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Webserver Request Event\nWhere the HTTP code >= 200\nWhere the HTTP code < 400\nOR\n\n\tWhere URL contains\
  \ \"cmd.exe\"\n\t\n\tWhere URL contains \"xp_cmdshell\"\n\t\n\tWhere URL contains \"=whoami\"\n\t\n\tWhere URL contains\
  \ \"=net%20user\"\n\t\n\tWhere URL contains \"=net+user\"\n\t\n\tWhere URL contains \"=net%2buser\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/c%\"\n\t\n\tWhere URL contains \"=cmd+/c+\"\n\t\n\tWhere URL contains \"=cmd%2b/c%\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/r%\"\n\t\n\tWhere URL contains \"=cmd+/r+\"\n\t\n\tWhere URL contains \"=cmd%2b/r%\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/k%\"\n\t\n\tWhere URL contains \"=cmd+/k+\"\n\t\n\tWhere URL contains \"=cmd%2b/k%\"\n\t\n\tWhere URL contains\
  \ \"=powershell%\"\n\t\n\tWhere URL contains \"=powershell+\"\n\t\n\tWhere URL contains \"=tasklist%\"\n\t\n\tWhere URL\
  \ contains \"=tasklist+\"\n\t\n\tWhere URL contains \"=wmic%\"\n\t\n\tWhere URL contains \"=wmic+\"\n\t\n\tWhere URL contains\
  \ \"=ssh%\"\n\t\n\tWhere URL contains \"=ssh+\"\n\t\n\tWhere URL contains \"=python%\"\n\t\n\tWhere URL contains \"=python+\"\
  \n\t\n\tWhere URL contains \"=python3%\"\n\t\n\tWhere URL contains \"=python3+\"\n\t\n\tWhere URL contains \"=ipconfig\"\
  \n\t\n\tWhere URL contains \"=wget%\"\n\t\n\tWhere URL contains \"=wget+\"\n\t\n\tWhere URL contains \"=curl%\"\n\t\n\t\
  Where URL contains \"=curl+\"\n\t\n\tWhere URL contains \"=certutil\"\n\t\n\tWhere URL contains \"=copy%20%5c%5c\"\n\t\n\
  \tWhere URL contains \"=dsquery%\"\n\t\n\tWhere URL contains \"=dsquery+\"\n\t\n\tWhere URL contains \"=nltest%\"\n\t\n\t\
  Where URL contains \"=nltest+\"\n\t\n\tWhere URL contains \"&cmd=\""
suppression:
  window: 24 hours
tuning_period: 7 days

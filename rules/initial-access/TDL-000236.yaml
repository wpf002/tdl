rule_id: TDL-AUTH-000236
v4_id: '000236'
name: Webserver Command Injection Attempt
description: Detects a host attempting to call the command line on a web server to execute remote commands and if the web
  server is vulnerable to injection, an attacker can pipe commands into CMD that will be processed by the server.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1202
technique_name: Indirect Command Execution
platform:
- Windows
data_sources:
- Webserver
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("cmd.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("cmd.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('cmd.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_auth_000236 {
      meta:
        author = "TDL"
        description = "Webserver Command Injection Attempt"
        severity = "LOW"
        tactic = "TA0001"
        technique = "T1202"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(cmd.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("cmd.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [cmd.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (cmd.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("cmd.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(cmd.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("cmd.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Webserver Request Event\nWhere the HTTP code >= 200\nWhere the HTTP code < 400\nOR\n\n\tWhere URL contains\
  \ \"cmd.exe\"\n\t\n\tWhere URL contains \"xp_cmdshell\"\n\t\n\tWhere URL contains \"=whoami\"\n\t\n\tWhere URL contains\
  \ \"=net%20user\"\n\t\n\tWhere URL contains \"=net+user\"\n\t\n\tWhere URL contains \"=net%2buser\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/c%\"\n\t\n\tWhere URL contains \"=cmd+/c+\"\n\t\n\tWhere URL contains \"=cmd%2b/c%\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/r%\"\n\t\n\tWhere URL contains \"=cmd+/r+\"\n\t\n\tWhere URL contains \"=cmd%2b/r%\"\n\t\n\tWhere URL contains\
  \ \"=cmd%20/k%\"\n\t\n\tWhere URL contains \"=cmd+/k+\"\n\t\n\tWhere URL contains \"=cmd%2b/k%\"\n\t\n\tWhere URL contains\
  \ \"=powershell%\"\n\t\n\tWhere URL contains \"=powershell+\"\n\t\n\tWhere URL contains \"=tasklist%\"\n\t\n\tWhere URL\
  \ contains \"=tasklist+\"\n\t\n\tWhere URL contains \"=wmic%\"\n\t\n\tWhere URL contains \"=wmic+\"\n\t\n\tWhere URL contains\
  \ \"=ssh%\"\n\t\n\tWhere URL contains \"=ssh+\"\n\t\n\tWhere URL contains \"=python%\"\n\t\n\tWhere URL contains \"=python+\"\
  \n\t\n\tWhere URL contains \"=python3%\"\n\t\n\tWhere URL contains \"=python3+\"\n\t\n\tWhere URL contains \"=ipconfig\"\
  \n\t\n\tWhere URL contains \"=wget%\"\n\t\n\tWhere URL contains \"=wget+\"\n\t\n\tWhere URL contains \"=curl%\"\n\t\n\t\
  Where URL contains \"=curl+\"\n\t\n\tWhere URL contains \"=certutil\"\n\t\n\tWhere URL contains \"=copy%20%5c%5c\"\n\t\n\
  \tWhere URL contains \"=dsquery%\"\n\t\n\tWhere URL contains \"=dsquery+\"\n\t\n\tWhere URL contains \"=nltest%\"\n\t\n\t\
  Where URL contains \"=nltest+\"\n\t\n\tWhere URL contains \"&cmd=\""
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the parent → child process tree, command line arguments, and code-signing status to assess whether the entry vector
  is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

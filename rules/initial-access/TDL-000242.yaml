rule_id: TDL-AUTH-000242
v4_id: '000242'
name: Successful SQL Injection
description: "Detects when a SQL injection is successful in exfiltrating data from a web server\u2019s database. After an\
  \ injection attempt, the firewall session will log a large amount of bytes being sent back to the external source, indicating\
  \ a successful injection."
tactic: Initial Access
tactic_id: TA0001
technique_id: T1190
technique_name: Exploit Public-Facing Application
platform:
- Network
data_sources:
- Firewall
- IDS/IPS
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 900 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000242 {\n  meta:\n    author = \"TDL\"\n    description = \"Successful SQL Injection\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1190\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 15m\n\n\
    \  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 15m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids*

    | where technique="T1190" OR _raw matches "*T1190*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 IDS/IPS Exploit Event

  From one external source to one internal destinations (Inbound)

  Where the Signature contains case insensitive "SQL Injection"


  Followed By


  1 Firewall Event

  From one external source to one internal destinations (Inbound)

  Withe the same Source IP, Destination IP and Source Port

  Where Bytes In is greater than 10 MB

  Within 15 minutes


  ---------------------------------------------------------------------------------------------------------------


  1 WAF Event

  Where the Signature contains "SQL Injection"

  Where the Action is "Allowed"'
suppression:
  window: 12 hours
tuning_period: 7 days

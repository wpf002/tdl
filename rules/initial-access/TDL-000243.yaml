rule_id: TDL-AUTH-000243
v4_id: '000243'
name: Allowed Exploit to Vulnerable Host
description: Detects when an exploit is allowed to a host that is vulnerable to the exploits. This could indicate that the
  attacker has performed successful internal reconnaissance and is acting on that data. It will also ensure that attention
  is drawn to the vulnerable server so that necessary patches may be applied. In order to achieve this use case, we will need
  to have a list of vulnerable hosts via nessus scan or other vulnerability management servers.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1203
technique_name: Exploitation for Client Execution
platform:
- Network
data_sources:
- IDS/IPS
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=windows

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000243 {
      meta:
        author = "TDE"
        description = "Allowed Exploit to Vulnerable Host"
        severity = "HIGH"
        tactic = "TA0001"
        technique = "T1203"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 IDS/IPS Exploit Event
  From an external source to an internal destination (Inbound)
  Where the Vulnerability Scanner states that the Destination Host is vulnerable to the Signature detected

  ---------------------------------------------------------------------------------------------------------------

  1 Cisco Firepower IDS/IPS Exploit Event
  Where Where Impact equals "1"
suppression:
  window: 8 hours
tuning_period: 7 days

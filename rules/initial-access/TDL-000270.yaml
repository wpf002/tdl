rule_id: TDL-AUTH-000270
v4_id: '000270'
name: Repeat Account Lockout
description: Designed to detect multiple account lockout events for a user in a 60 minute period. Investigate the source of
  the failed logins as well as any cause of the failed logins (wrong password, process logging in)
tactic: Initial Access
tactic_id: TA0001
technique_id: T1531
technique_name: Account Access Removal
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4740'
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=windows

    | where (EventCode=4740 OR EventCode=4740)

    | bucket _time span=1m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4740, 4740)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4740\n  AND INOFFSET(starttime, LAST 3600 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    HAVING event_count >= 5\nORDER BY starttime DESC"
  yara_l: "rule zs_auth_000270 {\n  meta:\n    author = \"TDL\"\n    description = \"Repeat Account Lockout\"\n    severity\
    \ = \"LOW\"\n    tactic = \"TA0001\"\n    technique = \"T1531\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.metadata.product_event_type = \"4740\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 1h\n\n  condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4740'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 1h)

    | WHERE event_count >= 5

    | SORT event_count DESC'
  leql: 'where(event_id IN [4740])

    groupby(source_ip, username, hostname)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4740

    | stats count as events by ComputerName, UserName

    | where events >= 5'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4740)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as event_count by hostname, actor_effective_username

    | filter event_count >= 5

    | fields hostname, actor_effective_username, event_count'
  lucene: event_id:(4740)
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1531*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '5 Windows Account Locked Out Events

  Where the Event ID is in [644, 4740]

  With the same Destination Username

  Within 1 hour


  ---------------------------------------------------------------------------------------------------------------


  5 User Account Locked Out Events

  With the same Destination Username

  Within 1 hour'
suppression:
  window: 24 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- "Examine the parent \u2192 child process tree, command line arguments, and code-signing status to assess whether the entry\
  \ vector is consistent with this technique."
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

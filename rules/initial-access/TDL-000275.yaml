rule_id: TDL-AUTH-000275
v4_id: '000275'
name: Mass Malicious Email Delivery
description: Detects when a single sender is found attempting to send multiple phishing emails to multiple users within the
  organization.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1566
technique_name: Phishing
platform:
- Windows
data_sources:
- Mimecast
- Proofpoint
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | bucket _time span=5m

    | stats count by src_ip, Account_Name, _time

    | where count >= 20

    | table _time, host, user, _raw'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 5m)

    | where Count >= 20

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000275 {\n  meta:\n    author = \"TDL\"\n    description = \"Mass Malicious Email Delivery\"\n   \
    \ severity = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1566\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 20\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 20

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 20)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 20

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 20\n| fields hostname, actor_effective_username,\
    \ event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*windows*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1566*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '20 Email Security Events

  Where the Email contains a malicious URL or attachment

  With the same Sender

  With unique Recipients

  within 5 minutes


  ---------------------------------------------------------------------------------------------


  1 Mimecast Event Where URL Category is ["Malware", "*Compromised*", "*Phishing*", "*Suspicious*", "*Botnet*"] From Unique
  Target Users'
suppression:
  window: 12 hours
tuning_period: 7 days

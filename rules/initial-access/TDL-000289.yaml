rule_id: TDL-AUTH-000289
v4_id: 000289
name: Stealth Password Guessing
description: Detects a potential password guessing attack against an account from a single source.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4625, 4776'
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |-
    index=windows
    | where (EventCode=4625 OR EventCode=4776 OR EventCode=4625 OR EventCode=4776)
    | bucket _time span=1m
    | stats count by src_ip, Account_Name, _time
    | where count >= 4
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | where EventID in (4625, 4776, 4625, 4776)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 1m)
    | where Count >= 4
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid IN (4625, 4776)
      AND INOFFSET(starttime, LAST 3600 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    HAVING event_count >= 4
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000289 {
      meta:
        author = "TDE"
        description = "Stealth Password Guessing"
        severity = "LOW"
        tactic = "TA0001"
        technique = "T1078"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4625"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 1h

      condition:
        #event >= 4

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4625', '4776')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 1h)
    | WHERE event_count >= 4
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4625, 4776])
    groupby(source_ip, username, hostname)
    calculate(count AS event_count)
    having(event_count >= 4)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4625 OR EventCode=4776
    | stats count as events by ComputerName, UserName
    | where events >= 4
  xql: |-
    dataset = xdr_data
    | filter event_type = "PROCESS" and action_evtlog_event_id in (4625, 4776)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | comp count() as event_count by hostname, actor_effective_username
    | filter event_count >= 4
    | fields hostname, actor_effective_username, event_count
  lucene: event_id:(4625 OR 4776)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "4 Instances over 1 hour of 2  Windows Authentication Failure events \nFrom the same internal Source IP/Source\
  \ Hostname\nWhere the Event ID is in [529, 4625, 680, 681, 4776]\nWhere the Failure Code is \"0xC000006A\" \nWhere the username\
  \ does not end with \"$\"\nWhere the Source IP/Hostname is NOT on the Mail Server List\nWhere the Source IP/Hostname is\
  \ NOT on the Central Authentication Server List\nWhere the destination username is NOT on the High Value Target Accounts\
  \ List\nWhere the  Destination Username is NOT on the Password Reset Exclusion List - 4 hours\nWith the same Destination\
  \ Username and Event ID\nWith unique failure timestamps\nWithin 3 minutes"
suppression:
  window: 24 hours
tuning_period: 7 days

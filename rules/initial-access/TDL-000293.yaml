rule_id: TDL-AUTH-000293
v4_id: 000293
name: Allowed Cross-Site Scripting Traffic
description: Detects when traffic is allowed with a cross site scripting signature or common cross site scripting request
  patterns.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1190
technique_name: Exploit Public-Facing Application
platform:
- Network
data_sources:
- Intrusion Detection/Prevention (IDS/IPS)
- Web Application Firewall (WAF)
- Webserver
- Reverse Proxy
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: |-
    CommonSecurityLog
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000293 {
      meta:
        author = "TDE"
        description = "Allowed Cross-Site Scripting Traffic"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1190"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Web Application Firewall Event\nWhere Action is Allowed\nOR\n    Where the Signature contains \"xss\"\n\n\
  \    Where the Signature contains \"csrf\"\n\n    Where the Signature contains \"cross\"\n    Where the Signature contains\
  \ \"site\"\n\n--------------------------------------------------\n\n1 Reverse Proxy/Webserver Event\nOR\n    Where the URI\
  \ contains \"=<script>\"\n    \n    Where the URI contains \"=%3cscript%3e\"\n    \n    Where the URI contains \"=%253cscript%253e\"\
  \n    \n    Where the URI contains \"<iframe \"\n    \n    Where the URI contains \"%3ciframe \"\n    \n    Where the URI\
  \ contains \"<svg \"\n    \n    Where the URI contains \"%3csvg \"\n    \n    Where the URI contains \"document.cookie\"\
  \n    \n    Where the URI contains \"document.domain\"\n    \n    Where the URI contains \" onerror=\"\n    \n    Where\
  \ the URI contains \" onresize=\"\n    \n    Where the URI contains \" onload=\\\"\"\n    \n    Where the URI contains \"\
  onmouseover=\"\n    \n    Where the URI contains \"${alert\"\n    \n    Where the URI contains \"javascript:alert\"\n  \
  \  \n    Where the URI contains \"javascript%3aalert\"\n    \n    Where the URI contains \"backurl=\"\n\nWhere the Response\
  \ Code does NOT start with \"4\"\nWhere the Response Code does NOT start with \"5\""
suppression:
  window: 12 hours
tuning_period: 7 days

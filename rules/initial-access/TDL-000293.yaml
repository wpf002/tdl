rule_id: TDL-AUTH-000293
v4_id: 000293
name: Allowed Cross-Site Scripting Traffic
description: Detects when traffic is allowed with a cross site scripting signature or common cross site scripting request
  patterns.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1190
technique_name: Exploit Public-Facing Application
platform:
- Network
data_sources:
- Intrusion Detection/Prevention (IDS/IPS)
- Web Application Firewall (WAF)
- Webserver
- Reverse Proxy
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*tcp*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "tcp"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%tcp%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_auth_000293 {
      meta:
        author = "TDL"
        description = "Allowed Cross-Site Scripting Traffic"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1190"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /tcp/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/tcp/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*tcp*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*tcp*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*tcp*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Web Application Firewall Event\nWhere Action is Allowed\nOR\n    Where the Signature contains \"xss\"\n\n\
  \    Where the Signature contains \"csrf\"\n\n    Where the Signature contains \"cross\"\n    Where the Signature contains\
  \ \"site\"\n\n--------------------------------------------------\n\n1 Reverse Proxy/Webserver Event\nOR\n    Where the URI\
  \ contains \"=<script>\"\n    \n    Where the URI contains \"=%3cscript%3e\"\n    \n    Where the URI contains \"=%253cscript%253e\"\
  \n    \n    Where the URI contains \"<iframe \"\n    \n    Where the URI contains \"%3ciframe \"\n    \n    Where the URI\
  \ contains \"<svg \"\n    \n    Where the URI contains \"%3csvg \"\n    \n    Where the URI contains \"document.cookie\"\
  \n    \n    Where the URI contains \"document.domain\"\n    \n    Where the URI contains \" onerror=\"\n    \n    Where\
  \ the URI contains \" onresize=\"\n    \n    Where the URI contains \" onload=\\\"\"\n    \n    Where the URI contains \"\
  onmouseover=\"\n    \n    Where the URI contains \"${alert\"\n    \n    Where the URI contains \"javascript:alert\"\n  \
  \  \n    Where the URI contains \"javascript%3aalert\"\n    \n    Where the URI contains \"backurl=\"\n\nWhere the Response\
  \ Code does NOT start with \"4\"\nWhere the Response Code does NOT start with \"5\""
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the destination domain/IP, ASN, port, and TLS / HTTP fingerprints to assess whether the entry vector is consistent
  with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-AUTH-000340
v4_id: '000340'
name: AWS DNS Request to Malicious Domain - GuardDuty
description: Detects when an EC2 instance is attempting to query a domain that is known to be tied to malicious activity.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1189
technique_name: Drive-by Compromise
platform:
- AWS
data_sources:
- AWS GuardDuty
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=aws sourcetype=aws:cloudtrail

    | table _time, host, user, _raw'
  kql: |-
    AWSCloudTrail
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, Computer, Account, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000340 {
      meta:
        author = "TDE"
        description = "AWS DNS Request to Malicious Domain - GuardDuty"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1189"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-aws.cloudtrail*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized pen testing
- Security research
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- thr
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Guard Duty Event \nWhere the Event Type is in [\"Backdoor:EC2/C&CActivity.B!DNS\", \"Impact:EC2/MaliciousDomainRequest.Reputation\"\
  , \"Impact:EC2/AbusedDomainRequest.Reputation\", \"Trojan:EC2/BlackholeTraffic!DNS\", \"Trojan:EC2/DriveBySourceTraffic!DNS\"\
  , \"Trojan:EC2/DropPoint!DNS\", \"Trojan:EC2/PhishingDomainRequest!DNS\", \"Backdoor:Runtime/C&CActivity.B!DNS\", \"Impact:Runtime/AbusedDomainRequest.Reputation\"\
  , \"Impact:Runtime/MaliciousDomainRequest.Reputation\", \"Trojan:Runtime/PhishingDomainRequest!DNS\", \"Trojan:Lambda/BlackholeTraffic\"\
  , \"Trojan:Runtime/BlackholeTraffic\", \"Trojan:Runtime/BlackholeTraffic!DNS\", \"Trojan:Runtime/DriveBySourceTraffic!DNS\"\
  , \"Trojan:Runtime/DropPoint!DNS\",\"Backdoor:Runtime/C&CActivity.B!DNS\"]"
suppression:
  window: 12 hours
tuning_period: 7 days

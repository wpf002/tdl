test_method: historical
pseudo_logic: "1 Guard Duty Event \nWhere the Event Type is in [\"UnauthorizedAccess:EC2/MetadataDNSRebind\", \"UnauthorizedAccess:Runtime/MetadataDNSRebind\"\
  ]"
suppression:
  window: 24 hours
tuning_period: 7 days

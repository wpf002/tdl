rule_id: TDL-AUTH-000375
v4_id: '000375'
name: Azure Suspicious Guest User Activity
description: Detects when a guest user is found attempting to use various PowerShell CLI within Azure.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1059
technique_name: Command and Scripting Interpreter
platform:
- Azure
data_sources:
- Azure AD
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=azure

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: |-
    SigninLogs
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, UserPrincipalName, IPAddress, Location, ResultType
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE eventid IN (4564, 4950)
      AND INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000375 {
      meta:
        author = "TDE"
        description = "Azure Suspicious Guest User Activity"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1059"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.metadata.product_event_type = "4564"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-azure*,logs-o365*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.code IN ('4564', '4950')
    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT event_count DESC
  leql: |-
    where(event_id IN [4564, 4950])
    groupby(hostname, username)
    calculate(count AS event_count)
  crowdstrike: |-
    event_simpleName=SecurityEvent
    | where EventCode=4564 OR EventCode=4950
    | table ComputerName, UserName, CommandLine, ContextTimeStamp
  xql: |-
    dataset = cloud_audit_log
    | filter event_type = "CLOUD" and action_evtlog_event_id in (4564, 4950)
    | filter _time > to_timestamp(now() - 86400, "epoch")
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time
    | sort desc _time
  lucene: event_id:(4564 OR 4950)
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 Azure AD Event
  Where the Event Name is in [Sign-in activity]
  Where the Application ID is in [1b730954-1685-4b74-9bfd-dac224a7b894, 04b07795-8ddb-461a-bbee-02f9e1bf7b46, 1950a258-227b-4e31-a9cf-717495945fc2, a0c73c16-a7e3-4564-9a95-2bdf47383716, fb78d390-0c51-40cd-8e17-fdbfab77341b, d1ddf0e4-d672-4dae-b554-9d5bdfd93547, 9bc3ab49-b65d-410a-85ad-de819febfddc, 12128f48-ec9e-42f0-b203-ea49fb6af367, 23d8f6bd-1eb0-4cc2-a08c-7bf525c67bcd, 31359c7f-bd7e-475c-86db-fdb8c937548e, 90f610bf-206d-4950-b61d-37fa6fd1b224, 14d82eec-204b-4c2f-b7e8-296a70dab67e]
  Where the target user matches the Guest User in lookup [TDE - Azure Guest Account Tracker]
suppression:
  window: 8 hours
tuning_period: 7 days

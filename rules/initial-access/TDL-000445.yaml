rule_id: TDL-AUTH-000445
v4_id: '000445'
name: Java Class Proxy Download
description: Detects Java class download in proxy logs, e.g. used in Log4shell exploitation
  attacks against Log4j.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*tcp*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "tcp"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%tcp%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_auth_000445 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Java Class Proxy Download\"\n    severity = \"MEDIUM\"\n    tactic = \"\
    TA0001\"\n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type = \"\
    NETWORK_CONNECTION\"\n    $e.network.protocol = /tcp/\n    $src = $e.principal.ip\n\
    \  match:\n    $src over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%tcp%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/tcp/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*tcp*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tcp"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*tcp*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*tcp*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender,
  URL), and the matched IOC.'
- Examine the parent → child process tree, command line arguments, and code-signing
  status to assess whether the entry vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes
  around the alert for related delivery activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access
  events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned
  vendor onboarding, marketing campaign, pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic
  artifacts, and open an incident ticket referencing this rule_id.'
pseudo_logic: '1 Instance within any observed window of a Java Class Proxy Download
  event.


  From index=network with sourcetype of firewall or ids

  Where network.protocol contains "tcp"

  With count of connection events greater than or equal to 1

  Ranked by highest bytes_out descending, tracking unique destination IPs (unique_dests)
  and total bytes sent (bytes_out)

  With the same src_ip and dest_ip and dest_port'

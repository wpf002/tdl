rule_id: TDL-AUTH-000505
v4_id: '000505'
name: Allowed Directory Traversal Traffic
description: Detects when traffic is allowed with a directory traversal signature or common directory traversal request patterns.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1190
technique_name: Exploit Public-Facing Application
platform:
- Network
data_sources:
- Intrusion Detection/Prevention (IDS/IPS)
- Web Application Firewall (WAF)
- Webserver
- Reverse Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: |-
    CommonSecurityLog
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction
  aql: |-
    SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows
    FROM flows
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY sourceip, destinationip, destinationport
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000505 {
      meta:
        author = "TDL"
        description = "Allowed Directory Traversal Traffic"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1190"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-network*,logs-firewall*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Web Application Firewall Event\nWhere Action is Allowed\nOR\n    Where the Signature contains \"traversal\"\
  \n\n    Where the Signature contains \"lfi\"\n\n--------------------------------------------------\n\n1 Reverse Proxy/Webserver\
  \ Event\nOR\n    Where the URI contains \"../\"\n\t\n    Where the URI contains \"\\\\..\\\\\"\n\t\n    Where the URI contains\
  \ \"..../\"\n\t\n    Where the URI contains \"\\\"\\\"\\\"\\\"\"\n\t\n    Where the URI contains \"<<\"\n\t\n    Where the\
  \ URI contains \"><\"\n\t\n    Where the URI contains \"./././\"\n\t\n    Where the URI contains \"\\\\\\\\\"\n\t\n    Where\
  \ the URI contains \"\\\\\\\\.\\\\\"\n\t\n    Where the URI contains \"/%c0%ae%c0%ae/\"\n\t\n    Where the URI contains\
  \ \"@fs/\"\n\t\n    Where the URI contains \"file:/\"\n\t\n    Where the URI contains \"file%3a/\"\n\nWhere the Response\
  \ Code does NOT start with \"4\"\nWhere the Response Code does NOT start with \"5\""

rule_id: TDL-AUTH-000514
v4_id: '000514'
name: Domain Password Spray Commandlet Activity
description: Detects when a PowerShell script or command line contains the commandlets to perform a password spray.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1204
technique_name: User Execution
platform:
- Windows
data_sources:
- Windows Operating System
- Powershell Script Block
- 'Event IDs: 4688, 4104'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4688 OR EventCode=4104 OR EventCode=4688 OR EventCode=4104)

    | bucket _time span=5m

    | stats count as failures, dc(Account_Name) as unique_users by _time, IpAddress

    | where failures >= 10

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4688, 4104, 4688, 4104)

    | summarize Failures = count(), UniqueAccounts = dcount(TargetUserName) by IpAddress, bin(TimeGenerated, 5m)

    | where Failures >= 10

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT username, sourceip, COUNT(*) AS failure_count, UNIQUECOUNT(username) AS unique_accounts\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n  AND eventid IN (4625, 529, 4776)\n  AND INOFFSET(starttime, LAST\
    \ 300 SECONDS)\nGROUP BY sourceip\nHAVING unique_accounts >= 10 AND (failure_count / unique_accounts) <= 3\nORDER BY failure_count\
    \ DESC\nSTART '2026-04-27 00:00:00'"
  yara_l: "rule zs_auth_000514 {\n  meta:\n    author = \"TDL\"\n    description = \"Domain Password Spray Commandlet Activity\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0006\"\n    technique = \"T1204\"\n\n  events:\n    $login.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $login.metadata.product_name = \"Windows\"\n    $login.security_result.action = \"BLOCK\"\n  \
    \  $login.principal.ip = $src_ip\n    $login.target.user.userid = $user\n\n  match:\n    $src_ip over 5m\n\n  condition:\n\
    \    #login > 10 and\n    #user > 8\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN ("4625", "529")

    | STATS failure_count = COUNT(*), unique_accounts = COUNT_DISTINCT(winlog.event_data.TargetUserName) BY source.ip, @timestamp
    = BUCKET(@timestamp, 5m)

    | WHERE unique_accounts >= 10

    | EVAL ratio = failure_count / unique_accounts

    | WHERE ratio <= 3

    | SORT failure_count DESC'
  leql: 'where(event_id IN [4625, 529] AND logset = "Active Directory")

    groupby(source_ip)

    calculate(unique_count:destination_account AS unique_accounts)

    calculate(count AS total_failures)

    having(unique_accounts >= 10)

    having(total_failures / unique_accounts <= 3)'
  crowdstrike: 'event_simpleName=UserLogonFailed2

    | stats count(TargetUserName) as failures, dc(TargetUserName) as unique_accounts by RemoteIP

    | where unique_accounts >= 10 AND failures/unique_accounts <= 3

    | sort -unique_accounts'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id = 4625

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | comp count() as failure_count, dc(actor_effective_username) as unique_accounts by src_ip

    | filter unique_accounts >= 10

    | fields src_ip, failure_count, unique_accounts'
  lucene: 'event_id:(4625 OR 529) AND log_source_type:"Windows Security"

    AND NOT user_name:("ANONYMOUS LOGON" OR "*$")'
  sumo: '_sourceCategory=*ids*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1204*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: "1 Windows Process Execution Event \nWhere the Event ID is in [592, 4688]\nWhere the Process Name is powershell.exe\n\
  OR\n    Where the Command Line contains \"Invoke-DomainPasswordSpray\"\n    Where the Command Line contains \"Get-DomainUserList\"\
  \n    Where the Command Line contains \"Invoke-SpraySinglePassword\"\n    Where the Command Line contains \"Get-ObservationWindow\"\
  \n\n---------------------------------------------------------------------------------------------------------------\n\n\
  1 Windows Powershell Script Execution Event\nWhere the Event ID is 4104\nOR\n    Where the Script contains \"Invoke-DomainPasswordSpray\"\
  \n    Where the Script contains \"Get-DomainUserList\"\n    Where the Script contains \"Invoke-SpraySinglePassword\"\n \
  \   Where the Script contains \"Get-ObservationWindow\""

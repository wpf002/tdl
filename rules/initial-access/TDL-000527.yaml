rule_id: TDL-AUTH-000527
v4_id: '000527'
name: HVT Remote Password Guessing
description: This rule is designed to detect multiple failed authentication attempts against a VPN or public-facing host,
  which may indicate an attempt to brute force an account’s password.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Azure
- Microsoft 365
data_sources:
- VPN
- Azure AD
- Office 365
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |-
    index=azure
    | bucket _time span=3m
    | stats count by src_ip, Account_Name, _time
    | where count >= 75
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    SigninLogs
    | where TimeGenerated >= ago(1d)
    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 3m)
    | where Count >= 75
    | project TimeGenerated, UserPrincipalName, IPAddress, Location, ResultType
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 180 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_auth_000527 {
      meta:
        author = "TDL"
        description = "HVT Remote Password Guessing"
        severity = "MEDIUM"
        tactic = "TA0001"
        technique = "T1078"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 3m

      condition:
        #event >= 75

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-azure*,logs-o365*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 3m)
    | WHERE event_count >= 75
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 75)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 75
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 75\n| fields hostname,\
    \ actor_effective_username, event_count"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  75 Remote Authentication Failure events
  From 1 external source to the same destination
  With the same Destination Username
  Within 3 minutes
suppression:
  window: 24 hours
  fields:
  - Source IP
  - Source Username
tuning_period: 7 days

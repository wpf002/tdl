rule_id: TDL-AUTH-000534
v4_id: '000534'
name: Server-Side Code Injection in URL
description: Attackers may use improper URL checking to inject code that is executed
  on a server.  This may be used in DoS attacks or to execute commands to elevate
  privilege.  The attack pattern is similar to Shellshock exploitation.
tactic: Initial Access
tactic_id: TA0001
technique_id: T1190
technique_name: Exploit Public-Facing Application
platform:
- AWS
data_sources:
- AWS ELB
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search eventName="*.+*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName,
    resources{}.ARN

    | where count >= 1

    | sort - count

    '
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where eventName matches regex ".+"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName),
    Resource=tostring(coalesce(ResourceId, ResourceProvider))

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\
    \nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure\
    \ Audit','GCP Cloud Audit')\n  AND \"eventName\" LIKE '%.+%'\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_auth_000534 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Server-Side Code Injection in URL\"\n    severity = \"LOW\"\n    tactic\
    \ = \"TA0001\"\n    technique = \"T1190\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_RESOURCE_ACCESS\"\n    $e.eventName = /.+/\n    $actor = $e.principal.user.userid\n\
    \  match:\n    $actor over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE eventName LIKE "%.+%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC

    '
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)

    groupby(actor, event_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND eventName=*.+*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls

    '
  xql: 'dataset = cloud_audit_logs

    | filter eventName ~= ".+"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name,
    action_remote_ip

    | sort desc calls

    '
  lucene: 'event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*

    '
  sumo: '_sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*

    | where eventName matches "*.+*"

    | count by userIdentity_arn, eventName, sourceIPAddress

    | sort by _count desc

    '
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: Tune per environment baseline.
tags:
- net
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender,
  URL), and the matched IOC.'
- Examine the calling identity (ARN / UPN), source IP, user agent, and the resource
  being acted on to assess whether the entry vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes
  around the alert for related delivery activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access
  events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned
  vendor onboarding, marketing campaign, pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic
  artifacts, and open an incident ticket referencing this rule_id.'
pseudo_logic: '1 Instance within any time window of a server-side code injection attempt
  in a URL targeting a cloud-facing application.


  From index=cloud

  Where sourcetype is aws:cloudtrail, azure:auditlogs, or gcp:audit

  With eventName matching a pattern containing code injection syntax (e.g., shell
  metacharacters or command substitution sequences such as "*.+*")

  Excluding events originating from authorized scanner source IPs or known monitoring
  agent identities


  With the same userIdentity.arn, eventName, and resources{}.ARN as the correlation
  key, deduplicated per unique source IP address captured in sourceIPAddress'

rule_id: TDL-AUTH-000595
v4_id: 000595
name: HVT MFA Pin Guessing
description: This rule is designed to detect multiple failed MFA pin code attempts for the same high value target user against
  a company's MFA application. This may indicate an attempt to brute force a user's account and bypass MFA
tactic: Initial Access
tactic_id: TA0001
technique_id: T1078
technique_name: Valid Accounts
platform:
- Azure
- Okta
data_sources:
- Duo
- Okta
- Azure
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=azure

    | bucket _time span=3m

    | stats count by src_ip, Account_Name, _time

    | where count >= 5

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'OktaLogs_CL

    | where TimeGenerated >= ago(1d)

    | summarize Count = count() by Account, IpAddress, bin(TimeGenerated, 3m)

    | where Count >= 5

    | project TimeGenerated, Computer, Account, Activity'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 180 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_auth_000595 {\n  meta:\n    author = \"TDL\"\n    description = \"HVT MFA Pin Guessing\"\n    severity\
    \ = \"MEDIUM\"\n    tactic = \"TA0001\"\n    technique = \"T1078\"\n\n  events:\n    $event.metadata.event_type = \"GENERIC_EVENT\"\
    \n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n    $host over 3m\n\n \
    \ condition:\n    #event >= 5\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-azure*,logs-o365*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 3m)

    | WHERE event_count >= 5

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 5)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 5

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| comp count() as event_count by hostname, actor_effective_username\n| filter event_count >= 5\n| fields hostname,\
    \ actor_effective_username, event_count"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*okta* OR _sourceCategory=*azure*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- initial-access
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: '5 MFA Login Failures

  From the same external  Source

  Where the MFA Factor is a Pin or Device Code

  Where the Destination Username is on the High Value Target User List

  With the same Destination Username

  Within 3 minutes'
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- Examine the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on to assess whether the entry
  vector is consistent with this technique.
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

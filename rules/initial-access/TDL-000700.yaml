rule_id: TDL-AUTH-000700
v4_id: '000700'
name: Executable Launched from Removable USB Volume
description: Process started from a path on a removable drive (DriveType=2). Adversaries copy implants to USB and rely on
  autorun or user click for first execution. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1091
  under Initial Access).
tactic: Initial Access
tactic_id: TA0001
technique_id: T1091
technique_name: Replication Through Removable Media
platform:
- Windows
- Linux
- macOS
data_sources:
- Windows Event Log
- Sysmon
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.parent.path="*removable*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.parent.path matches regex "removable"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.parent.path\" LIKE\
    \ '%removable%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_auth_000700 {\n  meta:\n    author = \"TDL\"\n    description = \"Executable Launched from Removable\
    \ USB Volume\"\n    severity = \"HIGH\"\n    tactic = \"TA0001\"\n    technique = \"T1091\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.parent.path = /removable/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.parent.path LIKE "%removable%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.parent.path=/removable/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.parent.path=*removable*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.parent.path ~= "removable"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.parent.path:*removable*
  sumo: '_sourceCategory=*windows/events* OR _sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1091*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Process started from a path on a removable drive (DriveType=2). Adversaries copy implants to USB and rely on
  autorun or user click for first execution.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- removable-media
- usb
- autorun
- t1091
- initial-access
references:
- https://attack.mitre.org/techniques/T1091/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, target host/identity, source (IP, sender, URL), and the matched IOC.'
- "Examine the parent \u2192 child process tree, command line arguments, and code-signing status to assess whether the entry\
  \ vector is consistent with this technique."
- Cross-reference with email gateway, web proxy, and EDR telemetry in the 30 minutes around the alert for related delivery
  activity.
- 'Pivot on the user / host: look for follow-on execution, persistence, or credential-access events in the next 24h.'
- 'Decide TP / FP / dual-use: confirm the user did not request the activity (sanctioned vendor onboarding, marketing campaign,
  pen test).'
- 'If TP: isolate the host, reset the user''s credentials and tokens, capture forensic artifacts, and open an incident ticket
  referencing this rule_id.'

rule_id: TDL-LM-000075
v4_id: '000075'
name: Successful SMB Connection - Outbound
description: A report that provides visibility into successful outbound SMB connections.
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1021
technique_name: Remote Services
platform:
- Network
data_sources:
- Firewall
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=network

    | table _time, src_ip, dest_ip, dest_port, action'
  kql: 'CommonSecurityLog

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, SourceIP, DestinationIP, DestinationPort, DeviceAction'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(flowCount) AS total_flows

    FROM flows

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY sourceip, destinationip, destinationport

    ORDER BY starttime DESC'
  yara_l: "rule zs_lm_000075 {\n  meta:\n    author = \"TDL\"\n    description = \"Successful SMB Connection - Outbound\"\n\
    \    severity = \"MEDIUM\"\n    tactic = \"TA0008\"\n    technique = \"T1021\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid = $user\n\n  match:\n \
    \   $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-network*,logs-firewall*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = xdr_data\n| filter event_type = \"NETWORK\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*firewall*

    | where technique="T1021" OR _raw matches "*T1021*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
false_positives:
- Authorized scanners
- Monitoring agents
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- net
- lateral-movement
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: "1 Firewall Event \nFrom one internal source to many external destinations (Outbound)\nOR\n\tWhere the Destination\
  \ Port is in [139, 445]\n\t\n\tWhere the Application is in [SMB, Samba] case insensitive"
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol / credential used.'
- "Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints \u2014 confirm the cross-host action (SMB write,\
  \ WinRM exec, RDP session, kubectl exec) and the auth context."
- "Pull a graph of the source identity's recent host touches \u2014 adversaries hop quickly across multiple endpoints."
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic or worker-to-worker movement that has
  no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP for movement that crosses security zones
  or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials, and walk forward from the target host
  to find subsequent stages.'

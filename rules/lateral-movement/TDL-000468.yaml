rule_id: TDL-LM-000468
v4_id: 000468
name: Web Request to TOR IP
description: Detects a web request to a website with an IP on a TOR exit node feed
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1090
technique_name: Proxy
platform:
- Windows
data_sources:
- Forward Proxy
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search network.protocol="*tor*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip,
    dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out

    '
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP),
    DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where network.protocol matches regex "tor"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP,
    DestinationPort

    | order by Bytes desc

    '
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections,
    SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "network.protocol" LIKE ''%tor%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS

    '
  yara_l: "rule tdl_tdl_lm_000468 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Web Request to TOR IP\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0008\"\
    \n    technique = \"T1090\"\n  events:\n    $e.metadata.event_type = \"NETWORK_CONNECTION\"\
    \n    $e.network.protocol = /tor/\n    $src = $e.principal.ip\n  match:\n    $src\
    \ over 10m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND network.protocol LIKE "%tor%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip,
    destination.port

    | SORT bytes_out DESC

    '
  leql: 'where(logset = "Network Activity" AND network.protocol=/tor/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))

    '
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest)
    AND network.protocol=*tor*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4,
    RemotePort

    | sort -bytes_out

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND network.protocol ~= "tor"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname,
    action_remote_ip, action_remote_port

    | sort desc bytes_out

    '
  lucene: 'event.category:"network" AND network.protocol:*tor*

    '
  sumo: '_sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*

    | where network.protocol matches "*tor*"

    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port

    | sort by bytes_out desc

    '

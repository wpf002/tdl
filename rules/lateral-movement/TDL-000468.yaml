last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol
  / credential used.'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — confirm the cross-host action (SMB write, WinRM exec, RDP session, kubectl
  exec) and the auth context.
- Pull a graph of the source identity's recent host touches — adversaries hop quickly
  across multiple endpoints.
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic
  or worker-to-worker movement that has no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP
  for movement that crosses security zones or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials,
  and walk forward from the target host to find subsequent stages.'
pseudo_logic: '1 Instance within any observed time window of a web request where the
  destination IP matches a known TOR exit node feed entry.


  From index=network with sourcetype=firewall or sourcetype=ids

  Where network.protocol contains "tor"

  With stats aggregated by src_ip, dest_ip, and dest_port including total connection
  count, count of unique destination IPs, and sum of bytes_out

  Where count is greater than or equal to 1

  With results sorted descending by bytes_out to surface highest-volume TOR-destined
  transfers first

  With the same src_ip, dest_ip, and dest_port as the correlation key'

rule_id: TDL-LM-000588
v4_id: 000588
name: Object on Admin File Share Accessed with Write Permissions
description: Detects when an unauthorized non-system account accesses a file on the admin share via SMB with write access
  (0x2).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1021
technique_name: Remote Services
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5145'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("5145")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("5145")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('5145')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_lm_000588 {
      meta:
        author = "TDL"
        description = "Object on Admin File Share Accessed with Write Permissions"
        severity = "MEDIUM"
        tactic = "TA0008"
        technique = "T1021"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(5145)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("5145")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [5145])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (5145)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("5145")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(5145)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("5145")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- auth
- lateral-movement
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: '1 Windows User Created Event

  Where the Event ID is in [5145]

  Where the file path matches "*c$" or file path matches "*admin$"

  Where the eventdata.accessmask is "0x2"

  Where the src_user does not end with "$"'
suppression:
  window: 12 hours
  fields:
  - src_user
tuning_period: 14 days
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol / credential used.'
- Inspect the file path, file hash, parent process, and any prior network/email delivery — confirm the cross-host action (SMB
  write, WinRM exec, RDP session, kubectl exec) and the auth context.
- Pull a graph of the source identity's recent host touches — adversaries hop quickly across multiple endpoints.
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic or worker-to-worker movement that has
  no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP for movement that crosses security zones
  or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials, and walk forward from the target host
  to find subsequent stages.'

rule_id: TDL-LM-000588
v4_id: 000588
name: Object on Admin File Share Accessed with Write Permissions
description: Detects when an unauthorized non-system account accesses a file on the admin share via SMB with write access
  (0x2).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1021
technique_name: Remote Services
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 5145'
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: |-
    index=windows
    | where (EventCode=5145 OR EventCode=5145)
    | table _time, host, Account_Name, IpAddress, LogonType
  kql: |-
    SecurityEvent
    | where TimeGenerated >= ago(1d)
    | where EventID in (5145, 5145)
    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_lm_000588 {
      meta:
        author = "TDL"
        description = "Object on Admin File Share Accessed with Write Permissions"
        severity = "MEDIUM"
        tactic = "TA0008"
        technique = "T1021"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- auth
- lateral-movement
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: none
pseudo_logic: |-
  1 Windows User Created Event
  Where the Event ID is in [5145]
  Where the file path matches "*c$" or file path matches "*admin$"
  Where the eventdata.accessmask is "0x2"
  Where the src_user does not end with "$"
suppression:
  window: 12 hours
  fields:
  - src_user
tuning_period: 14 days

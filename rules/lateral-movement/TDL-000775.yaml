rule_id: TDL-LM-000775
v4_id: '000775'
name: Anomalous SMB Pipe Opens to Remote Hosts
description: "Single source opens \\PIPE\\srvsvc, \\PIPE\\samr, \\PIPE\\netlogon to \u22653 distinct remote hosts within 5m\
  \ without preceding admin auth. EternalBlue / Zerologon-style probing. Generated from gap analysis against canonical ATT&CK\
  \ Enterprise matrix (T1210 under Lateral Movement)."
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1210
technique_name: Exploitation of Remote Services
platform:
- Windows
- Linux
data_sources:
- Network IDS
- Windows Event Log
severity: Critical
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search destination.ip="*smb-pipe-fanout*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where destination.ip matches regex "smb-pipe-fanout"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "destination.ip" LIKE ''%smb-pipe-fanout%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_lm_000775 {\n  meta:\n    author = \"TDL\"\n    description = \"Anomalous SMB Pipe Opens to Remote\
    \ Hosts\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0008\"\n    technique = \"T1210\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.destination.ip = /smb-pipe-fanout/\n    $src = $e.principal.ip\n  match:\n    $src\
    \ over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND destination.ip LIKE "%smb-pipe-fanout%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND destination.ip=/smb-pipe-fanout/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND destination.ip=*smb-pipe-fanout*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND destination.ip ~= "smb-pipe-fanout"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND destination.ip:*smb-pipe-fanout*
  sumo: '_sourceCategory=*ids* OR _sourceCategory=*windows/events*

    | where technique="T1210" OR _raw matches "*T1210*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: "Single source opens \\PIPE\\srvsvc, \\PIPE\\samr, \\PIPE\\netlogon to \u22653 distinct remote hosts within\

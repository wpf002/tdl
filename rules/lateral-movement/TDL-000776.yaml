triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol / credential used.'
- Inspect the calling identity (ARN / UPN), source IP, user agent, and the resource being acted on — confirm the cross-host
  action (SMB write, WinRM exec, RDP session, kubectl exec) and the auth context.
- Pull a graph of the source identity's recent host touches — adversaries hop quickly across multiple endpoints.
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic or worker-to-worker movement that has
  no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP for movement that crosses security zones
  or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials, and walk forward from the target host
  to find subsequent stages.'

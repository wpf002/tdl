rule_id: TDL-LM-000777
v4_id: '000777'
name: Executable Written via SMB to Admin$ Share
description: FileCreate of .exe/.dll/.bin under \\<host>\ADMIN$ or \\<host>\C$\Windows\* by a remote logon session. Classic
  lateral payload drop. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1570 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1570
technique_name: Lateral Tool Transfer
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Network IDS
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*admin-share-write*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "admin-share-write"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%admin-share-write%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_lm_000777 {\n  meta:\n    author = \"TDL\"\n    description = \"Executable Written via SMB to Admin$\
    \ Share\"\n    severity = \"HIGH\"\n    tactic = \"TA0008\"\n    technique = \"T1570\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /admin-share-write/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%admin-share-write%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/admin-share-write/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*admin-share-write*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "admin-share-write"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*admin-share-write*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*ids*

    | where technique="T1570" OR _raw matches "*T1570*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'
pseudo_logic: FileCreate of .exe/.dll/.bin under \\<host>\ADMIN$ or \\<host>\C$\Windows\* by a remote logon session. Classic

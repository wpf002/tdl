rule_id: TDL-LM-000777
v4_id: '000777'
name: Executable Written via SMB to Admin$ Share
description: FileCreate of .exe/.dll/.bin under \\<host>\ADMIN$ or \\<host>\C$\Windows\* by a remote logon session. Classic
  lateral payload drop. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1570 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1570
technique_name: Lateral Tool Transfer
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Network IDS
severity: High
fidelity: Medium
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=network sourcetype=firewall OR sourcetype=ids
    | search network.protocol="*smb*"
    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port
    | where count >= 1
    | sort - bytes_out
  kql: |
    union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))
    | where TimeGenerated > ago(1d)
    | where network.protocol matches regex "smb"
    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort
    | order by Bytes desc
  aql: |
    SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out
    FROM flows
    WHERE "network.protocol" LIKE '%smb%'
    GROUP BY sourceip, destinationip, destinationport
    LAST 1 HOURS
  yara_l: |
    rule tdl_tdl_lm_000777 {
      meta:
        author = "TDL"
        description = "Executable Written via SMB to Admin$ Share"
        severity = "HIGH"
        tactic = "TA0008"
        technique = "T1570"
      events:
        $e.metadata.event_type = "NETWORK_CONNECTION"
        $e.network.protocol = /smb/
        $src = $e.principal.ip
      match:
        $src over 10m
      condition:
        $e
    }
  esql: |
    FROM logs-network*,logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "network" AND network.protocol LIKE "%smb%"
    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port
    | SORT bytes_out DESC
  leql: |
    where(logset = "Network Activity" AND network.protocol=/smb/)
    groupby(source_ip, destination_ip, destination_port)
    calculate(count, sum(bytes_out))
  crowdstrike: |
    event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND network.protocol=*smb*
    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort
    | sort -bytes_out
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.NETWORK AND network.protocol ~= "smb"
    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port
    | sort desc bytes_out
  lucene: |
    event.category:"network" AND network.protocol:*smb*
  sumo: |
    _sourceCategory=*firewall* OR _sourceCategory=*ids* OR _sourceCategory=*flow*
    | where network.protocol matches "*smb*"
    | sum(bytes_out) as bytes_out, count by src_ip, dest_ip, dest_port
    | sort by bytes_out desc
pseudo_logic: FileCreate of .exe/.dll/.bin under \\<host>\ADMIN$ or \\<host>\C$\Windows\* by a remote logon session. Classic
  lateral payload drop.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:
- smb
- scp
- tool-transfer
- t1570
- lateral-movement
references:
- https://attack.mitre.org/techniques/T1570/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-28'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol / credential used.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — confirm the cross-host action
  (SMB write, WinRM exec, RDP session, kubectl exec) and the auth context.
- Pull a graph of the source identity's recent host touches — adversaries hop quickly across multiple endpoints.
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic or worker-to-worker movement that has
  no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP for movement that crosses security zones
  or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials, and walk forward from the target host
  to find subsequent stages.'

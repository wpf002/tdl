rule_id: TDL-LM-000778
v4_id: 000778
name: tscon Used to Hijack Disconnected RDP Session
description: tscon.exe invoked targeting another user's session ID without /password. Free-RDP-session takeover when invoker
  is SYSTEM. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1563 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1563
technique_name: Remote Service Session Hijacking
platform:
- Windows
- Linux
data_sources:
- Windows Event Log
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("tscon.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("tscon.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('tscon.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_lm_000778 {
      meta:
        author = "TDL"
        description = "tscon Used to Hijack Disconnected RDP Session"
        severity = "HIGH"
        tactic = "TA0008"
        technique = "T1563"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(tscon.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("tscon.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [tscon.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (tscon.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("tscon.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(tscon.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("tscon.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: tscon.exe invoked targeting another user's session ID without /password. Free-RDP-session takeover when invoker

rule_id: TDL-LM-000778
v4_id: 000778
name: tscon Used to Hijack Disconnected RDP Session
description: tscon.exe invoked targeting another user's session ID without /password. Free-RDP-session takeover when invoker
  is SYSTEM. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1563 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1563
technique_name: Remote Service Session Hijacking
platform:
- Windows
- Linux
data_sources:
- Windows Event Log
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*tscon*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "tscon"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%tscon%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_lm_000778 {\n  meta:\n    author = \"TDL\"\n    description = \"tscon Used to Hijack Disconnected\
    \ RDP Session\"\n    severity = \"HIGH\"\n    tactic = \"TA0008\"\n    technique = \"T1563\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /tscon/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%tscon%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/tscon/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*tscon*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "tscon"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*tscon*
  sumo: '_sourceCategory=*windows/events* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1563*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: tscon.exe invoked targeting another user's session ID without /password. Free-RDP-session takeover when invoker

rule_id: TDL-LM-000779
v4_id: 000779
name: Lateral Spread via Removable Media Write+Execute
description: Same host writes an executable to a removable volume then a different host executes it within 24h. Suggests USB-borne
  worm spread. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1091 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1091
technique_name: Replication Through Removable Media
platform:
- Windows
- Linux
- macOS
data_sources:
- Windows Event Log
- Sysmon
- EDR
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*removable*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "removable"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%removable%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_lm_000779 {\n  meta:\n    author = \"TDL\"\n    description = \"Lateral Spread via Removable Media\
    \ Write+Execute\"\n    severity = \"HIGH\"\n    tactic = \"TA0008\"\n    technique = \"T1091\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /removable/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%removable%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/removable/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*removable*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "removable"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*removable*
  sumo: '_sourceCategory=*windows/events* OR _sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1091*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Same host writes an executable to a removable volume then a different host executes it within 24h. Suggests

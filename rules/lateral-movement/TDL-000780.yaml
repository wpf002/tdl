rule_id: TDL-LM-000780
v4_id: 000780
name: Mass Software Push from RMM Console
description: "Single RMM/SCCM identity initiates software install or script execution against \u226510 distinct endpoints\
  \ in 30m. Anomalous fan-out from deployment tooling. Generated from gap analysis against canonical ATT&CK Enterprise matrix\
  \ (T1072 under Lateral Movement)."
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1072
technique_name: Software Deployment Tools
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- MDM Logs
- RMM Logs
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search actor.user.name="*fanout*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where actor.user.name matches regex "fanout"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "actor.user.name" LIKE ''%fanout%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_lm_000780 {\n  meta:\n    author = \"TDL\"\n    description = \"Mass Software Push from RMM Console\"\
    \n    severity = \"HIGH\"\n    tactic = \"TA0008\"\n    technique = \"T1072\"\n  events:\n    $e.metadata.event_type =\
    \ \"NETWORK_CONNECTION\"\n    $e.actor.user.name = /fanout/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND actor.user.name LIKE "%fanout%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND actor.user.name=/fanout/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND actor.user.name=*fanout*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND actor.user.name ~= "fanout"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND actor.user.name:*fanout*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*mdm* OR _sourceCategory=*rmm*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1072*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'

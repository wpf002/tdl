rule_id: TDL-LM-000781
v4_id: 000781
name: Executable Written to Departmental Network Share
description: New .exe / .lnk / .scr written to a departmental file share (Finance, HR) by a non-admin user. Worm-like content
  tainting. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1080 under Lateral Movement).
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1080
technique_name: Taint Shared Content
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Auditd
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*share-taint*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "share-taint"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%share-taint%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_lm_000781 {\n  meta:\n    author = \"TDL\"\n    description = \"Executable Written to Departmental\
    \ Network Share\"\n    severity = \"HIGH\"\n    tactic = \"TA0008\"\n    technique = \"T1080\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /share-taint/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%share-taint%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/share-taint/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*share-taint*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "share-taint"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*share-taint*
pseudo_logic: New .exe / .lnk / .scr written to a departmental file share (Finance, HR) by a non-admin user. Worm-like content
  tainting.
false_positives:

rule_id: TDL-LM-001
name: Pass-the-Hash NTLM Lateral Movement
tactic: Lateral Movement
tactic_id: TA0008
technique_id: T1550.002
technique_name: Pass the Hash
platform:
- Windows
data_sources:
- Windows Security Event Log (4624)
severity: High
fidelity: Medium
lifecycle: Deployed
risk_score: 85
queries:
  spl: 'index=windows sourcetype="WinEventLog:Security"

    | search event_id IN ("4624")

    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode

    | where count >= 1

    | sort - count

    '
  kql: 'SecurityEvent

    | where TimeGenerated > ago(1d)

    | where event_id in ("4624")

    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, username, hostname, \"Logon Type\" as logon_type,\
    \ eventid\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'\n\
    \  AND \"event_id\" IN ('4624')\nLAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_lm_001 {\n  meta:\n    author = \"TDL\"\n    description =\
    \ \"Pass-the-Hash NTLM Lateral Movement\"\n    severity = \"HIGH\"\n    tactic\
    \ = \"TA0008\"\n    technique = \"T1550.002\"\n  events:\n    $e.metadata.event_type\
    \ = \"USER_LOGIN\"\n    $e.event_id = /(4624)/\n    $user = $e.target.user.userid\n\
    \  match:\n    $user over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-windows.security*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.category == "authentication" AND event_id IN ("4624")

    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType,
    event.code

    | SORT count DESC

    '
  leql: 'where(logset IN ["Active Directory", "Asset Authentication"] AND event_id
    IN [4624])

    groupby(destination_account, source_ip, asset)

    calculate(count)

    '
  crowdstrike: 'event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp)
    AND event_id IN (4624)

    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType

    | sort -auth_events

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.LOGIN AND event_id in ("4624")

    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip,
    action_logon_type

    | sort desc logins

    '
  lucene: 'event.category:"authentication" AND event_id:(4624)

    '
  sumo: '_sourceCategory=*windows*security* OR _sourceCategory=*ad*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id IN ("4624")

    | count by host, user, src_ip, logon_type, event_id

    | sort by _count desc

    '
false_positives:
- Legitimate admin accounts managing multiple systems
tags:
- pass-the-hash
- ntlm
- lateral-movement
author: TDL
created: '2024-02-10'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, source host, target host, and the protocol
  / credential used.'
- Inspect the destination domain/IP, ASN, port, and TLS / HTTP fingerprints — confirm
  the cross-host action (SMB write, WinRM exec, RDP session, kubectl exec) and the
  auth context.
- Pull a graph of the source identity's recent host touches — adversaries hop quickly
  across multiple endpoints.
- 'Validate against change tickets and admin patterns: is this admin-bastion traffic
  or worker-to-worker movement that has no business justification?'
- 'Decide TP / FP: FP for sanctioned admin / vulnerability-scan / RMM activity; TP
  for movement that crosses security zones or uses an unusual identity.'
- 'If TP: isolate both source and target, rotate the moving identity''s credentials,
  and walk forward from the target host to find subsequent stages.'
pseudo_logic: '1 Instance over any time window of a Windows Security Authentication
  event.

  From index=windows sourcetype="WinEventLog:Security"

  Where event_id equals 4624

  With LogonType captured as a distinguishing field alongside EventCode

  With the same user, IpAddress, and LogonType

  Deduplicated and ranked by descending count, surfacing any single occurrence where
  an NTLM pass-the-hash logon pattern is observed across correlated hosts values per
  unique user and IpAddress combination.'

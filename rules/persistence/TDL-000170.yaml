rule_id: TDL-PER-000170
v4_id: '000170'
name: Task Manager Running as System
description: Detects if Windows Task Manager process is running as the local system account. Attackers will attempt to hide
  themselves by imitating legitimate Windows system processes, however they are typically run as SYSTEM.
tactic: Persistence
tactic_id: TA0003
technique_id: T1543
technique_name: Create or Modify System Process
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("taskmgr.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("taskmgr.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('taskmgr.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_per_000170 {
      meta:
        author = "TDL"
        description = "Task Manager Running as System"
        severity = "MEDIUM"
        tactic = "TA0003"
        technique = "T1543"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(taskmgr.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("taskmgr.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [taskmgr.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (taskmgr.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("taskmgr.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(taskmgr.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("taskmgr.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- persistence
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: "1 Windows Process Execution Event \nWhere the Event ID is in [592, 4688]\nWhere the Process Name is taskmgr.exe\n\
  OR \n\tWhere Destination User is NULL (Pre Windows 10/2016)\n\tWhere Source User ID is SYSTEM\n\t\n\tWhere Destination User\
  \ is NOT NULL (Windows 10/2016)\n\tWhere Destination User ID is SYSTEM"
suppression:
  window: 12 hours
  fields:
  - Source Username
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the persistence artifact (registry path / scheduled task / service
  / config).'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the persistence target
  points to an unusual location or unsigned binary.
- Determine when the artifact was created and which process/account performed the write — pivot on that process for the original
  attack chain.
- 'Look for prior child-process activity from the persistence target: did anything actually launch from it?'
- 'Decide TP / FP: FP for sanctioned management software (RMM, vendor agents, custom installers) — verify against the asset
  register.'
- 'If TP: remove the persistence artifact, isolate the host, hunt for the same artifact across the fleet, and rotate any credentials
  touched by the persistent process.'

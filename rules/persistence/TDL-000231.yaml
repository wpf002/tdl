rule_id: TDL-PER-000231
v4_id: '000231'
name: Authentication Package DLL Injection
description: Detects when a new authentication package DLL is registered. Authentication Packages provide support for different
  authentication security protocols, such as Kerberos or multifactor products. Since the authentication package DLLs are loaded
  at startup or reboot, an attacker can upload a malicious DLL to establish persistence on the machine.
tactic: Persistence
tactic_id: TA0003
technique_id: T1574
technique_name: Hijack Execution Flow
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4657'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)
    | search registry_key="*.+*"
    | stats count, values(host) as hosts by user, target_object, details, image
    | sort - count
  kql: |
    DeviceRegistryEvents
    | where TimeGenerated > ago(1d)
    | where registry_key matches regex ".+"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Registry Key", "Registry Value Name", "Registry Value Data", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('12','13','14')
      AND "registry_key" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_per_000231 {
      meta:
        author = "TDL"
        description = "Authentication Package DLL Injection"
        severity = "MEDIUM"
        tactic = "TA0003"
        technique = "T1574"
      events:
        $e.metadata.event_type = "REGISTRY_MODIFICATION"
        $e.registry_key = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "registry" AND registry_key LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "registry" AND registry_key=/.+/)
    groupby(asset, registry_key, registry_value)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry_key=*.+*
    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue
    | sort -changes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.REGISTRY AND registry_key ~= ".+"
    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name
    | sort desc changes
  lucene: |
    event.category:"registry" AND registry_key:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("12","13","14") AND registry_key matches "*.+*"
    | count by host, user, registry_key, registry_value, image
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- persistence
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '1 Windows Registry Modification Event

  Where the Event ID is in [567, 4657]

  Where the Registry Key is in [HKLM\SYSTEM\CurrentControlSet\Control\Lsa\, REGISTRY\MACHINE\SYSTEM\CurrentControlSet\Control\Lsa\]

  Where the Object Value "Authentication Packages"'
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the persistence artifact (registry path / scheduled task / service
  / config).'
- Inspect the source IP, geo / ASN, authentication method, and prior sign-in pattern for the user — verify the persistence
  target points to an unusual location or unsigned binary.
- Determine when the artifact was created and which process/account performed the write — pivot on that process for the original
  attack chain.
- 'Look for prior child-process activity from the persistence target: did anything actually launch from it?'
- 'Decide TP / FP: FP for sanctioned management software (RMM, vendor agents, custom installers) — verify against the asset
  register.'
- 'If TP: remove the persistence artifact, isolate the host, hunt for the same artifact across the fleet, and rotate any credentials
  touched by the persistent process.'

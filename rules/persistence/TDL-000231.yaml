rule_id: TDL-PER-000231
v4_id: '000231'
name: Authentication Package DLL Injection
description: Detects when a new authentication package DLL is registered. Authentication Packages provide support for different
  authentication security protocols, such as Kerberos or multifactor products. Since the authentication package DLLs are loaded
  at startup or reboot, an attacker can upload a malicious DLL to establish persistence on the machine.
tactic: Persistence
tactic_id: TA0003
technique_id: T1574
technique_name: Hijack Execution Flow
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4657'
severity: Medium
fidelity: Medium
lifecycle: Deployed
risk_score: 55
queries:
  spl: 'index=windows

    | where (EventCode=4657 OR EventCode=4657)

    | table _time, host, user, ProcessName, CommandLine'
  kql: 'SecurityEvent

    | where TimeGenerated >= ago(1d)

    | where EventID in (4657, 4657)

    | project TimeGenerated, Computer, Account, IpAddress, EventID, Activity'
  aql: "SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount\nFROM\
    \ events\nWHERE eventid = 4657\n  AND INOFFSET(starttime, LAST 300 SECONDS)\nGROUP BY username, hostname, QIDNAME(qid)\n\
    \nORDER BY starttime DESC"
  yara_l: "rule zs_per_000231 {\n  meta:\n    author = \"TDE\"\n    description = \"Authentication Package DLL Injection\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0003\"\n    technique = \"T1574\"\n\n  events:\n    $event.metadata.event_type\
    \ = \"GENERIC_EVENT\"\n    $event.metadata.product_event_type = \"4657\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-windows.sysmon_operational*,logs-system.security*

    | WHERE @timestamp > NOW() - 1 day

    | WHERE event.code IN (''4657'')

    | STATS event_count = COUNT(*) BY host.name, user.name, event.code, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT event_count DESC'
  leql: 'where(event_id IN [4657])

    groupby(hostname, username)

    calculate(count AS event_count)'
  crowdstrike: 'event_simpleName=SecurityEvent

    | where EventCode=4657

    | table ComputerName, UserName, CommandLine, ContextTimeStamp'
  xql: 'dataset = xdr_data

    | filter event_type = "PROCESS" and action_evtlog_event_id in (4657)

    | filter _time > to_timestamp(now() - 86400, "epoch")

    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time

    | sort desc _time'
  lucene: event_id:(4657)
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- persistence
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Windows Registry Modification Event

  Where the Event ID is in [567, 4657]

  Where the Registry Key is in [HKLM\SYSTEM\CurrentControlSet\Control\Lsa\, REGISTRY\MACHINE\SYSTEM\CurrentControlSet\Control\Lsa\]

  Where the Object Value "Authentication Packages"'
suppression:
  window: 12 hours
tuning_period: 7 days

rule_id: TDL-PER-000248
v4_id: 000248
name: Printer Port Monitor DLL Injection
description: Detects when a new DLL is added to the printer port monitor. Port monitors
  can be set to run at startup by the printer servier spoolsv.exe. An attacker can
  register a malicious DLL that will be run by spoolsv.exe with SYSTEM level privileges.
tactic: Persistence
tactic_id: TA0003
technique_id: T1574
technique_name: Hijack Execution Flow
platform:
- Windows
data_sources:
- Windows Operating System
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process_name IN ("spoolsv.exe")

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name,
    command_line

    | where count >= 1

    | sort - count

    '
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process_name in ("spoolsv.exe")

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName,
    ProcessCommandLine

    | order by Count desc

    '
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"\
    Process CommandLine\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process_name\" IN ('spoolsv.exe')\n\
    LAST 24 HOURS\n"
  yara_l: "rule tdl_tdl_per_000248 {\n  meta:\n    author = \"TDL\"\n    description\
    \ = \"Printer Port Monitor DLL Injection\"\n    severity = \"MEDIUM\"\n    tactic\
    \ = \"TA0003\"\n    technique = \"T1574\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process_name = /(spoolsv.exe)/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}\n"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process_name IN ("spoolsv.exe")

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name,
    process.command_line

    | SORT count DESC

    '
  leql: 'where(logset = "Endpoint Activity" AND process_name IN [spoolsv.exe])

    groupby(asset, process_name, parent_process_name)

    calculate(count)

    '
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process_name IN (spoolsv.exe)

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName,
    CommandLine

    | sort -occurrences

    '
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process_name in ("spoolsv.exe")

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name,
    causality_actor_process_image_name, action_process_image_command_line

    | sort desc occurrences

    '
  lucene: 'event.category:"process" AND process_name:(spoolsv.exe)

    '
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint*

    | parse "EventID=*\"" as event_id

    | where event_id="1" AND process_name IN ("spoolsv.exe")

    | count by host, user, parent_process_name, command_line

    | sort by _count desc

    '
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- persistence
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
suppression:
  window: 12 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the persistence artifact
  (registry path / scheduled task / service / config).'
- Inspect the parent → child process tree, command line arguments, and code-signing
  status — verify the persistence target points to an unusual location or unsigned
  binary.
- Determine when the artifact was created and which process/account performed the
  write — pivot on that process for the original attack chain.
- 'Look for prior child-process activity from the persistence target: did anything
  actually launch from it?'
- 'Decide TP / FP: FP for sanctioned management software (RMM, vendor agents, custom
  installers) — verify against the asset register.'
- 'If TP: remove the persistence artifact, isolate the host, hunt for the same artifact
  across the fleet, and rotate any credentials touched by the persistent process.'
pseudo_logic: '1 Instance over any time window of a Sysmon Process Creation event.


  From index=endpoint sourcetype=Sysmon

  Where EventCode=1 (Process Creation)

  Where process_name is "spoolsv.exe"

  With any parent_process_name and command_line captured for context

  With the same process_name, parent_process_name, and command_line as the correlation
  key

  With results aggregated to surface distinct hosts and users associated with each
  unique process invocation'

rule_id: TDL-PER-000374
v4_id: '000374'
name: Azure Guest User Privilege Escalation
description: Detects the change of user type from "Guest" to "Member" for potential elevation of privilege.
tactic: Persistence
tactic_id: TA0003
technique_id: T1098
technique_name: Account Manipulation
platform:
- Azure
data_sources:
- Azure AD
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: 'index=azure

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: |-
    SigninLogs
    | where TimeGenerated >= ago(1d)
    | project TimeGenerated, UserPrincipalName, IPAddress, Location, ResultType
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule zs_per_000374 {
      meta:
        author = "TDE"
        description = "Azure Guest User Privilege Escalation"
        severity = "HIGH"
        tactic = "TA0003"
        technique = "T1098"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-azure*,logs-o365*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- auth
- persistence
author: TDE/TDE
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: |-
  1 Azure AD Event
  Where the Event Name is in [update user]
  Where the modified property new value is in [member]
  Where the target user matches the Guest User in lookup [TDE - Azure Guest Account Tracker]
suppression:
  window: 8 hours
tuning_period: 7 days

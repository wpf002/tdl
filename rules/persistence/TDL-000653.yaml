rule_id: TDL-PER-000653
v4_id: '000653'
name: Suspicious Authentication Method Added to User Account - Azure
description: Detects a change to an authentication method which could be an indication of an attacker adding an auth method
  to the account so they can have continued access.
tactic: Persistence
tactic_id: TA0003
technique_id: T1098
technique_name: Account Manipulation
platform:
- Azure
data_sources:
- Azure Sign-in
severity: Low
fidelity: Low
lifecycle: Deployed
risk_score: 30
queries:
  spl: 'index=azure

    | table _time, host, Account_Name, IpAddress, LogonType'
  kql: 'SigninLogs

    | where TimeGenerated >= ago(1d)

    | project TimeGenerated, UserPrincipalName, IPAddress, Location, ResultType'
  aql: 'SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount

    FROM events

    WHERE INOFFSET(starttime, LAST 300 SECONDS)

    GROUP BY username, hostname, QIDNAME(qid)

    ORDER BY starttime DESC'
  yara_l: "rule zs_per_000653 {\n  meta:\n    author = \"TDL\"\n    description = \"Suspicious Authentication Method Added\
    \ to User Account - Azure\"\n    severity = \"LOW\"\n    tactic = \"TA0003\"\n    technique = \"T1098\"\n\n  events:\n\
    \    $event.metadata.event_type = \"GENERIC_EVENT\"\n    $event.principal.hostname = $host\n    $event.principal.user.userid\
    \ = $user\n\n  match:\n    $host over 5m\n\n  condition:\n    #event >= 1\n\n  outcome:\n    $risk_score = max(50)\n}"
  esql: 'FROM logs-azure*,logs-o365*

    | WHERE @timestamp > NOW() - 1 day

    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)

    | WHERE event_count >= 1

    | SORT @timestamp DESC'
  leql: 'where(logset = "Endpoint Activity")

    groupby(hostname, username)

    calculate(count AS event_count)

    having(event_count >= 1)'
  crowdstrike: 'event_simpleName=ProcessRollup2

    | stats count as proc_count by ComputerName, FileName

    | where proc_count >= 1

    | sort -proc_count'
  xql: "dataset = cloud_audit_log\n| filter event_type = \"CLOUD\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\"\
    )\n| fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort\
    \ desc _time"
  lucene: event_id:* AND log_type:"security"
  sumo: '_sourceCategory=*azure*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1098*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
false_positives:
- Legitimate admin activity
- Authorized service accounts
tuning_guidance: Tune per environment baseline.
tags:
- auth
- persistence
author: TDL
created: '2024-01-01'
last_modified: '2026-04-27'
test_method: historical
pseudo_logic: '1 Azure Sign-In Event

  Where the Event Name is "Admin registered security info"

  Where the Action is "success"'

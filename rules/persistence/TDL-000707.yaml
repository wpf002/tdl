rule_id: TDL-PER-000707
v4_id: '000707'
name: BITS Job with SetNotifyCmdLine Configured
description: "BITS job created with a notify command \u2014 BITS will execute the command when the transfer completes. Classic\
  \ stealth persistence/launch primitive. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1197 under\
  \ Persistence)."
tactic: Persistence
tactic_id: TA0003
technique_id: T1197
technique_name: BITS Jobs
platform:
- Windows
data_sources:
- Sysmon
- Windows Event Log
severity: Medium
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search process.command_line="*bitsadmin*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "bitsadmin"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "process.command_line" LIKE ''%bitsadmin%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_per_000707 {\n  meta:\n    author = \"TDL\"\n    description = \"BITS Job with SetNotifyCmdLine Configured\"\
    \n    severity = \"MEDIUM\"\n    tactic = \"TA0003\"\n    technique = \"T1197\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.process.command_line = /bitsadmin/\n    $src = $e.principal.ip\n  match:\n    $src\
    \ over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND process.command_line LIKE "%bitsadmin%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND process.command_line=/bitsadmin/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND process.command_line=*bitsadmin*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND process.command_line ~= "bitsadmin"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND process.command_line:*bitsadmin*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*windows/events*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1197*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'

rule_id: TDL-PER-000708
v4_id: 000708
name: New Browser Extension Installed Outside Managed Channel
description: Chrome/Edge/Firefox extension installed via developer-mode load or sideload, not from the managed extension policy.
  Persistence + credential-theft vector. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1176 under
  Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1176
technique_name: Browser Extensions
platform:
- Windows
- macOS
- Linux
data_sources:
- EDR
- Browser Telemetry
severity: Medium
fidelity: Medium
lifecycle: Proposed
risk_score: 55
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*extension*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "extension"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%extension%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_per_000708 {\n  meta:\n    author = \"TDL\"\n    description = \"New Browser Extension Installed Outside\
    \ Managed Channel\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0003\"\n    technique = \"T1176\"\n  events:\n    $e.metadata.event_type\
    \ = \"FILE_CREATION\"\n    $e.file.path = /extension/\n    $host = $e.principal.hostname\n  match:\n    $host over 30m\n\
    \  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%extension%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/extension/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*extension*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "extension"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*extension*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*browser*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1176*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Chrome/Edge/Firefox extension installed via developer-mode load or sideload, not from the managed extension
  policy. Persistence + credential-theft vector.
false_positives:

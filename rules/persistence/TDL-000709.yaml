rule_id: TDL-PER-000709
v4_id: 000709
name: Container Image Pushed to Production Registry by Unusual Identity
description: Push to internal/prod container registry from an identity outside the CI/CD service-account allowlist. Adversaries
  plant backdoored images for later pulls. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1525 under
  Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1525
technique_name: Implant Internal Image
platform:
- AWS
- Azure
- GCP
- Kubernetes
data_sources:
- Cloud Audit Logs
- Container Registry Logs
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: 'index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)

    | search userIdentity.arn="*registry*"

    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN

    | where count >= 1

    | sort - count'
  kql: 'union AWSCloudTrail, AzureActivity, AuditLogs

    | where TimeGenerated > ago(1d)

    | where userIdentity.arn matches regex "registry"

    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId,
    ResourceProvider))

    | order by Count desc'
  aql: "SELECT DEVICETIME, \"User Identity\", \"Event Name\", \"Source IP Address\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype)\
    \ IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')\n  AND \"userIdentity.arn\" LIKE '%registry%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_per_000709 {\n  meta:\n    author = \"TDL\"\n    description = \"Container Image Pushed to Production\
    \ Registry by Unusual Identity\"\n    severity = \"HIGH\"\n    tactic = \"TA0003\"\n    technique = \"T1525\"\n  events:\n\
    \    $e.metadata.event_type = \"USER_RESOURCE_ACCESS\"\n    $e.userIdentity.arn = /registry/\n    $actor = $e.principal.user.userid\n\
    \  match:\n    $actor over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-aws*,logs-azure*,logs-gcp*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE userIdentity.arn LIKE "%registry%"

    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id

    | SORT count DESC'
  leql: 'where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND userIdentity.arn=/registry/)

    groupby(actor, event_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=CloudOcsfApiActivity AND userIdentity.arn=*registry*

    | stats count as calls by Actor, ApiName, SourceIPAddress

    | sort -calls'
  xql: 'dataset = cloud_audit_logs

    | filter userIdentity.arn ~= "registry"

    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip

    | sort desc calls'
  lucene: event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND userIdentity.arn:*registry*
  sumo: '_sourceCategory=*cloud/audit* OR _sourceCategory=*container/registry*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1525*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: Push to internal/prod container registry from an identity outside the CI/CD service-account allowlist. Adversaries
  plant backdoored images for later pulls.

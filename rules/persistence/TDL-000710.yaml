rule_id: TDL-PER-000710
v4_id: '000710'
name: LSA Security Package or Authentication Package Registered
description: HKLM\SYSTEM\CurrentControlSet\Control\Lsa Security Packages / Authentication Packages key written. Adversaries
  register a malicious SSP DLL for credential capture and persistence. Generated from gap analysis against canonical ATT&CK
  Enterprise matrix (T1556 under Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1556
technique_name: Modify Authentication Process
platform:
- Windows
- Linux
- macOS
- Azure
- AWS
data_sources:
- Windows Event Log
- Sysmon
- Auditd
- Cloud Audit Logs
severity: Critical
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)

    | search registry.path="*lsa-package*"

    | stats count, values(host) as hosts by user, target_object, details, image

    | sort - count'
  kql: 'DeviceRegistryEvents

    | where TimeGenerated > ago(1d)

    | where registry.path matches regex "lsa-package"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Registry Key\", \"Registry Value Name\", \"Registry Value Data\", \"Process Name\"\n\
    FROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" IN ('12','13','14')\n\
    \  AND \"registry.path\" LIKE '%lsa-package%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_per_000710 {\n  meta:\n    author = \"TDL\"\n    description = \"LSA Security Package or Authentication\
    \ Package Registered\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0003\"\n    technique = \"T1556\"\n  events:\n \
    \   $e.metadata.event_type = \"REGISTRY_MODIFICATION\"\n    $e.registry.path = /lsa-package/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "registry" AND registry.path LIKE "%lsa-package%"

    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "registry" AND registry.path=/lsa-package/)

    groupby(asset, registry_key, registry_value)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry.path=*lsa-package*

    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue

    | sort -changes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.REGISTRY AND registry.path ~= "lsa-package"

    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name

    | sort desc changes'
  lucene: event.category:"registry" AND registry.path:*lsa-package*
  sumo: '_sourceCategory=*windows/events* OR _sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd* OR _sourceCategory=*cloud/audit*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1556*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: HKLM\SYSTEM\CurrentControlSet\Control\Lsa Security Packages / Authentication Packages key written. Adversaries
  register a malicious SSP DLL for credential capture and persistence.

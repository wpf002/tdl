rule_id: TDL-PER-000711
v4_id: '000711'
name: Office Application Loading Template or Add-in from User Path
description: Office app loads a .dotm/.xlam/.ppam/.wll/.xll from %APPDATA% or %TEMP%. Common Office persistence (Outlook Home
  Page, template injection, COM addins). Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1137 under
  Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1137
technique_name: Office Application Startup
platform:
- Windows
- macOS
data_sources:
- Sysmon
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=11 OR EventCode=23 OR EventCode=26)

    | search file.path="*office-addin*"

    | stats count, values(host) as hosts by user, image, target_filename

    | where count >= 1

    | sort - count'
  kql: 'DeviceFileEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "office-addin"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, FolderPath, FileName

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"File Path\", \"Process Name\"\nFROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft\
    \ Windows Sysmon'\n  AND \"EventID\" IN ('11','23','26')\n  AND \"file.path\" LIKE '%office-addin%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_per_000711 {\n  meta:\n    author = \"TDL\"\n    description = \"Office Application Loading Template\
    \ or Add-in from User Path\"\n    severity = \"HIGH\"\n    tactic = \"TA0003\"\n    technique = \"T1137\"\n  events:\n\
    \    $e.metadata.event_type = \"FILE_CREATION\"\n    $e.file.path = /office-addin/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "file" AND file.path LIKE "%office-addin%"

    | STATS count = COUNT(*) BY host.name, user.name, file.path, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "file" AND file.path=/office-addin/)

    groupby(asset, file_path, process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (FileWritten, NewExecutableWritten) AND file.path=*office-addin*

    | stats count as writes by ComputerName, UserName, FileName, ImageFileName

    | sort -writes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.FILE AND file.path ~= "office-addin"

    | comp count() as writes by agent_hostname, actor_effective_username, action_file_name, action_file_path

    | sort desc writes'
  lucene: event.category:"file" AND file.path:*office-addin*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1137*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Office app loads a .dotm/.xlam/.ppam/.wll/.xll from %APPDATA% or %TEMP%. Common Office persistence (Outlook
  Home Page, template injection, COM addins).
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:

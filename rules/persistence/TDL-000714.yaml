rule_id: TDL-PER-000714
v4_id: '000714'
name: 'Web Shell Indicator: Webserver Spawning Shell'
description: w3wp.exe / httpd / nginx spawning cmd.exe / powershell.exe / bash. Web-shell command execution. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1505 under Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1505
technique_name: Server Software Component
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Web Server Logs
severity: Critical
fidelity: High
lifecycle: Proposed
risk_score: 95
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("w3wp.exe", "cmd.exe", "powershell.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("w3wp.exe", "cmd.exe", "powershell.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('w3wp.exe', 'cmd.exe', 'powershell.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_per_000714 {
      meta:
        author = "TDL"
        description = "Web Shell Indicator: Webserver Spawning Shell"
        severity = "CRITICAL"
        tactic = "TA0003"
        technique = "T1505"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(w3wp.exe|cmd.exe|powershell.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("w3wp.exe", "cmd.exe", "powershell.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [w3wp.exe, cmd.exe, powershell.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (w3wp.exe, cmd.exe, powershell.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("w3wp.exe", "cmd.exe", "powershell.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(w3wp.exe OR cmd.exe OR powershell.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("w3wp.exe", "cmd.exe", "powershell.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
pseudo_logic: w3wp.exe / httpd / nginx spawning cmd.exe / powershell.exe / bash. Web-shell command execution.
false_positives:

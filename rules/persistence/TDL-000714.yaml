rule_id: TDL-PER-000714
v4_id: '000714'
name: 'Web Shell Indicator: Webserver Spawning Shell'
description: w3wp.exe / httpd / nginx spawning cmd.exe / powershell.exe / bash. Web-shell command execution. Generated from
  gap analysis against canonical ATT&CK Enterprise matrix (T1505 under Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1505
technique_name: Server Software Component
platform:
- Windows
- Linux
data_sources:
- Sysmon
- Web Server Logs
severity: Critical
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.parent.name="*webshell*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.parent.name matches regex "webshell"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.parent.name\" LIKE\
    \ '%webshell%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_per_000714 {\n  meta:\n    author = \"TDL\"\n    description = \"Web Shell Indicator: Webserver Spawning\
    \ Shell\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0003\"\n    technique = \"T1505\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.parent.name = /webshell/\n    $host = $e.principal.hostname\n  match:\n    $host\
    \ over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.parent.name LIKE "%webshell%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.parent.name=/webshell/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.parent.name=*webshell*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.parent.name ~= "webshell"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.parent.name:*webshell*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*web/access*

    | where technique="T1505" OR _raw matches "*T1505*"

    | count, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | sort by bytes_out desc'

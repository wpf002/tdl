rule_id: TDL-PER-000715
v4_id: '000715'
name: Inbound Connection Following Unusual UDP Knock Sequence
description: Sequence of small UDP packets to closed ports immediately followed by a TCP connection from the same source to
  a high port. Classic port-knock backdoor activation. Generated from gap analysis against canonical ATT&CK Enterprise matrix
  (T1205 under Persistence).
tactic: Persistence
tactic_id: TA0003
technique_id: T1205
technique_name: Traffic Signaling
platform:
- Windows
- Linux
- Network
data_sources:
- Firewall
- Network IDS
- Sysmon
severity: Medium
fidelity: Low
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search source.ip="*knock*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where source.ip matches regex "knock"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "source.ip" LIKE ''%knock%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_per_000715 {\n  meta:\n    author = \"TDL\"\n    description = \"Inbound Connection Following Unusual\
    \ UDP Knock Sequence\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0003\"\n    technique = \"T1205\"\n  events:\n   \
    \ $e.metadata.event_type = \"NETWORK_CONNECTION\"\n    $e.source.ip = /knock/\n    $src = $e.principal.ip\n  match:\n\
    \    $src over 10m\n  condition:\n    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND source.ip LIKE "%knock%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND source.ip=/knock/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND source.ip=*knock*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND source.ip ~= "knock"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND source.ip:*knock*

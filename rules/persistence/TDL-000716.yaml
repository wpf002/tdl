rule_id: TDL-PER-000716
v4_id: '000716'
name: Dormant Account Reactivated and Used Within 1 Hour
description: "Account with no auth in \u226590 days reactivated and immediately used to authenticate. Adversaries revive forgotten\
  \ accounts as quiet persistence. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1078 under Persistence)."
tactic: Persistence
tactic_id: TA0003
technique_id: T1078
technique_name: Valid Accounts
platform:
- Windows
- Linux
- macOS
- AWS
- Azure
- Okta
- Microsoft 365
data_sources:
- Auth Logs
- Cloud Audit Logs
- Identity Provider Logs
severity: High
fidelity: Medium
lifecycle: Proposed
queries:
  spl: 'index=network sourcetype=firewall OR sourcetype=ids

    | search user.name="*dormant*"

    | stats count, dc(dest_ip) as unique_dests, sum(bytes_out) as bytes_out by src_ip, dest_ip, dest_port

    | where count >= 1

    | sort - bytes_out'
  kql: 'union (DeviceNetworkEvents), (CommonSecurityLog | extend SourceIP=tostring(SourceIP), DestinationIP=tostring(DestinationIP))

    | where TimeGenerated > ago(1d)

    | where user.name matches regex "dormant"

    | summarize Count=count(), Bytes=sum(coalesce(SentBytes, 0)) by SourceIP, DestinationIP, DestinationPort

    | order by Bytes desc'
  aql: 'SELECT sourceip, destinationip, destinationport, SUM(eventcount) as connections, SUM(bytessrc) as bytes_out

    FROM flows

    WHERE "user.name" LIKE ''%dormant%''

    GROUP BY sourceip, destinationip, destinationport

    LAST 1 HOURS'
  yara_l: "rule tdl_tdl_per_000716 {\n  meta:\n    author = \"TDL\"\n    description = \"Dormant Account Reactivated and Used\
    \ Within 1 Hour\"\n    severity = \"HIGH\"\n    tactic = \"TA0003\"\n    technique = \"T1078\"\n  events:\n    $e.metadata.event_type\
    \ = \"NETWORK_CONNECTION\"\n    $e.user.name = /dormant/\n    $src = $e.principal.ip\n  match:\n    $src over 10m\n  condition:\n\
    \    $e\n}"
  esql: 'FROM logs-network*,logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "network" AND user.name LIKE "%dormant%"

    | STATS bytes_out = SUM(network.bytes), conns = COUNT(*) BY source.ip, destination.ip, destination.port

    | SORT bytes_out DESC'
  leql: 'where(logset = "Network Activity" AND user.name=/dormant/)

    groupby(source_ip, destination_ip, destination_port)

    calculate(count, sum(bytes_out))'
  crowdstrike: 'event_simpleName IN (NetworkConnectIP4, NetworkConnectIP6, DnsRequest) AND user.name=*dormant*

    | stats count as conns, sum(BytesSent) as bytes_out by ComputerName, RemoteAddressIP4, RemotePort

    | sort -bytes_out'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.NETWORK AND user.name ~= "dormant"

    | comp count() as conns, sum(action_total_bytes) as bytes_out by agent_hostname, action_remote_ip, action_remote_port

    | sort desc bytes_out'
  lucene: event.category:"network" AND user.name:*dormant*
  sumo: '_sourceCategory=*auth* OR _sourceCategory=*cloud/audit* OR _sourceCategory=*idp*

    | parse regex "\"userIdentity\":\{\"arn\":\"(?<actor>[^\"]+)" nodrop

    | where _raw matches "*T1078*"

    | count by actor, eventName, sourceIPAddress

    | sort by _count desc'
pseudo_logic: "Account with no auth in \u226590 days reactivated and immediately used to authenticate. Adversaries revive\

rule_id: TDL-PER-002
name: New Service Created with Suspicious Executable Path
tactic: Persistence
tactic_id: TA0003
technique_id: T1543.003
technique_name: Windows Service
platform:
- Windows
data_sources:
- Windows Security Event Log (7045)
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 80
queries:
  spl: |
    index=windows sourcetype="WinEventLog:Security"
    | search event_id IN ("7045")
    | stats count, values(host) as hosts by user, IpAddress, LogonType, EventCode
    | where count >= 1
    | sort - count
  kql: |
    SecurityEvent
    | where TimeGenerated > ago(1d)
    | where event_id in ("7045")
    | summarize Count=count() by Computer, Account, IpAddress, LogonType, EventID
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, username, hostname, "Logon Type" as logon_type, eventid
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) ILIKE '%Windows%'
      AND "event_id" IN ('7045')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_per_002 {
      meta:
        author = "TDL"
        description = "New Service Created with Suspicious Executable Path"
        severity = "HIGH"
        tactic = "TA0003"
        technique = "T1543.003"
      events:
        $e.metadata.event_type = "USER_LOGIN"
        $e.event_id = /(7045)/
        $user = $e.target.user.userid
      match:
        $user over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-windows.security*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | WHERE event.category == "authentication" AND event_id IN ("7045")
    | STATS count = COUNT(*) BY host.name, user.name, source.ip, winlog.event_data.LogonType, event.code
    | SORT count DESC
  leql: |
    where(logset IN ["Active Directory", "Asset Authentication"] AND event_id IN [7045])
    groupby(destination_account, source_ip, asset)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (UserLogon, UserLogonFailed2, AuthenticationFailedRdp) AND event_id IN (7045)
    | stats count as auth_events by ComputerName, UserName, RemoteIP, LogonType
    | sort -auth_events
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.LOGIN AND event_id in ("7045")
    | comp count() as logins by agent_hostname, actor_effective_username, action_remote_ip, action_logon_type
    | sort desc logins
  lucene: |
    event.category:"authentication" AND event_id:(7045)
  sumo: |
    _sourceCategory=*windows*security* OR _sourceCategory=*ad*
    | parse "EventID=*\"" as event_id nodrop
    | where event_id IN ("7045")
    | count by host, user, src_ip, logon_type, event_id
    | sort by _count desc
false_positives:
- Some legitimate software in non-standard paths
tags:
- service
- persistence
author: TDL
created: '2024-01-20'
test_method: purple_team
last_modified: '2026-04-28'
triage_steps:
- 'Confirm the alert metadata: timestamp, host, user, and the persistence artifact (registry path / scheduled task / service
  / config).'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the persistence target
  points to an unusual location or unsigned binary.
- Determine when the artifact was created and which process/account performed the write — pivot on that process for the original
  attack chain.
- 'Look for prior child-process activity from the persistence target: did anything actually launch from it?'
- 'Decide TP / FP: FP for sanctioned management software (RMM, vendor agents, custom installers) — verify against the asset
  register.'
- 'If TP: remove the persistence artifact, isolate the host, hunt for the same artifact across the fleet, and rotate any credentials
  touched by the persistent process.'

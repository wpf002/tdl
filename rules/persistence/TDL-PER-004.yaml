rule_id: TDL-PER-004
name: WMI Event Subscription Created for Persistence
tactic: Persistence
tactic_id: TA0003
technique_id: T1546.003
technique_name: WMI Event Subscription
platform:
- Windows
data_sources:
- Sysmon Event ID 19/20/21
severity: Critical
fidelity: High
lifecycle: Deployed
risk_score: 90
queries:
  spl: 'index=windows sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational"

    (EventCode=19 OR EventCode=20 OR EventCode=21)

    | stats values(EventCode) as event_types, count by host, user, _time

    | where count >= 2

    | table _time, host, user, event_types'
  kql: 'DeviceEvents

    | where TimeGenerated >= ago(1d)

    | where ActionType in ("WmiActivityEvent","WmiEventConsumerToFilterBinding")

    | summarize Count=count(), Types=make_set(ActionType) by DeviceName, bin(TimeGenerated,5m)

    | where Count >= 2'
  aql: |-
    SELECT LOGSOURCENAME(logsourceid) AS log_source, username, hostname, QIDNAME(qid) AS event_name, eventcount
    FROM events
    WHERE INOFFSET(starttime, LAST 300 SECONDS)
    GROUP BY username, hostname, QIDNAME(qid)
    ORDER BY starttime DESC
  yara_l: |-
    rule tdl_per_004 {
      meta:
        author = "TDL"
        description = "WMI Event Subscription Created for Persistence"
        severity = "CRITICAL"
        tactic = "TA0003"
        technique = "T1546.003"

      events:
        $event.metadata.event_type = "GENERIC_EVENT"
        $event.principal.hostname = $host
        $event.principal.user.userid = $user

      match:
        $host over 5m

      condition:
        #event >= 1

      outcome:
        $risk_score = max(50)
    }
  esql: |-
    FROM logs-windows.sysmon_operational*,logs-system.security*
    | WHERE @timestamp > NOW() - 1 day
    | STATS event_count = COUNT(*) BY host.name, user.name, @timestamp = BUCKET(@timestamp, 5m)
    | WHERE event_count >= 1
    | SORT @timestamp DESC
  leql: |-
    where(logset = "Endpoint Activity")
    groupby(hostname, username)
    calculate(count AS event_count)
    having(event_count >= 1)
  crowdstrike: |-
    event_simpleName=ProcessRollup2
    | stats count as proc_count by ComputerName, FileName
    | where proc_count >= 1
    | sort -proc_count
  xql: "dataset = xdr_data\n| filter event_type = \"PROCESS\" \n| filter _time > to_timestamp(now() - 86400, \"epoch\")\n\
    | fields hostname, actor_effective_username, action_process_image_name, action_process_command_line, _time\n| sort desc\
    \ _time"
  lucene: |-
    event_id:* AND log_type:"security"
false_positives:
- SCCM and management tools using WMI subscriptions
tags:
- wmi
- persistence
- fileless
author: TDL
created: '2024-01-22'
test_method: purple_team

rule_id: TDL-PE-000186
v4_id: 000186
name: Sudo File Modified
description: Detects a user modifying the sudoer file on a host. An attacker may attempt to escalate privileges by adding
  compromised accounts directly to the sudoer file to gain root permissions. These direct modifications should be considered
  suspicious since most sudo additions occur through the adduser or usermod commands.
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1548
technique_name: Abuse Elevation Control Mechanism
platform:
- Linux
data_sources:
- Linux Operating System
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name="*.+*"
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name matches regex ".+"
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_pe_000186 {
      meta:
        author = "TDL"
        description = "Sudo File Modified"
        severity = "HIGH"
        tactic = "TA0004"
        technique = "T1548"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name=/.+/)
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name=*.+*
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name ~= ".+"
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name matches "*.+*"
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 7 days.'
tags:
- edp
- privilege-escalation
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '1 Linux Command Line Event

  Where the Command contains "visudo"

  Where the Command contains "etc/sudoers" OR "sudoers"'
suppression:
  window: 8 hours
tuning_period: 7 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, source user, and (if visible) the resulting privileged context.'
- Inspect the file path, file hash, parent process, and any prior network/email delivery — verify the privilege gain was not
  part of an approved elevation flow (UAC consent, sudo, PAM ticket).
- 'Pull preceding 1h of activity for the source user: was there earlier credential-access / discovery / exploit telemetry?'
- 'Validate token / session changes: new SeImpersonate-style privileges, new IAM role assumption, or a SYSTEM-level child
  process from a user-level parent.'
- 'Decide TP / FP: TP if there''s no change-management correlation and no parent admin process; FP if it''s a documented elevation
  by IT.'
- 'If TP: contain the host, revoke the elevated session, sweep for other escalations using the same primitive, and notify
  identity / IR teams.'

rule_id: TDL-PE-000361
v4_id: '000361'
name: Explorer Wermgr Potential Process Injection
description: Detects suspicious command line arguments from potentially-injected versions of explorer or wermgr processes.
  This is a technique associated with QakBot malware. Investigate the parent process lineage to determine why these binaries
  are performing recon.
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1055
technique_name: Process Injection
platform:
- Windows
data_sources:
- Windows Operating System
- 'Event IDs: 4688'
severity: High
fidelity: High
lifecycle: Deployed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon EventCode=1
    | search process_name IN ("explorer.exe", "wermgr.exe")
    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line
    | where count >= 1
    | sort - count
  kql: |
    DeviceProcessEvents
    | where TimeGenerated > ago(1d)
    | where process_name in ("explorer.exe", "wermgr.exe")
    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Process Name", "Parent Process Name", "Process CommandLine"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" = '1'
      AND "process_name" IN ('explorer.exe', 'wermgr.exe')
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_pe_000361 {
      meta:
        author = "TDL"
        description = "Explorer Wermgr Potential Process Injection"
        severity = "HIGH"
        tactic = "TA0004"
        technique = "T1055"
      events:
        $e.metadata.event_type = "PROCESS_LAUNCH"
        $e.process_name = /(explorer.exe|wermgr.exe)/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*,logs-windows*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "process" AND process_name IN ("explorer.exe", "wermgr.exe")
    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND process_name IN [explorer.exe, wermgr.exe])
    groupby(asset, process_name, parent_process_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=ProcessRollup2 AND process_name IN (explorer.exe, wermgr.exe)
    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine
    | sort -occurrences
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.PROCESS AND process_name in ("explorer.exe", "wermgr.exe")
    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name, action_process_image_command_line
    | sort desc occurrences
  lucene: |
    event.category:"process" AND process_name:(explorer.exe OR wermgr.exe)
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id="1" AND process_name IN ("explorer.exe", "wermgr.exe")
    | count by host, user, parent_process_name, command_line
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: 'Tune per environment baseline. Tuning period: 14 days.'
tags:
- edp
- privilege-escalation
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: historical
pseudo_logic: '1 Windows Process Creation Event

  Where the Event ID is in [592, 4688]

  Where Process Name in ["explorer.exe", "wermgr.exe"]

  AND Command Line matches ''.*(whoami\s*(-|\/)all|arp\s*(-|\/)a|ipconfig\s*(-|\/)all|net view\s*(-|\/)all|cmd \/c set|nslookup
  -querytype=all|nltest\s*(-|\/)domain_trusts\s*(-|\/)all_trusts|net\s+share|netstat\s+(-|\/)nao|net\s+localgroup|qwinsta).*'''
tuning_period: 14 days
triage_steps:
- 'Confirm the alert metadata: timestamp, host, source user, and (if visible) the resulting privileged context.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the privilege gain was
  not part of an approved elevation flow (UAC consent, sudo, PAM ticket).
- 'Pull preceding 1h of activity for the source user: was there earlier credential-access / discovery / exploit telemetry?'
- 'Validate token / session changes: new SeImpersonate-style privileges, new IAM role assumption, or a SYSTEM-level child
  process from a user-level parent.'
- 'Decide TP / FP: TP if there''s no change-management correlation and no parent admin process; FP if it''s a documented elevation
  by IT.'
- 'If TP: contain the host, revoke the elevated session, sweep for other escalations using the same primitive, and notify
  identity / IR teams.'

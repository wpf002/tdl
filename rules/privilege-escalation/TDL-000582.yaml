rule_id: TDL-PE-000582
v4_id: 000582
name: Kubernetes Pod Created with a hostPath Mount
description: 'Detects creation of a container with a hostPath mount. A hostPath volume mounts a directory or a file from the
  node to the container. Attackers who have permissions to create a new pod in the cluster may create one with a writable
  hostPath volume and chroot to escape to the underlying node. A sigma rule by Leo Tsaousis (@laripping)


  ref: https://microsoft.github.io/Threat-Matrix-for-Kubernetes/techniques/Writable%20hostPath%20mount/

  https://blog.appsecco.com/kubernetes-namespace-breakout-using-insecure-host-path-volume-part-1-b382f2a6e216'
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1611
technique_name: Escape to Host
platform:
- Windows
data_sources:
- Kubernetes
severity: Low
fidelity: Low
lifecycle: Proposed
risk_score: 30
queries:
  spl: |
    index=cloud (sourcetype=aws:cloudtrail OR sourcetype=azure:auditlogs OR sourcetype=gcp:audit)
    | search eventName="*.+*"
    | stats count, values(sourceIPAddress) as src_ips by userIdentity.arn, eventName, resources{}.ARN
    | where count >= 1
    | sort - count
  kql: |
    union AWSCloudTrail, AzureActivity, AuditLogs
    | where TimeGenerated > ago(1d)
    | where eventName matches regex ".+"
    | summarize Count=count() by Identity, EventName=coalesce(EventName, OperationName), Resource=tostring(coalesce(ResourceId, ResourceProvider))
    | order by Count desc
  aql: |
    SELECT DEVICETIME, "User Identity", "Event Name", "Source IP Address"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) IN ('AWS CloudTrail','Azure Audit','GCP Cloud Audit')
      AND "eventName" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_pe_000582 {
      meta:
        author = "TDL"
        description = "Kubernetes Pod Created with a hostPath Mount"
        severity = "LOW"
        tactic = "TA0004"
        technique = "T1611"
      events:
        $e.metadata.event_type = "USER_RESOURCE_ACCESS"
        $e.eventName = /.+/
        $actor = $e.principal.user.userid
      match:
        $actor over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-aws*,logs-azure*,logs-gcp*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE eventName LIKE "%.+%"
    | STATS count = COUNT(*) BY user.name, event.action, cloud.account.id
    | SORT count DESC
  leql: |
    where(logset IN ["AWS CloudTrail", "Azure Audit", "GCP Audit"] AND eventName=/.+/)
    groupby(actor, event_name)
    calculate(count)
  crowdstrike: |
    event_simpleName=CloudOcsfApiActivity AND eventName=*.+*
    | stats count as calls by Actor, ApiName, SourceIPAddress
    | sort -calls
  xql: |
    dataset = cloud_audit_logs
    | filter eventName ~= ".+"
    | comp count() as calls by actor_effective_username, action_evtlog_event_name, action_remote_ip
    | sort desc calls
  lucene: |
    event.dataset:("aws.cloudtrail" OR "azure.audit" OR "gcp.audit") AND eventName:*.+*
  sumo: |
    _sourceCategory=*aws/cloudtrail* OR _sourceCategory=*azure/audit* OR _sourceCategory=*gcp/audit*
    | where eventName matches "*.+*"
    | count by userIdentity_arn, eventName, sourceIPAddress
    | sort by _count desc
false_positives:
- Security software
- Authorized admin tools
tuning_guidance: Tune per environment baseline.
tags:
- edp
- privilege-escalation
author: TDL
created: '2024-01-01'
last_modified: '2026-04-28'
test_method: none
pseudo_logic: "1 Kubernetes Event \nWhere the Resource is \"pods\"\nWhere Verb is \"create\"\nWhere \"requestObject.spec.hostPath\"\
  \ is NOT Null"
triage_steps:
- 'Confirm the alert metadata: timestamp, host, source user, and (if visible) the resulting privileged context.'
- Inspect the parent → child process tree, command line arguments, and code-signing status — verify the privilege gain was
  not part of an approved elevation flow (UAC consent, sudo, PAM ticket).
- 'Pull preceding 1h of activity for the source user: was there earlier credential-access / discovery / exploit telemetry?'
- 'Validate token / session changes: new SeImpersonate-style privileges, new IAM role assumption, or a SYSTEM-level child
  process from a user-level parent.'
- 'Decide TP / FP: TP if there''s no change-management correlation and no parent admin process; FP if it''s a documented elevation
  by IT.'
- 'If TP: contain the host, revoke the elevated session, sweep for other escalations using the same primitive, and notify
  identity / IR teams.'

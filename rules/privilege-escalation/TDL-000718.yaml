rule_id: TDL-PE-000718
v4_id: 000718
name: Logon Script (UserInitMprLogonScript) Created or Modified
description: HKCU\Environment\UserInitMprLogonScript value created/modified, or /etc/rc.local / /etc/profile.d/* written.
  Runs at next logon under target's context. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1037
  under Privilege Escalation).
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1037
technique_name: Boot or Logon Initialization Scripts
platform:
- Windows
- macOS
- Linux
data_sources:
- Sysmon
- EDR
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)

    | search registry.path="*logon-script*"

    | stats count, values(host) as hosts by user, target_object, details, image

    | sort - count'
  kql: 'DeviceRegistryEvents

    | where TimeGenerated > ago(1d)

    | where registry.path matches regex "logon-script"

    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Registry Key\", \"Registry Value Name\", \"Registry Value Data\", \"Process Name\"\n\
    FROM events\nWHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" IN ('12','13','14')\n\
    \  AND \"registry.path\" LIKE '%logon-script%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_pe_000718 {\n  meta:\n    author = \"TDL\"\n    description = \"Logon Script (UserInitMprLogonScript)\
    \ Created or Modified\"\n    severity = \"HIGH\"\n    tactic = \"TA0004\"\n    technique = \"T1037\"\n  events:\n    $e.metadata.event_type\
    \ = \"REGISTRY_MODIFICATION\"\n    $e.registry.path = /logon-script/\n    $host = $e.principal.hostname\n  match:\n  \
    \  $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "registry" AND registry.path LIKE "%logon-script%"

    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND log_type = "registry" AND registry.path=/logon-script/)

    groupby(asset, registry_key, registry_value)

    calculate(count)'
  crowdstrike: 'event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry.path=*logon-script*

    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue

    | sort -changes'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.REGISTRY AND registry.path ~= "logon-script"

    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name

    | sort desc changes'
  lucene: event.category:"registry" AND registry.path:*logon-script*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1037*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: HKCU\Environment\UserInitMprLogonScript value created/modified, or /etc/rc.local / /etc/profile.d/* written.
  Runs at next logon under target's context.
false_positives:

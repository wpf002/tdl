rule_id: TDL-PE-000719
v4_id: 000719
name: New Windows Service Created With Binary in User Path
description: sc create / New-Service / direct registry create under HKLM\SYSTEM\CurrentControlSet\Services with ImagePath
  in %TEMP%/%APPDATA%. Service runs as SYSTEM at next start. Generated from gap analysis against canonical ATT&CK Enterprise
  matrix (T1543 under Privilege Escalation).
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1543
technique_name: Create or Modify System Process
platform:
- Windows
- macOS
- Linux
data_sources:
- Sysmon
- EDR
- Auditd
severity: High
fidelity: High
lifecycle: Proposed
risk_score: 75
queries:
  spl: |
    index=endpoint sourcetype=Sysmon (EventCode=12 OR EventCode=13 OR EventCode=14)
    | search registry_key="*.+*"
    | stats count, values(host) as hosts by user, target_object, details, image
    | sort - count
  kql: |
    DeviceRegistryEvents
    | where TimeGenerated > ago(1d)
    | where registry_key matches regex ".+"
    | summarize Count=count() by DeviceName, InitiatingProcessFileName, RegistryKey, RegistryValueName, RegistryValueData
    | order by Count desc
  aql: |
    SELECT DEVICETIME, sourceip, "Registry Key", "Registry Value Name", "Registry Value Data", "Process Name"
    FROM events
    WHERE LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'
      AND "EventID" IN ('12','13','14')
      AND "registry_key" LIKE '%.+%'
    LAST 24 HOURS
  yara_l: |
    rule tdl_tdl_pe_000719 {
      meta:
        author = "TDL"
        description = "New Windows Service Created With Binary in User Path"
        severity = "HIGH"
        tactic = "TA0004"
        technique = "T1543"
      events:
        $e.metadata.event_type = "REGISTRY_MODIFICATION"
        $e.registry_key = /.+/
        $host = $e.principal.hostname
      match:
        $host over 30m
      condition:
        $e
    }
  esql: |
    FROM logs-endpoint*
    | WHERE @timestamp > NOW() - 1 hour
    | WHERE event.category == "registry" AND registry_key LIKE "%.+%"
    | STATS count = COUNT(*) BY host.name, user.name, registry.path, registry.value, process.name
    | SORT count DESC
  leql: |
    where(logset = "Endpoint Activity" AND log_type = "registry" AND registry_key=/.+/)
    groupby(asset, registry_key, registry_value)
    calculate(count)
  crowdstrike: |
    event_simpleName IN (RegSystemConfigValueUpdate, RegGenericValueUpdate) AND registry_key=*.+*
    | stats count as changes by ComputerName, UserName, RegObjectName, RegStringValue
    | sort -changes
  xql: |
    dataset = xdr_data
    | filter event_type = ENUM.REGISTRY AND registry_key ~= ".+"
    | comp count() as changes by agent_hostname, actor_effective_username, action_registry_key_name, action_registry_value_name
    | sort desc changes
  lucene: |
    event.category:"registry" AND registry_key:*.+*
  sumo: |
    _sourceCategory=*sysmon* OR _sourceCategory=*endpoint*
    | parse "EventID=*\"" as event_id
    | where event_id IN ("12","13","14") AND registry_key matches "*.+*"
    | count by host, user, registry_key, registry_value, image
    | sort by _count desc
pseudo_logic: sc create / New-Service / direct registry create under HKLM\SYSTEM\CurrentControlSet\Services with ImagePath
  in %TEMP%/%APPDATA%. Service runs as SYSTEM at next start.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: Proposed rule generated from ATT&CK gap analysis — review the pseudo_logic, scope filters to the right asset
  group, and refine thresholds using ≥7 days of telemetry before promoting.
tuning_period: 14 days
tags:

rule_id: TDL-PE-000721
v4_id: '000721'
name: Unprivileged Process Spawning Elevated Child via Known LPE Pattern
description: Non-admin process spawns a SYSTEM/root child without UAC consent prompt; or kernel module load with no preceding
  signed-driver event. Indicates LPE exploit. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1068
  under Privilege Escalation).
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1068
technique_name: Exploitation for Privilege Escalation
platform:
- Windows
- Linux
- macOS
data_sources:
- EDR
- Sysmon
- Auditd
severity: Critical
fidelity: Medium
lifecycle: Proposed
risk_score: 85
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.user.id="*elevation*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.user.id matches regex "elevation"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.user.id\" LIKE\
    \ '%elevation%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_pe_000721 {\n  meta:\n    author = \"TDL\"\n    description = \"Unprivileged Process Spawning Elevated\
    \ Child via Known LPE Pattern\"\n    severity = \"CRITICAL\"\n    tactic = \"TA0004\"\n    technique = \"T1068\"\n  events:\n\
    \    $e.metadata.event_type = \"PROCESS_LAUNCH\"\n    $e.process.user.id = /elevation/\n    $host = $e.principal.hostname\n\
    \  match:\n    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.user.id LIKE "%elevation%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.user.id=/elevation/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.user.id=*elevation*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.user.id ~= "elevation"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.user.id:*elevation*
  sumo: '_sourceCategory=*endpoint/edr* OR _sourceCategory=*sysmon* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1068*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Non-admin process spawns a SYSTEM/root child without UAC consent prompt; or kernel module load with no preceding
  signed-driver event. Indicates LPE exploit.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:

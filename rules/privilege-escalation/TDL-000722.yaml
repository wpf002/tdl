rule_id: TDL-PE-000722
v4_id: '000722'
name: Trusted Binary Loading DLL from Application Directory
description: Microsoft-signed binary loads an unsigned DLL from its application directory or %APPDATA%. Side-load / search-order
  hijack pattern. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1574 under Privilege Escalation).
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1574
technique_name: Hijack Execution Flow
platform:
- Windows
- macOS
- Linux
data_sources:
- Sysmon
- EDR
severity: High
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search file.path="*dll-side-load*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where file.path matches regex "dll-side-load"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"file.path\" LIKE '%dll-side-load%'\n\
    LAST 24 HOURS"
  yara_l: "rule tdl_tdl_pe_000722 {\n  meta:\n    author = \"TDL\"\n    description = \"Trusted Binary Loading DLL from Application\
    \ Directory\"\n    severity = \"HIGH\"\n    tactic = \"TA0004\"\n    technique = \"T1574\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.file.path = /dll-side-load/\n    $host = $e.principal.hostname\n  match:\n    $host over\
    \ 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND file.path LIKE "%dll-side-load%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND file.path=/dll-side-load/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND file.path=*dll-side-load*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND file.path ~= "dll-side-load"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND file.path:*dll-side-load*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*endpoint/edr*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1574*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: Microsoft-signed binary loads an unsigned DLL from its application directory or %APPDATA%. Side-load / search-order
  hijack pattern.
false_positives:
- Sanctioned admin or engineering activity
- Approved automation / CI workflows
tuning_guidance: "Proposed rule generated from ATT&CK gap analysis \u2014 review the pseudo_logic, scope filters to the right\
  \ asset group, and refine thresholds using \u22657 days of telemetry before promoting."
tuning_period: 14 days
tags:
- dll-hijack
- search-order
- side-load
- t1574
- privilege-escalation
references:
- https://attack.mitre.org/techniques/T1574/
author: TDL gap-analysis generator
created: '2026-04-27'
last_modified: '2026-04-27'
test_method: none
triage_steps:
- 'Confirm the alert metadata: timestamp, host, source user, and (if visible) the resulting privileged context.'
- "Inspect the parent \u2192 child process tree, command line arguments, and code-signing status \u2014 verify the privilege\
  \ gain was not part of an approved elevation flow (UAC consent, sudo, PAM ticket)."
- 'Pull preceding 1h of activity for the source user: was there earlier credential-access / discovery / exploit telemetry?'
- 'Validate token / session changes: new SeImpersonate-style privileges, new IAM role assumption, or a SYSTEM-level child
  process from a user-level parent.'
- 'Decide TP / FP: TP if there''s no change-management correlation and no parent admin process; FP if it''s a documented elevation
  by IT.'
- 'If TP: contain the host, revoke the elevated session, sweep for other escalations using the same primitive, and notify
  identity / IR teams.'

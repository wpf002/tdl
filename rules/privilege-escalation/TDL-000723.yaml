rule_id: TDL-PE-000723
v4_id: '000723'
name: Scheduled Task Configured to Run as SYSTEM
description: schtasks /create /ru SYSTEM, or task XML RunLevel=HighestAvailable with UserId=NT AUTHORITY\SYSTEM. Scheduled
  escalation primitive. Generated from gap analysis against canonical ATT&CK Enterprise matrix (T1053 under Privilege Escalation).
tactic: Privilege Escalation
tactic_id: TA0004
technique_id: T1053
technique_name: Scheduled Task/Job
platform:
- Windows
- Linux
- macOS
data_sources:
- Sysmon
- Windows Event Log
- Auditd
severity: Medium
fidelity: High
lifecycle: Proposed
queries:
  spl: 'index=endpoint sourcetype=Sysmon EventCode=1

    | search process.command_line="*schtasks-system*"

    | stats count, values(host) as hosts, values(user) as users by process_name, parent_process_name, command_line

    | where count >= 1

    | sort - count'
  kql: 'DeviceProcessEvents

    | where TimeGenerated > ago(1d)

    | where process.command_line matches regex "schtasks-system"

    | summarize Count=count() by DeviceName, AccountName, FileName, InitiatingProcessFileName, ProcessCommandLine

    | order by Count desc'
  aql: "SELECT DEVICETIME, sourceip, \"Process Name\", \"Parent Process Name\", \"Process CommandLine\"\nFROM events\nWHERE\
    \ LOGSOURCETYPENAME(devicetype) = 'Microsoft Windows Sysmon'\n  AND \"EventID\" = '1'\n  AND \"process.command_line\"\
    \ LIKE '%schtasks-system%'\nLAST 24 HOURS"
  yara_l: "rule tdl_tdl_pe_000723 {\n  meta:\n    author = \"TDL\"\n    description = \"Scheduled Task Configured to Run as\
    \ SYSTEM\"\n    severity = \"MEDIUM\"\n    tactic = \"TA0004\"\n    technique = \"T1053\"\n  events:\n    $e.metadata.event_type\
    \ = \"PROCESS_LAUNCH\"\n    $e.process.command_line = /schtasks-system/\n    $host = $e.principal.hostname\n  match:\n\
    \    $host over 30m\n  condition:\n    $e\n}"
  esql: 'FROM logs-endpoint*,logs-windows*

    | WHERE @timestamp > NOW() - 1 hour

    | WHERE event.category == "process" AND process.command_line LIKE "%schtasks-system%"

    | STATS count = COUNT(*) BY host.name, user.name, process.name, process.parent.name, process.command_line

    | SORT count DESC'
  leql: 'where(logset = "Endpoint Activity" AND process.command_line=/schtasks-system/)

    groupby(asset, process_name, parent_process_name)

    calculate(count)'
  crowdstrike: 'event_simpleName=ProcessRollup2 AND process.command_line=*schtasks-system*

    | stats count as occurrences by ComputerName, UserName, FileName, ParentBaseFileName, CommandLine

    | sort -occurrences'
  xql: 'dataset = xdr_data

    | filter event_type = ENUM.PROCESS AND process.command_line ~= "schtasks-system"

    | comp count() as occurrences by agent_hostname, actor_effective_username, action_process_image_name, causality_actor_process_image_name,
    action_process_image_command_line

    | sort desc occurrences'
  lucene: event.category:"process" AND process.command_line:*schtasks-system*
  sumo: '_sourceCategory=*sysmon* OR _sourceCategory=*windows/events* OR _sourceCategory=*linux/auditd*

    | parse "EventID=*\"" as event_id nodrop

    | where event_id="1" AND _raw matches "*T1053*"

    | count by host, user, parent_process_name, command_line

    | sort by _count desc'
pseudo_logic: schtasks /create /ru SYSTEM, or task XML RunLevel=HighestAvailable with UserId=NT AUTHORITY\SYSTEM. Scheduled
  escalation primitive.

title: Unauthorized WaveDownload Event - Salesforce
id: TDL-COL-000417
status: stable
description: Wave Download events represent downloads made from lens explorations and dashboard widgets
  in the Tableau CRM user interface. A Wave Download event type is captured when a user downloads images
  ( .png ), Microsoft Excel data ( .xls ), or comma-separated values ( .csv ) files.

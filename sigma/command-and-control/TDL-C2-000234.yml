title: Suspicious Webserver Script Location
id: TDL-C2-000234
status: experimental
description: Detects a host sending a request to a script file on a web server that is not in a normal
  web directory. Attackers will often upload web shell scripts to uncommon directories to avoid detection
  and be able to continue their attack.

title: C2 Callback - Multiple External Hosts
id: TDL-C2-000311
status: stable
description: Detects outbound traffic flagged by the IDS as malware communications back to a command and
  control server from multiple hosts. Infected hosts need to maintain contact with a C2 server in order
  to receive updates and commands  to further their objective. Multiple internal hosts demonstrating this
  activity could indicate a widespread botnet infection.

title: Wireless AP Broadcast Deauthentication
id: TDL-CA-000059
status: experimental
description: Detects a wireless deauthentication request that is sent to the broadcast MAC address of
  the wireless access point. The majority of wireless attacks on access points begin with the attacker
  capturing a client’s authentication. By sending a broadcast deauthentication packet, the access point
  will deauthenticate all clients on the network and an attacker can then capture their re-authentications.

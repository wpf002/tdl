title: DC Sync Attack
id: TDL-CA-000143
status: experimental
description: Detects an attacker performing a DCSync attack which involves taking advantage of the Directory
  Replication Service Remote (DRSR) protocol to obtain sensitive information from a DC such as password
  hashes for domain users. This is preformed by the attacker masquerading their host as a domain controller
  and tricking an authentic DC to synchromize its database to it.

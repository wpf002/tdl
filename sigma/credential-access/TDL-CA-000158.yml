title: POST to Threat Domain
id: TDL-CA-000158
status: stable
description: This rule is designed to detect a POST request to a domain found on a Threat Intelligence
  Feed. POST requests are used to upload data and can indicate an attempt to exfiltrate data to a threat
  host.

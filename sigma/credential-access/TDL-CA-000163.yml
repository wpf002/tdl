title: Promiscuous Mode Enabled
id: TDL-CA-000163
status: experimental
description: This rule is designed to detect a network interface card entering promiscuous mode. Once
  a network interface card has been switched to promiscuous mode and encryption is not used, an attacker
  could see traffic from other hosts on the network.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.credential-access
- attack.t1040
- detection.net
- detection.credential-access
logsource:
  service: syslog
  product: linux
detection:
  selection:
    Keywords:
    - Promiscuous Mode Enabled
  condition: selection
falsepositives:
- Authorized scanners
- Monitoring agents
level: high
custom:
  v4_id: '000163'

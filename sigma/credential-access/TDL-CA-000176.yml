title: Password Reset Tracker
id: TDL-CA-000176
status: stable
description: Detects recent password changes throughout the environment and adds the use to a list that
  is excluded from brute force attacks. Hosts and other devices maybe slow to update passwords and could
  generate false positives. The source IP and username is added to a tracker list.

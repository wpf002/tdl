title: Shadow File Accessed
id: TDL-CA-000180
status: stable
description: The /etc/shadow file on a Linux system is an extremely sensitive file that contains credential
  information. Exposure of these files can result in an attacker capturing password hashes that can be
  taken offline and eventually cracked. Attackers have also been seen appending entries to the shadow
  file in order to escalate their privileges. Any attempt to view, copy, or edit this file should be investigated
  for expected use.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:

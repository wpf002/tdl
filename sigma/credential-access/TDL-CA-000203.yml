title: Active Directory Database Dump
id: TDL-CA-000203
status: experimental
description: Detects when a user dumps the Active Directory Database file ntds.dit using the built in
  windows tool ntdsutil. The ntds.dit file contains all of the user and group information in Active Directory.
  By using the utility ntdsutil, an attacker can create a copy of the database and extract user credentials
  from it offline.

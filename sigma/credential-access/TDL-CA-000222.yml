title: Group Policy Password Enumeration
id: TDL-CA-000222
status: stable
description: When attempting to pivot within an internal AD network, attackers will query the Domain Controllers
  for passwords stored within group policy files. This is typically done by querying the SYSVOL share
  and searching for multiple .xml files.

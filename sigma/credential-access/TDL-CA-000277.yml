title: Stealth Account Guessing
id: TDL-CA-000277
status: experimental
description: Detects a potential low and slow account guessing attack against Windows accounts. Attackers
  may attempt to determine if a username exists by authenticating with a username and observing error
  messages received. The guessed usernames may be default accounts for applications or permutations the
  organization's naming convention. Once the attacker has determined if a username exists, they can target
  the existing accounts with password spraying attacks. The attacker, in this instance, is preforming
  the account guessing at a slow rate to avoid detection.

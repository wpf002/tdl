title: Kubernetes User Attached to a Pod
id: TDL-CA-000579
status: experimental
description: Detect when a user attaches to a pod. A user should not need to attach to a pod. Attaching
  to a pod allows a user to attach to any process in a running container which may give an attacker access
  to sensitive data.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.credential-access
- attack.t1552
- detection.auth
- detection.credential-access
logsource:
  service: security
  product: windows
detection:
  selection:
    Keywords:
    - Kubernetes User Attached to a Pod
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: 000579

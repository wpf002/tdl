title: Golden Ticket Activity
id: TDL-CA-000590
status: experimental
description: Detects when a source generates a ticket granting service (TGS) event without a ticket granting
  ticket (TGT) event, which means a Golden Ticket may be used within the environment. Adversaries who
  have the KRBTGT account password hash may forge Kerberos ticket-granting tickets (TGT), also known as
  a golden ticket. Using a golden ticket, adversaries are then able to request ticket granting service
  (TGS) tickets, which enable access to specific resources. Golden tickets require adversaries to interact
  with the Key Distribution Center (KDC) in order to obtain TGS.

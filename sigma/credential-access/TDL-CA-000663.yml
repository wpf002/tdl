title: Windows Replay Attack Detected
id: TDL-CA-000663
status: experimental
description: This rule identifies potential replay attacks on Windows systems. Replay attacks involve
  capturing and reusing valid authentication tokens or network traffic to gain unauthorized access. This
  detection focuses on anomalies such as repeated Kerberos authentication errors (e.g., KRB_AP_ERR_REPEAT
  ) or unusual patterns in authentication attempts.

title: Directory Service Restore Mode Account Password Modification
id: TDL-CA-000694
status: experimental
description: Detects potential attempts made to set the Directory Services Restore Mode administrator
  password. The Directory Service Restore Mode (DSRM) account is a local administrator account on Domain
  Controllers. Attackers may change the password in order to obtain persistence.

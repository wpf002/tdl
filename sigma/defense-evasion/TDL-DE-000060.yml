title: Rogue DHCP Server
id: TDL-DE-000060
status: stable
description: Detects a host that is not a DHCP server communicating over DHCP ports to clients. An attacker
  can execute a man-in-the-middle attack by responding to a DHCP request before the legitimate server.
  The malicious DHCP lease can set the client’s default gateway to a compromised host, where the attacker
  can intercept and read all of the client’s traffic.

title: Sensitive Registry Key Modification - HVT
id: TDL-DE-000201
status: experimental
description: Windows log all registry keys that are modified on a system. If a registry key is modified
  that includes the file name detected by antivirus, there is evidence that execution may have taken place
  and the rule will create an event for correlation with other indicators of compromise.

title: Root Certificate Installed
id: TDL-DE-000230
status: experimental
description: Detects when a new root certificate is installed using the certutil.exe utility. Attackers
  could install certificates for their malicious web servers so the host will trust the web site and not
  prompt a warning for the user. An attacker can also clone root certificates, sign malicious code, and
  then reinstall the certificates so the code appears signed by trusted vendors.

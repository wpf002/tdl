title: Suspicious POST Request to Image - Webserver
id: TDL-DE-000235
status: experimental
description: Detects a host sending a POST request to an image file. Attackers can embed web shell code
  inside the EXIF metadata of an image to bypass file upload restrictions and the server will interpret
  the file as an image while also executing it as a script.

title: Local Firewall Modified
id: TDL-DE-000247
status: stable
description: Detects when the Windows Firewall is disabled or modified on a  host. Malware typically works
  to disable security features on hosts. While this method is typically considered noisy malicious activity,
  any tampering of the Windows Firewall service is considered an indicator of compromise on a machine.

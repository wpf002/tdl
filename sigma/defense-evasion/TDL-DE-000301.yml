title: Google Workspace Application Removed from Blocklist
id: TDL-DE-000301
status: stable
description: Detects when a user with Google Workspace administrative permissions removes an application
  from the explicit block list to allow distribution of the application amongst users. This may also indicate
  the unauthorized use of an application that had been previously blocked before by a user with admin
  privileges.
references: []

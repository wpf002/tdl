title: Domain Added to Google Workspace Trusted Domains
id: TDL-DE-000302
status: stable
description: Detects when a domain is added to the list of trusted Google Workspace domains. An adversary
  may add a trusted domain in order to collect and exfiltrate data from their target’s organization with
  less restrictive security controls.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.defense-evasion
- attack.t1484
- detection.auth
- detection.defense-evasion
logsource:
  category: generic
detection:
  selection:
    Keywords:
    - Domain Added to Google Workspace Trusted Domains
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: low
custom:
  v4_id: '000302'

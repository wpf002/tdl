title: Google Workspace Bitlocker Setting Disabled
id: TDL-DE-000303
status: stable
description: Detects when an administrative user disables BitLocker drive encryption, which can be used
  in Google Workspace to mitigate unauthorized data access on lost or stolen computers. Adversaries with
  valid account access may disable BitLocker to access sensitive data on an endpoint added to Google Workspace
  device management.
references: []

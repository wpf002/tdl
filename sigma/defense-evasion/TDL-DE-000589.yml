title: Pass the Ticket Attack Activity
id: TDL-DE-000589
status: experimental
description: Detects when a source generates ticket granting service (TGS) events without ticket granting
  ticket (TGT) events, which means a Pass the Ticket attack may be occurring. Adversaries may "pass the
  ticket" using stolen Kerberos tickets to move laterally within an environment, bypassing normal system
  access controls. Pass the ticket (PtT) is a method of authenticating to a system using Kerberos tickets
  without having access to an account's password.

title: Windows Active Directory Object WriteDAC Access
id: TDL-DE-000661
status: experimental
description: Detects instances where WriteDAC permissions are modified or accessed. WriteDAC allows users
  to change the discretionary access control list (DACL) of an object, which defines the permissions for
  that object. Unauthorized or unexpected changes to WriteDAC permissions can indicate potential privilege
  escalation or malicious activity.

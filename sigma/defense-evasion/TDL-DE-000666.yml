title: Ptrace Anti Debugging Activity - GuardDuty
id: TDL-DE-000666
status: experimental
description: This detection looks for a process running on the listed Amazon EC2 instance or a container
  within your AWS environment that has used the ptrace system call with the PTRACE_TRACEME option. This
  activity would cause an attached debugger to detach from the running process. If no debugger is attached,
  it has no effect. However, the activity in itself raises suspicion because this might indicate that
  malware is running on the system. Malware frequently uses anti-debugging techniques to evade analysis,
  and these techniques can be detected at runtime. GuardDuty examines related runtime activity and context
  so that it generates this finding only when the associated activity and context are potentially suspicious.

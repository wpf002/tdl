description: This detection looks for a sequence of suspicious actions indicative of data compromise in
  one or more Amazon Simple Storage Service (Amazon S3) buckets, by using potentially compromised AWS
  credentials. Multiple suspicious and anomalous attack behaviors (API requests) were observed, resulting
  in higher confidence of the credentials are being misused.

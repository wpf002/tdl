title: Mass User Typosquatting Domain Access
id: TDL-DE-000672
status: experimental
description: Detects a mass amount of  web traffic from unqiue users to a web domain that appears to be
  similar to a company's domain. Typosquatting can be used in targeted phishing attempts for credentials
  or to deploy malware. The list of domains is pulled by using DNS Twister

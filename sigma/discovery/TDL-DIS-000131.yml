title: AWS User Enumeration
id: TDL-DIS-000131
status: stable
description: Detects when a host executes AWS API calls that match enumeration tool behavior. Once an
  attacker obtains an API key for a user, they will attempt to enumerate the permissions of the user to
  determine which API calls they can use.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.discovery
- attack.t1069
- detection.auth
- detection.discovery
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - AWS User Enumeration
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: '000131'

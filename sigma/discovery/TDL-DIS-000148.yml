title: Vulnerability Scan - Outbound
id: TDL-DIS-000148
status: stable
description: Detects a vulnerability scan from one internal host to an external host. Attackers will use
  vulnerability scans to perform reconnaissance to determine vulnerable services on the target. This could
  be  a compromised internal host attempting to scan other organizations’ networks for vulnerabilities
  in order to pivot.

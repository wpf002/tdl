title: Vulnerability Sweep - Outbound
id: TDL-DIS-000149
status: stable
description: Detects a single exploit attempted from one internal host against multiple external hosts.
  Instead of running a noisy vulnerability scan, an attacker will try a targeted exploit against several
  suspected vulnerable hosts or services.  This could be  a compromised internal host attempting to scan
  other organizations’ networks for vulnerabilities in order to pivot.

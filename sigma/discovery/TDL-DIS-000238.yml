title: Webserver Admin Portal Scanning
id: TDL-DIS-000238
status: stable
description: Detects an external IP address that performs multiple HTTP requests for an admin portal on
  a public-facing web server. This could indicates an attacker is searching for an open admin portal to
  potentially launch attacks against. This attack is common against websites built with WordPress and
  PHP.

title: Excessive Webserver Errors from Host
id: TDL-DIS-000239
status: stable
description: Detects a host sending a high volume of requests that result in errors from the web server.
  During their exploitation, attackers may try an exploit several times, with different obfuscation or
  techniques in order to successfully exploit the server. Launching these exploits may result in errors
  from the server for invalid methods, requests, or form data that could indicate an attacker performing
  this attack.

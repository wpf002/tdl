title: Calls for List Buckets Potential Enumeration - GCP
id: TDL-DIS-000319
status: stable
description: Detects a service account listing buckets which may be an attempt to enumerate the list of
  buckets within an instance. Service accounts typically do not need to list storage buckets because they
  are already configured to access the buckets they need.
references: []

title: Container Launched with Sensitive Mount - GuardDuty
id: TDL-DIS-000348
status: stable
description: Detects when a container was launched with a configuration that included a sensitive host
  path with write access in the volumeMounts section. This makes the sensitive host path accessible and
  writable from inside the container. This technique is commonly used by adversaries to gain access to
  the host's filesystem.

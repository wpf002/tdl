title: Persistent Malware
id: TDL-EXE-000048
status: stable
description: Detects a specific piece of malware that is repeatedly detected and cleaned by the AV on
  a system. This could indicate that the AV is leaving remnants of the malware when deleting it that cause
  it to be installed again after it has been cleaned. This could also be an indication that a user has
  bad network practice and is repeatedly infected with the same malware.

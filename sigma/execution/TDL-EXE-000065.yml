title: Executable File Downloaded from Shortened URL
id: TDL-EXE-000065
status: stable
description: URL shortening services such as Bitly, Google, and Twitter in which a URL may be made substantially
  shorter and still direct to the required page are used for many legitimate purposes such as messaging
  technologies that limit the number of characters in a message (for example SMS, twitter, etc).

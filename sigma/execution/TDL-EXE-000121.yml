title: Scheduled Task Created - HVT
id: TDL-EXE-000121
status: stable
description: Detects a new scheduled task created on a HVT host. Attackers typically establish persistent
  access by creating a scheduled task to run code at regular intervals. This alert will be sent in a weekly
  report for the tuning period of 30 days until a baseline can be established.

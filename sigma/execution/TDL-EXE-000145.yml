title: External Reconnaissance Followed by Malicious Callback
id: TDL-EXE-000145
status: experimental
description: This rule is designed to track external reconnaissance attribution to malware infections
  due to zero day exploits. If a zero-day exploit were to occur, the IDS signatures will not detect the
  exploit leaving the target vulnerable to repeated attacks.

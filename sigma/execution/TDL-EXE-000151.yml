title: Service Installation - HVT
id: TDL-EXE-000151
status: stable
description: Detects a new service installed on a HVT host. Attackers will commonly establish persistent
  access to a compromised host by installing a new service to run their code. HVT hosts should not typically
  have frequent service installations, so any instances should be considered suspicious. The alert will
  be sent as a report for the first 30 days then moved to an alert.

title: Malware Found with Registry Modification
id: TDL-EXE-000155
status: experimental
description: This rule is designed to alert on Antivirus detections where a registry key such as the ‘Run’
  or ‘RunOnce’ keys have been modified. This can occur where Antivirus is delayed in its detection and
  response.

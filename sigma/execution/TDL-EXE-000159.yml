title: Executable File Downloaded from WordPress Site
id: TDL-EXE-000159
status: stable
description: WordPress sites are often quickly established and legitimate executables that would be expected
  within an organization are not often hosted on WordPress sites. This could indicate an attacker attempting
  to download malicious files from a WordPress site they stood up.

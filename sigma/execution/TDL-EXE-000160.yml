title: Executable File Downloaded from Punycode URL
id: TDL-EXE-000160
status: stable
description: Detects when an executable file is downloaded from a punycode URL. Punycode is an encoding
  that converts Unicode characters into ASCII and browsers will automatically convert the punycode URL
  into Unicode. Attackers can exploit this for their purposes by registering a punycode domain that, when
  decoded, appears similar to a legitimate domain.

title: MS Office Spawning Command Line Tools
id: TDL-EXE-000171
status: experimental
description: Detects an embedded Microsoft Office application macro attempting to spawn command line tools
  such as cmd.exe or powershell.exe. In recent years, attackers have been embedding macros in Office applications
  to run these command line tools to compromise the host.

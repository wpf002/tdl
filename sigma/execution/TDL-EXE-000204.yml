title: Non-standard Process Launching Windows Process
id: TDL-EXE-000204
status: experimental
description: Detects when a default Windows process is launched by a non-standard process. Windows processes
  have defined execution paths and are supposed to be executed by certain other processes and a standard
  process being executed by a different process may indicate an attacker has executed a malicious copy
  or is tampering with the process or its modules.

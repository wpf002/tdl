title: Cylance Script Control Violation
id: TDL-EXE-000219
status: stable
description: Detects when Cylance has performed a block or quarantine action on a Macro-enabled script
  from Microsoft Office products. By default, script control is enabled however blocking macros is a setting
  that must be configured. While macro scripts in office documents are normal in an enterprise environment,
  attackers can utilize them to download malicious files or perform other malicious actions.

title: Vulnerable Process Launching Shell
id: TDL-EXE-000232
status: stable
description: Detects when a browser or applications associated with a browser launches a script or shell
  process on the target host. Browsers and other applications such as Java or Flash are commonly targeted
  by attackers hosting malicious web sites. Malicious scripts on the site will automatically exploit vulnerable
  versions of the software and allow the attacker to execute code or drop files on the host.

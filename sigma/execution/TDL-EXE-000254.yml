title: Traffic Pattern to Randomly Generated Domain
id: TDL-EXE-000254
status: experimental
description: Detects when a single ip performs multiple connections to a randomly generated domain. Botnets
  commonly use Domain Generation Algorithms, DGA, to generate and register domains for Command and Control
  purposes. This could be an indication that the impacted host is infected.

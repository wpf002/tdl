title: Command Executed Within Kube-System Namespace - GuardDuty
id: TDL-EXE-000347
status: stable
description: Detects when a command is executed within the kube-system namespace. The kube-system namespace
  is a default namespace, which is primarily used for system level components such as kube-dns and kube-proxy.
  It is very uncommon to execute commands inside pods or containers under kube-system namespace and may
  indicate suspicious activity.

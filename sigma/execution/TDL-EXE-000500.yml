title: High Severity Malware Detected
id: TDL-EXE-000500
status: experimental
description: This rule is designed to alert on malware with a high severity detected by CrowdStrike. Investigation
  on the file and host should be performed even if the action was blocked or quarantined. As well as a
  RCA to determine how the file got on the host.

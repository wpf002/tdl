title: Kubernetes Pod Created in Kube Namespace
id: TDL-EXE-000572
status: experimental
description: Detect when a user is creating a pod in one of the Kubernetes default namespaces. The only
  users creating pods in the kube-system namespace should be cluster administrators. Furthermore, it is
  best practice to not run any cluster critical infrastructure in the kube-system namespace. The kube-public
  namespace is intended for Kubernetes objects which should be readable by unauthenticated users. Thus,
  a pod should likely not be created in the kube-public namespace.
references: []

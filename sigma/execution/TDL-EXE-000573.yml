title: Kubernetes Pod Created with hostNetwork
id: TDL-EXE-000573
status: experimental
description: Detect when a pod is attached to the host network. Attaching the hostNetwork permits a pod
  to access the node’s network adapter allowing a pod to listen to all network traffic for all pods on
  the node and communicate with other pods on the network namespace.

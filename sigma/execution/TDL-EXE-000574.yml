title: Privileged Kubernetes Pod Created
id: TDL-EXE-000574
status: experimental
description: Privileged containers have all capabilities of the host machine. These privileged containers
  may perform actions directly on the host that they are running on. Ensure that this event is expected
  and occurs from a user account or IP address that normally works with privileged containers within the
  cluster. Customers are encouraged to set up an exclusion list for spec.securitycontext.capabilities
  for pods that are frequently going to be managed with privileged escalation.

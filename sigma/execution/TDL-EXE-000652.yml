title: Azure Automation Account Created
id: TDL-EXE-000652
status: stable
description: Detects when an Azure Automation account is created. Automation accounts can be used to automate
  management tasks and orchestrate actions across systems. An adversary may create an Automation account
  in order to maintain persistence in their target’s environment.

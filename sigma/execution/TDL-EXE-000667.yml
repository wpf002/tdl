title: Potentially Malicious Tool Detected - GuardDuty
id: TDL-EXE-000667
status: experimental
description: This detection looks for a suspicious tool has been executed on an EC2 instance or container
  within your AWS environment. This includes tools used in pentesting engagements, also known as backdoor
  tools, network scanners, and network sniffers. All these tools can be used in benign contexts but are
  also frequently used by threat actors with malicious intent. Observing offensive security tools could
  indicate that the associated EC2 instance or container has been compromised.

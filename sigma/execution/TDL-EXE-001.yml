logsource:
  category: process_creation
  product: windows
detection:
  selection:
    EventID:
    - 4688
    CommandLine|contains:
    - -EncodedCommand
    - '-enc '
    - '-e '
  condition: selection
falsepositives:
- Legitimate admin scripts using encoded commands
- SCCM/Intune deployment scripts
level: high

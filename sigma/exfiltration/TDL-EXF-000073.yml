title: Hidden Data Transfer
id: TDL-EXF-000073
status: stable
description: This rule is designed to detect an attacker attempting to exfiltrate data by using non-standard
  ports for applications. By default, this rule looks for standard transfer protocols such as ftp,ssh,sftp,tftp,telnet,ftps.
  However, custom application ports can be added to reduce false positives.

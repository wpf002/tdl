title: Wireless AP Deauthentication Flood
id: TDL-IMP-000188
status: stable
description: Detects a high volume of deauthentication events on an access point. The majority of wireless
  attacks begin with the attacker capturing a client’s authentication to the access point. An attacker
  will send a  high volume of deauthentication packets to kick a client off the network and force them
  to re-authenticate. This can also create a denial-of-service condition for the targeted clients if the
  attacker continues to send a high-volume of deauthentication packets.

title: Default Account Logon
id: TDL-AUTH-000001
status: stable
description: Detects a successful logon to a default account. Attackers may attempt to authenticate to
  a default account in hopes that the account is still active.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:

title: Interactive Logon with Service Account
id: TDL-AUTH-000012
status: stable
description: Detects an interactive logon and/or logons to destinations that the service account doesn’t
  normally log into can be viewed as indicators of compromise. Normally you shouldn’t see an interactive
  login with a service account.

title: Kerberos Account Password Reset
id: TDL-AUTH-000020
status: stable
description: Detects when the Kerberos account (krbtgt) password has been reset or changed. This could
  indicate an attacker attempting to create fake kerberos tickets within the environment. This password
  is typically only reset when a domain has already been compromised and recovery has begun.
references: []
author: TDL

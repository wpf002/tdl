title: Successful Remote Brute Force
id: TDL-AUTH-000031
status: stable
description: This rule is designed to detect a login success from a source that has been previously flagged
  for Remote Password Guessing, this may indicate an attacker successfully guessed a users password.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: signinlogs
  product: azure
detection:
  selection:
    Keywords:
    - Successful Remote Brute Force
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: '000031'

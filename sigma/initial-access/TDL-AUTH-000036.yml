logsource:
  service: syslog
  product: linux
detection:
  selection:
    EventID:
    - 46255
    - 4625
    Keywords:
    - '0xC000006A'
    - '0xC0000064'
    - '0xC000006D'
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: low
custom:

title: Password Spraying
id: TDL-AUTH-000036
status: stable
description: Detects a potential password spraying attack against Windows accounts. Attackers may have
  gathered a list of user accounts and could be attempting to use common passwords against each one in
  order to compromise the accounts.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:

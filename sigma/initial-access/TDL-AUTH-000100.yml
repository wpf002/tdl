title: AWS API Call From Unauthorized Location
id: TDL-AUTH-000100
status: stable
description: Detects when an AWS API call has been requested from a user who is logged from a location
  that is not approved. A typical best practice is to only allow privileged access from designated IPs
  (i.e. the corporate LAN).
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1098
- detection.auth
- detection.initial-access
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - AWS API Call From Unauthorized Location
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: '000100'

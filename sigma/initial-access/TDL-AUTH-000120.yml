title: Mass Account Lockouts
id: TDL-AUTH-000120
status: stable
description: Detects when a large amount of user accounts are locked out which could be indicative of
  an enterprise wide password spraying attack. Attackers could try multiple user accounts and lock them
  out, which could be malicious activity or an attempt to learn the lockout policy of the organization.
references: []
author: TDL

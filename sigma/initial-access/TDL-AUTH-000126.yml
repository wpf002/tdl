title: AWS Admin Account Created by Unauthorized User
id: TDL-AUTH-000126
status: stable
description: Detects when an account has been granted administrative privileges. An attacker with a compromised
  API key may create an account with administrative privileges to establish persistence in AWS before
  executing malicious activities.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1098
- detection.auth
- detection.initial-access
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - AWS Admin Account Created by Unauthorized User
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: '000126'

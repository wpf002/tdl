title: AWS Admin Group Created by Unauthorized User
id: TDL-AUTH-000127
status: stable
description: Detects when a group has been granted administrative privileges. An attacker with a compromised
  API key may create a group with administrative privileges to establish persistence in AWS before executing
  malicious activities. The group that received the administrative privileges will be added to the Administrative
  Group list so any members added can be identified as administrators in other events.
references: []
author: TDE/TDE

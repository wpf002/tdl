title: AWS Password Spraying
id: TDL-AUTH-000129
status: stable
description: Detects an attacker attempting to guess the passwords of multiple AWS users that may not
  exist in AWS. An attacker may use default credentials against known accounts or attempt to guess other
  accounts based on naming conventions to gain access to the AWS console.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - '0xC000006A'
    - '0xC0000064'
    - '0xC000006D'
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: 000129

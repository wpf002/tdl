title: AWS Unauthorized Action Attempts
id: TDL-AUTH-000133
status: stable
description: Detects an AWS account that has been blocked from performing multiple actions due to security
  permissions. An attacker with a compromised account may not know the account’s permissions and will
  attempt abusive activities, which may be blocked due to insufficient privileges.

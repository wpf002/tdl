title: AWS Root Account Used
id: TDL-AUTH-000134
status: stable
description: Detects when the default AWS root account is used. The root account is first created with
  the AWS subscription account and has the highest privileges. It is recommended to immediately create
  a separate administrative account instead of using root, as normal usage of root can make the account
  more vulnerable to compromise. Utilizing a separate administrative account will also aid in forensics
  of any incident that were to occur.
references: []

title: Possible RDP Hijacking
id: TDL-AUTH-000175
status: experimental
description: Detects if the tscon server process is running as the local system account. If attackers
  are able to gain command execution with NT\System then they can hijack any currently logged in user's
  RDP session, without any knowledge about their credentials.

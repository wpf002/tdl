title: AWS Actions without MFA
id: TDL-AUTH-000191
status: stable
description: Detects when an API key or user logs in without multifactor authentication. Attackers may
  compromise API keys or user credentials and attempt to abuse them. Having multifactor is an additional
  security step to prevent this and any action without multifactor could indicate a compromise.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - AWS Actions without MFA
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: 000191

title: AWS API Call from Terminated AD Account
id: TDL-AUTH-000192
status: stable
description: Detects when a user account is disabled or terminated in Active Directory but still has an
  active AWS account. A user’s AWS account may have the same name but not be linked to the organization's
  Active Directory. If the user is terminated, they may have continued access to AWS and can cause harm
  to the organization’s AWS instances.
references: []

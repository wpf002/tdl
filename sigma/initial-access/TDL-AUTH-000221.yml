title: Mass Click Blocked
id: TDL-AUTH-000221
status: stable
description: Detects when multiple users have "clicked" or interacted with an e-mail containing the same
  url that has been classified as malicious and the email security gateway has blocked the attempts. Attackers
  will typically send phishing e-mails to users in an attempt to gain access to the organizations network.
  This could be an indication of a phishing campaign.

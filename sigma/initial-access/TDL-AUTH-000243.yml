title: Allowed Exploit to Vulnerable Host
id: TDL-AUTH-000243
status: stable
description: Detects when an exploit is allowed to a host that is vulnerable to the exploits. This could
  indicate that the attacker has performed successful internal reconnaissance and is acting on that data.
  It will also ensure that attention is drawn to the vulnerable server so that necessary patches may be
  applied. In order to achieve this use case, we will need to have a list of vulnerable hosts via nessus
  scan or other vulnerability management servers.

title: HVT User AWS API Call From Unauthorized Location
id: TDL-AUTH-000249
status: stable
description: Detects when an AWS API call has been requested from a privileged user who is logged from
  a location that is not approved. A typical best practice is to only allow privileged access from designated
  IPs (i.e. the corporate lan).
references: []
author: TDL

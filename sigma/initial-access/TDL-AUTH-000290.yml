title: Successful Logon from Risky IP
id: TDL-AUTH-000290
status: stable
description: This detection identifies that users were active from an IP address identified as risky by
  Microsoft Threat Intelligence. These IP addresses are involved in malicious activities, such as Botnet
  C&C, and may indicate compromised account.

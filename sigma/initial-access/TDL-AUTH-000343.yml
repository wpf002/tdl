title: AWS DNS Rebinding - GuardDuty
id: TDL-AUTH-000343
status: stable
description: Detects when an EC2 instance is s querying a domain that resolves to the EC2 metadata IP
  address (169.254.169.254). A DNS query of this kind may indicate that the instance is a target of a
  DNS rebinding technique. This technique can be used to obtain metadata from an EC2 instance, including
  the IAM credentials associated with the instance. DNS rebinding involves tricking an application running
  on the EC2 instance to load return data from a URL, where the domain name in the URL resolves to the
  EC2 metadata IP address (169.254.169.254). This causes the application to access EC2 metadata and possibly
  make it available to the attacker. It is possible to access EC2 metadata using DNS rebinding only if
  the EC2 instance is running a vulnerable application that allows injection of URLs, or if someone accesses
  the URL in a web browser running on the EC2 instance.

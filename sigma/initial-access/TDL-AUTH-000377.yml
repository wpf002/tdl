title: Anonymous User OneDrive Access
id: TDL-AUTH-000377
status: stable
description: Detects when an anonymous user accesses OneDrive resource through an anonymous link. Anonymous
  links can be used by any authenticated or unauthenticated users and may lead to leaking sensitive data
  outside of the organization.

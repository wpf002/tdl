title: Unauthorized Custom Permissions Created - Salesforce
id: TDL-AUTH-000418
status: stable
description: Custom Permissions in Salesforce are used to give access to users for certain apps or processes
  that you have configured and which cannot be controlled by profile or permission set directly. This
  rule is used to monitor this activity as adversaries could abuse this to escalate privileges.
references: []

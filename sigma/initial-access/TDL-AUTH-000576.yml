title: Kubernetes Service Account Created in Kube Namespace
id: TDL-AUTH-000576
status: experimental
description: Detect when a user is creating a service account in one of the Kubernetes default namespaces.
  The only users creating service accounts in the kube-system namespace should be cluster administrators.
  Furthermore, it is best practice to not run any cluster critical infrastructure in the kube-system namespace.
  The kube-public namespace is intended for kubernetes objects which should be readable by unauthenticated
  users. Thus, a service account should likely not be created in the kube-public namespace.

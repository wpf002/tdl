title: MFA Pin Guessing
id: TDL-AUTH-000592
status: experimental
description: This rule is designed to detect multiple failed MFA pin code attempts for the same user against
  a company's MFA application. This may indicate an attempt to brute force a user's account and bypass
  MFA

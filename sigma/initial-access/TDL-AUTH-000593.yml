title: MFA Pin Spraying
id: TDL-AUTH-000593
status: experimental
description: This rule is designed to detect multiple failed MFA pin code attempts for multiple users
  over a short period of time . This may indicate a threat actor using a bypass code or common pin against
  multiple user accounts to see if they can bypass MFA

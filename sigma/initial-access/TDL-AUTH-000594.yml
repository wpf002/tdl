title: Successful MFA Pin Brute Force
id: TDL-AUTH-000594
status: experimental
description: This rule is designed to detect multiple failed MFA pin code attempts for the same user against
  a company's MFA application followed by a successful login via a MFA pin code. This may indicate a successful
  brute force attempt against a user's account
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: okta
  product: okta
detection:
  selection:
    Keywords:
    - Successful MFA Pin Brute Force
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: medium
custom:
  v4_id: 000594

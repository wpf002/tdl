title: Logon with Break Glass Account
id: TDL-AUTH-000615
status: experimental
description: A rule that detects when there is a successful logon into a break glass account. Break glass
  accounts are highly privileged accounts and should only be used in emergency situations.
references: []
author: TDE/TDE
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: cloudtrail
  product: aws
detection:
  selection:
    Keywords:
    - Logon with Break Glass Account
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: high
custom:
  v4_id: '000615'

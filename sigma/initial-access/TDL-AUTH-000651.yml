title: Azure App Granted Privileged Delegated or App Permissions
id: TDL-AUTH-000651
status: stable
description: Detects when administrator grants either application permissions (app roles) or highly privileged
  delegated permissions. This could indicate that an application has been granted overly permissive permissions.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.initial-access
- attack.t1078
- detection.auth
- detection.initial-access
logsource:
  service: signinlogs
  product: azure
detection:
  selection:
    Keywords:
    - Azure App Granted Privileged Delegated or App Permissions
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: low
custom:
  v4_id: '000651'

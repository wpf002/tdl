title: WinSxS DLL Side-Loading
id: TDL-PER-000227
status: experimental
description: Detects DLL being modified in the WinSxS directories. WinSxS (Windows Side-by-Side) is a
  repository of older versions of DLL files that Windows maintains for backwards-compatibility. If an
  older application is run, Windows will load the older DLLs that correspond to that version instead of
  the current DLL. Attackers can identify which older DLLs are being loaded and replace them with malicious
  DLLs so they will be loaded by the OS which could lead to a system foothold.

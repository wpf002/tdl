title: AWS Security Group Modified by Unauthorized User
id: TDL-PER-000373
status: stable
description: Detects when a AWS security group is modified which could allow unauthorized acces. Attackers
  will modify security groups to establish persistence, exfiltrate data, or pivot in a AWS environment.

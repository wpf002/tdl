title: Hidden Account Creation
id: TDL-PER-000662
status: experimental
description: This rule monitors for the creation of user accounts with names ending in a dollar sign ($),
  which typically indicates a machine account. While such accounts are standard in Active Directory environments
  for computer objects, the unauthorized creation of accounts with this naming pattern could signify malicious
  activity, such as attempts to blend in as legitimate machine accounts to evade detection.

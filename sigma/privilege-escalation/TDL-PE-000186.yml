title: Sudo File Modified
id: TDL-PE-000186
status: stable
description: Detects a user modifying the sudoer file on a host. An attacker may attempt to escalate privileges
  by adding compromised accounts directly to the sudoer file to gain root permissions. These direct modifications
  should be considered suspicious since most sudo additions occur through the adduser or usermod commands.
references: []
author: TDL

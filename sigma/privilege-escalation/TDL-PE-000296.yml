title: Google Workspace Admin Role Created
id: TDL-PE-000296
status: stable
description: This rule detects the creation of a new delegated admin role within Google Workspace. New
  roles of this type can be used to assign administrative privileges to users, and can be part of a privilege
  escalation attempt.
references: []
author: TDL
date: '2024-01-01'
modified: '2026-04-27'
tags:
- attack.privilege-escalation
- attack.t1078
- detection.auth
- detection.privilege-escalation
logsource:
  category: generic
detection:
  selection:
    Keywords:
    - Google Workspace Admin Role Created
  condition: selection
falsepositives:
- Legitimate admin activity
- Authorized service accounts
level: low
custom:
  v4_id: 000296

title: Azure Domain Trust Modification Detected
id: TDL-PE-000370
status: stable
description: Adversaries may add new domain trusts or modify the properties of existing domain trusts
  to evade defenses and/or elevate privileges. This will detect when a user or application modifies the
  federation settings on the domain or update domain authentication.

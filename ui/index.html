<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDL Playbook</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF6B35' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>html, body, #root { margin: 0; background: #0B0B11; min-height: 100%; }</style>
    <script>
      // Only render a fatal-error overlay when the React app fails to bootstrap.
      // After mount, errors are handled by the in-app ErrorBoundary; window-level
      // events here are usually third-party (browser extensions, password managers,
      // injected content scripts) and must NOT replace the user's UI.
      (function () {
        var booted = false;
        window.__markAppBooted = function () { booted = true; };

        function isThirdPartyNoise(e) {
          // Cross-origin errors are reported as "Script error." with no filename/lineno —
          // these come from extensions/injected scripts and are not actionable here.
          if (!e) return true;
          if (e.message === 'Script error.' && !e.filename && !e.lineno) return true;
          // Errors originating from browser extensions.
          if (e.filename && /^(chrome|moz|safari-web|webkit-masked-url)-extension:/.test(e.filename)) return true;
          return false;
        }

        function showFatalOverlay(msg) {
          var root = document.getElementById('root');
          // If React has already painted, do not nuke the user's UI.
          if (booted || (root && root.children.length > 0)) return;
          (root || document.body).innerHTML =
            '<pre style="padding:24px;font:13px ui-monospace,monospace;color:#fca5a5;background:#0b0b0d;white-space:pre-wrap;word-break:break-word;">[Startup error]\n' +
            msg + '</pre>';
        }

        window.addEventListener('error', function (e) {
          if (isThirdPartyNoise(e)) return;
          var detail = (e.error && e.error.stack) || (e.message + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
          if (booted) { console.error('[tdl] window error after mount:', detail); return; }
          showFatalOverlay(detail);
        });

        window.addEventListener('unhandledrejection', function (e) {
          var detail = 'Unhandled promise rejection: ' + ((e.reason && e.reason.stack) || e.reason);
          if (booted) { console.error('[tdl]', detail); return; }
          showFatalOverlay(detail);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

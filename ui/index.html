<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDL Playbook</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FF6B35' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>html, body, #root { margin: 0; background: #0B0B11; min-height: 100%; }</style>
    <script>
      // Surface any unhandled JS error directly in the page instead of a blank screen.
      window.__renderError = function (msg) {
        var root = document.getElementById('root') || document.body;
        root.innerHTML = '<pre style="padding:24px;font:13px ui-monospace,monospace;color:#fca5a5;background:#0b0b0d;white-space:pre-wrap;word-break:break-word;">[Render error]\n' + msg + '</pre>';
      };
      window.addEventListener('error', function (e) {
        window.__renderError((e.error && e.error.stack) || (e.message + ' @ ' + e.filename + ':' + e.lineno));
      });
      window.addEventListener('unhandledrejection', function (e) {
        window.__renderError('Unhandled promise rejection: ' + ((e.reason && e.reason.stack) || e.reason));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
